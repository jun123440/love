<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>提取照片</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Segoe UI','PingFang SC',sans-serif;min-height:100vh}
.header{padding:32px 24px 16px;max-width:1200px;margin:0 auto}
.header h1{font-size:24px;font-weight:300;letter-spacing:4px;color:#fff}
.header p{font-size:13px;color:#666;margin-top:6px;letter-spacing:1px}
.actions{padding:0 24px 24px;max-width:1200px;margin:0 auto;display:flex;gap:12px;flex-wrap:wrap}
.btn{padding:8px 24px;border:1px solid #333;background:transparent;color:#ccc;border-radius:6px;cursor:pointer;font-size:13px;transition:.2s;font-family:inherit;letter-spacing:1px}
.btn:hover{background:#1a1a1a;color:#fff;border-color:#555}
.btn:disabled{opacity:.3;cursor:default}
.btn.primary{background:#fff;color:#0d0d0d;border-color:#fff}
.btn.primary:hover{background:#e0e0e0}
.grid{padding:0 24px 48px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#141414;border-radius:10px;overflow:hidden;border:1px solid #222;transition:.2s;position:relative}
.card:hover{border-color:#444}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;cursor:pointer;background:#1a1a1a}
.card-info{padding:12px 14px 14px;display:flex;align-items:center;justify-content:space-between}
.card-info .name{font-size:12px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-info .size{font-size:11px;color:#555;margin-left:8px}
.card-info .dl-btn{padding:4px 12px;border:1px solid #333;background:transparent;color:#999;border-radius:4px;cursor:pointer;font-size:11px;transition:.2s;font-family:inherit;margin-left:8px;text-decoration:none}
.card-info .dl-btn:hover{background:#fff;color:#0d0d0d;border-color:#fff}
.empty{grid-column:1/-1;text-align:center;padding:80px 24px;color:#555;font-size:14px;letter-spacing:1px}
.loading{grid-column:1/-1;text-align:center;padding:80px 24px;color:#555;font-size:13px;letter-spacing:2px}
.status-bar{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:10px 24px;font-size:12px;color:#555;display:flex;justify-content:space-between;align-items:center}
.status-bar .count{color:#888}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;cursor:pointer}
.modal.show{display:flex}
.modal img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:4px}
.modal .close-modal{position:fixed;top:20px;right:24px;color:#666;font-size:28px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal .close-modal:hover{color:#fff}
.modal .dl-modal{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);padding:10px 32px;border:1px solid #333;background:rgba(255,255,255,.05);color:#ccc;border-radius:100px;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:2px;backdrop-filter:blur(8px);text-decoration:none;transition:.2s}
.modal .dl-modal:hover{background:rgba(255,255,255,.12);color:#fff}
.select-overlay{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:2}
.select-overlay.selected{border-color:#fff;background:rgba(255,255,255,.9)}
.select-overlay.selected::after{content:'';width:8px;height:8px;border-radius:50%;background:#0d0d0d}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:0 12px 48px}.header,.actions{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>

<div class="header">
  <h1>提取照片</h1>
  <p id="statusText">加载中...</p>
</div>

<div class="actions" id="actionsBar" style="display:none">
  <button class="btn primary" id="selectAllBtn">全选</button>
  <button class="btn" id="downloadSelectedBtn" disabled>下载选中 (0)</button>
  <button class="btn" id="refreshBtn">刷新</button>
</div>

<div class="grid" id="grid">
  <div class="loading">加载中...</div>
</div>

<div class="status-bar" id="statusBar" style="display:none">
  <span class="count" id="fileCount"></span>
  <span id="totalSize"></span>
</div>

<div class="modal" id="modal">
  <span class="close-modal" onclick="closeModal()">✕</span>
  <img id="modalImg" src="" alt="preview">
  <a class="dl-modal" id="modalDlBtn" download>下载原图</a>
</div>

<script>
// Token
const TOKEN_KEY='d0wnl04d_k3y_2024'
const TOKEN_BYTES=[3,88,24,49,62,100,4,0,22,37,124,41,59,115,120,5,12,43,98,54,8,91,67,5,60,11,44,100,41,37,102,119,99,89,84,88,69,56,11,103]
function getToken(){
  return TOKEN_BYTES.map((v,i)=>String.fromCharCode(v^TOKEN_KEY.charCodeAt(i%TOKEN_KEY.length))).join('')
}

const TOKEN=getToken()
const REPO='jun123440/face-captures'
const AUTH={Authorization:'Bearer '+TOKEN,'User-Agent':'extract'}
let allFiles=[],selected=new Set()
let loading=false

async function loadPhotos(){
  const grid=document.getElementById('grid')
  const statusText=document.getElementById('statusText')
  const actionsBar=document.getElementById('actionsBar')
  const statusBar=document.getElementById('statusBar')
  loading=true
  grid.innerHTML='<div class="loading">加载中...</div>'
  statusText.textContent='正在从私有仓库加载...'
  try{
    // Try to list photos directory
    let res=await fetch('https://api.github.com/repos/'+REPO+'/contents/photos',{headers:AUTH})
    if(!res.ok){
      // Maybe no photos dir yet
      if(res.status===404){
        grid.innerHTML='<div class="empty">暂无照片</div>'
        statusText.textContent='暂无照片'
        actionsBar.style.display='none'
        statusBar.style.display='none'
        loading=false
        return
      }
      throw new Error('HTTP '+res.status)
    }
    let files=await res.json()
    // Filter to images only
    allFiles=files.filter(f=>f.type==='file'&&/\.(jpg|jpeg|png|webp)$/i.test(f.name))
    if(allFiles.length===0){
      grid.innerHTML='<div class="empty">暂无照片</div>'
      statusText.textContent='暂无照片'
      actionsBar.style.display='none'
      statusBar.style.display='none'
      loading=false
      return
    }
    // Sort by name descending (newest first)
    allFiles.sort((a,b)=>b.name.localeCompare(a.name))
    selected.clear()
    updateUI()
    renderGrid()
    statusText.textContent='共 '+allFiles.length+' 张照片'
    actionsBar.style.display='flex'
    statusBar.style.display='flex'
    updateStatusBar()
  }catch(e){
    grid.innerHTML='<div class="empty">加载失败：'+e.message+'</div>'
    statusText.textContent='加载失败'
  }
  loading=false
}

function renderGrid(){
  const grid=document.getElementById('grid')
  grid.innerHTML=''
  for(const file of allFiles){
    const card=document.createElement('div')
    card.className='card'
    // Thumbnail via API
    const thumbPromise=getDataUrl(file.path)
    card.innerHTML='<div class="select-overlay" data-path="'+file.path+'" onclick="toggleSelect(event,\''+file.path+'\')"></div><img src="" alt="'+file.name+'" data-path="'+file.path+'" onclick="openModal(\''+file.path+'\')">'+
      '<div class="card-info"><span class="name" title="'+file.name+'">'+file.name+'</span><span class="size">'+formatSize(file.size)+'</span><a class="dl-btn" href="#" data-path="'+file.path+'" download="'+file.name+'">下载</a></div>'
    grid.appendChild(card)
    // Load thumbnail async
    thumbPromise.then(url=>{
      const img=card.querySelector('img')
      if(img)img.src=url
    })
    // Wire download
    const dlBtn=card.querySelector('.dl-btn')
    dlBtn.addEventListener('click',async function(e){
      e.stopPropagation()
      const path=this.dataset.path
      const url=await getDataUrl(path)
      const a=document.createElement('a')
      a.href=url
      a.download=this.getAttribute('download')
      a.click()
    })
  }
}

async function getDataUrl(path){
  try{
    let res=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+path,{headers:AUTH})
    let data=await res.json()
    // Determine MIME type
    const ext=path.split('.').pop().toLowerCase()
    const mime={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',webp:'image/webp'}[ext]||'image/jpeg'
    return 'data:'+mime+';base64,'+data.content
  }catch(e){
    return ''
  }
}

function toggleSelect(e,path){
  e.stopPropagation()
  if(selected.has(path))selected.delete(path)
  else selected.add(path)
  updateUI()
}

function updateUI(){
  document.querySelectorAll('.select-overlay').forEach(el=>{
    el.classList.toggle('selected',selected.has(el.dataset.path))
  })
  const btn=document.getElementById('downloadSelectedBtn')
  const count=selected.size
  btn.disabled=count===0
  btn.textContent='下载选中 ('+count+')'
  document.getElementById('selectAllBtn').textContent=selected.size===allFiles.length?'取消全选':'全选'
}

function updateStatusBar(){
  const total=allFiles.reduce((s,f)=>s+f.size,0)
  document.getElementById('fileCount').textContent=allFiles.length+' 张照片'
  document.getElementById('totalSize').textContent=formatSize(total)
}

function formatSize(bytes){
  if(bytes<1024)return bytes+' B'
  if(bytes<1024*1024)return (bytes/1024).toFixed(1)+' KB'
  return (bytes/(1024*1024)).toFixed(1)+' MB'
}

function formatDate(iso){
  const d=new Date(iso)
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')
}

// Modal
function openModal(path){
  const modal=document.getElementById('modal')
  const img=document.getElementById('modalImg')
  const dlBtn=document.getElementById('modalDlBtn')
  modal.classList.add('show')
  img.src=''
  dlBtn.removeAttribute('href')
  // Determine filename
  const file=allFiles.find(f=>f.path===path)
  const name=file?file.name:'photo.jpg'
  getDataUrl(path).then(url=>{
    img.src=url
    dlBtn.href=url
    dlBtn.download=name
  })
}

function closeModal(){
  document.getElementById('modal').classList.remove('show')
}

document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeModal()
})

document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal()
})

// Select all
document.getElementById('selectAllBtn').addEventListener('click',function(){
  if(selected.size===allFiles.length){
    selected.clear()
  }else{
    allFiles.forEach(f=>selected.add(f.path))
  }
  updateUI()
})

// Download selected
document.getElementById('downloadSelectedBtn').addEventListener('click',async function(){
  if(selected.size===0)return
  this.disabled=true
  this.textContent='准备中...'
  const paths=[...selected]
  // Download one by one
  for(const path of paths){
    const file=allFiles.find(f=>f.path===path)
    const name=file?file.name:'photo.jpg'
    const url=await getDataUrl(path)
    const a=document.createElement('a')
    a.href=url
    a.download=name
    a.click()
    // Small delay between triggers
    await new Promise(r=>setTimeout(r,300))
  }
  this.disabled=false
  this.textContent='下载选中 ('+selected.size+')'
})

// Refresh
document.getElementById('refreshBtn').addEventListener('click',loadPhotos)

// Init
loadPhotos()
</script>
</body>
</html>
