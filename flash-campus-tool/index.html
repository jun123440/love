<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪动校园 · 运动数据模拟器</title>
  <link rel="stylesheet" href="https://cdn.tailwindcss.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@latest/css/font-awesome.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0c0e1a 0%, #1a1b2e 50%, #0f1923 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
    }
    .gradient-text {
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.3), rgba(52, 211, 153, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #3b82f6, #10b981);
      outline: none;
      width: 100%;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.3);
      transition: all 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 30px rgba(52, 211, 153, 0.5);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .stat-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #10b981);
      border: none;
      color: white;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.35);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #cbd5e1;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      color: white;
    }
    select, input[type="date"], input[type="time"] {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #e2e8f0;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      width: 100%;
    }
    select:focus, input[type="date"]:focus, input[type="time"]:focus {
      border-color: rgba(96, 165, 250, 0.5);
      box-shadow: 0 0 15px rgba(96, 165, 250, 0.15);
    }
    select option {
      background: #1a1b2e;
      color: #e2e8f0;
    }
    .label-text {
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.3px;
    }
    .value-text {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }
    #trailCanvas {
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }
    .glow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(16, 185, 129, 0.9);
      backdrop-filter: blur(12px);
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .bg-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @media (max-width: 768px) {
      .value-text { font-size: 16px; }
      .btn-primary { padding: 10px 24px; font-size: 14px; }
    }
    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    .data-row:last-child { border-bottom: none; }
    .data-row .key { color: #94a3b8; }
    .data-row .val { color: #e2e8f0; font-weight: 500; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="max-w-7xl mx-auto px-4 py-6 md:py-10">
    <!-- 头部 -->
    <div class="text-center mb-8 fade-in">
      <div class="flex items-center justify-center gap-3 mb-2">
        <i class="fa fa-bolt text-3xl" style="color: #34d399;"></i>
        <h1 class="text-3xl md:text-4xl font-bold">
          <span class="gradient-text">闪动校园</span>
          <span class="text-gray-300 font-light">· 数据模拟器</span>
        </h1>
      </div>
      <p class="text-gray-500 text-sm">生成逼真的运动跑步数据，支持轨迹可视化与导出</p>
    </div>

    <!-- 主内容区 -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

      <!-- 左侧：参数设置 -->
      <div class="lg:col-span-2">
        <div class="glass-strong p-6 fade-in" style="animation-delay: 0.1s;">
          <div class="flex items-center gap-2 mb-6">
            <i class="fa fa-sliders text-blue-400 text-lg"></i>
            <h2 class="text-lg font-semibold text-gray-200">跑步参数</h2>
          </div>

          <div class="space-y-6">

            <!-- 距离 -->
            <div>
              <div class="flex justify-between items-center mb-2">
                <span class="label-text"><i class="fa fa-arrows-h mr-1 text-blue-400"></i>跑步距离</span>
                <span class="value-text" id="distanceDisplay">5.0 <span class="text-sm font-normal text-gray-400">km</span></span>
              </div>
              <input type="range" id="distance" min="0.5" max="25" step="0.1" value="5.0">
              <div class="flex justify-between text-xs text-gray-600 mt-1">
                <span>0.5 km</span>
                <span>25 km</span>
              </div>
            </div>

            <!-- 配速 -->
            <div>
              <div class="flex justify-between items-center mb-2">
                <span class="label-text"><i class="fa fa-clock-o mr-1 text-emerald-400"></i>平均配速</span>
                <span class="value-text" id="paceDisplay">4:30 <span class="text-sm font-normal text-gray-400">/km</span></span>
              </div>
              <input type="range" id="pace" min="3" max="8" step="0.1" value="4.5">
              <div class="flex justify-between text-xs text-gray-600 mt-1">
                <span>3:00 /km</span>
                <span>8:00 /km</span>
              </div>
            </div>

            <!-- 步频 -->
            <div>
              <div class="flex justify-between items-center mb-2">
                <span class="label-text"><i class="fa fa fa-shoe-prints mr-1 text-purple-400"></i>步频</span>
                <span class="value-text" id="cadenceDisplay">165 <span class="text-sm font-normal text-gray-400">步/分</span></span>
              </div>
              <input type="range" id="cadence" min="120" max="200" step="1" value="165">
              <div class="flex justify-between text-xs text-gray-600 mt-1">
                <span>120 spm</span>
                <span>200 spm</span>
              </div>
            </div>

            <!-- 路线模式 -->
            <div>
              <div class="flex items-center gap-2 mb-2">
                <i class="fa fa-map-o text-rose-400 text-sm"></i>
                <span class="label-text">路线模式</span>
              </div>
              <select id="routeMode">
                <option value="loop">环形路线</option>
                <option value="outback">折返路线</option>
                <option value="random">自由路线</option>
              </select>
            </div>

            <!-- 跑步时段 -->
            <div>
              <div class="flex items-center gap-2 mb-2">
                <i class="fa fa-sun-o text-yellow-400 text-sm"></i>
                <span class="label-text">跑步时段</span>
              </div>
              <select id="timeSlot">
                <option value="morning">🌅 晨跑 (06:00-08:00)</option>
                <option value="am">☀️ 上午 (08:00-11:00)</option>
                <option value="noon">🌤️ 中午 (11:00-14:00)</option>
                <option value="pm">🌇 下午 (14:00-17:00)</option>
                <option value="evening" selected>🌆 傍晚 (17:00-19:00)</option>
                <option value="night">🌙 夜跑 (19:00-22:00)</option>
              </select>
            </div>

            <!-- 日期 -->
            <div>
              <div class="flex items-center gap-2 mb-2">
                <i class="fa fa-calendar text-cyan-400 text-sm"></i>
                <span class="label-text">跑步日期</span>
              </div>
              <input type="date" id="runDate">
            </div>

            <!-- 生成按钮 -->
            <div class="pt-2">
              <button class="btn-primary w-full justify-center" id="generateBtn">
                <i class="fa fa-magic"></i>
                生成运动数据
              </button>
            </div>

          </div>
        </div>
      </div>

      <!-- 右侧：数据展示 -->
      <div class="lg:col-span-3 space-y-6">

        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in" style="animation-delay: 0.2s;">
          <div class="glass stat-card p-4 text-center">
            <div class="text-xs text-gray-500 mb-1"><i class="fa fa-arrows-h mr-1 text-blue-400"></i>总距离</div>
            <div class="text-2xl font-bold text-white" id="statDistance">0 <span class="text-sm font-normal text-gray-400">km</span></div>
          </div>
          <div class="glass stat-card p-4 text-center">
            <div class="text-xs text-gray-500 mb-1"><i class="fa fa-clock-o mr-1 text-emerald-400"></i>总时长</div>
            <div class="text-2xl font-bold text-white" id="statDuration">0 <span class="text-sm font-normal text-gray-400">min</span></div>
          </div>
          <div class="glass stat-card p-4 text-center">
            <div class="text-xs text-gray-500 mb-1"><i class="fa fa-tachometer mr-1 text-purple-400"></i>平均配速</div>
            <div class="text-2xl font-bold text-white" id="statPace">0 <span class="text-sm font-normal text-gray-400">/km</span></div>
          </div>
          <div class="glass stat-card p-4 text-center">
            <div class="text-xs text-gray-500 mb-1"><i class="fa fa-fire mr-1 text-rose-400"></i>消耗</div>
            <div class="text-2xl font-bold text-white" id="statCalories">0 <span class="text-sm font-normal text-gray-400">kcal</span></div>
          </div>
        </div>

        <!-- 轨迹图 + 详情 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in" style="animation-delay: 0.3s;">
          <!-- 轨迹图 -->
          <div class="md:col-span-2">
            <div class="glass-strong p-4 h-full">
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                  <i class="fa fa-map-marker text-rose-400"></i>
                  <h3 class="text-sm font-semibold text-gray-300">GPS 轨迹</h3>
                </div>
                <div class="flex items-center gap-3 text-xs text-gray-500">
                  <span><span class="glow-dot bg-emerald-400" style="animation-delay: 0s;"></span> 起点</span>
                  <span><span class="glow-dot bg-rose-400" style="animation-delay: 1s;"></span> 终点</span>
                </div>
              </div>
              <div class="bg-grid rounded-lg overflow-hidden" style="background-color: rgba(0,0,0,0.3); aspect-ratio: 16/10;">
                <canvas id="trailCanvas" width="800" height="500"></canvas>
              </div>
            </div>
          </div>

          <!-- 详情 -->
          <div>
            <div class="glass-strong p-4 h-full">
              <div class="flex items-center gap-2 mb-4">
                <i class="fa fa-list text-cyan-400"></i>
                <h3 class="text-sm font-semibold text-gray-300">详细数据</h3>
              </div>
              <div id="detailData">
                <div class="text-gray-500 text-sm text-center py-8">点击「生成数据」<br>查看详细运动数据</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 操作栏 -->
        <div class="flex flex-wrap gap-3 justify-end fade-in" style="animation-delay: 0.4s;">
          <button class="btn-secondary" id="copyBtn">
            <i class="fa fa-copy"></i>
            复制 JSON
          </button>
          <button class="btn-secondary" id="exportBtn">
            <i class="fa fa-download"></i>
            导出 JSON
          </button>
          <button class="btn-secondary" id="resetBtn">
            <i class="fa fa-refresh"></i>
            重置
          </button>
        </div>

      </div>
    </div>

    <!-- 底部 -->
    <div class="text-center mt-10 text-gray-600 text-xs fade-in" style="animation-delay: 0.5s;">
      本工具仅用于数据模拟与学习研究
    </div>
  </div>

  <script>
    // === DOM 引用 ===
    const $ = id => document.getElementById(id);
    const distance = $('distance');
    const pace = $('pace');
    const cadence = $('cadence');
    const distanceDisplay = $('distanceDisplay');
    const paceDisplay = $('paceDisplay');
    const cadenceDisplay = $('cadenceDisplay');
    const routeMode = $('routeMode');
    const timeSlot = $('timeSlot');
    const runDate = $('runDate');
    const generateBtn = $('generateBtn');
    const copyBtn = $('copyBtn');
    const exportBtn = $('exportBtn');
    const resetBtn = $('resetBtn');
    const canvas = $('trailCanvas');
    const ctx = canvas.getContext('2d');
    const toast = $('toast');

    // 统计显示
    const statDistance = $('statDistance');
    const statDuration = $('statDuration');
    const statPace = $('statPace');
    const statCalories = $('statCalories');
    const detailData = $('detailData');

    // 当前生成的数据
    let currentData = null;

    // 设置默认日期为今天
    runDate.valueAsDate = new Date();

    // === 参数显示更新 ===
    distance.addEventListener('input', () => {
      const v = parseFloat(distance.value);
      distanceDisplay.innerHTML = `${v.toFixed(1)} <span class="text-sm font-normal text-gray-400">km</span>`;
    });

    pace.addEventListener('input', () => {
      const v = parseFloat(pace.value);
      const min = Math.floor(v);
      const sec = Math.round((v - min) * 60);
      paceDisplay.innerHTML = `${min}:${sec.toString().padStart(2, '0')} <span class="text-sm font-normal text-gray-400">/km</span>`;
    });

    cadence.addEventListener('input', () => {
      const v = parseInt(cadence.value);
      cadenceDisplay.innerHTML = `${v} <span class="text-sm font-normal text-gray-400">步/分</span>`;
    });

    // === 工具函数 ===
    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.style.background = isError ? 'rgba(239, 68, 68, 0.9)' : 'rgba(16, 185, 129, 0.9)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function paceToSeconds(p) {
      return p * 60;
    }

    function formatPace(secPerKm) {
      const min = Math.floor(secPerKm / 60);
      const sec = Math.round(secPerKm % 60);
      return `${min}:${sec.toString().padStart(2, '0')}`;
    }

    function formatDuration(totalSec) {
      const min = Math.floor(totalSec / 60);
      const sec = Math.round(totalSec % 60);
      return `${min}分${sec}秒`;
    }

    function getTimeSlotRange(slot) {
      const map = {
        'morning': [6, 8],
        'am': [8, 11],
        'noon': [11, 14],
        'pm': [14, 17],
        'evening': [17, 19],
        'night': [19, 22]
      };
      return map[slot] || [17, 19];
    }

    // === GPS 轨迹生成 ===
    function generateRoute(distanceKm, mode, numPoints) {
      // 模拟校园区域（武汉大学附近）
      const centerLat = 30.537;
      const centerLng = 114.365;
      const scale = 0.0012; // 每单位距离的经纬度变化

      // 根据距离决定路径长度
      const pathLength = Math.max(20, numPoints);
      const points = [];

      switch (mode) {
        case 'loop': {
          const segments = Math.max(6, Math.floor(pathLength / 4));
          for (let i = 0; i <= pathLength; i++) {
            const t = i / pathLength;
            const angle = t * Math.PI * 2;
            const radius = 0.5 + Math.sin(t * Math.PI * 3) * 0.2;
            const r = radius * scale * distanceKm * 0.8;
            const lat = centerLat + Math.sin(angle) * r + (Math.random() - 0.5) * scale * 0.3;
            const lng = centerLng + Math.cos(angle) * r + (Math.random() - 0.5) * scale * 0.3;
            points.push({ lat, lng });
          }
          break;
        }
        case 'outback': {
          const half = Math.floor(pathLength / 2);
          const maxR = scale * distanceKm * 0.6;
          for (let i = 0; i <= pathLength; i++) {
            const t = i / pathLength;
            const progress = t <= 0.5 ? t * 2 : 2 - t * 2;
            const r = maxR * progress;
            const angle = Math.PI / 4 + Math.sin(t * Math.PI * 4) * 0.3;
            const lat = centerLat + Math.cos(angle) * r + (Math.random() - 0.5) * scale * 0.2;
            const lng = centerLng + Math.sin(angle) * r + (Math.random() - 0.5) * scale * 0.2;
            points.push({ lat, lng });
          }
          break;
        }
        case 'random': {
          let lat = centerLat;
          let lng = centerLng;
          const step = scale * distanceKm * 0.08;
          const angles = [];
          let currentAngle = Math.random() * Math.PI * 2;
          for (let i = 0; i <= pathLength; i++) {
            points.push({ lat, lng });
            currentAngle += (Math.random() - 0.5) * 0.8;
            lat += Math.cos(currentAngle) * step * (0.8 + Math.random() * 0.4);
            lng += Math.sin(currentAngle) * step * (0.8 + Math.random() * 0.4);
            // 约束范围
            const dr = Math.hypot(lat - centerLat, lng - centerLng);
            const maxR = scale * distanceKm * 0.7;
            if (dr > maxR) {
              const ratio = maxR / dr;
              lat = centerLat + (lat - centerLat) * ratio * 0.95;
              lng = centerLng + (lng - centerLng) * ratio * 0.95;
              currentAngle += Math.PI * 0.5;
            }
          }
          break;
        }
      }
      return points;
    }

    // === 主生成逻辑 ===
    function generateData() {
      const dist = parseFloat(distance.value);
      const paceVal = parseFloat(pace.value); // min/km
      const cad = parseInt(cadence.value);
      const mode = routeMode.value;
      const dateStr = runDate.value;
      const slot = timeSlot.value;

      // 计算基本数据
      const paceSec = paceToSeconds(paceVal);
      const totalSec = dist * paceSec;
      const totalMin = totalSec / 60;
      const steps = Math.round(cad * totalMin);

      // 卡路里（体重65kg估算）
      const weight = 65;
      const calories = Math.round(weight * dist * 1.036);

      // 时间范围
      const [hourStart, hourEnd] = getTimeSlotRange(slot);
      const startHour = hourStart + Math.floor(Math.random() * (hourEnd - hourStart));
      const startMin = Math.floor(Math.random() * 60);
      const startTime = `${startHour.toString().padStart(2, '0')}:${startMin.toString().padStart(2, '0')}`;

      const startDate = new Date(`${dateStr}T${startTime}:00`);
      const endDate = new Date(startDate.getTime() + totalSec * 1000);
      const endTime = `${endDate.getHours().toString().padStart(2, '0')}:${endDate.getMinutes().toString().padStart(2, '0')}`;

      // 生成GPS路线
      const numPoints = Math.max(30, Math.floor(dist * 15));
      const rawRoute = generateRoute(dist, mode, numPoints);

      // 给路线点添加时间和海拔
      const route = rawRoute.map((p, i) => {
        const t = i / rawRoute.length;
        const pointTime = new Date(startDate.getTime() + t * totalSec * 1000);
        const altitude = 20 + Math.sin(t * Math.PI * 6) * 5 + Math.random() * 3;
        return {
          lat: parseFloat(p.lat.toFixed(6)),
          lng: parseFloat(p.lng.toFixed(6)),
          altitude: parseFloat(altitude.toFixed(1)),
          time: pointTime.toISOString()
        };
      });

      // 配速变化（轻微波动）
      const paceSamples = [];
      for (let i = 0; i < 10; i++) {
        paceSamples.push(paceSec + (Math.random() - 0.5) * paceSec * 0.15);
      }

      const data = {
        generatedAt: new Date().toISOString(),
        summary: {
          distance: parseFloat(dist.toFixed(2)),
          duration: Math.round(totalSec),
          durationFormatted: formatDuration(totalSec),
          avgPace: paceSec,
          avgPaceFormatted: formatPace(paceSec),
          cadence: cad,
          steps: steps,
          calories: calories,
          avgSpeed: parseFloat((dist / (totalSec / 3600)).toFixed(2))
        },
        timeInfo: {
          date: dateStr,
          startTime: startTime,
          endTime: endTime,
          startISO: startDate.toISOString(),
          endISO: endDate.toISOString()
        },
        route: route
      };

      currentData = data;
      return data;
    }

    // === 绘制轨迹 ===
    function drawTrail(route) {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      if (!route || route.length < 2) return;

      // 提取坐标并映射到画布
      const lats = route.map(p => p.lat);
      const lngs = route.map(p => p.lng);
      const minLat = Math.min(...lats);
      const maxLat = Math.max(...lats);
      const minLng = Math.min(...lngs);
      const maxLng = Math.max(...lngs);

      const padding = 50;
      const rangeLat = maxLat - minLat || 0.001;
      const rangeLng = maxLng - minLng || 0.001;

      function mapToCanvas(lat, lng) {
        const x = padding + (lng - minLng) / rangeLng * (w - 2 * padding);
        const y = h - padding - (lat - minLat) / rangeLat * (h - 2 * padding);
        return { x, y };
      }

      // 绘制网格
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 10; i++) {
        const x = padding + i / 10 * (w - 2 * padding);
        const y = padding + i / 10 * (h - 2 * padding);
        ctx.beginPath();
        ctx.moveTo(x, padding);
        ctx.lineTo(x, h - padding);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(w - padding, y);
        ctx.stroke();
      }

      // 绘制轨迹线
      const points = route.map(p => mapToCanvas(p.lat, p.lng));

      // 渐变轨迹线
      const gradient = ctx.createLinearGradient(0, 0, w, h);
      gradient.addColorStop(0, '#34d399');
      gradient.addColorStop(0.5, '#60a5fa');
      gradient.addColorStop(1, '#8b5cf6');

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = 'rgba(52, 211, 153, 0.3)';
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // 绘制轨迹点（小圆点）
      for (let i = 0; i < points.length; i += Math.max(1, Math.floor(points.length / 60))) {
        ctx.beginPath();
        ctx.arc(points[i].x, points[i].y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();
      }

      // 起点（绿色）
      const start = points[0];
      ctx.beginPath();
      ctx.arc(start.x, start.y, 9, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(52, 211, 153, 0.9)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', start.x, start.y);

      // 终点（红色）
      const end = points[points.length - 1];
      ctx.beginPath();
      ctx.arc(end.x, end.y, 9, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(251, 146, 60, 0.9)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.font = 'bold 10px sans-serif';
      ctx.fillText('E', end.x, end.y);

      // 起点终点标注
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(`起点 ${route[0].lat.toFixed(4)}, ${route[0].lng.toFixed(4)}`, start.x, start.y + 14);
      ctx.fillText(`终点 ${route[route.length - 1].lat.toFixed(4)}, ${route[route.length - 1].lng.toFixed(4)}`, end.x, end.y + 14);

      // 距离标注
      const midIdx = Math.floor(points.length / 2);
      const mid = points[midIdx];
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(`● ${currentData.summary.distance.toFixed(1)} km`, mid.x, mid.y - 8);
    }

    // === 更新UI ===
    function updateUI(data) {
      const s = data.summary;
      statDistance.innerHTML = `${s.distance.toFixed(2)} <span class="text-sm font-normal text-gray-400">km</span>`;
      statDuration.innerHTML = `${Math.round(s.duration / 60)} <span class="text-sm font-normal text-gray-400">min</span>`;
      statPace.innerHTML = `${s.avgPaceFormatted} <span class="text-sm font-normal text-gray-400">/km</span>`;
      statCalories.innerHTML = `${s.calories} <span class="text-sm font-normal text-gray-400">kcal</span>`;

      // 详细数据
      detailData.innerHTML = `
        <div class="space-y-1">
          <div class="data-row"><span class="key">距离</span><span class="val">${s.distance.toFixed(2)} km</span></div>
          <div class="data-row"><span class="key">时长</span><span class="val">${s.durationFormatted}</span></div>
          <div class="data-row"><span class="key">配速</span><span class="val">${s.avgPaceFormatted} /km</span></div>
          <div class="data-row"><span class="key">速度</span><span class="val">${s.avgSpeed} km/h</span></div>
          <div class="data-row"><span class="key">步频</span><span class="val">${s.cadence} 步/分</span></div>
          <div class="data-row"><span class="key">步数</span><span class="val">${s.steps.toLocaleString()} 步</span></div>
          <div class="data-row"><span class="key">消耗</span><span class="val">${s.calories} kcal</span></div>
          <div class="data-row"><span class="key">开始</span><span class="val">${data.timeInfo.startTime}</span></div>
          <div class="data-row"><span class="key">结束</span><span class="val">${data.timeInfo.endTime}</span></div>
          <div class="data-row"><span class="key">日期</span><span class="val">${data.timeInfo.date}</span></div>
          <div class="data-row"><span class="key">轨迹点</span><span class="val">${data.route.length} 个</span></div>
        </div>
      `;

      drawTrail(data.route);
    }

    // === 生成 ===
    generateBtn.addEventListener('click', () => {
      const data = generateData();
      updateUI(data);
      showToast('✅ 运动数据生成成功！');
    });

    // === 复制 JSON ===
    copyBtn.addEventListener('click', async () => {
      if (!currentData) { showToast('请先生成数据', true); return; }
      try {
        await navigator.clipboard.writeText(JSON.stringify(currentData, null, 2));
        showToast('✅ JSON 已复制到剪贴板');
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = JSON.stringify(currentData, null, 2);
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✅ JSON 已复制到剪贴板');
      }
    });

    // === 导出 JSON ===
    exportBtn.addEventListener('click', () => {
      if (!currentData) { showToast('请先生成数据', true); return; }
      const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const fileName = `run_data_${currentData.timeInfo.date}_${currentData.timeInfo.startTime.replace(':', '')}.json`;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✅ JSON 文件已导出');
    });

    // === 重置 ===
    resetBtn.addEventListener('click', () => {
      distance.value = 5;
      pace.value = 4.5;
      cadence.value = 165;
      routeMode.value = 'loop';
      timeSlot.value = 'evening';
      runDate.valueAsDate = new Date();

      distance.dispatchEvent(new Event('input'));
      pace.dispatchEvent(new Event('input'));
      cadence.dispatchEvent(new Event('input'));

      currentData = null;
      statDistance.innerHTML = '0 <span class="text-sm font-normal text-gray-400">km</span>';
      statDuration.innerHTML = '0 <span class="text-sm font-normal text-gray-400">min</span>';
      statPace.innerHTML = '0 <span class="text-sm font-normal text-gray-400">/km</span>';
      statCalories.innerHTML = '0 <span class="text-sm font-normal text-gray-400">kcal</span>';
      detailData.innerHTML = '<div class="text-gray-500 text-sm text-center py-8">点击「生成数据」<br>查看详细运动数据</div>';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      showToast('已重置所有参数');
    });

    // === 初始绘制（默认生成一次）===
    window.addEventListener('load', () => {
      const data = generateData();
      updateUI(data);
    });

    // === 响应式 Canvas ===
    function resizeCanvas() {
      const container = canvas.parentElement;
      const rect = container.getBoundingClientRect();
      const aspect = 16 / 10;
      let w = container.clientWidth;
      let h = w / aspect;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      canvas.width = w * 2;
      canvas.height = h * 2;
      canvas.getContext('2d').scale(2, 2);
      if (currentData) drawTrail(currentData.route);
    }

    window.addEventListener('resize', resizeCanvas);
    // 初始绘制后延迟调整尺寸
    setTimeout(resizeCanvas, 100);
  </script>
</body>
</html>
