<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anti Burn · 防烧屏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
#screen{position:fixed;top:0;left:0;width:100%;height:100%;transition:background .8s ease}
#screen.dark{background:#050505}
#screen.white{background:#ffffff}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0;transition:opacity .8s ease}
#canvas.show{opacity:1}
.hud{position:fixed;z-index:10;font-variant-numeric:tabular-nums;pointer-events:none;text-align:center;transition:color .6s}
.hud.dark{color:rgba(255,255,255,.5)}
.hud.white{color:rgba(0,0,0,.35)}
#total{top:30px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:300;letter-spacing:1px}
#countdown{top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;font-weight:200;letter-spacing:2px;line-height:1.2}
#countdown .label{display:block;font-size:13px;font-weight:300;letter-spacing:2px;margin-top:6px}
#nextLabel{bottom:60px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:200;opacity:.35}
#next{bottom:36px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:300;letter-spacing:.5px}
#progress-wrap{position:fixed;top:0;left:0;width:100%;height:2px;z-index:10}
#progress-fill{height:100%;width:0%;transition:width 1s linear}
#progress-wrap.dark-bar #progress-fill{background:rgba(255,255,255,.08)}
#progress-wrap.white-bar #progress-fill{background:rgba(0,0,0,.1)}
.done{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:#fff;opacity:0;pointer-events:none;transition:opacity 1.2s}
.done.show{opacity:1;pointer-events:auto}
.done h1{font-weight:200;font-size:30px;color:#222;margin-bottom:8px}
.done p{font-weight:200;font-size:13px;color:#999}
</style>
</head>
<body>

<div id="screen" class="dark"></div>
<canvas id="canvas"></canvas>

<div id="total" class="hud dark">总时长 03:00:00</div>
<div id="countdown" class="hud dark">--<span class="label">距离下次白屏</span></div>
<div id="nextLabel" class="hud dark">状态</div>
<div id="next" class="hud dark">等待中</div>
<div id="progress-wrap" class="dark-bar"><div id="progress-fill"></div></div>

<div class="done" id="done">
  <h1>✓ 已完成 3 小时</h1>
  <p>点击屏幕重新开始</p>
</div>

<script>
const TOTAL = 3 * 60 * 60 * 1000
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const screen = document.getElementById('screen')
const totalEl = document.getElementById('total')
const countdownEl = document.getElementById('countdown')
const nextLabelEl = document.getElementById('nextLabel')
const nextEl = document.getElementById('next')
const progressFill = document.getElementById('progress-fill')
const progressWrap = document.getElementById('progress-wrap')
const done = document.getElementById('done')

let W, H
let startTime = localStorage.getItem('abStart')
  ? parseInt(localStorage.getItem('abStart'))
  : Date.now()
if (!localStorage.getItem('abStart')) {
  localStorage.setItem('abStart', startTime)
}

let state = 'waiting' // waiting | white
let nextTarget = 0
let animId = null
let particles = []
let completed = false

function resize() {
  W = canvas.width = window.innerWidth
  H = canvas.height = window.innerHeight
}
window.addEventListener('resize', resize)
resize()

function cls(c) {
  screen.className = c
  document.querySelectorAll('.hud').forEach(el => {
    el.className = el.className.replace(/hud \w+/, 'hud ' + c)
  })
  progressWrap.className = c === 'dark' ? 'dark-bar' : 'white-bar'
}

function fmt(ms) {
  const h = Math.floor(ms / 3600000)
  const m = Math.floor((ms % 3600000) / 60000)
  const s = Math.floor((ms % 60000) / 1000)
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
}

function scheduleNext() {
  const delay = 30000 + Math.random() * 150000 // 30s ~ 3min
  nextTarget = Date.now() + delay
  state = 'waiting'
  cls('dark')
  canvas.classList.remove('show')
}

function initParticles(n = 80) {
  particles = []
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 2 + 0.5,
      ph: Math.random() * Math.PI * 2
    })
  }
}

function drawParticles(t) {
  ctx.clearRect(0, 0, W, H)
  for (const p of particles) {
    p.x += p.vx
    p.y += p.vy
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0
    const a = 0.02 + 0.015 * Math.sin(t * 0.001 + p.ph)
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(210,210,210,${a})`
    ctx.fill()
  }
  const sweep = 0.5 + 0.5 * Math.sin(t * 0.0003)
  ctx.fillStyle = `rgba(255,255,255,${sweep * 0.003})`
  ctx.fillRect(0, 0, W, H)
}

function loop(t) {
  const now = Date.now()
  const elapsed = now - startTime
  const remaining = Math.max(0, TOTAL - elapsed)
  const progress = Math.min(1, elapsed / TOTAL)

  totalEl.textContent = '总时长 ' + fmt(remaining)

  if (state === 'waiting') {
    const diff = Math.max(0, nextTarget - now)
    const sec = Math.ceil(diff / 1000)
    countdownEl.innerHTML = sec + '<span class="label">距离下次白屏</span>'
    nextEl.textContent = sec <= 0 ? '马上白屏' : sec + ' 秒后白屏'
    nextLabelEl.textContent = '状态'

    if (diff <= 0) {
      state = 'white'
      cls('white')
      canvas.classList.add('show')
      initParticles(60)
      const dur = 5000 + Math.random() * 10000 // 5~15s
      nextTarget = now + dur
    }
  }

  if (state === 'white') {
    const diff = Math.max(0, nextTarget - now)
    const sec = Math.ceil(diff / 1000)
    countdownEl.innerHTML = sec + '<span class="label">白屏进行中</span>'
    nextEl.textContent = '白屏保护中…'
    nextLabelEl.textContent = '状态'
    drawParticles(t)

    if (diff <= 0) {
      scheduleNext()
    }
  }

  progressFill.style.width = progress * 100 + '%'

  if (elapsed >= TOTAL && !completed) {
    completed = true
    state = 'done'
    cls('white')
    canvas.classList.remove('show')
    document.querySelectorAll('.hud').forEach(e => e.style.opacity = '0')
    progressWrap.style.opacity = '0'
    setTimeout(() => done.classList.add('show'), 800)
    localStorage.removeItem('abStart')
    return
  }

  animId = requestAnimationFrame(loop)
}

function restart() {
  localStorage.removeItem('abStart')
  startTime = Date.now()
  localStorage.setItem('abStart', startTime)
  completed = false
  done.classList.remove('show')
  document.querySelectorAll('.hud').forEach(e => e.style.opacity = '1')
  progressWrap.style.opacity = '1'
  state = 'waiting'
  scheduleNext()
  if (animId) cancelAnimationFrame(animId)
  animId = requestAnimationFrame(loop)
}

document.addEventListener('click', () => {
  if (completed) restart()
})

scheduleNext()
animId = requestAnimationFrame(loop)
</script>
</body>
</html>
