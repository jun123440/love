<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>love collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-snap-type:y mandatory;overflow-y:scroll}
body{font-family:'Outfit',sans-serif;background:#08080f;color:#e8e8f0;overflow-x:hidden}

canvas#bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}

section{scroll-snap-align:start;width:100vw;height:100vh;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem}

/* ==== Hero ==== */
#hero{justify-content:center;align-items:center}
.hero-label{font-family:'DM Mono',monospace;font-weight:400;font-size:clamp(0.65rem,0.8vw,0.75rem);letter-spacing:0.5em;text-transform:uppercase;color:rgba(232,232,240,0.25);margin-bottom:1.5rem;position:relative;z-index:2}
.hero-title{font-family:'Alex Brush',cursive;font-size:clamp(4rem,14vw,12rem);letter-spacing:0.02em;line-height:0.85;text-align:center;position:relative;z-index:2}
.hero-title .line{display:block;text-align:center}
.hero-title .line1{font-family:'Alex Brush',cursive;font-size:clamp(3.5rem,12vw,10rem);line-height:0.85;color:#50b0e8;opacity:0.5;text-shadow:0 0 15px rgba(50,160,230,0.3);-webkit-text-stroke:0.5px rgba(255,255,255,0.25)}
.hero-title .line1 .hero-char{display:inline-block;opacity:0;animation:loveReveal 0.8s ease both}
.hero-title .line2{font-family:'Alex Brush',cursive;color:rgba(232,232,240,0.1);font-size:clamp(1.8rem,6vw,5rem);line-height:1}
.hero-title .line2 .hero-char{display:inline-block;opacity:0;animation:loveReveal 0.8s ease both}
@keyframes loveReveal{0%{opacity:0;transform:translateY(40px) rotate(-6deg) scale(0.8)}100%{opacity:1;transform:translateY(0) rotate(0) scale(1)}}
.hero-sub{font-size:clamp(0.8rem,1.2vw,1rem);font-weight:300;color:rgba(232,232,240,0.35);margin-top:2rem;letter-spacing:0.15em;position:relative;z-index:2;opacity:0;animation:fadeUp 0.8s ease 1.4s both}
@keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.scroll-indicator{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.5rem;z-index:2}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,rgba(232,232,240,0.4),transparent);animation:scrollPulse 2.5s ease infinite}
.scroll-text{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(232,232,240,0.2)}
@keyframes scrollPulse{0%,100%{opacity:1;transform:scaleY(1)}50%{opacity:0.3;transform:scaleY(0.6)}}

/* ==== Works ==== */
#works{justify-content:center;gap:2.5rem;padding-top:4rem;padding-bottom:4rem}
.section-label{font-family:'DM Mono',monospace;font-weight:400;font-size:clamp(0.55rem,0.7vw,0.65rem);letter-spacing:0.5em;text-transform:uppercase;color:rgba(232,232,240,0.12);position:relative;z-index:2}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;max-width:780px;width:88%;position:relative;z-index:2}

.card{display:flex;flex-direction:column;gap:0.4rem;padding:1.25rem 1.5rem;border-radius:14px;text-decoration:none;color:#e8e8f0;position:relative;overflow:hidden;cursor:pointer;
background:rgba(232,232,240,0.03);border:1px solid rgba(232,232,240,0.06);
transition:all 0.5s cubic-bezier(0.23,1,0.32,1);transform-style:preserve-3d;perspective:600px}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(120% 120% at 50% -20%,var(--glow),transparent 70%);opacity:0;transition:opacity 0.5s;pointer-events:none}
.card::after{content:'';position:absolute;inset:0;border-radius:14px;padding:1px;background:linear-gradient(135deg,var(--glow),transparent 60%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity 0.5s;pointer-events:none}
.card:hover{transform:translateY(-6px) scale(1.015);border-color:rgba(232,232,240,0.12);background:rgba(232,232,240,0.06)}
.card:hover::before{opacity:1}
.card:hover::after{opacity:1}
.card-num{font-family:'DM Mono',monospace;font-size:0.6rem;font-weight:500;color:rgba(232,232,240,0.15);letter-spacing:0.05em}
.card-name{font-size:0.9rem;font-weight:600;letter-spacing:0.01em}

/* ==== End ==== */
#end{justify-content:center;align-items:center;gap:1.5rem}
#end .end-text{font-family:'Outfit',sans-serif;font-weight:300;font-size:clamp(0.8rem,1.2vw,1rem);color:rgba(232,232,240,0.15);letter-spacing:0.15em;position:relative;z-index:2}
#end a{color:rgba(232,232,240,0.3);text-decoration:none;transition:color 0.3s;position:relative;z-index:2;font-size:0.8rem;letter-spacing:0.05em}
#end a:hover{color:#44aacc}

/* ==== Responsive ==== */
@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr);gap:0.5rem;width:92%}.card{padding:1rem 1.2rem}.card-name{font-size:0.8rem}}
@media(min-width:1200px){.grid{max-width:900px;gap:1rem}.card{padding:1.5rem 1.75rem}.card-name{font-size:1rem}}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<section id="hero">
  <div class="hero-label">Portfolio</div>
  <div class="hero-title">
    <span class="line line1"><span class="hero-char" style="animation-delay:0s">l</span><span class="hero-char" style="animation-delay:0.08s">o</span><span class="hero-char" style="animation-delay:0.16s">v</span><span class="hero-char" style="animation-delay:0.24s">e</span></span>
    <span class="line line2"><span class="hero-char" style="animation-delay:0.4s">c</span><span class="hero-char" style="animation-delay:0.48s">o</span><span class="hero-char" style="animation-delay:0.56s">l</span><span class="hero-char" style="animation-delay:0.64s">l</span><span class="hero-char" style="animation-delay:0.72s">e</span><span class="hero-char" style="animation-delay:0.8s">c</span><span class="hero-char" style="animation-delay:0.88s">t</span><span class="hero-char" style="animation-delay:0.96s">i</span><span class="hero-char" style="animation-delay:1.04s">o</span><span class="hero-char" style="animation-delay:1.12s">n</span></span>
  </div>
  <div class="hero-sub">A Collection of Experiments</div>
  <div class="scroll-indicator">
    <div class="scroll-line"></div>
    <div class="scroll-text">Scroll</div>
  </div>
</section>

<section id="works">
  <div class="section-label">Projects</div>
  <div class="grid" id="projectGrid"></div>
</section>

<section id="end">
  <div class="end-text">Explore &middot; Create &middot; Repeat</div>
  <a href="https://github.com/jun123440" target="_blank" rel="noopener">GitHub ↗</a>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const projects = [
  {name:'3D Earth',path:'3d-earth/',hsl:0.58},
  {name:'App',path:'app/',hsl:0.55},
  {name:'Black Hole',path:'blackhole/',hsl:0.75},
  {name:'Confession',path:'confession/',hsl:0.88},
  {name:'Earth Plus',path:'earth-plus/',hsl:0.42},
  {name:'EVA Wallpaper',path:'eva-wallpaper/',hsl:0.60},
  {name:'Particle Magic',path:'particle-magic/',hsl:0.02},
  {name:'Rose',path:'rose/',hsl:0.95},
  {name:'Solar System',path:'solar-system/',hsl:0.05},
  {name:'Black Hole+',path:'black-hole.html',hsl:0.72},
  {name:'Pac-Man',path:'pacman/',hsl:0.12}
];

const grid = document.getElementById('projectGrid');
projects.forEach((p,i)=>{
  const a = document.createElement('a');
  a.className = 'card';
  a.href = p.path;
  const c = new THREE.Color().setHSL(p.hsl,0.6,0.5);
  const hex = '#'+c.getHexString();
  a.style.setProperty('--glow', hex + '44');
  a.innerHTML = '<div class="card-num">'+(i+1).toString().padStart(2,'0')+'</div><div class="card-name">'+p.name+'</div>';
  grid.appendChild(a);
  a.addEventListener('mousemove',function(e){
    const r=this.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-0.5;
    const y=(e.clientY-r.top)/r.height-0.5;
    this.style.transform='perspective(600px) rotateY('+(x*8)+'deg) rotateX('+(-y*8)+'deg) translateY(-6px) scale(1.015)';
  });
  a.addEventListener('mouseleave',function(){this.style.transform='';});
});

// ==== Three.js Scene ====
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x08080f, 0.03);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 8);

// ==== Centerpiece: Octahedron ====
const centerGeo = new THREE.OctahedronGeometry(1.2, 0);
const centerMat = new THREE.MeshPhysicalMaterial({
  color: 0x0088cc,
  metalness: 0.3,
  roughness: 0.2,
  transparent: true,
  opacity: 0.9,
  clearcoat: 0.3,
  envMapIntensity: 0.5
});
const center = new THREE.Mesh(centerGeo, centerMat);
scene.add(center);

const wireMat = new THREE.MeshBasicMaterial({
  color: 0x0088cc,
  wireframe: true,
  transparent: true,
  opacity: 0.15
});
const centerWire = new THREE.Mesh(centerGeo.clone(), wireMat);
centerWire.scale.set(1.05, 1.05, 1.05);
scene.add(centerWire);

// ==== Orbiting Elements ====
const orbiters = [];
const orbiterConfigs = [
  { radius: 2.8, speed: 0.4, size: 0.5, geo: 'icosahedron', color: 0x44aacc, offset: 0, plane: 'xz' },
  { radius: 3.4, speed: -0.3, size: 0.4, geo: 'dodecahedron', color: 0x006699, offset: 2.1, plane: 'xy' },
  { radius: 4.0, speed: 0.2, size: 0.35, geo: 'octahedron', color: 0x4488cc, offset: 4.2, plane: 'yz' },
  { radius: 2.2, speed: -0.5, size: 0.25, geo: 'tetrahedron', color: 0x44aadd, offset: 1.5, plane: 'xz' }
];

orbiterConfigs.forEach((cfg, idx) => {
  let geo;
  switch(cfg.geo) {
    case 'icosahedron': geo = new THREE.IcosahedronGeometry(cfg.size, 0); break;
    case 'dodecahedron': geo = new THREE.DodecahedronGeometry(cfg.size, 0); break;
    case 'octahedron': geo = new THREE.OctahedronGeometry(cfg.size, 0); break;
    case 'tetrahedron': geo = new THREE.TetrahedronGeometry(cfg.size, 0); break;
  }
  
  const mat = new THREE.MeshPhysicalMaterial({
    color: cfg.color,
    metalness: 0.2,
    roughness: 0.3,
    transparent: true,
    opacity: 0.7,
    clearcoat: 0.2
  });
  
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = cfg;
  mesh.userData.angle = cfg.offset;
  scene.add(mesh);
  
  const glowGeo = new THREE.SphereGeometry(cfg.size * 1.8, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: cfg.color,
    transparent: true,
    opacity: 0.05,
    wireframe: true
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  scene.add(glow);
  
  orbiters.push({ mesh, glow, cfg });
});

// ==== Connecting Lines ====
const lineMat = new THREE.LineBasicMaterial({
  color: 0x0088cc,
  transparent: true,
  opacity: 0.08
});

const linePositions = new Float32Array(orbiterConfigs.length * 6);
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
const line = new THREE.LineSegments(lineGeo, lineMat);
scene.add(line);

// ==== Particles ====
const count = 2000;
const pos = new Float32Array(count * 3);
const col = new Float32Array(count * 3);

for(let i=0; i<count; i++){
  const r = 2 + Math.random() * 8;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  pos[i*3+2] = r * Math.cos(phi);
  const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.6, 0.4 + Math.random() * 0.3);
  col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
}

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));

const pMat = new THREE.PointsMaterial({
  size: 0.03,
  vertexColors: true,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// ==== Ambient Glow Sphere ====
const ambGeo = new THREE.SphereGeometry(2.0, 32, 32);
const ambMat = new THREE.MeshBasicMaterial({
  color: 0x0088cc,
  transparent: true,
  opacity: 0.03,
  wireframe: true
});
const ambSphere = new THREE.Mesh(ambGeo, ambMat);
scene.add(ambSphere);

// ==== Mouse ====
const mouse = { x:0, y:0, targetX:0, targetY:0 };
document.addEventListener('mousemove', e => {
  mouse.targetX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.targetY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ==== Scroll State ====
let scrollProgress = 0;

window.addEventListener('scroll', () => {
  const totalH = document.body.scrollHeight - window.innerHeight;
  scrollProgress = Math.min(1, Math.max(0, window.scrollY / totalH));
});

// ==== Animation ====
function animate(){
  requestAnimationFrame(animate);
  
  mouse.x += (mouse.targetX - mouse.x) * 0.05;
  mouse.y += (mouse.targetY - mouse.y) * 0.05;
  
  const camTargetZ = 8 - scrollProgress * 3;
  camera.position.x += (mouse.x * 0.3 - camera.position.x) * 0.03;
  camera.position.y += (-mouse.y * 0.2 - camera.position.y) * 0.03;
  camera.position.z += (camTargetZ - camera.position.z) * 0.03;
  camera.lookAt(0, 0, 0);

  center.rotation.x += 0.004;
  center.rotation.y += 0.007;
  centerWire.rotation.x = center.rotation.x;
  centerWire.rotation.y = center.rotation.y;
  
  const pulse = 1 + Math.sin(Date.now() * 0.001) * 0.02;
  const scrollScale = 1 - scrollProgress * 0.3;
  center.scale.set(pulse * scrollScale, pulse * scrollScale, pulse * scrollScale);
  centerWire.scale.set(1.05 * pulse * scrollScale, 1.05 * pulse * scrollScale, 1.05 * pulse * scrollScale);

  const spread = 1 + scrollProgress * 0.6;
  const orbiterPositions = [];
  
  orbiters.forEach((item, idx) => {
    item.cfg.angle += 0.01 * item.cfg.speed;
    const a = item.cfg.angle;
    const r = item.cfg.radius * spread;
    let x, y, z;
    
    switch(item.cfg.plane) {
      case 'xz':
        x = Math.cos(a) * r;
        y = Math.sin(a * 0.5) * 0.5;
        z = Math.sin(a) * r;
        break;
      case 'xy':
        x = Math.cos(a) * r * 0.7;
        y = Math.sin(a) * r * 0.7;
        z = Math.sin(a * 0.7) * 1.5;
        break;
      case 'yz':
        x = Math.sin(a * 0.7) * 1.2;
        y = Math.cos(a) * r * 0.7;
        z = Math.sin(a) * r * 0.7;
        break;
    }
    
    item.mesh.position.set(x, y, z);
    item.mesh.rotation.x += 0.01 * item.cfg.speed;
    item.mesh.rotation.y += 0.02 * item.cfg.speed;
    item.glow.position.copy(item.mesh.position);
    orbiterPositions.push(x, y, z);
  });

  const lp = line.geometry.attributes.position.array;
  for(let i=0; i<orbiterPositions.length; i+=3){
    lp[i] = 0; lp[i+1] = 0; lp[i+2] = 0;
    lp[i+3] = orbiterPositions[i];
    lp[i+4] = orbiterPositions[i+1];
    lp[i+5] = orbiterPositions[i+2];
  }
  line.geometry.attributes.position.needsUpdate = true;

  ambSphere.rotation.x += 0.001;
  ambSphere.rotation.y += 0.002;
  const ambPulse = 1 + Math.sin(Date.now() * 0.0008) * 0.05;
  ambSphere.scale.set(ambPulse, ambPulse, ambPulse);

  particles.rotation.y += 0.0003;
  particles.rotation.x += 0.0001;
  pMat.opacity = 0.3 + scrollProgress * 0.3;

  scene.fog.density = 0.03 + scrollProgress * 0.02;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
