<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Rose 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }
        #loading {
            position: fixed; inset: 0; display: flex;
            align-items: center; justify-content: center;
            color: #ff88aa; font: 1.2rem sans-serif;
            letter-spacing: 3px; z-index: 10;
            background: #1a1a2e; transition: opacity 0.8s;
        }
        #loading.hide { opacity: 0; pointer-events: none; }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font: 12px sans-serif;
            z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">🌹 加载中...</div>
    <div id="info">拖拽旋转 · 滚轮缩放</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 2, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.target.set(0, 0.5, 0);
        controls.update();

        const ambient = new THREE.AmbientLight(0x222244, 0.6);
        scene.add(ambient);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        mainLight.position.set(5, 8, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.8);
        fillLight.position.set(-3, 2, -4);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff88aa, 1.2);
        rimLight.position.set(-2, 4, 5);
        scene.add(rimLight);

        const bgLight = new THREE.PointLight(0xff4488, 0.5, 10);
        bgLight.position.set(0, 1, -3);
        scene.add(bgLight);

        const groundGeom = new THREE.PlaneGeometry(10, 10);
        const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.3;
        ground.receiveShadow = true;
        scene.add(ground);

        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
        loader.setDRACOLoader(dracoLoader);

        loader.load(
            'https://raw.githubusercontent.com/Ikenga4y/Pink-rose/main/single_flower__rose_pink%20(1).glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(1, 1, 1);
                model.position.set(0, 0, 0);
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                scene.add(model);

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                controls.target.copy(center);
                camera.position.set(center.x + size * 1.2, center.y + size * 0.6, center.z + size * 1.2);
                controls.update();

                document.getElementById('loading').classList.add('hide');
            },
            undefined,
            (err) => {
                document.getElementById('loading').textContent = '❌ 加载失败';
                console.error(err);
            }
        );

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
