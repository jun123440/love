<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Creative Code</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#08080f;color:#e8e8f0;font-family:'Outfit',sans-serif;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#content{position:relative;z-index:1}
.section{height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.bg-wrap{position:absolute;inset:0;overflow:hidden;z-index:0}
.bg-img{width:100%;height:100%;object-fit:cover;opacity:0.35;filter:saturate(0.7)}
.bg-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(8,8,15,0.85),rgba(8,8,15,0.5))}
.section-content{position:relative;z-index:2;text-align:center;max-width:840px;padding:clamp(24px,5vw,48px)}
.hero-label{font-family:'DM Mono',monospace;font-size:clamp(0.7rem,1vw,0.9rem);letter-spacing:0.35em;text-transform:uppercase;color:rgba(232,232,240,0.35);margin-bottom:clamp(12px,2vh,24px)}
.hero-title{font-size:clamp(2.8rem,11vw,7rem);font-weight:900;line-height:0.9;letter-spacing:-0.06em;margin-bottom:clamp(6px,1.5vh,16px)}
.hero-creative{background:linear-gradient(135deg,#006699,#44aacc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.hero-code{display:inline-block;color:#e8e8f0}
.hero-code span{display:inline-block;animation:heroFloat 0.7s ease both}
.hero-code span:nth-child(1){animation-delay:0s}
.hero-code span:nth-child(2){animation-delay:0.06s}
.hero-code span:nth-child(3){animation-delay:0.12s}
.hero-code span:nth-child(4){animation-delay:0.18s}
@keyframes heroFloat{0%{opacity:0;transform:translateY(50px) rotateX(-30deg)}100%{opacity:1;transform:translateY(0) rotateX(0)}}
.hero-sub{font-size:clamp(0.85rem,1.5vw,1.2rem);font-weight:300;color:rgba(232,232,240,0.4);letter-spacing:0.12em}
.project-card{text-align:left;width:100%;max-width:640px;padding:clamp(16px,3vw,32px)}
.project-number{font-family:'DM Mono',monospace;font-size:clamp(1.5rem,3vw,2.8rem);font-weight:500;opacity:0.1;position:absolute;top:0;right:clamp(16px,3vw,32px);line-height:1}
.project-name{font-size:clamp(1.5rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:4px}
.project-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:clamp(0.55rem,0.8vw,0.7rem);letter-spacing:0.15em;text-transform:uppercase;padding:3px 10px;border:1px solid rgba(232,232,240,0.2);border-radius:16px;margin-bottom:10px;opacity:0.5;color:rgba(232,232,240,0.6)}
.project-desc{font-size:clamp(0.8rem,1.2vw,1rem);font-weight:300;color:rgba(232,232,240,0.45);line-height:1.6;margin-bottom:clamp(10px,1.5vh,20px);max-width:460px}
.project-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:clamp(0.65rem,0.9vw,0.8rem);color:rgba(232,232,240,0.5);text-decoration:none;padding:6px 16px;border:1px solid rgba(232,232,240,0.1);border-radius:24px;transition:all 0.3s}
.project-link:hover{background:rgba(232,232,240,0.06);border-color:rgba(232,232,240,0.25);color:#e8e8f0}
.end-section .section-content{text-align:center}
.end-title{font-size:clamp(1.4rem,2.8vw,2.2rem);font-weight:300;color:rgba(232,232,240,0.25);letter-spacing:0.08em;margin-bottom:8px}
.end-sub{font-family:'DM Mono',monospace;font-size:clamp(0.65rem,0.9vw,0.8rem);color:rgba(232,232,240,0.15)}
.end-link{display:inline-flex;align-items:center;gap:6px;color:rgba(232,232,240,0.3);text-decoration:none;font-family:'DM Mono',monospace;font-size:0.75rem;margin-top:12px;padding:6px 14px;border:1px solid rgba(232,232,240,0.08);border-radius:18px;transition:all 0.3s}
.end-link:hover{color:#e8e8f0;border-color:rgba(232,232,240,0.2)}
@media(max-width:600px){
  .section-content{padding:16px}
  .project-card{padding:8px}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="content">
  <section class="section" id="hero">
    <div class="section-content">
      <div class="hero-label">Portfolio</div>
      <div class="hero-title">
        <span class="hero-creative">Creative</span>
        <span class="hero-code"><span>C</span><span>o</span><span>d</span><span>e</span></span>
      </div>
      <div class="hero-sub">A Collection of Experiments</div>
    </div>
  </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const COLORS = [
  {main:0x4488cc,em:0x1a3a5a,label:'deep blue'},     // 0 3D Earth
  {main:0x44aa88,em:0x1a4a3a,label:'teal'},           // 1 App
  {main:0x8844aa,em:0x3a1a4a,label:'purple'},         // 2 Black Hole
  {main:0xcc4466,em:0x5a1a2a,label:'rose'},           // 3 Confession
  {main:0x448855,em:0x1a3a2a,label:'forest'},         // 4 Earth Plus
  {main:0xaa4477,em:0x4a1a3a,label:'magenta'},        // 5 EVA
  {main:0x44aacc,em:0x1a4a5a,label:'cyan'},           // 6 Particle Magic
  {main:0xcc4444,em:0x5a1a1a,label:'red'},            // 7 Rose
  {main:0xcc8844,em:0x5a3a1a,label:'gold'},           // 8 Solar System
  {main:0x6644cc,em:0x2a1a5a,label:'indigo'}          // 9 Black Hole+
];
// All colors defined above

const projects = [
  {name:'3D Earth',path:'3d-earth/',type:'globe',tag:'3D Visualization',desc:'Interactive 3D globe with rotation and zoom controls',bg:'https://images.unsplash.com/photo-1777047023742-1607aeb1a5bb?w=1920&q=80',ci:0},
  {name:'App',path:'app/',type:'tech',tag:'Interactive Tool',desc:'Multi-page application with modern UI interactions',bg:'https://images.unsplash.com/photo-1742199009963-c028d0c5a603?w=1920&q=80',ci:1},
  {name:'Black Hole',path:'blackhole/',type:'vortex',tag:'Simulation',desc:'Gravitational field simulation with particle accretion disk',bg:'https://images.unsplash.com/photo-1771095436222-e20a8737fcd1?w=1920&q=80',ci:2},
  {name:'Confession',path:'confession/',type:'heart',tag:'Interactive Art',desc:'Romantic animated page with dynamic visual effects',bg:'https://images.unsplash.com/photo-1726387871055-35c2c98357f9?w=1920&q=80',ci:3},
  {name:'Earth Plus',path:'earth-plus/',type:'globe',tag:'3D Visualization',desc:'Interactive 3D globe with rotation and zoom controls',bg:'https://images.unsplash.com/photo-1766119871772-0bf74304a9e7?w=1920&q=80',ci:4},
  {name:'EVA Wallpaper',path:'eva-wallpaper/',type:'eva',tag:'Generator Tool',desc:'Neon-themed wallpaper generator with custom patterns',bg:'https://images.unsplash.com/photo-1752070493852-3c4554538293?w=1920&q=80',ci:5},
  {name:'Particle Magic',path:'particle-magic/',type:'particles',tag:'Visual Effect',desc:'Real-time particle system with mouse interaction',bg:'https://images.unsplash.com/photo-1760389276378-63ecc0df6d52?w=1920&q=80',ci:6},
  {name:'Rose',path:'rose/',type:'flower',tag:'Generative Art',desc:'Mathematical rose curve rendered in 3D space',bg:'https://images.unsplash.com/photo-1751569543798-ced8c41a37ee?w=1920&q=80',ci:7},
  {name:'Solar System',path:'solar-system/',type:'orbit',tag:'Simulation',desc:'Full solar system model with orbital mechanics',bg:'https://images.unsplash.com/photo-1708257106582-3734df4532e7?w=1920&q=80',ci:8},
  {name:'Black Hole+',path:'black-hole.html',type:'vortex',tag:'Simulation',desc:'Gravitational field simulation with particle accretion disk',bg:'https://images.unsplash.com/photo-1761232007928-258c9bd98d66?w=1920&q=80',ci:9}
];

// Build project sections
const content = document.getElementById('content');
projects.forEach((p,i)=>{
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.dataset.idx = i;
  sec.innerHTML = `<div class="bg-wrap"><img class="bg-img" src="${p.bg}" alt="" loading="lazy"></div><div class="section-content"><div class="project-card"><div class="project-number">${String(i+1).padStart(2,'0')}</div><div class="project-name" style="color:hsl(${p.ci*36+180},50%,55%)">${p.name}</div><div class="project-tag">${p.tag}</div><div class="project-desc">${p.desc}</div><a class="project-link" href="${p.path}">View Project <span>→</span></a></div></div>`;
  content.appendChild(sec);
});
// End section
const endSec = document.createElement('section');
endSec.className = 'section end-section';
endSec.innerHTML = '<div class="section-content"><div class="end-title">Explore · Create · Repeat</div><div class="end-sub">All projects built with curiosity</div><a class="end-link" href="https://github.com/jun123440" target="_blank">GitHub ↗</a></div>';
content.appendChild(endSec);

// ---- Three.js Setup ----
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
cam.position.z = 7;

const ambient = new THREE.AmbientLight(0x222244,0.4);
scene.add(ambient);
const dl1 = new THREE.DirectionalLight(0xffffff,0.8);
dl1.position.set(5,5,5);
scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8888ff,0.3);
dl2.position.set(-3,-3,4);
scene.add(dl2);

// ---- 3D Factory Functions ----
function createGlobe(g,c){
  const sp = new THREE.Mesh(new THREE.SphereGeometry(1.5,48,48),new THREE.MeshPhongMaterial({color:c.main,emissive:c.em,emissiveIntensity:0.3,shininess:40}));
  const wire = new THREE.Mesh(new THREE.SphereGeometry(1.52,24,24),new THREE.MeshBasicMaterial({color:c.main,wireframe:true,transparent:true,opacity:0.15}));
  const ring = new THREE.Mesh(new THREE.RingGeometry(2.0,2.8,64),new THREE.MeshBasicMaterial({color:c.main,side:THREE.DoubleSide,transparent:true,opacity:0.1}));
  ring.rotation.x = Math.PI*0.3;
  const pc = 300; const pos = new Float32Array(pc*3);
  for(let i=0;i<pc;i++){const a=Math.random()*Math.PI*2;const r=2.5+Math.random()*1.5;const h=(Math.random()-0.5)*0.5;pos[i*3]=r*Math.cos(a);pos[i*3+1]=h;pos[i*3+2]=r*Math.sin(a)}
  const pGeo = new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pMesh = new THREE.Points(pGeo,new THREE.PointsMaterial({color:c.main,size:0.035,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending}));
  g.add(sp,wire,ring,pMesh);
  let scattered=false;
  function scatter(){const p=pMesh.geometry.attributes.position.array;for(let i=0;i<pc;i++){const a=Math.random()*Math.PI*2;const r=4+Math.random()*3;p[i*3]=r*Math.cos(a);p[i*3+1]=(Math.random()-0.5)*3;p[i*3+2]=r*Math.sin(a)}pMesh.geometry.attributes.position.needsUpdate=true;scattered=true}
  function reset(){const p=pMesh.geometry.attributes.position.array;for(let i=0;i<pc;i++){const a=Math.random()*Math.PI*2;const r=2.5+Math.random()*1.5;p[i*3]=r*Math.cos(a);p[i*3+1]=(Math.random()-0.5)*0.5;p[i*3+2]=r*Math.sin(a)}pMesh.geometry.attributes.position.needsUpdate=true;scattered=false}
  return {
    reset(){
      g.scale.setScalar(1);sp.scale.setScalar(1);wire.scale.setScalar(1);ring.scale.setScalar(1);
      reset();
    },
    scatter(){scatter()},
    updateIdle(t){
      sp.rotation.y=t*0.15;sp.rotation.x=Math.sin(t*0.1)*0.1;
      wire.rotation.y=t*0.18;wire.rotation.x=Math.sin(t*0.1)*0.1;
      ring.rotation.y=t*0.08;ring.rotation.x=Math.PI*0.3+Math.sin(t*0.05)*0.05;
      if(!scattered){const p=pMesh.geometry.attributes.position.array;for(let i=0;i<pc;i++){const i3=i*3;const x=p[i3],z=p[i3+2];const r=Math.sqrt(x*x+z*z);const a=Math.atan2(z,x)+0.005;p[i3]=r*Math.cos(a);p[i3+2]=r*Math.sin(a)}pMesh.geometry.attributes.position.needsUpdate=true}
    },
    updateOut(t,m){
      const s=1-m*0.6;g.scale.setScalar(s);
      sp.rotation.y=t*0.3;wire.rotation.y=t*0.35;
      const p=pMesh.geometry.attributes.position.array;
      for(let i=0;i<pc;i++){const i3=i*3;const x=p[i3],z=p[i3+2];const r=Math.sqrt(x*x+z*z);const a=Math.atan2(z,x)+m*0.1+m*0.3*(Math.sin(t+i));const nr=r+0.1;p[i3]=nr*Math.cos(a);p[i3+2]=nr*Math.sin(a);p[i3+1]+=Math.sin(t+i)*0.005*m}
      pMesh.geometry.attributes.position.needsUpdate=true;
    },
    updateIn(t,m){
      const s=m<0.5?m*2:1;g.scale.setScalar(s);
      sp.rotation.y=t*0.05*(1-m);wire.rotation.y=t*0.05*(1-m);
      if(!scattered){const p=pMesh.geometry.attributes.position.array;for(let i=0;i<pc;i++){const i3=i*3;const x=p[i3],z=p[i3+2];const r=Math.sqrt(x*x+z*z);const a=Math.atan2(z,x)-0.01*(1-m);const nr=r-0.02;p[i3]=nr*Math.cos(a);p[i3+2]=nr*Math.sin(a);if(m>0.5){p[i3+1]*=0.98}}pMesh.geometry.attributes.position.needsUpdate=true}
    }
  };
}

function createVortex(g,c){
  const bh = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),new THREE.MeshPhongMaterial({color:0x000000,emissive:c.main,emissiveIntensity:0.4}));
  const glow = new THREE.Mesh(new THREE.RingGeometry(0.55,0.9,32),new THREE.MeshBasicMaterial({color:c.main,side:THREE.DoubleSide,transparent:true,opacity:0.12}));
  glow.rotation.x=-Math.PI*0.5;
  const pc=600;const pos=new Float32Array(pc*3);
  for(let i=0;i<pc;i++){const a=Math.random()*Math.PI*2;const r=0.7+Math.random()*3.5;pos[i*3]=r*Math.cos(a);pos[i*3+1]=(Math.random()-0.5)*0.6*(r/4);pos[i*3+2]=r*Math.sin(a)}
  const dGeo=new THREE.BufferGeometry();dGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const dMat=new THREE.PointsMaterial({color:c.main,size:0.035,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending});
  const disk=new THREE.Points(dGeo,dMat);
  g.add(bh,glow,disk);
  function scatter(){const p=disk.geometry.attributes.position.array;for(let i=0;i<pc;i++){const a=Math.random()*Math.PI*2;const r=4+Math.random()*3;p[i*3]=r*Math.cos(a);p[i*3+1]=(Math.random()-0.5)*3;p[i*3+2]=r*Math.sin(a)}disk.geometry.attributes.position.needsUpdate=true}
  function reset(){const p=disk.geometry.attributes.position.array;for(let i=0;i<pc;i++){const a=Math.random()*Math.PI*2;const r=0.7+Math.random()*3.5;p[i*3]=r*Math.cos(a);p[i*3+1]=(Math.random()-0.5)*0.6*(r/4);p[i*3+2]=r*Math.sin(a)}disk.geometry.attributes.position.needsUpdate=true}
  return {
    reset(){g.scale.setScalar(1);reset()},
    scatter(){scatter()},
    updateIdle(t){
      bh.rotation.x=Math.sin(t*0.1)*0.1;bh.rotation.z=Math.sin(t*0.08)*0.1;
      glow.rotation.z=t*0.2;
      const p=disk.geometry.attributes.position.array;
      for(let i=0;i<pc;i++){const i3=i*3;const x=p[i3],z=p[i3+2];const r=Math.sqrt(x*x+z*z);const a=Math.atan2(z,x)+0.008;p[i3]=r*Math.cos(a);p[i3+2]=r*Math.sin(a)}
      disk.geometry.attributes.position.needsUpdate=true;
    },
    updateOut(t,m){
      g.scale.setScalar(1-m*0.5);
      glow.rotation.z=t*0.5;
      const p=disk.geometry.attributes.position.array;
      for(let i=0;i<pc;i++){const i3=i*3;const x=p[i3],z=p[i3+2];const r=Math.sqrt(x*x+z*z);const a=Math.atan2(z,x)+m*0.2;p[i3]=(r+m*0.5)*Math.cos(a);p[i3+2]=(r+m*0.5)*Math.sin(a);p[i3+1]+=Math.sin(t+i)*0.01*m}
      disk.geometry.attributes.position.needsUpdate=true;
    },
    updateIn(t,m){
      const s=m<0.3?m/0.3:1;g.scale.setScalar(s);
      const p=disk.geometry.attributes.position.array;
      for(let i=0;i<pc;i++){const i3=i*3;const x=p[i3],z=p[i3+2];const r=Math.sqrt(x*x+z*z);if(r>4){p[i3]*=0.98;p[i3+2]*=0.98}p[i3+1]*=0.99}
      disk.geometry.attributes.position.needsUpdate=true;
    }
  };
}

function createOrbit(g,c){
  const sun=new THREE.Mesh(new THREE.SphereGeometry(0.7,24,24),new THREE.MeshPhongMaterial({color:0xff8800,emissive:0xff4400,emissiveIntensity:0.6}));
  const sg=new THREE.Mesh(new THREE.SphereGeometry(0.9,16,16),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.06}));
  const pd=[{d:1.6,s:0.1,sp:0.6},{d:2.2,s:0.14,sp:0.4},{d:2.8,s:0.18,sp:0.3},{d:3.4,s:0.12,sp:0.2},{d:4.0,s:0.08,sp:0.15}];
  const planets=[];
  pd.forEach((p,i)=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(p.s,12,12),new THREE.MeshPhongMaterial({color:c.main,emissive:c.em,emissiveIntensity:0.1}));
    const a=Math.random()*Math.PI*2;m.position.set(p.d*Math.cos(a),0,p.d*Math.sin(a));
    const r=new THREE.Mesh(new THREE.RingGeometry(p.d-0.02,p.d+0.02,32),new THREE.MeshBasicMaterial({color:c.main,side:THREE.DoubleSide,transparent:true,opacity:0.04}));
    r.rotation.x=-Math.PI*0.5;
    g.add(m,r);planets.push({m,r,d:p.d,sp:p.sp,ang:a});
  });
  g.add(sun,sg);
  function scatter(){planets.forEach(p=>{const a=Math.random()*Math.PI*2;const d=5+Math.random()*3;p.m.position.set(d*Math.cos(a),0,d*Math.sin(a))})}
  function reset(){planets.forEach(p=>{p.ang=Math.random()*Math.PI*2;p.m.position.set(p.d*Math.cos(p.ang),0,p.d*Math.sin(p.ang))})}
  return {
    reset(){g.scale.setScalar(1);reset()},
    scatter(){scatter()},
    updateIdle(t){
      sun.rotation.y=t*0.1;sg.scale.setScalar(1+Math.sin(t*0.5)*0.05);
      planets.forEach(p=>{p.ang+=0.004*p.sp;p.m.position.x=p.d*Math.cos(p.ang);p.m.position.z=p.d*Math.sin(p.ang);p.m.rotation.y=t*p.sp});
    },
    updateOut(t,m){
      g.scale.setScalar(1-m*0.4);sg.material.opacity=0.06*(1-m);
      planets.forEach(p=>{p.ang+=0.01*p.sp;p.m.position.x=(p.d+m*2)*Math.cos(p.ang);p.m.position.z=(p.d+m*2)*Math.sin(p.ang);p.m.position.y=m*1.5*(Math.sin(t+p.sp))});
    },
    updateIn(t,m){
      const s=m<0.4?m/0.4:1;g.scale.setScalar(s);
      planets.forEach(p=>{p.ang+=0.003*p.sp*(1-m);const cd=p.d*(0.3+m*0.7);p.m.position.x=cd*Math.cos(p.ang);p.m.position.z=cd*Math.sin(p.ang);p.m.position.y=(1-m)*2*Math.sin(t+p.sp)});
    }
  };
}

function createHeart(g,c){
  const pc=500;const pos=new Float32Array(pc*3);const cols=new Float32Array(pc*3);
  for(let i=0;i<pc;i++){const t=Math.random()*Math.PI*2;const r=Math.random()*1.5;const hx=16*Math.pow(Math.sin(t),3)*r/16;const hy=(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*r/16;const sp=(Math.random()-0.5)*1.0;pos[i*3]=hx*0.7+sp*0.3;pos[i*3+1]=hy*0.7+sp*0.3;pos[i*3+2]=sp;const col=new THREE.Color(c.main).multiplyScalar(0.6+Math.random()*0.4);cols[i*3]=col.r;cols[i*3+1]=col.g;cols[i*3+2]=col.b}
  const hGeo=new THREE.BufferGeometry();hGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));hGeo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const hMat=new THREE.PointsMaterial({size:0.05,vertexColors:true,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending});
  const hMesh=new THREE.Points(hGeo,hMat);
  const gr=new THREE.Mesh(new THREE.RingGeometry(1.8,2.5,32),new THREE.MeshBasicMaterial({color:c.main,side:THREE.DoubleSide,transparent:true,opacity:0.05}));
  gr.rotation.x=-Math.PI*0.5;
  g.add(hMesh,gr);

// ---- Scroll Controller ----
let currentFocus = -1; // -1=hero, 0-9=projects, 10=end
let transitionFrom = -1;
let transitionTo = -1;
let transitionProgress = 1; // 0-1

function setGroupOpacity(grp, op) {
  grp.group.traverse(child => {
    if (child.isMesh || child.isPoints) {
      child.material.transparent = true;
      child.material.opacity = Math.max(0, Math.min(1, op * (child.userData?.baseOpacity || 1)));
      child.material.needsUpdate = true;
    }
  });
  // Also set group visible for optimization
  grp.group.visible = op > 0.01;
}

function updateScroll() {
  const scrollY = window.scrollY;
  const vh = window.innerHeight;
  const totalH = document.documentElement.scrollHeight - vh;
  
  // Section 0 = hero (0 to vh)
  // Sections 1-10 = projects (vh to 11*vh)
  // Section 11 = end (11*vh to 12*vh)
  
  const rawPos = scrollY / vh;
  
  if (rawPos < 1) {
    // Hero
    const heroProgress = rawPos;
    heroOpacity = Math.max(0, 1 - heroProgress * 2);
    currentFocus = -1;
    transitionFrom = -1;
    transitionTo = 0;
    transitionProgress = Math.min(1, heroProgress * 2);
  } else if (rawPos >= 1 && rawPos < 1 + projects.length) {
    heroOpacity = 0;
    endOpacity = 0;
    const projectPos = rawPos - 1;
    const idx = Math.floor(projectPos);
    const localProgress = projectPos - idx;
    
    currentFocus = idx;
    
    if (localProgress < 0.5) {
      // Stable zone - only this project visible
      transitionFrom = idx;
      transitionTo = idx;
      transitionProgress = 0;
    } else {
      // Transition zone
      transitionFrom = idx;
      transitionTo = Math.min(idx + 1, projects.length - 1);
      transitionProgress = (localProgress - 0.5) * 2; // 0 to 1 over 50% of section
    }
  } else {
    // End section
    heroOpacity = 0;
    endOpacity = Math.min(1, (rawPos - 1 - projects.length) * 2);
    currentFocus = projects.length;
    transitionFrom = projects.length - 1;
    transitionTo = projects.length;
    transitionProgress = 1;
  }
}

// ---- Scene State Management ----
// Track which groups need which update
let prevState = { from: -2, to: -2, progress: -1 };

function applySceneState() {
  const vh = window.innerHeight;
  const scrollY = window.scrollY;
  const rawPos = scrollY / vh;
  
  // Compute target opacities for all groups
  groups.forEach((grp, i) => {
    let target = 0;
    
    if (rawPos < 1) {
      // Hero - all projects hidden
      target = 0;
    } else if (rawPos >= 1 && rawPos < 1 + projects.length) {
      const projectPos = rawPos - 1;
      const idx = Math.floor(projectPos);
      const localProgress = projectPos - idx;
      
      if (i === idx) {
        if (localProgress < 0.5) {
          target = 1; // Stable
        } else {
          target = 1 - (localProgress - 0.5) * 2; // Fade out
        }
      } else if (i === idx + 1 && localProgress >= 0.5) {
        target = (localProgress - 0.5) * 2; // Fade in
      } else {
        target = 0;
      }
    }
    // End section - last project fades out
    if (rawPos >= 1 + projects.length) {
      if (i === projects.length - 1) {
        target = Math.max(0, 1 - (rawPos - 1 - projects.length) * 2);
      } else {
        target = 0;
      }
    }
    
    grp.targetOpacity = target;
  });
}

// ---- Resize ----
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();

// ---- Main Loop ----
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  frameCount++;
  
  updateScroll();
  applySceneState();
  
  // Smooth opacity transitions
  groups.forEach((grp, i) => {
    grp.opacity += (grp.targetOpacity - grp.opacity) * 0.08;
    if (grp.opacity < 0.01 && grp.targetOpacity < 0.01) {
      grp.group.visible = false;
      return;
    }
    grp.group.visible = true;
    
    // Only update if visible
    setGroupOpacity(grp, grp.opacity);
    
    // Determine which update to call
    const isOutgoing = grp.targetOpacity < 0.5 && grp.opacity > 0.1 && i === transitionFrom && transitionFrom !== transitionTo;
    const isIncoming = grp.targetOpacity > 0.1 && i === transitionTo && transitionFrom !== transitionTo;
    const isStable = grp.targetOpacity > 0.8 && grp.opacity > 0.8;
    
    if (isStable) {
      grp.ctrl.updateIdle(t);
    } else if (isOutgoing) {
      const morph = 1 - (grp.opacity / Math.max(0.01, grp.targetOpacity + 0.01));
      if (grp.ctrl.updateOut) grp.ctrl.updateOut(t, Math.min(1, Math.max(0, morph)));
    } else if (isIncoming) {
      const morph = grp.opacity / (grp.targetOpacity + 0.01);
      if (grp.ctrl.updateIn) {
        if (grp._resetForIn !== true) {
          grp.ctrl.scatter();
          grp._resetForIn = true;
        }
        grp.ctrl.updateIn(t, Math.min(1, Math.max(0, morph)));
      }
    } else if (grp.opacity > 0.01) {
      grp.ctrl.updateIdle(t);
    }
    
    // Reset flag when stable
    if (isStable) grp._resetForIn = false;
  });
  
  // Hero
  heroOpacity = Math.max(0, heroOpacity - 0.01);
  heroGroup.visible = heroOpacity > 0.01;
  if (heroGroup.visible) {
    hPMesh.material.opacity = heroOpacity * 0.25;
    const p = hPMesh.geometry.attributes.position.array;
    for (let i = 0; i < hc; i++) {
      p[i*3] += Math.sin(t + i) * 0.001;
      p[i*3+1] += Math.cos(t * 0.7 + i * 0.1) * 0.001;
    }
    hPMesh.geometry.attributes.position.needsUpdate = true;
  }
  
  // End
  endGroup.visible = endOpacity > 0.01;
  if (endGroup.visible) {
    ePMesh.material.opacity = endOpacity * 0.15;
    endGroup.rotation.y = mx * 0.15;
  }
  
  // Camera subtle movement
  cam.position.x += (Math.sin(t * 0.03) * 0.3 + mx * 0.2 - cam.position.x) * 0.02;
  cam.position.y += (Math.sin(t * 0.04) * 0.2 + my * 0.15 - cam.position.y) * 0.02;
  cam.lookAt(0, 0, 0);
  
  renderer.render(scene, cam);
}

// ---- Init ----
// First pass initial state
setTimeout(() => {
  updateScroll();
  applySceneState();
  groups.forEach(grp => {
    grp.opacity = grp.targetOpacity;
    setGroupOpacity(grp, grp.opacity);
  });
}, 50);

animate();
</script>
