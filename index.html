<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Code</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-snap-type:y mandatory;overflow-y:scroll;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#050510;color:#fff;overflow-x:hidden}

canvas#bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}

section{scroll-snap-align:start;width:100vw;height:100vh;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden}

/* Hero */
#hero .title{font-size:clamp(3rem,10vw,8rem);font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#00d4ff,#ff00e4,#7b2ff7);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 6s ease infinite;position:relative;z-index:2;text-align:center;line-height:1.1}
#hero .subtitle{font-size:clamp(1rem,2vw,1.5rem);font-weight:300;color:rgba(255,255,255,0.5);margin-top:1rem;letter-spacing:0.3em;text-transform:uppercase;position:relative;z-index:2}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;animation:bounce 2s ease infinite;z-index:2}

@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

/* Projects */
#works{justify-content:center;gap:2rem}
#works h2{font-size:clamp(1.5rem,3vw,2.5rem);font-weight:600;color:rgba(255,255,255,0.15);letter-spacing:0.15em;text-transform:uppercase;position:relative;z-index:2}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:800px;width:90%;position:relative;z-index:2}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:1.5rem;text-decoration:none;color:#fff;transition:all 0.4s cubic-bezier(0.25,0.1,0.25,1);cursor:pointer;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 0%,var(--glow,rgba(0,212,255,0.15)),transparent 70%);opacity:0;transition:opacity 0.4s}
.card:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06)}
.card:hover::before{opacity:1}
.card-icon{font-size:1.8rem;margin-bottom:0.6rem;display:block}
.card-name{font-size:0.9rem;font-weight:600;letter-spacing:0.02em}
.card-count{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:0.3rem}

/* Footer */
#end{justify-content:center;align-items:center;gap:1.5rem}
#end p{font-size:clamp(0.8rem,1.2vw,1rem);color:rgba(255,255,255,0.25);letter-spacing:0.1em;position:relative;z-index:2}
#end a{color:rgba(255,255,255,0.4);text-decoration:none;transition:color 0.3s;position:relative;z-index:2;font-size:0.9rem}
#end a:hover{color:#00d4ff}

/* Responsive */
@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr);gap:0.6rem}.card{padding:1rem}.card-icon{font-size:1.3rem}.card-name{font-size:0.75rem}}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<section id="hero">
  <div class="title">Creative Code</div>
  <div class="subtitle">A Collection of Experiments</div>
  <div class="scroll-hint">Scroll</div>
</section>

<section id="works">
  <h2>Projects</h2>
  <div class="grid" id="projectGrid"></div>
</section>

<section id="end">
  <p>Explore &middot; Play &middot; Repeat</p>
  <a href="https://github.com/jun123440" target="_blank" rel="noopener">GitHub</a>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ Project Data ============
const projects = [
  {name:'3D Earth',path:'3d-earth/',color:'#00d4ff'},
  {name:'App',path:'app/',color:'#ff6b6b'},
  {name:'Black Hole',path:'blackhole/',color:'#7b2ff7'},
  {name:'Confession',path:'confession/',color:'#ff00e4'},
  {name:'Earth Plus',path:'earth-plus/',color:'#00e676'},
  {name:'EVA Wallpaper',path:'eva-wallpaper/',color:'#ff9100'},
  {name:'Particle Magic',path:'particle-magic/',color:'#ffeb3b'},
  {name:'Rose',path:'rose/',color:'#ff1744'},
  {name:'Solar System',path:'solar-system/',color:'#ff6f00'},
  {name:'Black Hole',path:'black-hole.html',color:'#9c27b0'}
];

const grid = document.getElementById('projectGrid');
projects.forEach((p,i)=>{
  const a = document.createElement('a');
  a.className = 'card';
  a.href = p.path;
  a.target = '_blank';
  a.rel = 'noopener';
  a.style.setProperty('--glow', p.color + '33');
  a.innerHTML = `<span class="card-icon">${['✦','◆','●','▲','■','★','♦','◉','⬢','◆'][i]}</span>
    <div class="card-name">${p.name}</div>
    <div class="card-count">${String(i+1).padStart(2,'0')}</div>`;
  grid.appendChild(a);

  a.addEventListener('mousemove',e=>{
    const r=a.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-0.5;
    const y=(e.clientY-r.top)/r.height-0.5;
    a.style.transform=`perspective(600px) rotateY(${x*12}deg) rotateX(${-y*12}deg) translateY(-6px) scale(1.02)`;
  });
  a.addEventListener('mouseleave',()=>{
    a.style.transform='';
  });
});

// ============ Three.js Scene ============
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510,0.035);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z = 5;

// Main object
const torusGeo = new THREE.TorusKnotGeometry(1.2,0.35,180,24);
const torusMat = new THREE.MeshBasicMaterial({color:0x00d4ff,wireframe:true});
const torus = new THREE.Mesh(torusGeo,torusMat);
scene.add(torus);

// Inner solid with transparent color
const solidMat = new THREE.MeshBasicMaterial({
  color:0x00d4ff,
  transparent:true,
  opacity:0.08,
  side:THREE.DoubleSide
});
const solid = new THREE.Mesh(torusGeo.clone(),solidMat);
solid.scale.set(0.98,0.98,0.98);
scene.add(solid);

// Secondary ring
const ringGeo = new THREE.TorusGeometry(1.8,0.02,32,64);
const ringMat = new THREE.MeshBasicMaterial({color:0x7b2ff7,transparent:true,opacity:0.4});
const ring = new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x = Math.PI / 3;
scene.add(ring);

// Particles
const count = 2500;
const pos = new Float32Array(count * 3);
const sizes = new Float32Array(count);
const colors = new Float32Array(count * 3);
const vel = new Float32Array(count);

for(let i=0;i<count;i++){
  const r = 4 + Math.random() * 6;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  pos[i*3+2] = r * Math.cos(phi);
  sizes[i] = 0.5 + Math.random() * 1.5;
  vel[i] = 0.1 + Math.random() * 0.3;
  const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2,0.8,0.5 + Math.random() * 0.3);
  colors[i*3] = c.r;
  colors[i*3+1] = c.g;
  colors[i*3+2] = c.b;
}

const partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
partGeo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
partGeo.setAttribute('color',new THREE.BufferAttribute(colors,3));

const partMat = new THREE.PointsMaterial({
  size:0.04,
  vertexColors:true,
  transparent:true,
  opacity:0.6,
  blending:THREE.AdditiveBlending,
  depthWrite:false,
  sizeAttenuation:true
});
const particleSystem = new THREE.Points(partGeo,partMat);
scene.add(particleSystem);

// Mouse
const mouse = {x:0,y:0};
document.addEventListener('mousemove',e=>{
  mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
});

// Scroll state
let scrollProgress = 0;
let targetColor = 0x00d4ff;
let hue = 0.55;

window.addEventListener('scroll',()=>{
  const totalH = document.body.scrollHeight - window.innerHeight;
  scrollProgress = window.scrollY / totalH;
  hue = 0.55 - scrollProgress * 0.3;
});

// Color transition
let currentHue = 0.55;
let progress = 0;

// Animation
function animate(){
  requestAnimationFrame(animate);
  
  // Camera follows mouse
  camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.05;
  camera.position.y += (-mouse.y * 0.3 - camera.position.y) * 0.05;
  camera.lookAt(0,0,0);

  // Rotate main objects
  torus.rotation.x += 0.003;
  torus.rotation.y += 0.006;
  solid.rotation.x = torus.rotation.x;
  solid.rotation.y = torus.rotation.y;
  ring.rotation.z += 0.002;

  // Animate hue
  currentHue += (hue - currentHue) * 0.03;
  const c = new THREE.Color().setHSL(currentHue,0.8,0.55);
  torusMat.color.copy(c);
  solidMat.color.copy(c);
  
  const c2 = new THREE.Color().setHSL(currentHue + 0.2,0.8,0.5);
  ringMat.color.copy(c2);

  // Slowly rotate particles
  particleSystem.rotation.y += 0.0005;
  particleSystem.rotation.x += 0.0003;

  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
