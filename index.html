<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jun123440 · 创意空间</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --card:#111118;
  --border:#1a1a28;
  --text:#e4e4ec;
  --dim:#5c5c72;
  --glow:#7c5cfc;
  --pink:#f472b6;
  --cyan:#38bdf8;
  --green:#22c55e;
  --orange:#f97316;
  --yellow:#eab308;
  --red:#ef4444;
  --purple:#a855f7;
  --teal:#14b8a6;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  line-height:1.6;
  min-height:100vh;
}
canvas#bg{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  pointer-events:none;opacity:.4;
}
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:48px 20px 100px}
header{padding:48px 0 64px;text-align:center}
.logo{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  padding:8px 20px;border-radius:100px;
  font-size:13px;color:var(--dim);margin-bottom:36px;
  letter-spacing:.3px;
}
.logo i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
header h1{
  font-size:clamp(2.6rem,7vw,5rem);
  font-weight:800;
  line-height:1.15;
  letter-spacing:-.03em;
  margin-bottom:16px;
}
header h1 span{
  background:linear-gradient(135deg,var(--glow),var(--pink),var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
header p{font-size:1.05rem;color:var(--dim);max-width:480px;margin:0 auto 0}
header p i{font-style:normal;display:inline-block;animation:hop 2s infinite}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.section-label{
  display:flex;align-items:center;gap:12px;
  margin:48px 0 20px;font-size:13px;color:var(--dim);
  letter-spacing:1px;text-transform:uppercase;
}
.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px 22px;
  text-decoration:none;
  color:var(--text);
  transition:all .35s cubic-bezier(.25,.46,.45,.94);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.card::after{
  content:'';
  position:absolute;inset:0;
  border-radius:14px;
  background:linear-gradient(135deg,transparent 55%,rgba(124,92,252,.06));
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}
.card:hover{
  border-color:rgba(124,92,252,.4);
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.card:hover::after{opacity:1}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.card-arrow{
  font-size:16px;color:var(--dim);flex-shrink:0;
  margin-top:4px;transition:transform .3s,color .3s;
}
.card:hover .card-arrow{transform:translate(4px,-3px);color:var(--glow)}
.card h3{font-size:1.05rem;font-weight:700;letter-spacing:-.01em}
.card p{font-size:.85rem;color:var(--dim);line-height:1.55}
.card .tag{
  display:inline-block;
  font-size:11px;padding:3px 10px;border-radius:100px;
  background:rgba(124,92,252,.12);color:#a78bfa;
  align-self:flex-start;margin-top:2px;
}
footer{
  text-align:center;padding:64px 0 0;
  color:var(--dim);font-size:13px;
}
footer a{color:var(--glow);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--pink)}
@media(max-width:640px){
  .wrap{padding:24px 14px 60px}
  header{padding:24px 0 36px}
  .grid{grid-template-columns:1fr}
  header p{font-size:.95rem}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <header>
    <div class="logo"><i></i>jun123440.dpdns.org</div>
    <h1><span>创意实验场</span></h1>
    <p><i>✦</i> 交互艺术 · 视觉探索 · 前端实验 <i>✦</i></p>
  </header>
  <div class="section-label">Projects</div>
  <div class="grid" id="grid"></div>
  <footer>
    <a href="https://jun123440.github.io" target="_blank">jun123440</a> &nbsp;·&nbsp; 保持创造
  </footer>
</div>
<script>
var projects=[
  {n:'3d-earth',i:'🌍',c:'#22c55e',l:'3D地球',d:'可交互的3D地球模型，拖拽旋转缩放',t:'Three.js'},
  {n:'app',i:'📱',c:'#7c5cfc',l:'颜值测试器',d:'AI颜值评分，上传照片即刻分析'},
  {n:'blackhole',i:'🕳️',c:'#a855f7',l:'黑洞',d:'模拟黑洞引力场的视觉化体验',t:'WebGL'},
  {n:'confession',i:'💌',c:'#f472b6',l:'告白',d:'浪漫表白页，温馨动画效果'},
  {n:'earth-plus',i:'🌏',c:'#38bdf8',l:'地球+',d:'增强版3D地球，带大气层特效',t:'Three.js'},
  {n:'particle-magic',i:'✨',c:'#eab308',l:'粒子魔法',d:'粒子系统生成炫酷视觉效果'},
  {n:'rose',i:'🌹',c:'#ef4444',l:'玫瑰',d:'3D玫瑰花的数学之美',t:'Three.js'},
  {n:'solar-system',i:'🪐',c:'#f97316',l:'太阳系',d:'模拟太阳系行星公转轨道',t:'Three.js'},
  {n:'poem',i:'📝',c:'#06b6d4',l:'为你写诗',d:'诗意生成页面，文字与视觉交融'},
  {n:'eva-wallpaper',i:'🎨',c:'#8b5cf6',l:'EVA壁纸',d:'EVA主题壁纸生成工具',t:'Canvas'}
];
var grid=document.getElementById('grid');
projects.forEach(function(p){
  var a=document.createElement('a');
  a.className='card';
  a.href='/'+p.n+'/';
  a.target='_top';
  var tag=p.t?'<span class="tag">'+p.t+'</span>':'';
  a.innerHTML='<div class="card-top"><div class="card-icon" style="background:'+p.c+'22;color:'+p.c+'">'+p.i+'</div><span class="card-arrow">↗</span></div><h3>'+p.l+'</h3><p>'+p.d+'</p>'+tag;
  grid.appendChild(a);
});
var c=document.getElementById('bg'),ctx=c.getContext('2d'),w,h,t=0;
function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
function draw(){
  t+=.004;ctx.clearRect(0,0,w,h);var cx=w/2,cy=h/2;
  for(var i=0;i<60;i++){
    var a=i*Math.PI*2/60+t,r=100+Math.sin(t*1.5+i)*50;
    var x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    var s=1.5+Math.sin(t*2.5+i*2)*1.5;
    ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);
    ctx.fillStyle='rgba(124,92,252,'+(0.12+Math.sin(t+i)*0.08)+')';
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
