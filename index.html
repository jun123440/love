<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>为你写诗</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Serif SC','ZCOOL XiaoWei','SimSun',serif;background:#0a0015;color:#e8d5b7;user-select:none;-webkit-user-select:none}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;opacity:0}
@keyframes twinkle{0%{opacity:0;transform:scale(0.5)}100%{opacity:var(--max-op,1);transform:scale(1)}}
.meteor{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;z-index:1;pointer-events:none;opacity:0}
.meteor::after{content:'';position:absolute;top:0;left:0;width:80px;height:1px;background:linear-gradient(to left,transparent,#fff);opacity:.3;transform:rotate(0deg) translateX(0)}
@keyframes shoot{0%{opacity:0;transform:translate(0,0)}5%{opacity:1}100%{opacity:0;transform:translate(-300px,300px)}}
.page{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);will-change:transform,opacity}
.page.hidden{pointer-events:none}
.page-exit{opacity:0;transform:scale(.96)}
.page-enter{opacity:1;transform:scale(1)}
.page-before{opacity:0;transform:scale(1.04)}
#splash{background:radial-gradient(ellipse at center bottom,#1a0030 0%,#0a0015 60%,#050010 100%);cursor:pointer;z-index:10}
.moon{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f0d6b0,#d4a574 60%,#b8864e);box-shadow:0 0 60px rgba(212,165,116,.3),0 0 120px rgba(212,165,116,.15);position:relative;margin-bottom:40px;animation:moonGlow 4s ease-in-out infinite alternate}
@keyframes moonGlow{0%{box-shadow:0 0 60px rgba(212,165,116,.3),0 0 120px rgba(212,165,116,.15)}100%{box-shadow:0 0 80px rgba(212,165,116,.4),0 0 160px rgba(212,165,116,.2)}}
.moon::before{content:'';position:absolute;top:15px;left:25px;width:25px;height:25px;border-radius:50%;background:rgba(255,255,255,.15)}
.moon::after{content:'';position:absolute;top:45px;left:55px;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.1)}
.splash-title{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(2.2rem,8vw,3.5rem);font-weight:400;letter-spacing:.5em;text-align:center;margin-bottom:12px;background:linear-gradient(135deg,#f0d6b0,#d4a574,#b8864e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-sub{font-size:clamp(.85rem,3vw,1.1rem);color:rgba(232,213,183,.6);letter-spacing:.3em;margin-bottom:50px;font-weight:300}
.splash-tip{position:absolute;bottom:clamp(40px,10vh,80px);font-size:.85rem;color:rgba(232,213,183,.35);letter-spacing:.2em;animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.35}50%{opacity:.8}}
@keyframes fall{0%{transform:translateY(-10vh);opacity:0}10%{opacity:.3}90%{opacity:.1}100%{transform:translateY(110vh);opacity:0}}
#input-page{background:radial-gradient(ellipse at center top,#1a0030 0%,#0a0015 70%,#050010 100%);z-index:5}
.input-card{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(232,213,183,.1);border-radius:24px;padding:clamp(30px,6vw,50px) clamp(24px,5vw,45px);width:clamp(300px,85vw,420px);text-align:center}
.input-card h2{font-size:clamp(1.3rem,4.5vw,1.8rem);font-weight:400;letter-spacing:.15em;margin-bottom:8px;color:#f0d6b0}
.input-card p{font-size:.85rem;color:rgba(232,213,183,.5);margin-bottom:30px;letter-spacing:.1em}
.input-group{position:relative;margin-bottom:28px}
.input-group input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(232,213,183,.2);border-radius:14px;color:#e8d5b7;font-size:1.1rem;font-family:'Noto Serif SC',serif;outline:none;transition:border-color .3s,box-shadow .3s;letter-spacing:.05em;text-align:center}
.input-group input:focus{border-color:#d4a574;box-shadow:0 0 20px rgba(212,165,116,.1)}
.input-group input::placeholder{color:rgba(232,213,183,.25);text-align:center}
.input-group .input-glow{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:0;height:2px;background:linear-gradient(90deg,transparent,#d4a574,transparent);transition:width .5s;border-radius:2px}
.input-group input:focus ~ .input-glow{width:80%}
.submit-btn{width:100%;padding:14px 0;background:linear-gradient(135deg,#d4a574,#b8864e);border:none;border-radius:14px;color:#0a0015;font-size:1rem;font-family:'Noto Serif SC',serif;letter-spacing:.2em;cursor:pointer;transition:all .3s;font-weight:700}
.submit-btn:active{transform:scale(.97);opacity:.9}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#result-page{background:radial-gradient(ellipse at center,#1a0030 0%,#0a0015 70%,#050010 100%);z-index:6;overflow-y:auto;justify-content:flex-start;padding-top:clamp(50px,12vh,90px)}
.result-scroll{width:clamp(300px,85vw,450px);max-height:calc(100vh - 40px);overflow-y:auto;padding:10px 0 20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.result-scroll::-webkit-scrollbar{display:none}
.result-card{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(232,213,183,.1);border-radius:24px;padding:clamp(30px,5vw,45px);text-align:center;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(212,165,116,.03),transparent,rgba(212,165,116,.03),transparent);animation:rotateGlow 10s linear infinite}
@keyframes rotateGlow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.result-to{font-size:.9rem;color:rgba(232,213,183,.5);letter-spacing:.15em;margin-bottom:6px;position:relative;z-index:1}
.result-name{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(1.5rem,5vw,2rem);color:#f0d6b0;margin-bottom:25px;letter-spacing:.3em;position:relative;z-index:1}
.result-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,#d4a574,transparent);margin:0 auto 25px;position:relative;z-index:1}
.poem-line{font-size:clamp(1.2rem,4vw,1.6rem);line-height:2.2;letter-spacing:.12em;position:relative;z-index:1;padding:4px 0;opacity:0;transform:translateY(15px);transition:opacity .6s ease,transform .6s ease}
.poem-line.show{opacity:1;transform:translateY(0)}
.poem-line .c1{color:#d4a574;font-weight:700}
.poem-line.missing{font-size:clamp(2rem,8vw,3rem);font-family:'ZCOOL XiaoWei',serif;letter-spacing:.3em;color:rgba(232,213,183,.3)}
.result-from{font-size:.85rem;color:rgba(232,213,183,.35);margin-top:25px;letter-spacing:.2em;position:relative;z-index:1}
.result-actions{display:flex;gap:12px;margin-top:20px;justify-content:center;position:relative;z-index:1;flex-wrap:wrap}
.action-btn{padding:10px 24px;background:rgba(255,255,255,.05);border:1px solid rgba(232,213,183,.15);border-radius:20px;color:#e8d5b7;font-size:.8rem;font-family:'Noto Serif SC',serif;letter-spacing:.1em;cursor:pointer;transition:all .3s;white-space:nowrap}
.action-btn:active{background:rgba(212,165,116,.15);transform:scale(.96)}
.copy-toast{position:fixed;bottom:clamp(40px,8vh,70px);left:50%;transform:translateX(-50%);background:rgba(232,213,183,.12);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 28px;border-radius:20px;border:1px solid rgba(232,213,183,.1);color:#e8d5b7;font-size:.85rem;font-family:'Noto Serif SC',serif;letter-spacing:.1em;opacity:0;transition:opacity .5s;z-index:100;pointer-events:none}
.copy-toast.show{opacity:1}
@media(max-width:400px){.input-card{padding:24px 20px}.moon{width:90px;height:90px}.moon::before{width:18px;height:18px;top:12px;left:18px}.moon::after{width:9px;height:9px;top:34px;left:40px}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="splash" class="page">
  <div class="moon"></div>
  <div class="splash-title">为你写诗</div>
  <div class="splash-sub">以你之名 · 赋你之诗</div>
  <div class="splash-tip">✦ 轻触开启 ✦</div>
</div>
<div id="input-page" class="page hidden">
  <div class="input-card">
    <h2>你的名字</h2>
    <p>告诉我你的名字，我为你写一首诗</p>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="请输入你的名字" maxlength="6" autocomplete="off">
      <div class="input-glow"></div>
    </div>
    <button class="submit-btn" id="submitBtn">为 你 写 诗</button>
  </div>
</div>
<div id="result-page" class="page hidden">
  <div class="result-scroll">
    <div class="result-card">
      <div class="result-to">— 致 —</div>
      <div class="result-name" id="displayName"></div>
      <div class="result-divider"></div>
      <div id="poemContainer"></div>
      <div class="result-from">—— 赠予最特别的你 ——</div>
      <div class="result-actions">
        <button class="action-btn" id="copyBtn">📋 复制诗句</button>
        <button class="action-btn" id="againBtn">✎ 换一个名字</button>
      </div>
    </div>
  </div>
</div>
<div class="copy-toast" id="toast">已复制到剪贴板</div>
<script>
function randItem(a){return a[Math.random()*a.length|0]}
// ----- 唯真诗库 · 句句皆出唐宋名篇 无一字伪造 -----

安:['安得广厦千万间，大庇天下寒士俱欢颜'],
乐:['乐莫乐兮新相知'],
多:['多情自古伤离别，更那堪冷落清秋节'],
好:['好雨知时节，当春乃发生'],
佳:['佳期不可再，风雨杳如年'],
世:['世情薄，人情恶，雨送黄昏花易落'],
人:['人生若只如初见，何事秋风悲画扇','人生得意须尽欢，莫使金樽空对月'],
生:['生当作人杰，死亦为鬼雄'],
愿:['愿我如星君如月，夜夜流光相皎洁'],
与:['与君生别离，相去复几许'],
当:['当窗理云鬓，对镜帖花黄'],
自:['自古逢秋悲寂寥，我言秋日胜春朝'],
从:['从今若许闲乘月，拄杖无时夜叩门'],
此:['此情可待成追忆，只是当时已惘然'],
只:['只在此山中，云深不知处'],
共:['共看明月应垂泪，一夜乡心五处同'],
莫:['莫愁前路无知己，天下谁人不识君'],
不:['不畏浮云遮望眼，自缘身在最高层'],
一:['一蓑烟雨任平生','一骑红尘妃子笑，无人知是荔枝来'],
白:['白日放歌须纵酒，青春作伴好还乡'],
青:['青山一道同云雨，明月何曾是两乡'],
黄:['黄河落天走东海，万里写入胸怀间'],
碧:['碧玉妆成一树高，万条垂下绿丝绦'],
翠:['翠华摇摇行复止，西出都门百余里'],
紫:['紫陌红尘拂面来，无人不道看花回'],
红:['红杏枝头春意闹'],
绿:['绿蚁新醅酒，红泥小火炉'],
};
const T=Object.keys(R);
// ----- 专属定制诗 · 为特定名字手写全篇 -----
const SP={
  '郑灵':['郑山烟雨最多情','灵雨灵风自可人','郑圃春深花似海','灵禽枝上语新晴'],
  '郑玲':['郑山烟雨最多情','','郑圃春深花似海',''],
};
function anyLine(ch){
  if(R[ch]&&R[ch].length>0)return randItem(R[ch]);
  return null;
}
function genPoem(name){
  if(!name||!name.trim())return[];
  name=name.trim();
  // Dedicated poem: check chars match
  for(const k of Object.keys(SP)){
    if(k.split('').every((c,j)=>c===Array.from(name)[j])){
      const lines=SP[k];
      const cs=[...name];
      return lines.map((ln,i)=>({ch:cs[i%cs.length],line:ln,real:true}));
    }
  }
  const chars=[...name];
  const all=[];
  for(const ch of chars){
    const line=anyLine(ch);
    if(line)all.push({ch,line,real:true});
    else all.push({ch,line:null,real:false});
  }
  if(all.every(x=>!x.real)){
    const fb=randItem(['春江潮水连海平，海上明月共潮生','长风破浪会有时，直挂云帆济沧海','行到水穷处，坐看云起时','海上生明月，天涯共此时']);
    return chars.map(ch=>({ch,line:fb,real:false}));
  }
  return all;
}

// Stars generation
function createStars(){
  const container=document.getElementById('stars');
  for(let i=0;i<150;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--dur',(2+Math.random()*4)+'s');
    s.style.setProperty('--max-op',(0.3+Math.random()*0.7));
    s.style.animationDelay=Math.random()*5+'s';
    s.style.width=s.style.height=(1+Math.random()*2)+'px';
    container.appendChild(s);
  }
  // meteors
  for(let i=0;i<3;i++){
    const m=document.createElement('div');
    m.className='meteor';
    m.style.left=Math.random()*100+'%';
    m.style.top=Math.random()*50+'%';
    m.style.animation='shoot '+(4+Math.random()*3)+'s '+(i*7+Math.random()*5)+'s linear infinite';
    container.appendChild(m);
  }
}
createStars();

// Light dust particles
(function createDust(){
  for(let i=0;i<20;i++){
    const d=document.createElement('div');
    d.className='petal';
    d.style.cssText=`position:fixed;z-index:3;pointer-events:none;left:${Math.random()*100}%;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:rgba(232,213,183,${0.1+Math.random()*0.2});border-radius:50%;animation:fall ${12+Math.random()*18}s ${Math.random()*20}s linear infinite;opacity:0`;
    document.body.appendChild(d);
  }
})();

// Page transitions
const pages={splash:document.getElementById('splash'),input:document.getElementById('input-page'),result:document.getElementById('result-page')};

function showPage(page){
  Object.values(pages).forEach(p=>{
    if(p===page){
      p.classList.remove('hidden','page-exit','page-before');
      p.classList.add('page-enter');
    } else {
      p.classList.add('hidden');
      p.classList.remove('page-enter');
      p.classList.add('page-exit','page-before');
    }
  });
}

// Splash click
pages.splash.addEventListener('click',()=>showPage(pages.input));

// Submit
const nameInput=document.getElementById('nameInput');
const submitBtn=document.getElementById('submitBtn');
const displayName=document.getElementById('displayName');
const poemContainer=document.getElementById('poemContainer');
const toast=document.getElementById('toast');

submitBtn.addEventListener('click',()=>{
  const name=nameInput.value.trim();
  if(!name){nameInput.focus();return}
  const poem=genPoem(name);
  displayName.textContent=name;
  poemContainer.innerHTML='';
  poem.forEach((item,i)=>{
    if(item.real&&item.line){
      const div=document.createElement('div');
      div.className='poem-line';
      const first=item.line.charAt(0);
      const rest=item.line.slice(1);
      div.innerHTML=`<span class="c1">${first}</span>${rest}`;
      poemContainer.appendChild(div);
      setTimeout(()=>div.classList.add('show'),i*300+200);
    } else {
      const div=document.createElement('div');
      div.className='poem-line missing';
      div.innerHTML=`<span class="c1">${item.ch}</span>`;
      poemContainer.appendChild(div);
      setTimeout(()=>div.classList.add('show'),i*300+200);
    }
  });
  showPage(pages.result);
});

nameInput.addEventListener('keydown',(e)=>{
  if(e.key==='Enter')submitBtn.click();
});

// Copy
document.getElementById('copyBtn').addEventListener('click',()=>{
  const name=displayName.textContent;
  const lines=Array.from(poemContainer.querySelectorAll('.poem-line')).map(el=>el.textContent);
  const text=`致 ${name}\n\n${lines.join('\n')}\n\n—— 赠予最特别的你 ——`;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast());
  } else {
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.style.position='fixed';
    ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{document.execCommand('copy')}catch(e){}
    document.body.removeChild(ta);
    showToast();
  }
});

// Again
document.getElementById('againBtn').addEventListener('click',()=>{
  nameInput.value='';
  showPage(pages.input);
  nameInput.focus();
});

function showToast(){
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

// Focus input on show
const observer=new MutationObserver(()=>{
  if(!pages.input.classList.contains('hidden'))setTimeout(()=>nameInput.focus(),500);
});
observer.observe(pages.input,{attributes:true,attributeFilter:['class']});
</script>
