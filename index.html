<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jun123440</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#fff;
  color:#1d1d1f;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.47059;
}
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.8);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,.08);
}
nav .inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;height:44px;
}
nav a{
  color:#1d1d1f;text-decoration:none;font-size:12px;font-weight:400;
  letter-spacing:.3px;opacity:.8;transition:opacity .2s;
}
nav a:hover{opacity:1}
section{
  max-width:980px;margin:0 auto;padding:0 22px;
}
.hero{
  padding:140px 0 80px;text-align:center;
}
.hero h1{
  font-size:clamp(2.8rem,5vw,4rem);
  font-weight:700;
  letter-spacing:-.003em;
  margin-bottom:8px;
  color:#1d1d1f;
}
.hero h1 .light{font-weight:400;color:#86868b}
.hero .sub{
  font-size:clamp(1.1rem,1.8vw,1.35rem);
  color:#86868b;
  margin-top:12px;
  max-width:600px;margin-left:auto;margin-right:auto;
}
.hero .intro{
  margin-top:40px;
  max-width:640px;margin-left:auto;margin-right:auto;
  font-size:1.05rem;color:#515154;line-height:1.6;
}
.divider{
  height:1px;background:linear-gradient(90deg,transparent,#d2d2d7,transparent);
  margin:0 22px;
}
.section-title{
  padding:80px 22px 24px;
  max-width:980px;margin:0 auto;
  font-size:clamp(1.5rem,2.5vw,2rem);font-weight:700;color:#1d1d1f;
  letter-spacing:-.002em;
}
.grid{
  max-width:980px;margin:0 auto;padding:0 22px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:16px;
}
.card{
  display:flex;flex-direction:column;
  background:#f5f5f7;
  border-radius:18px;
  padding:28px 24px 24px;
  text-decoration:none;color:#1d1d1f;
  transition:all .25s ease;
  position:relative;
}
.card:hover{background:#e8e8ed}
.card .em{
  font-size:28px;margin-bottom:10px;
}
.card h3{font-size:1.05rem;font-weight:600;margin-bottom:4px}
.card p{font-size:.9rem;color:#86868b;line-height:1.5}
.card .badge{
  display:inline-block;margin-top:12px;
  font-size:12px;color:#06c;font-weight:400;
}
.card .badge span{display:inline-block;transition:transform .2s}
.card:hover .badge span{transform:translateX(4px)}
footer{
  max-width:980px;margin:0 auto;
  padding:40px 22px 60px;
  text-align:center;font-size:12px;color:#86868b;
}
footer a{color:#515154;text-decoration:none}
footer a:hover{text-decoration:underline}
@media(max-width:640px){
  .hero{padding:100px 0 50px}
  .grid{grid-template-columns:1fr;gap:12px;padding:0 16px 40px}
  .section-title{padding:50px 16px 20px}
}
</style>
</head>
<body>
<nav>
  <div class="inner">
    <a href="/">jun123440</a>
    <a href="https://github.com/jun123440" target="_blank">GitHub ↗</a>
  </div>
</nav>

<section class="hero">
  <h1>jun<span class="light">123440</span></h1>
  <div class="sub">全栈开发者 · 创意程序员</div>
  <div class="intro">
    我是蒋文俊，一个喜欢用代码创造有趣东西的开发者。
    从3D视觉到AI应用，从交互艺术到实用工具——
    这里是我的一些实验和作品。
  </div>
</section>

<div class="divider"></div>

<div class="section-title">项目</div>
<div class="grid" id="grid"></div>

<footer>
  <p>© jun123440 · <a href="https://jun123440.github.io" target="_blank">GitHub Pages</a> · 保持创造</p>
</footer>

<script>
var p=[
  {n:'3d-earth',e:'🌍',l:'3D地球',d:'可交互的3D地球模型，拖拽旋转缩放'},
  {n:'app',e:'📱',l:'颜值测试器',d:'AI颜值评分，上传照片即刻分析'},
  {n:'blackhole',e:'🕳️',l:'黑洞',d:'模拟黑洞引力场的视觉化体验'},
  {n:'confession',e:'💌',l:'告白',d:'浪漫表白页，温馨动画效果'},
  {n:'earth-plus',e:'🌏',l:'地球+',d:'增强版3D地球，带大气层特效'},
  {n:'particle-magic',e:'✨',l:'粒子魔法',d:'粒子系统生成炫酷视觉效果'},
  {n:'rose',e:'🌹',l:'玫瑰',d:'3D玫瑰花的数学之美'},
  {n:'solar-system',e:'🪐',l:'太阳系',d:'模拟太阳系行星公转轨道'},
  {n:'poem',e:'📝',l:'为你写诗',d:'诗意生成页面，文字与视觉交融'},
  {n:'eva-wallpaper',e:'🎨',l:'EVA壁纸',d:'EVA主题壁纸生成工具'}
];
var g=document.getElementById('grid');
p.forEach(function(x){
  var a=document.createElement('a');
  a.className='card';
  a.href='/'+x.n+'/';
  a.target='_top';
  a.innerHTML='<div class="em">'+x.e+'</div><h3>'+x.l+'</h3><p>'+x.d+'</p><div class="badge">查看项目 <span>→</span></div>';
  g.appendChild(a);
});
</script>
</body>
</html>
