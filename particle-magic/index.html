<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子魔法 - 手势识别</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060618; overflow: hidden;
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  user-select: none; -webkit-user-select: none; cursor: default;
}
canvas#stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
#guide-title {
  font-size: clamp(2rem,5vw,4.5rem); font-weight: 900;
  background: linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#f093fb,#ff6b6b);
  background-size: 400% 400%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 3s ease infinite;
  letter-spacing: .06em;
  filter: drop-shadow(0 0 25px rgba(255,255,255,.25));
}
#guide-subtitle {
  font-size: clamp(.9rem,2vw,1.6rem); color: rgba(255,255,255,.75);
  margin-top: .6em; letter-spacing: .25em; font-weight: 300; transition: opacity .5s;
}
#detected-num {
  font-size: clamp(1.2rem,2.5vw,2.2rem); color: #fff;
  margin-top: .8em; min-height: 2.2em; font-weight: 700;
  text-shadow: 0 0 30px rgba(255,255,255,.7),0 0 60px rgba(100,200,255,.5);
  transition: all .4s;
}
#start-btn {
  pointer-events: auto; margin-top: 1.6em;
  padding: .85em 2.6em; font-size: 1.1rem; font-weight: 700;
  border: none; border-radius: 50px; cursor: pointer;
  background: linear-gradient(135deg,#ff6b6b,#ff8e53); color: #fff; letter-spacing: .08em;
  box-shadow: 0 4px 35px rgba(255,107,107,.5); transition: all .35s;
  animation: btnPulse 2s ease infinite;
}
#start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 45px rgba(255,107,107,.7); }
#start-btn:active { transform: scale(.95); }
#start-btn:disabled { opacity: .6; cursor: not-allowed; animation: none; }
#start-btn.ready { background: linear-gradient(135deg,#6bcb77,#4d96ff); animation: none; box-shadow: 0 4px 35px rgba(107,203,119,.5); }
#camera-status {
  position: fixed; top: 18px; right: 22px;
  color: rgba(255,255,255,.55); font-size: .8rem; z-index: 20;
  display: none; align-items: center; gap: 7px;
  background: rgba(0,0,0,.35); padding: 6px 14px; border-radius: 20px;
  backdrop-filter: blur(8px);
}
#camera-dot { width: 7px; height: 7px; border-radius: 50%; background: #4f4; animation: blink 1.5s ease infinite; }
#camera-preview {
  position: fixed; bottom: 18px; right: 18px;
  width: 160px; height: 120px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,.25);
  overflow: hidden; z-index: 20; display: none; box-shadow: 0 4px 25px rgba(0,0,0,.5);
}
#camera-preview video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#fps-display {
  position: fixed; top: 18px; left: 22px;
  color: rgba(255,255,255,.4); font-size: .7rem; z-index: 20;
  background: rgba(0,0,0,.3); padding: 4px 10px; border-radius: 10px;
}
@keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes btnPulse { 0%,100%{box-shadow:0 4px 35px rgba(255,107,107,.5)} 50%{box-shadow:0 4px 55px rgba(255,107,107,.8)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="fps-display"></div>
<div id="ui">
  <div id="guide-title">粒子魔法</div>
  <div id="guide-subtitle">伸出你的手，比个数字吧！</div>
  <div id="detected-num"></div>
  <button id="start-btn">开启摄像头体验</button>
</div>
<div id="camera-status"><div id="camera-dot"></div><span>摄像头已开启</span></div>
<div id="camera-preview"><video id="video" autoplay playsinline></video></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

<script>
(function() {
'use strict';

const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
const video = document.getElementById('video');
const startBtn = document.getElementById('start-btn');
const guideSubtitle = document.getElementById('guide-subtitle');
const detectedNum = document.getElementById('detected-num');
const cameraStatus = document.getElementById('camera-status');
const cameraPreview = document.getElementById('camera-preview');
const fpsEl = document.getElementById('fps-display');

const COLOR_PALETTE = [
  '#ff006e','#ff5e00','#ffbe0b','#00f5d4','#00bbf9',
  '#9b5de5','#f15bb5','#fee440','#8338ec','#ff9500',
  '#00e5ff','#ff2d55','#5856d6','#ffcc00','#5eff6f',
  '#ff6b9d','#00d4aa','#ff9f43','#6c5ce7','#ff7675',
  '#ff3366','#ff9900','#33ccff','#66ff66','#cc33ff',
  '#e040fb','#00e676','#ffab00','#448aff','#ff4081',
];

const PARTICLE_COUNT = 20000;
const FORMATION_DURATION = 1.2;
const HOLD_DURATION = 3.0;
const GESTURE_CONFIRM_FRAMES = 10;

let particles = [];
let appState = 'idle';
let currentNumber = null;
let formationStartTime = 0;
let formedStartTime = 0;
let returnStartTime = 0;
let shapeTargets = [];
let globalTime = 0;
let handDetected = false;
let lastHandTime = 0;
let gestureVotes = {};
let confirmedGesture = null;
let hands = null;
let cameraInstance = null;
let cameraReady = false;
let lastTimestamp = 0;

let fpsFrames = 0, fpsTime = 0, fps = 0;

function resizeStage() {
  stage.width = window.innerWidth;
  stage.height = window.innerHeight;
}
resizeStage();
window.addEventListener('resize', () => {
  resizeStage();
  for (const k of Object.keys(shapeCache)) delete shapeCache[k];
  if (appState === 'formed' && currentNumber !== null) {
    const txt = currentNumber === 5 ? 'BEAUTY' : String(currentNumber);
    shapeTargets = generateShapePositions(txt);
    for (let i = 0; i < particles.length; i++) {
      const t = shapeTargets[i % shapeTargets.length];
      particles[i].x = t.x; particles[i].y = t.y;
      particles[i].tx = t.x; particles[i].ty = t.y;
    }
  }
});

function hexToRgb(h) {
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}

function easeOutBack(t) { const c1 = 1.70158; return 1 + (c1 + 1) * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }

function noise(x, y, t) {
  return Math.sin(x * .007 + t * .6) * Math.cos(y * .005 + t * .45) * .5 +
         Math.sin(x * .012 - t * .35) * Math.cos(y * .01 + t * .55) * .35 +
         Math.cos(x * .008 + y * .006 + t * .3) * .3;
}

function precomputeColor(hex) {
  const rgb = hexToRgb(hex);
  return {
    r: rgb.r, g: rgb.g, b: rgb.b,
    full: `rgba(${rgb.r},${rgb.g},${rgb.b},1)`,
  };
}
const COLORS_RGB = COLOR_PALETTE.map(precomputeColor);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * stage.width;
    this.y = Math.random() * stage.height;
    this.tx = null; this.ty = null; this.sx = 0; this.sy = 0;
    this.vx = (Math.random() - .5) * 2;
    this.vy = (Math.random() - .5) * 2;
    this.size = .5 + Math.random() * 2.3;
    const c = COLORS_RGB[Math.floor(Math.random() * COLORS_RGB.length)];
    this.r = c.r; this.g = c.g; this.b = c.b;
    this.alpha = .45 + Math.random() * .55;
    this.phase = Math.random() * Math.PI * 2;
  }
  setIdle() { this.tx = null; this.ty = null; }
  setTarget(tx, ty) { this.tx = tx; this.ty = ty; this.sx = this.x; this.sy = this.y; }
}

const shapeCache = {};
function generateShapePositions(text) {
  if (shapeCache[text]) return shapeCache[text];
  const oc = document.createElement('canvas');
  oc.width = stage.width; oc.height = stage.height;
  const octx = oc.getContext('2d');
  octx.fillStyle = '#fff';
  const fs = text === 'BEAUTY'
    ? Math.min(stage.width / 5.5, stage.height / 2.8)
    : Math.min(stage.width / 2, stage.height * .7);
  octx.font = `900 ${Math.floor(fs)}px "Arial Black","Arial","PingFang SC","Microsoft YaHei",sans-serif`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle';
  octx.fillText(text, oc.width / 2, oc.height / 2);
  const img = octx.getImageData(0, 0, oc.width, oc.height);
  const px = img.data;
  const positions = [];
  for (let y = 0; y < oc.height; y += 2) {
    for (let x = 0; x < oc.width; x += 2) {
      if (px[(y * oc.width + x) * 4 + 3] > 80) positions.push({x, y});
    }
  }
  const result = [];
  const need = PARTICLE_COUNT;
  if (positions.length >= need) {
    for (let i = 0; i < need; i++) {
      const j = i + Math.floor(Math.random() * (positions.length - i));
      [positions[i], positions[j]] = [positions[j], positions[i]];
      result.push({ x: positions[i].x + (Math.random() - .5) * 5, y: positions[i].y + (Math.random() - .5) * 5 });
    }
  } else {
    for (let i = 0; i < positions.length; i++)
      result.push({ x: positions[i].x + (Math.random() - .5) * 4, y: positions[i].y + (Math.random() - .5) * 4 });
    while (result.length < need) {
      const p = positions[Math.floor(Math.random() * positions.length)];
      result.push({ x: p.x + (Math.random() - .5) * 8, y: p.y + (Math.random() - .5) * 8 });
    }
  }
  shapeCache[text] = result;
  return result;
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
}

function countFingers(landmarks) {
  let count = 0;
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];
  const mcps = [5, 9, 13, 17];
  for (let i = 0; i < 4; i++) {
    const tip = landmarks[tips[i]];
    const pip = landmarks[pips[i]];
    const mcp = landmarks[mcps[i]];
    if (tip.y < pip.y - .003 && tip.y < mcp.y) count++;
  }
  const thumbDist = Math.hypot(landmarks[4].x - landmarks[5].x, landmarks[4].y - landmarks[5].y);
  if (thumbDist > .18) count++;
  return count;
}

function onHandResults(results) {
  const now = performance.now() / 1000;
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handDetected = true;
    lastHandTime = now;
    const fc = countFingers(results.multiHandLandmarks[0]);
    if (!gestureVotes[fc]) gestureVotes[fc] = 0;
    gestureVotes[fc]++;
    for (const k of Object.keys(gestureVotes)) {
      if (+k !== fc) gestureVotes[k] = Math.max(0, gestureVotes[k] - 3);
    }
    for (const [cnt, votes] of Object.entries(gestureVotes)) {
      if (votes >= GESTURE_CONFIRM_FRAMES && +cnt !== confirmedGesture) {
        const num = +cnt;
        if (num >= 1 && num <= 5) {
          handleGesture(num);
          confirmedGesture = num;
          gestureVotes = {};
          break;
        }
      }
    }
    if (Math.max(...Object.values(gestureVotes), 0) > 60) gestureVotes = {};
  } else {
    handDetected = false;
    for (const k of Object.keys(gestureVotes)) gestureVotes[k] = Math.max(0, gestureVotes[k] - 3);
    if (Math.max(...Object.values(gestureVotes), 0) < 2) {
      gestureVotes = {};
      if (confirmedGesture !== null && now - lastHandTime > .6) {
        returnToIdle();
        confirmedGesture = null;
      }
    }
  }
}

function handleGesture(number) {
  if (currentNumber === number) return;
  const targetText = number === 5 ? 'BEAUTY' : String(number);
  currentNumber = number;
  shapeTargets = generateShapePositions(targetText);
  const shuffled = new Array(particles.length);
  for (let i = 0; i < particles.length; i++) shuffled[i] = particles[i];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  for (let i = 0; i < particles.length; i++)
    shuffled[i].setTarget(shapeTargets[i % shapeTargets.length].x, shapeTargets[i % shapeTargets.length].y);
  appState = 'forming';
  formationStartTime = performance.now() / 1000;
  const cn = ['', '一', '二', '三', '四'];
  if (number === 5) { detectedNum.textContent = 'BEAUTY'; detectedNum.style.color = '#ff6b9d'; }
  else { detectedNum.textContent = cn[number]; detectedNum.style.color = '#fff'; }
  guideSubtitle.style.opacity = '.3';
}

function returnToIdle() {
  if (appState === 'returning' || appState === 'idle') return;
  appState = 'returning';
  currentNumber = null;
  confirmedGesture = null;
  gestureVotes = {};
  returnStartTime = performance.now() / 1000;
  const cx = stage.width / 2, cy = stage.height / 2;
  for (const p of particles) {
    const dx = p.x - cx, dy = p.y - cy;
    const d = Math.hypot(dx, dy) || 1;
    p.vx = dx / d * (1 + Math.random() * 6);
    p.vy = dy / d * (1 + Math.random() * 6);
    p.setIdle();
  }
  detectedNum.textContent = '';
  guideSubtitle.style.opacity = '1';
}

function update(dt) {
  globalTime += dt;
  const now = performance.now() / 1000;

  if (appState === 'forming') {
    const progress = Math.min(1, (now - formationStartTime) / FORMATION_DURATION);
    for (const p of particles) {
      if (p.tx !== null) {
        const t = easeOutBack(progress);
        const j = (1 - t) * 3;
        p.x = p.sx + (p.tx - p.sx) * t + (Math.random() - .5) * j;
        p.y = p.sy + (p.ty - p.sy) * t + (Math.random() - .5) * j;
      }
    }
    if (progress >= 1) {
      appState = 'formed';
      formedStartTime = now;
      for (const p of particles) { if (p.tx !== null) { p.x = p.tx; p.y = p.ty; } }
    }
  } else if (appState === 'formed') {
    const pulse = currentNumber === 5 ? 1 + Math.sin(globalTime * 2.5) * .2 : 1;
    for (const p of particles) {
      if (p.tx !== null) {
        p.x = p.tx + Math.sin(globalTime * 3.5 + p.phase) * .8 * pulse;
        p.y = p.ty + Math.cos(globalTime * 3.2 + p.phase) * .8 * pulse;
      }
    }
    if (now - formedStartTime > HOLD_DURATION && !handDetected) returnToIdle();
  } else if (appState === 'returning') {
    for (const p of particles) {
      p.vx *= .98; p.vy *= .98;
      p.x += p.vx + noise(p.x, p.y, globalTime) * 1.8;
      p.y += p.vy + noise(p.x + 700, p.y + 700, globalTime) * 1.8;
      if (p.x < -80) p.x = stage.width + 80;
      if (p.x > stage.width + 80) p.x = -80;
      if (p.y < -80) p.y = stage.height + 80;
      if (p.y > stage.height + 80) p.y = -80;
    }
    if (now - returnStartTime > 2) appState = 'idle';
  } else {
    for (const p of particles) {
      p.vx += noise(p.x, p.y, globalTime) * .06;
      p.vy += noise(p.x + 500, p.y + 500, globalTime) * .06;
      p.vx *= .993; p.vy *= .993;
      const sp = Math.hypot(p.vx, p.vy);
      if (sp > 4) { const s = 4 / sp; p.vx *= s; p.vy *= s; }
      p.x += p.vx; p.y += p.vy;
      if (p.x < -80) p.x = stage.width + 80;
      if (p.x > stage.width + 80) p.x = -80;
      if (p.y < -80) p.y = stage.height + 80;
      if (p.y > stage.height + 80) p.y = -80;
    }
  }
}

function render() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(6,6,24,.08)';
  ctx.fillRect(0, 0, stage.width, stage.height);

  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const s = (appState === 'formed' && currentNumber === 5)
      ? p.size * (1 + Math.sin(globalTime * 2.5 + p.phase) * .25) : p.size;

    ctx.beginPath();
    ctx.arc(p.x, p.y, s * 1.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha * .15})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(p.x, p.y, s * .3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';

  fpsFrames++;
  const now = performance.now();
  if (now - fpsTime >= 1000) {
    fps = fpsFrames;
    fpsFrames = 0;
    fpsTime = now;
    fpsEl.textContent = fps + ' FPS | 20000 particles';
  }
}

function animate(ts) {
  update(Math.min(.05, (ts - lastTimestamp) / 1000));
  lastTimestamp = ts;
  render();
  requestAnimationFrame(animate);
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    video.srcObject = stream;
    await video.play();

    hands = new Hands({
      locateFile: (f) => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/' + f
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: .5,
      minTrackingConfidence: .5,
    });
    hands.onResults(onHandResults);

    cameraInstance = new Camera(video, {
      onFrame: async () => { if (hands) await hands.send({ image: video }); },
      width: 640, height: 480,
    });
    await cameraInstance.start();
    cameraReady = true;

    cameraStatus.style.display = 'flex';
    cameraPreview.style.display = 'block';
    startBtn.textContent = '✓ 摄像头已就绪';
    startBtn.classList.add('ready');
    startBtn.disabled = false;
    detectedNum.textContent = '比个数字试试吧！';
    detectedNum.style.fontSize = 'clamp(.9rem,1.6vw,1.3rem)';
    detectedNum.style.color = 'rgba(255,255,255,.7)';
  } catch (err) {
    console.warn('Camera error:', err);
    detectedNum.textContent = '⚠ 无法访问摄像头，请允许权限后刷新页面';
    detectedNum.style.color = '#ff6b6b';
    startBtn.textContent = '重新尝试';
    startBtn.disabled = false;
  }
}

startBtn.addEventListener('click', () => {
  if (cameraReady) return;
  startBtn.textContent = '正在启动...';
  startBtn.disabled = true;
  startCamera();
});

initParticles();
lastTimestamp = performance.now();
fpsTime = performance.now();
requestAnimationFrame(animate);

console.log('%c✨ 粒子魔法已就绪 %c| %c20000粒子 + 手势1-5',
  'color:#ff6b9d;font-size:1.2em;', '', 'color:#aaa;');
})();
</script>
</body>
</html>
