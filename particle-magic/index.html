}
@keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

<body>
<canvas id="stage"></canvas>

<div id="ui">
  <div id="guide-title">у╗«ТјЉуЊЎТдёТЌђуАХ</div>
  <div id="guide-subtitle">Тх╝уе┐тџГТхБуіхТ«ЉжјхтгХу┤ЮтДБТќЙжЄюжЈЂТЮ┐уЊДжЇџЛЇу┤њ</div>
  <div id="detected-num"></div>

  </div>

</div>

<div id="camera-status"><div id="camera-dot"></div><span>жјйтІФтёџТЙХТЮЉтЄАт»«РѓгжЇџ?/span></div>
<div id="camera-preview"><video id="video" autoplay playsinline></video></div>
<div id="upload-status"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

<script>
(function() {
'use strict';

const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
const video = document.getElementById('video');
const startBtn = document.getElementById('start-btn');
const recordBtn = document.getElementById('record-btn');
const recordTimer = document.getElementById('record-timer');
const guideSubtitle = document.getElementById('guide-subtitle');
const detectedNum = document.getElementById('detected-num');
const cameraStatus = document.getElementById('camera-status');
const cameraPreview = document.getElementById('camera-preview');
const uploadStatus = document.getElementById('upload-status');

let githubToken = localStorage.getItem('gh_token') || '';

const GITHUB_OWNER = 'jun123440';
const GITHUB_REPO = 'love';
const GITHUB_BRANCH = 'main';

const COLOR_PALETTE = [
  '#ff006e','#ff5e00','#ffbe0b','#00f5d4','#00bbf9',
  '#9b5de5','#f15bb5','#fee440','#8338ec','#ff9500',
  '#00e5ff','#ff2d55','#5856d6','#ffcc00','#5eff6f',
  '#ff6b9d','#00d4aa','#ff9f43','#6c5ce7','#ff7675',
  '#ff3366','#ff9900','#33ccff','#66ff66','#cc33ff',
];

const PARTICLE_COUNT = 8000;
const FORMATION_DURATION = 1.3;
const HOLD_DURATION = 3.0;
const GESTURE_CONFIRM_FRAMES = 16;

let particles = [];
let appState = 'idle';
let currentNumber = null;
let formationStartTime = 0;
let formedStartTime = 0;
let returnStartTime = 0;
let transitionProgress = 0;
let shapeTargets = [];
let time = 0;
let handDetected = false;
let lastHandTime = 0;
let gestureVotes = {};
let confirmedGesture = null;
let hands = null;
let cameraInstance = null;
let cameraReady = false;
let lastTimestamp = 0;
let mediaRecorder = null;
let recordedChunks = [];
let recordStartTime = 0;
let recordInterval = null;

function resizeStage() {
  stage.width = window.innerWidth;
  stage.height = window.innerHeight;
}
resizeStage();
window.addEventListener('resize', () => {
  resizeStage();
  for (const k of Object.keys(shapeCache)) delete shapeCache[k];
  if (appState === 'formed' && currentNumber !== null) {
    const txt = currentNumber === 5 ? 'BEAUTY' : String(currentNumber);
    shapeTargets = generateShapePositions(txt);
    for (let i = 0; i < particles.length; i++) {
      const t = shapeTargets[i % shapeTargets.length];
      particles[i].x = t.x; particles[i].y = t.y;
      particles[i].tx = t.x; particles[i].ty = t.y;
    }
  }
});

function hexToRgb(h) {
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}

const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

function easeOutBack(t) { const c1 = 1.70158; const c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }

function noise(x, y, t) {
  return Math.sin(x * 0.007 + t * 0.6) * Math.cos(y * 0.005 + t * 0.45) * 0.5 +
         Math.sin(x * 0.012 - t * 0.35) * Math.cos(y * 0.01 + t * 0.55) * 0.35 +
         Math.cos(x * 0.008 + y * 0.006 + t * 0.3) * 0.3;
}

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * stage.width;
    this.y = Math.random() * stage.height;
    this.tx = null; this.ty = null; this.sx = 0; this.sy = 0;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.size = 0.6 + Math.random() * 2.8;
    const rgb = hexToRgb(COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)]);
    this.r = rgb.r; this.g = rgb.g; this.b = rgb.b;
    this.alpha = 0.5 + Math.random() * 0.5;
    this.phase = Math.random() * Math.PI * 2;
  }
  setIdle() { this.tx = null; this.ty = null; }
  setTarget(tx, ty) { this.tx = tx; this.ty = ty; this.sx = this.x; this.sy = this.y; }
}

const shapeCache = {};
function generateShapePositions(text) {
  if (shapeCache[text]) return shapeCache[text];
  const oc = document.createElement('canvas');
  oc.width = stage.width; oc.height = stage.height;
  const octx = oc.getContext('2d');
  octx.fillStyle = '#fff';
  const fs = text === 'BEAUTY'
    ? Math.min(stage.width / 5.5, stage.height / 2.8)
    : Math.min(stage.width / 2, stage.height * 0.7);
  octx.font = `900 ${Math.floor(fs)}px "Arial Black","Arial","PingFang SC","Microsoft YaHei",sans-serif`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle';
  octx.fillText(text, oc.width / 2, oc.height / 2);
  const img = octx.getImageData(0, 0, oc.width, oc.height);
  const px = img.data;
  const positions = [];
  const step = 2;
  for (let y = 0; y < oc.height; y += step) {
    for (let x = 0; x < oc.width; x += step) {
      if (px[(y * oc.width + x) * 4 + 3] > 100) positions.push({x, y});
    }
  }
  const result = [];
  const need = PARTICLE_COUNT;
  if (positions.length >= need) {
    for (let i = 0; i < need; i++) {
      const j = i + Math.floor(Math.random() * (positions.length - i));
      [positions[i], positions[j]] = [positions[j], positions[i]];
      result.push({ x: positions[i].x + (Math.random() - 0.5) * 6, y: positions[i].y + (Math.random() - 0.5) * 6 });
    }
  } else {
    for (let i = 0; i < positions.length; i++)
      result.push({ x: positions[i].x + (Math.random() - 0.5) * 5, y: positions[i].y + (Math.random() - 0.5) * 5 });
    while (result.length < need) {
      const p = positions[Math.floor(Math.random() * positions.length)];
      result.push({ x: p.x + (Math.random() - 0.5) * 10, y: p.y + (Math.random() - 0.5) * 10 });
    }
  }
  shapeCache[text] = result;
  return result;
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
}

function countFingers(landmarks) {
  let count = 0;

  // Non-thumb fingers: compare tip Y with PIP Y
  // tip.y < pip.y => finger is extended (pointing upward in image)
  const fingerTips = [8, 12, 16, 20];
  const fingerPips = [6, 10, 14, 18];
  for (let i = 0; i < 4; i++) {
    if (landmarks[fingerTips[i]].y < landmarks[fingerPips[i]].y - 0.005) count++;
  }

  // Thumb (landmark 4): distance from thumb tip to index MCP (landmark 5)
  // Folded thumb sits close to index knuckle; extended thumb is far away
  const thumbDist = Math.hypot(
    landmarks[4].x - landmarks[5].x,
    landmarks[4].y - landmarks[5].y
  );
  if (thumbDist > 0.2) count++;

  return count;
}

function onHandResults(results) {
  const now = performance.now() / 1000;
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handDetected = true;
    lastHandTime = now;
    const fc = countFingers(results.multiHandLandmarks[0]);

    if (!gestureVotes[fc]) gestureVotes[fc] = 0;
    gestureVotes[fc]++;

    // Decay old votes
    for (const k of Object.keys(gestureVotes)) {
      if (parseInt(k) !== fc) gestureVotes[k] = Math.max(0, gestureVotes[k] - 2);
    }

    for (const [cnt, votes] of Object.entries(gestureVotes)) {
      if (votes >= GESTURE_CONFIRM_FRAMES && parseInt(cnt) !== confirmedGesture) {
        const num = parseInt(cnt);
        if (num >= 1 && num <= 5) {
          handleGesture(num);
          confirmedGesture = num;
          gestureVotes = {};
          break;
        }
      }
    }

    const top = Math.max(...Object.values(gestureVotes), 0);
    if (top > 120) { gestureVotes = {}; }
  } else {
    handDetected = false;
    // Decay votes when no hand
    for (const k of Object.keys(gestureVotes)) gestureVotes[k] = Math.max(0, gestureVotes[k] - 2);
    const mx = Math.max(...Object.values(gestureVotes), 0);
    if (mx < 2) {
      gestureVotes = {};
      if (confirmedGesture !== null && now - lastHandTime > 0.8) {
        returnToIdle();
        confirmedGesture = null;
      }
    }
  }
}

function handleGesture(number) {
  const targetText = number === 5 ? 'BEAUTY' : String(number);
  currentNumber = number;
  shapeTargets = generateShapePositions(targetText);
  const shuffled = [...particles].sort(() => Math.random() - 0.5);
  for (let i = 0; i < particles.length; i++)
    shuffled[i].setTarget(shapeTargets[i % shapeTargets.length].x, shapeTargets[i % shapeTargets.length].y);
  appState = 'forming';
  formationStartTime = performance.now() / 1000;
  transitionProgress = 0;
  const cn = ['', 'ТХЊРѓг', 'Тхю?, 'ТХЊ?, 'жЇЦ?];
  if (number === 5) { detectedNum.textContent = 'BEAUTY'; detectedNum.style.color = '#ff6b9d'; }
  else { detectedNum.textContent = cn[number]; detectedNum.style.color = '#fff'; }
  guideSubtitle.style.opacity = '0.3';
}

function returnToIdle() {
  if (appState === 'returning' || appState === 'idle') return;
  appState = 'returning';
  currentNumber = null;
  confirmedGesture = null;
  gestureVotes = {};
  returnStartTime = performance.now() / 1000;
  const cx = stage.width / 2, cy = stage.height / 2;
  for (const p of particles) {
    const dx = p.x - cx, dy = p.y - cy;
    const d = Math.hypot(dx, dy) || 1;
    p.vx = (dx / d) * (1.5 + Math.random() * 5);
    p.vy = (dy / d) * (1.5 + Math.random() * 5);
    p.setIdle();
  }
  detectedNum.textContent = '';
  guideSubtitle.style.opacity = '1';
}

function update(dt) {
  time += dt;
  const now = performance.now() / 1000;

  if (appState === 'forming') {
    transitionProgress = Math.min(1, (now - formationStartTime) / FORMATION_DURATION);
    for (const p of particles) {
      if (p.tx !== null) {
        const t = easeOutBack(transitionProgress);
        const j = (1 - t) * 5;
        p.x = p.sx + (p.tx - p.sx) * t + (Math.random() - 0.5) * j;
        p.y = p.sy + (p.ty - p.sy) * t + (Math.random() - 0.5) * j;
      }
    }
    if (transitionProgress >= 1) {
      appState = 'formed';
      formedStartTime = now;
      for (const p of particles) { if (p.tx !== null) { p.x = p.tx; p.y = p.ty; } }
    }
  } else if (appState === 'formed') {
    const pulse = (currentNumber === 5) ? (1 + Math.sin(time * 2.5) * 0.25) : 1;
    for (const p of particles) {
      if (p.tx !== null) {
        p.x = p.tx + Math.sin(time * 3.8 + p.phase) * 1 * pulse;
        p.y = p.ty + Math.cos(time * 3.5 + p.phase) * 1 * pulse;
      }
    }
    if (now - formedStartTime > HOLD_DURATION && !handDetected) returnToIdle();
  } else if (appState === 'returning') {
    for (const p of particles) {
      p.vx *= 0.982; p.vy *= 0.982;
      p.x += p.vx + noise(p.x, p.y, time) * 1.5;
      p.y += p.vy + noise(p.x + 700, p.y + 700, time) * 1.5;
      if (p.x < -60) p.x = stage.width + 60;
      if (p.x > stage.width + 60) p.x = -60;
      if (p.y < -60) p.y = stage.height + 60;
      if (p.y > stage.height + 60) p.y = -60;
    }
    if (now - returnStartTime > 2.5) appState = 'idle';
  } else {
    for (const p of particles) {
      p.vx += noise(p.x, p.y, time) * 0.05;
      p.vy += noise(p.x + 500, p.y + 500, time) * 0.05;
      p.vx *= 0.994; p.vy *= 0.994;
      const sp = Math.hypot(p.vx, p.vy);
      if (sp > 3.5) { p.vx = p.vx / sp * 3.5; p.vy = p.vy / sp * 3.5; }
      p.x += p.vx; p.y += p.vy;
      if (p.x < -60) p.x = stage.width + 60;
      if (p.x > stage.width + 60) p.x = -60;
      if (p.y < -60) p.y = stage.height + 60;
      if (p.y > stage.height + 60) p.y = -60;
    }
  }
}

function render() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(6, 6, 24, 0.1)';
  ctx.fillRect(0, 0, stage.width, stage.height);

  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    const ss = (appState === 'formed' && currentNumber === 5)
      ? p.size * (1 + Math.sin(time * 2.5 + p.phase) * 0.3) : p.size;

    ctx.beginPath();
    ctx.arc(p.x, p.y, ss * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha * 0.1})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(p.x, p.y, ss * 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha * 0.4})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(p.x, p.y, ss * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

function animate(ts) {
  const dt = Math.min(0.05, (ts - lastTimestamp) / 1000);
  lastTimestamp = ts;
  update(dt);
  render();
  requestAnimationFrame(animate);
}

function updateRecordTimer() {
  const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
  const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const secs = (elapsed % 60).toString().padStart(2, '0');
  recordTimer.textContent = mins + ':' + secs;
}

function startRecording() {
  if (!video.srcObject) return;
  recordedChunks = [];
  recordBtn.textContent = 'жѕ┤?жЇІТ╗ёЬёЏУц░ТЏътЪЌ';
  recordBtn.classList.add('recording');
  recordTimer.style.display = 'block';
  recordTimer.textContent = '00:00';
  recordStartTime = Date.now();
  recordInterval = setInterval(updateRecordTimer, 200);

  const stream = video.srcObject;
  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
  } catch (e) {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
  }
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const filename = 'gesture-' + ts + '.webm';

    // Auto-download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);

    // Auto-upload to GitHub
    uploadStatus.style.display = 'block';
    uploadStatus.textContent = 'уїг?т«ИУ╣Гу╣џуђЏ? ' + filename + ' | жѕ┤?жЉиЬЂётДЕТХЊтЕЂу┤ХТХЊ?..';
    uploadToGitHub(blob, filename);
  };
  mediaRecorder.start(500);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  clearInterval(recordInterval);
  recordBtn.textContent = 'жѕ┤?т»«РѓгТ┐«тгфуХЇжЇњ?;
  recordBtn.classList.remove('recording');
  recordTimer.style.display = 'none';
}

async function uploadToGitHub(blob, filename) {
  if (!githubToken) {
    const t = prompt('уњЄуќ»уиГжЇЈсЃцуХўжље?GitHub Personal Access TokenжћЏтаюу╣џуђЏТе║Т╣фжЈѕЬёђТ╣┤те┤т┐џЬЮЇжЇБЬЪњу┤џжћЏ?);
    if (!t) { uploadStatus.textContent = 'жЅѓ?жЈѕЬЂЄЬєЋу╝Ѓ?TokenжћЏт▒ЙТБцтеЅТЏџугѓТх╝уІЁу┤ЎуЉЎтЌЏЬЋХт«ИУ╣ГугЁТЮъТќцу┤џ'; return; }
    githubToken = t;
    localStorage.setItem('gh_token', t);
  }
  uploadStatus.textContent = 'жѕ┤?тДЮ№йЁТ╣фТХЊтЕЂу┤Х ' + filename + ' жЇњ?GitHub...';

  try {
    const path = 'recordings/' + filename;

    const buf = await blob.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    const base64 = btoa(binary);

    const resp = await fetch('https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/contents/' + path, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + githubToken,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: 'Add gesture recording: ' + filename,
        content: base64,
        branch: GITHUB_BRANCH,
      }),
    });

    if (resp.ok) {
      uploadStatus.textContent = 'жЅЂ?т«ИУ╣ГугѓТх╝уі▓тЪї GitHub: recordings/' + filename;
    } else {
      const err = await resp.json();
      throw new Error(err.message || 'Upload failed');
    }
  } catch (e) {
    uploadStatus.textContent = 'жЅѓ?ТХЊтЕЂу┤ХТЙХУЙФУДд: ' + e.message + ' (уЉЎтЌЏЬЋХт«ИУ╣ГугЁТЮъ?';
  }
}

recordBtn.addEventListener('click', () => {
  if (!cameraReady) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else startRecording();
});

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    video.srcObject = stream;
    await video.play();

    hands = new Hands({
      locateFile: (f) => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/' + f
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    hands.onResults(onHandResults);

    cameraInstance = new Camera(video, {
      onFrame: async () => { if (hands) await hands.send({ image: video }); },
      width: 640, height: 480,
    });
    await cameraInstance.start();
    cameraReady = true;

    cameraStatus.style.display = 'flex';
    cameraPreview.style.display = 'block';
    recordBtn.style.display = 'inline-block';
    startBtn.textContent = 'жЅЂ?жјйтІФтёџТЙХТЮЉтЄАуЂЈУЙЕтЇј';
    startBtn.classList.add('ready');
    startBtn.disabled = false;
    detectedNum.textContent = 'тДБТќЙжЄюжЈЂТЮ┐уЊДуњЄТЏАуў»жЇџЛЇу┤њ';
    detectedNum.style.fontSize = 'clamp(.9rem, 1.6vw, 1.3rem)';
    detectedNum.style.color = 'rgba(255,255,255,.7)';
    uploadStatus.style.display = 'block';
    uploadStatus.textContent = 'ждЃТЉ┤ жјйтІФтёџТЙХТЮЉТ░еу╝Ђ?| жљљуЉ░тџ«"т»«РѓгТ┐«тгфуХЇжЇњ?ТиЄТ┐єуЊеуЉЎтЌЏЬЋХ';
  } catch (err) {
    console.warn('Camera error:', err);
    detectedNum.textContent = 'жѕ┐?жЈЃуі│уАХуњЂтЮЌТБХжјйтІФтёџТЙХУЙЙу┤ЮуњЄт│░тјЉуњЂтЉіТйѕжЌёТёгТѓЌжЇњжћІТЪіТццућИТй░';
    detectedNum.style.color = '#ff6b6b';
    detectedNum.style.fontSize = 'clamp(.8rem, 1.4vw, 1.1rem)';
    startBtn.textContent = 'жќ▓тХєТЪіуЂЈТ┐іуў»';
    startBtn.disabled = false;
  }
}

startBtn.addEventListener('click', () => {
  if (cameraReady) return;
  startBtn.textContent = 'тДЮ№йЁТ╣фжЇџЬѕџтДЕ...';
  startBtn.disabled = true;
  startCamera();
});
