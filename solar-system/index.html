<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳系 — 3A 级模拟</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui-top">
  <h1>☀ 太阳系</h1>
  <div id="timeDisplay"></div>
</div>

<div id="planet-panel">
  <button id="panel-close">✕</button>
  <div id="panel-content"></div>
</div>

<div id="controls">
  <button id="btn-reset" title="重置视角">⌂</button>
  <label>时间</label>
  <input type="range" id="speedSlider" min="-5" max="5" step="0.1" value="1">
  <span id="speedLabel">1×</span>
  <button id="btn-toggle-orbit" title="轨道">◎</button>
  <button id="btn-toggle-labels" title="标签">Aa</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>正在构建太阳系...</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<canvas id="label-canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="script.js?v=2"></script>
</body>
</html>
