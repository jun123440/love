<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>黑洞模型</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; touch-action:pan-x pan-y pinch-zoom; -webkit-tap-highlight-color:transparent; }

  canvas { display:block; }

  #wechat-overlay {
    display:none; position:fixed; inset:0; z-index:9999;
    background:radial-gradient(ellipse at center, #0a0010 0%, #000 100%);
    flex-direction:column; align-items:center; justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    padding:20px;
  }
  #wechat-overlay.active { display:flex; }

  #wechat-overlay .glow-circle {
    width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle, transparent 30%, rgba(255,140,0,0.15) 45%, rgba(255,80,0,0.3) 52%, rgba(255,50,0,0.15) 58%, transparent 70%);
    margin-bottom:30px; animation:glowPulse 2s ease-in-out infinite;
    display:flex; align-items:center; justify-content:center;
  }
  #wechat-overlay .glow-circle .dark-core {
    width:50px; height:50px; border-radius:50%; background:#000;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
  }

  @keyframes glowPulse {
    0%,100% { transform:scale(1); opacity:0.8; }
    50% { transform:scale(1.08); opacity:1; }
  }

  #wechat-overlay h2 {
    color:#ff9944; font-size:22px; font-weight:600; margin-bottom:12px;
    letter-spacing:2px; text-align:center;
  }
  #wechat-overlay p {
    color:rgba(255,255,255,0.7); font-size:14px; text-align:center;
    line-height:1.8; margin-bottom:24px; max-width:280px;
  }
  #wechat-overlay .copy-btn {
    background:linear-gradient(135deg, #ff6600, #ff3300);
    color:#fff; border:none; padding:14px 40px; font-size:16px;
    border-radius:30px; cursor:pointer; font-weight:600;
    letter-spacing:1px; transition:transform 0.2s;
    -webkit-tap-highlight-color:transparent;
  }
  #wechat-overlay .copy-btn:active { transform:scale(0.95); }

  #wechat-overlay .tip-row {
    display:flex; align-items:center; gap:10px; margin-top:20px;
    color:rgba(255,255,255,0.5); font-size:12px;
  }
  #wechat-overlay .tip-row .dot {
    width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.3);
  }

  #loading {
    position:fixed; inset:0; z-index:9998; background:#000;
    display:flex; align-items:center; justify-content:center;
    transition:opacity 0.6s; pointer-events:none;
  }
  #loading.hidden { opacity:0; }
  #loading .loader-ring {
    width:50px; height:50px; border:2px solid rgba(255,100,0,0.2);
    border-top-color:#ff6600; border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  #hint {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    z-index:10; color:rgba(255,255,255,0.4); font-size:12px;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    pointer-events:none; transition:opacity 1s;
  }

  #info-panel {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    z-index:10; color:rgba(255,255,255,0.5); font-size:11px;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    pointer-events:none; text-align:center; letter-spacing:1px;
  }
</style>
</head>
<body>

<div id="wechat-overlay">
  <div class="glow-circle"><div class="dark-core"></div></div>
  <h2>请在浏览器中打开</h2>
  <p>微信内置浏览器无法完美展示<br/>3D黑洞模型效果</p>
  <button class="copy-btn" id="copyBtn">复制链接并打开浏览器</button>
  <div style="display:flex;gap:16px;margin-top:16px;">
    <div class="tip-row"><span class="dot"></span> 点击右上角</div>
    <div class="tip-row"><span class="dot"></span> 选择「在浏览器中打开」</div>
  </div>
</div>

<div id="loading"><div class="loader-ring"></div></div>

<div id="info-panel">KERR BLACK HOLE · 旋转黑洞模型</div>
<div id="hint">拖动旋转 · 双指缩放</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
if (isWeChat) {
  document.getElementById('wechat-overlay').classList.add('active');
  document.getElementById('loading').classList.add('hidden');
}
const copyAndOpen = () => {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      alert('\u94FE\u63A5\u5DF2\u590D\u5236\uFF01\u8BF7\u5728\u7CFB\u7EDF\u6D4F\u89C8\u5668\u4E2D\u7C98\u8D34\u6253\u5F00');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('\u94FE\u63A5\u5DF2\u590D\u5236\uFF01\u8BF7\u5728\u7CFB\u7EDF\u6D4F\u89C8\u5668\u4E2D\u7C98\u8D34\u6253\u5F00');
  }
  window.location.href = 'https://' + window.location.host + window.location.pathname;
};
const copyBtn = document.getElementById('copyBtn');
if (copyBtn) copyBtn.addEventListener('click', copyAndOpen);

const container = document.body;
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 3.5, 8);
camera.lookAt(0, 0, 0);

let targetCamPhi = Math.PI * 0.28;
let targetCamTheta = 0;
let targetCamDist = 8;
let camPhi = targetCamPhi;
let camTheta = targetCamTheta;
let camDist = targetCamDist;
let autoRotate = true;
let autoRotateSpeed = 0.15;

function updateCameraPos() {
  const y = camDist * Math.cos(camPhi);
  const r = camDist * Math.sin(camPhi);
  const x = r * Math.sin(camTheta);
  const z = r * Math.cos(camTheta);
  camera.position.set(x, y, z);
  camera.lookAt(0, 0, 0);
}

const BODY_RADIUS = 1.0;
const ISCO_RADIUS = 3.0;
const DISK_INNER = 2.2;
const DISK_OUTER = 8.0;
const PHOTON_RING_RADIUS = 1.55;

// ─── STARFIELD ────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 1200;
const starPositions = new Float32Array(starCount * 3);
const starColors = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);

for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const radius = 40 + Math.random() * 20;
  starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
  starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
  starPositions[i*3+2] = radius * Math.cos(phi);

  const temp = Math.random();
  if (temp < 0.1) { starColors[i*3]=0.6; starColors[i*3+1]=0.7; starColors[i*3+2]=1.0; }
  else if (temp < 0.25) { starColors[i*3]=1.0; starColors[i*3+1]=0.9; starColors[i*3+2]=0.6; }
  else if (temp < 0.4) { starColors[i*3]=1.0; starColors[i*3+1]=0.7; starColors[i*3+2]=0.5; }
  else { starColors[i*3]=0.8+Math.random()*0.2; starColors[i*3+1]=0.8+Math.random()*0.2; starColors[i*3+2]=0.8+Math.random()*0.2; }
  starSizes[i] = 0.5 + Math.random() * 2.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

const starMat = new THREE.PointsMaterial({
  size:0.15, vertexColors:true, blending:THREE.AdditiveBlending,
  depthWrite:false, transparent:true, opacity:0.9
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ─── AMBIENT DUST PARTICLES ────────────────────────────
const dustGeo = new THREE.BufferGeometry();
const dustCount = 400;
const dustPositions = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 2.5 + Math.random() * 10;
  dustPositions[i*3] = Math.cos(angle) * dist;
  dustPositions[i*3+1] = (Math.random() - 0.5) * 1.2;
  dustPositions[i*3+2] = Math.sin(angle) * dist;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMat = new THREE.PointsMaterial({
  size:0.04, color:new THREE.Color('#ff8844'), blending:THREE.AdditiveBlending,
  depthWrite:false, transparent:true, opacity:0.5
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ─── EVENT HORIZON ────────────────────────────────────
const horizonGeo = new THREE.SphereGeometry(BODY_RADIUS, 64, 64);
const horizonMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value:0 },
    uViewDir: { value:new THREE.Vector3() }
  },
  vertexShader: `varying vec3 vPos; varying vec3 vNormal; varying vec3 vViewDir;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vPos = worldPos.xyz;
      vNormal = normalize(mat3(modelMatrix) * normal);
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      vViewDir = normalize(-mvPos.xyz);
      gl_Position = projectionMatrix * mvPos;
    }`,
  fragmentShader: `varying vec3 vPos; varying vec3 vNormal; varying vec3 vViewDir;
    uniform float uTime;
    void main() {
      float fresnel = 1.0 - abs(dot(vNormal, vViewDir));
      fresnel = pow(fresnel, 3.5);
      float ring = smoothstep(0.85, 0.95, fresnel) * (1.0 - smoothstep(0.96, 1.0, fresnel));
      float innerGlow = smoothstep(0.6, 0.85, fresnel) * 0.15;
      float photonGlow = exp(-pow((fresnel - 0.92) * 20.0, 2.0)) * 0.6;
      float alpha = max(ring * 0.5 + innerGlow + photonGlow, 0.0);
      vec3 col = mix(vec3(0.0), vec3(1.0, 0.7, 0.3), ring) + vec3(0.3, 0.5, 1.0) * innerGlow;
      col += vec3(1.0, 0.85, 0.5) * photonGlow;
      gl_FragColor = vec4(col, alpha);
    }`
});
const horizon = new THREE.Mesh(horizonGeo, horizonMat);
horizon.renderOrder = 1;
horizon.material.depthWrite = false;
scene.add(horizon);

// ─── PHOTON RINGS ─────────────────────────────────────
function createPhotonRing(radius, color, width, opacity) {
  const geo = new THREE.TorusGeometry(radius, width, 32, 200);
  geo.rotateX(Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent:true, opacity, blending:THREE.AdditiveBlending, depthWrite:false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 2;
  return mesh;
}
const photonRing1 = createPhotonRing(PHOTON_RING_RADIUS, '#ffcc66', 0.015, 0.9);
const photonRing2 = createPhotonRing(PHOTON_RING_RADIUS - 0.05, '#ff9944', 0.008, 0.5);
const photonRing3 = createPhotonRing(PHOTON_RING_RADIUS + 0.06, '#ffaa55', 0.025, 0.3);
scene.add(photonRing1);
scene.add(photonRing2);
scene.add(photonRing3);

// ─── OUTER GLOW SHELL ─────────────────────────────────
const glowShellGeo = new THREE.SphereGeometry(BODY_RADIUS * 2.2, 48, 48);
const glowShellMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value:0 } },
  vertexShader: `varying vec3 vNormal; varying vec3 vViewPos;
    void main() {
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      vNormal = normalize(mat3(modelViewMatrix) * normal);
      vViewPos = mvPos.xyz;
      gl_Position = projectionMatrix * mvPos;
    }`,
  fragmentShader: `varying vec3 vNormal; varying vec3 vViewPos;
    uniform float uTime;
    void main() {
      vec3 viewDir = normalize(-vViewPos);
      float fresnel = 1.0 - abs(dot(vNormal, viewDir));
      float glow = pow(fresnel, 6.0) * 0.4;
      glow += exp(-pow(fresnel * 8.0 - 2.5, 2.0)) * 0.25;
      vec3 col = mix(vec3(0.9, 0.4, 0.1), vec3(1.0, 0.8, 0.4), fresnel);
      gl_FragColor = vec4(col, glow);
    }`,
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
});
const glowShell = new THREE.Mesh(glowShellGeo, glowShellMat);
glowShell.renderOrder = 0;
scene.add(glowShell);

// ─── ACCRETION DISK ───────────────────────────────────
const diskRingGeo = new THREE.RingGeometry(DISK_INNER, DISK_OUTER, 200, 1);
diskRingGeo.rotateX(-Math.PI / 2);

const diskShaderMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value:0 },
    uCameraPos: { value:new THREE.Vector3() },
    uInner: { value:DISK_INNER },
    uOuter: { value:DISK_OUTER },
    uBodyR: { value:BODY_RADIUS }
  },
  vertexShader: `
    varying vec3 vWorldPos;
    varying vec3 vWorldNormal;
    varying vec2 vUv;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    varying vec3 vWorldPos;
    varying vec3 vWorldNormal;
    varying vec2 vUv;
    uniform float uTime;
    uniform vec3 uCameraPos;
    uniform float uInner;
    uniform float uOuter;
    uniform float uBodyR;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
        mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),
        f.y
      );
    }
    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++) {
        v += a * noise(p);
        p *= 2.3; a *= 0.45;
      }
      return v;
    }

    vec3 temperatureToColor(float t) {
      t = clamp(t, 0.0, 1.0);
      vec3 c1 = vec3(0.7, 0.1, 0.02);
      vec3 c2 = vec3(1.0, 0.35, 0.05);
      vec3 c3 = vec3(1.0, 0.7, 0.2);
      vec3 c4 = vec3(1.0, 0.95, 0.6);
      vec3 c5 = vec3(0.7, 0.85, 1.0);
      if (t < 0.25) return mix(c1, c2, t * 4.0);
      if (t < 0.5) return mix(c2, c3, (t - 0.25) * 4.0);
      if (t < 0.75) return mix(c3, c4, (t - 0.5) * 4.0);
      return mix(c4, c5, (t - 0.75) * 4.0);
    }

    void main() {
      float dist = length(vWorldPos.xz);
      float r01 = (dist - uInner) / (uOuter - uInner);
      float innerEdge = smoothstep(0.0, 0.04, r01);
      float outerEdge = 1.0 - smoothstep(0.7, 1.0, r01);

      float temperature = pow(max(dist / uOuter, 0.05), -0.8);
      temperature = clamp(temperature * 0.7, 0.0, 1.0);

      float angle = atan(vWorldPos.z, vWorldPos.x);
      vec3 camDir = normalize(uCameraPos - vWorldPos);
      float doppler = 1.0 + 0.55 * cos(angle + 1.5708);
      float viewDot = dot(normalize(vWorldPos.xz), normalize(uCameraPos.xz));
      doppler = mix(doppler, 1.0 + 0.4 * cos(angle), 0.5);
      doppler = pow(clamp(doppler, 0.25, 3.0), 2.5);

      vec2 noiseCoord = vec2(angle * 3.0, log(dist) * 5.0);
      noiseCoord.x += uTime * 0.3 / max(dist, 0.5);
      float texNoise = fbm(noiseCoord) * 0.4 + 0.6;
      float spiralNoise = fbm(vec2(angle * 5.0 + log(dist) * 4.0 + uTime * 0.15, dist * 0.5));
      float totalNoise = texNoise * 0.7 + spiralNoise * 0.3;

      vec3 baseColor = temperatureToColor(temperature);
      baseColor *= doppler * (0.8 + 0.4 * totalNoise);
      baseColor += vec3(0.05, 0.02, 0.0) * (1.0 - temperature);

      float alpha = innerEdge * outerEdge;
      alpha *= 0.85 + 0.15 * totalNoise;
      alpha *= clamp(r01 * 1.3, 0.0, 1.0) * 0.9;

      vec3 finalColor = baseColor;
      finalColor += vec3(1.0, 0.6, 0.2) * exp(-dist * 0.8) * 0.15;

      gl_FragColor = vec4(finalColor, alpha);
    }`,
  transparent:true,
  depthWrite:false,
  side:THREE.DoubleSide
});

const accretionDisk = new THREE.Mesh(diskRingGeo, diskShaderMat);
accretionDisk.renderOrder = 3;
scene.add(accretionDisk);

// ─── LENSED DISK (gravitational lensing simulation) ────
function createLensedDisk(yOffset, scale, opacity) {
  const geo = new THREE.RingGeometry(DISK_INNER * scale, BODY_RADIUS * 2.8 * scale, 128, 1);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value:0 },
      uCameraPos: { value:new THREE.Vector3() },
      uInner: { value:DISK_INNER * scale },
      uOuter: { value:BODY_RADIUS * 2.8 * scale },
      uBodyR: { value:BODY_RADIUS },
      uOpacity: { value:opacity }
    },
    vertexShader: `
      varying vec3 vWorldPos;
      varying vec3 vWorldNormal;
      varying vec2 vUv;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPos = worldPos.xyz;
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      varying vec3 vWorldPos;
      varying vec3 vWorldNormal;
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uCameraPos;
      uniform float uInner;
      uniform float uOuter;
      uniform float uBodyR;
      uniform float uOpacity;
      float hash(vec2 p) { return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i=floor(p); vec2 f=fract(p); f=f*f*(3.0-2.0*f);
        return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
      }
      float fbm(vec2 p) { float v=0.0,a=0.5; for(int i=0;i<3;i++){v+=a*noise(p);p*=2.3;a*=0.45;} return v; }
      void main() {
        float dist = length(vWorldPos.xz);
        float r01 = (dist - uInner) / (uOuter - uInner);
        float edge = smoothstep(0.0,0.08,r01) * (1.0-smoothstep(0.5,1.0,r01));
        float temp = pow(clamp(dist/uOuter,0.05,1.0),-0.6)*0.5;
        float angle = atan(vWorldPos.z, vWorldPos.x);
        vec2 nc = vec2(angle*3.0+uTime*0.2, log(max(dist,0.01))*5.0);
        float tex = fbm(nc)*0.4+0.6;
        vec3 col = mix(vec3(1.0,0.4,0.08), vec3(1.0,0.8,0.3), clamp(temp,0.0,1.0));
        col *= 0.8+0.2*tex;
        float alpha = edge * uOpacity * (0.6+0.4*tex);
        alpha *= smoothstep(0.0,0.5,r01);
        gl_FragColor = vec4(col, alpha);
      }`,
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = yOffset;
  mesh.renderOrder = 4;
  return mesh;
}
const lensedTop = createLensedDisk(0.35, 0.55, 0.5);
const lensedBot = createLensedDisk(-0.35, 0.55, 0.5);
scene.add(lensedTop);
scene.add(lensedBot);

// ─── INNER HOT RING ───────────────────────────────────
const innerRingGeo = new THREE.TorusGeometry(ISCO_RADIUS * 0.85, 0.03, 16, 200);
innerRingGeo.rotateX(Math.PI / 2);
const innerRingMat = new THREE.MeshBasicMaterial({
  color:'#ffdd88', transparent:true, opacity:0.7,
  blending:THREE.AdditiveBlending, depthWrite:false
});
const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
innerRing.renderOrder = 5;
scene.add(innerRing);

// ─── INFALLING PARTICLE STREAMS ───────────────────────
const particleGroup = new THREE.Group();
scene.add(particleGroup);
const streams = [];
const streamCount = 12;

for (let s = 0; s < streamCount; s++) {
  const particleCount = 30;
  const positionsArr = new Float32Array(particleCount * 3);
  const colorsArr = new Float32Array(particleCount * 3);
  const sizesArr = new Float32Array(particleCount);
  const streamData = {
    particles: [],
    baseAngle: (s / streamCount) * Math.PI * 2,
    startDist: DISK_OUTER * (0.7 + Math.random() * 0.3),
    speed: 0.3 + Math.random() * 0.6,
    spiralTightness: 3.0 + Math.random() * 4.0,
    heightSpread: 0.08 + Math.random() * 0.15
  };

  for (let i = 0; i < particleCount; i++) {
    streamData.particles.push({
      phase: (i / particleCount),
      dist: streamData.startDist * (1.0 - i / particleCount * 0.85),
      angle: streamData.baseAngle
    });
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positionsArr, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizesArr, 1));

  const mat = new THREE.PointsMaterial({
    size:0.04, vertexColors:true, blending:THREE.AdditiveBlending,
    depthWrite:false, transparent:true, opacity:0.8
  });

  const points = new THREE.Points(geo, mat);
  points.renderOrder = 6;
  particleGroup.add(points);
  streams.push({ points, data: streamData });
}

function updateParticleStreams(dt) {
  streams.forEach(({ points, data }) => {
    const pos = points.geometry.attributes.position;
    const col = points.geometry.attributes.color;
    const arrP = pos.array;
    const arrC = col.array;

    data.particles.forEach((p, i) => {
      p.phase += data.speed * dt * (1.0 + (1.0 - p.dist / data.startDist) * 2.0);
      if (p.phase > 1.0) {
        p.phase -= 1.0;
        p.dist = data.startDist;
        p.angle = data.baseAngle + (Math.random() - 0.5) * 0.3;
      }

      const spiralAngle = p.phase * Math.PI * 2 * data.spiralTightness;
      const progress = p.phase;
      const dist = data.startDist * (1.0 - progress * 0.9);
      const angle = data.baseAngle + spiralAngle;

      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;
      const hPhase = Math.sin(progress * Math.PI * 10 + data.baseAngle);
      const y = hPhase * data.heightSpread * (1.0 - progress) * 2.0;

      arrP[i*3] = x;
      arrP[i*3+1] = y;
      arrP[i*3+2] = z;

      const temp = clamp01(1.0 - progress);
      arrC[i*3] = 0.3 + temp * 0.7;
      arrC[i*3+1] = 0.15 + temp * 0.6;
      arrC[i*3+2] = temp * 0.3;

      if (dist < ISCO_RADIUS * 0.6) {
        arrC[i*3] *= 0.2;
        arrC[i*3+1] *= 0.2;
        arrC[i*3+2] *= 0.2;
      }
    });

    pos.needsUpdate = true;
    col.needsUpdate = true;
    points.material.opacity = 0.7 + Math.sin(Date.now() * 0.001 + data.baseAngle) * 0.1;
  });
}
function clamp01(v) { return Math.max(0, Math.min(1, v)); }

// ─── RELATIVISTIC JETS (optional poles) ────────────────
const jetGroup = new THREE.Group();
scene.add(jetGroup);

function createJetCone(ySign) {
  const coneGeo = new THREE.ConeGeometry(0.3, 2.5, 16, 8, true);
  const coneMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value:0 }, uSign: { value:ySign } },
    vertexShader: `varying float vHeight; varying vec3 vWorldPos;
      void main() {
        vec4 wp = modelMatrix * vec4(position,1.0);
        vWorldPos = wp.xyz;
        vHeight = position.y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `varying float vHeight; varying vec3 vWorldPos;
      uniform float uTime; uniform float uSign;
      void main() {
        float h = abs(vHeight) / 2.5;
        float alpha = (1.0 - h) * 0.25;
        alpha *= exp(-h * 3.0);
        vec3 col = mix(vec3(0.2,0.4,1.0), vec3(0.6,0.3,1.0), h);
        gl_FragColor = vec4(col, alpha);
      }`,
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
  });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.position.y = ySign * 1.4;
  cone.renderOrder = 7;
  return cone;
}
const jetTop = createJetCone(1);
const jetBot = createJetCone(-1);
jetGroup.add(jetTop);
jetGroup.add(jetBot);

// ─── LIGHTING ──────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
scene.add(ambientLight);

// ─── TOUCH/MOUSE CONTROLS ─────────────────────────────
let isDragging = false;
let prevTouch = { x:0, y:0 };
let prevPinchDist = 0;
let touchStartTime = 0;
let touchMoved = false;

function getEventPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x:e.touches[0].clientX, y:e.touches[0].clientY };
  }
  return { x:e.clientX, y:e.clientY };
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  isDragging = true;
  autoRotate = false;
  const pos = getEventPos(e);
  prevTouch.x = pos.x;
  prevTouch.y = pos.y;
  touchStartTime = Date.now();
  touchMoved = false;

  if (e.touches && e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    prevPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  e.preventDefault();

  if (e.touches && e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const delta = (dist - prevPinchDist) * 0.02;
    targetCamDist = Math.max(4.5, Math.min(18, targetCamDist - delta));
    prevPinchDist = dist;
    return;
  }

  const pos = getEventPos(e);
  const dx = pos.x - prevTouch.x;
  const dy = pos.y - prevTouch.y;

  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) touchMoved = true;

  targetCamTheta -= dx * 0.005;
  targetCamPhi += dy * 0.005;
  targetCamPhi = Math.max(0.05, Math.min(Math.PI - 0.05, targetCamPhi));

  prevTouch.x = pos.x;
  prevTouch.y = pos.y;
});

renderer.domElement.addEventListener('pointerup', () => {
  isDragging = false;
  if (!touchMoved && Date.now() - touchStartTime < 300) {
    autoRotate = !autoRotate;
  }
  setTimeout(() => { if (!isDragging) autoRotate = true; }, 3000);
});

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  targetCamDist = Math.max(4.5, Math.min(18, targetCamDist + e.deltaY * 0.01));
}, { passive:false });

// ─── RESIZE ────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── ANIMATION LOOP ───────────────────────────────────
const clock = new THREE.Clock();
document.getElementById('loading').classList.add('hidden');

function animate(timestamp) {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const time = timestamp * 0.001;

  if (autoRotate) {
    targetCamTheta += autoRotateSpeed * dt;
  }

  const lerpFactor = 1.0 - Math.exp(-5.0 * dt);
  camTheta += (targetCamTheta - camTheta) * lerpFactor;
  camPhi += (targetCamPhi - camPhi) * lerpFactor;
  camDist += (targetCamDist - camDist) * lerpFactor;

  updateCameraPos();
  updateParticleStreams(dt);

  const viewDir = camera.position.clone().normalize();
  diskShaderMat.uniforms.uTime.value = time;
  diskShaderMat.uniforms.uCameraPos.value.copy(camera.position);
  horizonMat.uniforms.uTime.value = time;
  horizonMat.uniforms.uViewDir.value.copy(viewDir);
  glowShellMat.uniforms.uTime.value = time;
  lensedTop.material.uniforms.uTime.value = time;
  lensedTop.material.uniforms.uCameraPos.value.copy(camera.position);
  lensedBot.material.uniforms.uTime.value = time;
  lensedBot.material.uniforms.uCameraPos.value.copy(camera.position);
  jetTop.material.uniforms.uTime.value = time;
  jetBot.material.uniforms.uTime.value = time;

  // rotate starfield slowly for parallax
  stars.rotation.y += dt * 0.02;
  stars.rotation.x += dt * 0.005;

  // pulse photon rings
  const pulse1 = 1.0 + Math.sin(time * 2.5) * 0.08;
  const pulse2 = 1.0 + Math.sin(time * 3.7 + 1.0) * 0.06;
  photonRing1.material.opacity = 0.85 * pulse1;
  photonRing2.material.opacity = 0.45 * pulse2;
  photonRing3.material.opacity = 0.28 * pulse1;

  // pulse inner ring
  innerRing.material.opacity = 0.65 + Math.sin(time * 3.0) * 0.15;

  // animate dust ring
  dust.rotation.y += dt * 0.15;
  dust.material.opacity = 0.4 + Math.sin(time * 1.5) * 0.1;

  // pulse lensed disks
  lensedTop.material.uniforms.uOpacity.value = 0.45 + Math.sin(time * 2.0) * 0.1;
  lensedBot.material.uniforms.uOpacity.value = 0.45 + Math.sin(time * 2.0 + Math.PI) * 0.1;

  // jet animation
  jetTop.scale.y = 1.0 + Math.sin(time * 4.0) * 0.15;
  jetBot.scale.y = 1.0 + Math.sin(time * 4.0 + Math.PI) * 0.15;
  jetTop.material.uniforms.uTime.value = time;
  jetBot.material.uniforms.uTime.value = time;

  // hide hint after a few seconds
  const hint = document.getElementById('hint');
  if (time > 8 && hint.style.opacity !== '0') {
    hint.style.opacity = Math.max(0, parseFloat(hint.style.opacity || 0.4) - dt * 0.5);
  }

  renderer.render(scene, camera);
}

// hide loading and start
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  requestAnimationFrame(animate);
}, 800);
</script>
</body>
