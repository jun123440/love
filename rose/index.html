<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>程序化玫瑰</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #1a1a2a; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const S = new THREE.Scene();
S.background = new THREE.Color(0x1a1a2a);

const C = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 100);
C.position.set(8, 6, 16);

const R = new THREE.WebGLRenderer({ antialias: true });
R.setSize(innerWidth, innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.prepend(R.domElement);

const O = new OrbitControls(C, R.domElement);
O.target.set(0, 3, 0);
O.enableDamping = true;
O.autoRotate = true;
O.autoRotateSpeed = 1.0;
O.update();

S.add(new THREE.AmbientLight(0xffffff, 0.4));
const d1 = new THREE.DirectionalLight(0xffffff, 2.5);
d1.position.set(5, 10, 7);
S.add(d1);
const d2 = new THREE.DirectionalLight(0xffffff, 0.8);
d2.position.set(-5, 3, -5);
S.add(d2);

// Petal geometry
function PG(len, wid, curl, edgeUp, uN, vN) {
  const p = [], c = [], x = [];
  for (let i = 0; i <= uN; i++) {
    for (let j = 0; j <= vN; j++) {
      const u = i / uN, v = -1 + 2 * j / vN;
      const w = Math.sin(u * Math.PI) * (1 - 0.35 * u);
      const t = 1 - 0.15 * u * u;
      const px = u * len;
      const py = v * wid * w * t;
      const curlV = -u * u * curl * len * 0.45;
      const e = Math.pow(Math.max(0, Math.abs(v) - 0.5) / 0.5, 1.5);
      const edge = e * wid * 2.5 * (1 - 0.5 * u) * edgeUp;
      p.push(px, py, curlV + edge);
      const dk = 0.4 + 0.6 * (1 - u * 0.9);
      const eb = 1 + 0.2 * Math.pow(Math.abs(v) * 1.5, 0.5);
      const tp = 1 + 0.25 * u * u * u;
      c.push(Math.min(1, 0.90 * dk * eb * tp), Math.min(1, 0.08 * dk * (0.5 + 0.5 * (1 - u * 0.5)) * eb), Math.min(1, 0.12 * dk * (0.3 + 0.7 * (1 - u * 0.3)) * eb));
    }
  }
  for (let i = 0; i < uN; i++) {
    for (let j = 0; j < vN; j++) {
      const a = i * (vN + 1) + j, b = a + 1, c2 = (i + 1) * (vN + 1) + j, d = c2 + 1;
      x.push(a, c2, b, b, c2, d);
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(p, 3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(c, 3));
  g.setIndex(x);
  g.computeVertexNormals();
  return g;
}

const GA = Math.PI * (3 - Math.sqrt(5));
const LY = [
  { n: 5,  s: 0.25, c: 0.90, y: -2,   r: 2.5 },
  { n: 7,  s: 0.38, c: 0.75, y: -0.5, r: 5   },
  { n: 9,  s: 0.52, c: 0.55, y: 1,    r: 8   },
  { n: 11, s: 0.65, c: 0.35, y: 2.5,  r: 12  },
  { n: 13, s: 0.78, c: 0.15, y: 4,    r: 17  },
  { n: 15, s: 0.90, c: 0.04, y: 5.5,  r: 22  },
];
const M = new THREE.MeshPhysicalMaterial({ roughness: 0.4, metalness: 0, clearcoat: 0.1, clearcoatRoughness: 0.4, side: THREE.DoubleSide, vertexColors: true });

for (let l = 0; l < LY.length; l++) {
  const L = LY[l];
  for (let i = 0; i < L.n; i++) {
    const a = i * GA + l * 0.618;
    const rad = L.r * (0.9 + 0.1 * Math.sin(i * 2.3 + l));
    const sv = L.s * (0.9 + 0.1 * Math.sin(i * 1.7 + l));
    const cv = L.c * (0.92 + 0.08 * Math.cos(i * 2.1 + l));
    const m = new THREE.Mesh(PG(sv * 36, sv * 36 * 0.40, cv, 0.6 + 0.4 * cv, 20, 10), M);
    m.position.set(Math.cos(a) * rad, L.y + Math.sin(a * 3 + l * 1.5) * 0.5, Math.sin(a) * rad);
    m.rotation.set(Math.PI / 3 - cv * Math.PI / 2.5, a + Math.PI / 2 + 0.15, cv * 0.1 * Math.sin(a * 2));
    S.add(m);
  }
}

// Stem
const pts = [];
for (let i = 0; i <= 24; i++) { const t = i / 24; pts.push(new THREE.Vector3(Math.sin(t * 5 + 0.5) * 0.3, -3.5 - t * 24, Math.cos(t * 3.5) * 0.3)); }
S.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 14, 0.25, 6, false), new THREE.MeshPhysicalMaterial({ color: 0x1e4012, roughness: 0.75 })));

// Base
const ba = new THREE.Mesh(new THREE.SphereGeometry(2.5, 12, 10), new THREE.MeshPhysicalMaterial({ color: 0x2a5520, roughness: 0.7 }));
ba.position.y = -3.2; ba.scale.y = 0.7;
S.add(ba);

// Sepals
const SM = new THREE.MeshPhysicalMaterial({ color: 0x2a5a1a, roughness: 0.7, metalness: 0, side: THREE.DoubleSide });
for (let i = 0; i < 5; i++) {
  const m = new THREE.Mesh(PG(10, 4, 0.1, 0.2, 10, 5), SM);
  const a = i * Math.PI * 2 / 5 + 0.2;
  m.position.set(Math.cos(a) * 2, -3.5, Math.sin(a) * 2);
  m.rotation.set(0.7, a + Math.PI / 2, 0); m.scale.set(1, 1, 0.6);
  S.add(m);
}

// Leaves
for (const [side, y] of [[1, -10], [-1, -16], [0.7, -22]]) {
  const m = new THREE.Mesh(PG(5, 2, 0.06, 0.12, 10, 5), new THREE.MeshPhysicalMaterial({ color: 0x1a6b14, roughness: 0.7, side: THREE.DoubleSide }));
  const g = new THREE.Group();
  m.rotation.set(-0.3, 0, side * 0.2); g.add(m);
  g.position.set(side * 5, y, 0); g.rotation.set(0, side > 0 ? -0.5 : 0.5, side * 0.1);
  S.add(g);
}

addEventListener('resize', () => { C.aspect = innerWidth / innerHeight; C.updateProjectionMatrix(); R.setSize(innerWidth, innerHeight); });
(function anim() { requestAnimationFrame(anim); O.update(); R.render(S, C); })();
</script>
</body>
</html>
