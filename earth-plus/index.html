<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 旋转地球 Plus</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="info">
  <h1>🌍 3D 旋转地球 Plus</h1>
  <p>拖拽旋转 · 滚轮缩放 · 自动旋转</p>
  <div id="stats">
    <span>2048 段球体</span><span>·</span><span>4K 地表纹理</span><span>·</span><span>各向异性过滤</span><span>·</span><span>法线凹凸</span><span>·</span><span>海洋镜面反射</span><span>·</span><span>实时云层</span><span>·</span><span>80000 星辰</span>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>正在加载高精度地球数据...</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="script.js"></script>

</html>
