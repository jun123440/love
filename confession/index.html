<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✦</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080303}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
.glass-card{background:rgba(180,20,40,0.06);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,80,80,0.06);border-radius:36px;padding:52px 46px;text-align:center;box-shadow:0 0 120px rgba(180,0,0,0.08)}
.glass-card h1{color:#e61950;font-size:22px;font-weight:300;margin-bottom:28px;letter-spacing:3px;text-shadow:0 0 50px rgba(230,25,80,0.2)}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(230,25,80,0.18);border-radius:18px;padding:15px 26px;font-size:20px;color:#e61950;text-align:center;outline:none;width:280px;font-family:'Georgia','Noto Serif SC','Microsoft YaHei',sans-serif;transition:all 0.5s;letter-spacing:1px}
.glass-card input:focus{border-color:rgba(230,25,80,0.35);box-shadow:0 0 50px rgba(230,25,80,0.1)}
.glass-card input::placeholder{color:rgba(230,25,80,0.15)}
.glass-card button{margin-top:26px;padding:13px 52px;background:linear-gradient(135deg,rgba(230,25,80,0.55),rgba(160,0,20,0.55));border:none;border-radius:50px;color:#fff;font-size:15px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px}
.glass-card button:hover{background:linear-gradient(135deg,rgba(230,25,80,0.75),rgba(180,0,30,0.75));transform:scale(1.04);box-shadow:0 0 50px rgba(230,25,80,0.15)}
canvas{display:block}
</style>
</head>
<body>
<div id="inputScreen">
  <div class="glass-card">
    <h1>✦ 请输入你的名字</h1>
    <input type="text" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off"><br>
    <button id="submitBtn">✦ 开始</button>
  </div>
</div>
<script>
let phase='idle',startTime,rotation=0,pts=[]
const GA=2.3999,tilt=radians(15),focal=500,MAX=950

function setup(){
  createCanvas(windowWidth,windowHeight).style('display','block')
  document.getElementById('submitBtn').onclick=submit
  document.getElementById('nameInput').onkeydown=e=>{if(e.key==='Enter')submit()}
}

function submit(){
  let v=document.getElementById('nameInput').value.trim()
  if(!v)return
  document.getElementById('inputScreen').classList.add('hidden')
  
  // name particles (character clusters, no pixel reading)
  let src=[]
  for(let i=0;i<v.length;i++){
    let cx=(i-(v.length-1)/2)*50
    for(let j=0;j<floor(800/v.length);j++)src.push({x:cx+random(-20,20),y:random(-24,24)})
  }
  shuffle(src);let N=min(MAX,src.length)
  
  pts=[]
  // rose: 5 layers of golden spiral with petal wobble
  let layers=[{n:180,r1:235,r2:175,h:5},{n:170,r1:175,r2:130,h:14},{n:160,r1:130,r2:88,h:24},{n:150,r1:88,r2:52,h:34},{n:140,r1:52,r2:24,h:44},{n:120,r1:24,r2:6,h:52}]
  let idx=0
  for(let li=0;li<layers.length;li++){
    let l=layers[li],n=max(1,floor(N*l.n/920))
    for(let i=0;i<n&&idx<N;i++){
      let p=i/n
      let a=i*GA+li*0.5
      let wob=0.3*sin(5*a+li)+0.2*cos(3*a)
      let r=lerp(l.r2,l.r1,p)*(0.82+0.18*(1+wob))+random(-4,4)
      let h=l.h*(1-p*0.35)+random(-1,2)
      let cT=(r-6)/229
      pts.push({
        sx:src[idx].x,sy:src[idx].y,
        ta:a,tr:r,th:max(h,0.5),
        cr:lerp(180,248,cT)+random(-4,4),
        cg:lerp(18,168,cT)+random(-6,10),
        cb:lerp(22,155,cT)+random(-6,10),
        sz:1+random()*1.8,ap:0,dl:0.1+idx*0.0018
      })
      idx++
    }
  }
  // stem
  let sn=floor(N*0.07)
  for(let i=0;i<sn&&idx<N;i++){
    let t=i/sn
    let a=-PI*0.25+t*PI*0.5
    pts.push({
      sx:src[idx].x,sy:src[idx].y,
      ta:a,tr:12+t*138,th:3*(1-t)+random(0,1),
      cr:lerp(50,130,1-t),cg:lerp(80,188,1-t),cb:lerp(28,70,1-t),
      sz:1.3+random()*1.3,ap:0,dl:0.2+idx*0.002,
      st:1,sw:i*0.08
    })
    idx++
  }
  // fill
  while(idx<N){
    let r=4+(idx%220)*1.05
    pts.push({
      sx:src[idx].x,sy:src[idx].y,
      ta:(idx*GA)%TWO_PI,tr:r,th:2+(idx%55)*0.9,
      cr:lerp(248,200,r/231),cg:lerp(168,30,r/231),cb:lerp(155,35,r/231),
      sz:1+random()*1.8,ap:0,dl:0.12+idx*0.0018
    })
    idx++
  }
  phase='grow';startTime=millis()
}

function draw(){
  // bg gradient
  for(let y=0;y<height;y+=4){noStroke();fill(lerp(10,3,y/height),0,0);rect(0,y,width,4)}
  rotation+=0.005
  let el=(millis()-startTime)/1000,all=true
  if(phase==='grow'){
    for(let p of pts){
      let e=el-p.dl
      if(e<0){p.ap=0;continue}
      let t=e<0.8?1-pow(2,-10*e/0.8):1
      if(t<1)all=false
      p.ap=t
    }
    if(all&&el>pts.length*0.002+2)phase='disp'
  }
  
  // render with depth sort
  let cx=width/2,cy=height*0.48,buf=[]
  for(let p of pts){
    if(p.ap<=0)continue
    let a,r,h
    if(p.st){
      let sw=sin(rotation*0.25+p.sw)*0.3
      a=p.ta+sw*0.03;r=p.tr*p.ap;h=p.th*p.ap
    }else{a=p.ta+rotation*p.ap;r=p.tr*p.ap;h=p.th*p.ap}
    let x=r*cos(a),yf=r*sin(a),z=h
    let sy=yf*cos(tilt)-z*sin(tilt),dp=yf*sin(tilt)+z*cos(tilt)
    let pf=focal/(focal+dp+30)
    let sx=cx+x*pf,sy2=cy+sy*pf
    let sd=yf<0?0.6+0.4*pow(1+yf/160,0.6):1
    buf.push({x:sx,y:sy2,s:p.sz*pf*(1+z*0.008),a:255*pf*sd*p.ap,r:p.cr,g:p.cg,b:p.cb})
  }
  if(buf.length<2)return
  buf.sort((a,b)=>a.y-b.y)
  for(let d of buf){
    push();translate(d.x,d.y)
    fill(d.r,d.g,d.b,d.a*0.12);noStroke();circle(0,0,d.s*4.5)
    fill(d.r,d.g,d.b,d.a);circle(0,0,d.s)
    pop()
  }
}

function windowResized(){resizeCanvas(windowWidth,windowHeight)}
</script>
</body>
</html>
