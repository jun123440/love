<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✦</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080303}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
.glass-card{background:rgba(180,20,40,0.06);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,80,80,0.06);border-radius:36px;padding:52px 46px;text-align:center;box-shadow:0 0 120px rgba(180,0,0,0.08)}
.glass-card h1{color:#e61950;font-size:22px;font-weight:300;margin-bottom:28px;letter-spacing:3px;text-shadow:0 0 50px rgba(230,25,80,0.2)}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(230,25,80,0.18);border-radius:18px;padding:15px 26px;font-size:20px;color:#e61950;text-align:center;outline:none;width:280px;font-family:'Georgia','Noto Serif SC','Microsoft YaHei',sans-serif;transition:all 0.5s;letter-spacing:1px}
.glass-card input:focus{border-color:rgba(230,25,80,0.35);box-shadow:0 0 50px rgba(230,25,80,0.1)}
.glass-card input::placeholder{color:rgba(230,25,80,0.15)}
.glass-card button{margin-top:26px;padding:13px 52px;background:linear-gradient(135deg,rgba(230,25,80,0.55),rgba(160,0,20,0.55));border:none;border-radius:50px;color:#fff;font-size:15px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px}
.glass-card button:hover{background:linear-gradient(135deg,rgba(230,25,80,0.75),rgba(180,0,30,0.75));transform:scale(1.04);box-shadow:0 0 50px rgba(230,25,80,0.15)}
canvas{display:block}
</style>
</head>
<body>
<div id="inputScreen">
  <div class="glass-card">
    <h1>✦ 请输入你的名字</h1>
    <input type="text" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off"><br>
    <button id="submitBtn">✦ 开始</button>
  </div>
</div>
<script>
let phase='idle',startTime=0,rotation=0,particles=[],phaseTimer=0
const tilt=radians(15),focal=500

function setup(){
  createCanvas(windowWidth,windowHeight).style('display','block')
  textAlign(CENTER,CENTER)
  document.getElementById('submitBtn').onclick=submit
  document.getElementById('nameInput').onkeydown=e=>{if(e.key==='Enter')submit()}
}

function submit(){
  let v=document.getElementById('nameInput').value.trim()
  if(!v)return
  document.getElementById('inputScreen').classList.add('hidden')
  build(v)
  phase='burst';startTime=millis()
}

function build(n){
  let g=createGraphics(500,200)
  g.textAlign(CENTER,CENTER);g.textSize(56);g.fill(255);g.background(0,0)
  g.text(n,250,100);g.loadPixels()
  let src=[]
  for(let y=0;y<200;y+=2)for(let x=0;x<500;x+=2){
    let i=(x+y*500)*4
    if(g.pixels[i]>200)src.push({x:x-250,y:y-100})
  }
  g.remove()
  let N=min(1200,src.length)
  shuffle(src)
  let cx=width/2,cy=height*0.48
  
  // rose params - 6 layers from outer to inner
  let layers=[{n:18,r1:220,r2:160,h:12},{n:16,r1:160,r2:110,h:24},{n:14,r1:110,r2:70,h:36},{n:12,r1:70,r2:40,h:46},{n:10,r1:40,r2:20,h:54},{n:8,r1:20,r2:4,h:60}]
  let pidx=0
  
  particles=[]
  for(let li=0;li<layers.length;li++){
    let l=layers[li],ppl=floor(N*l.n/78),pidx0=pidx
    for(let j=0;j<ppl&&pidx<src.length&&pidx<pidx0+ppl;j++){
      let t=j/ppl
      let baseA=j*2.3999+li*0.8
      let aOff=(random()-0.5)*PI/(l.n*0.5)
      let r=lerp(l.r2,l.r1,t)+random(-8,8)
      let a=baseA+aOff
      let h=l.h*(1-t*0.3)+random(-2,2)
      let colT=li/6
      let ri=lerp(180,245,colT)+random(-5,5)
      let gi=lerp(25,170,colT)+random(-8,12)
      let bi=lerp(30,160,colT)+random(-8,12)
      particles.push({
        sx:src[pidx].x,sy:src[pidx].y,
        ta:a,tr:r,th:h,
        cr:ri,cg:gi,cb:bi,
        sz:1.8+random()*1.2,
        ca:0,crr:0,chh:0,
        ap:0,dl:0.3+pidx*0.002+random()*0.4,
        st:0
      })
      pidx++
    }
  }
  let stemN=floor(particles.length*0.1)
  for(let i=0;i<stemN&&pidx<src.length;i++){
    let t=i/stemN
    let a=-PI*0.3+t*PI*0.5
    let r=20+t*140+random(-5,5)
    let h=2*(1-t)+random(0,1.5)
    particles.push({
      sx:src[pidx].x,sy:src[pidx].y,
      ta:a,tr:r,th:h,
      cr:lerp(50,120,1-t),cg:lerp(80,175,1-t),cb:lerp(30,70,1-t),
      sz:1.8+random()*1.2,
      ca:0,crr:0,chh:0,
      ap:0,dl:0.5+pidx*0.002+random()*0.3,
      st:1,sw:i*0.08
    })
    pidx++
  }
  // remaining particles as fill
  while(pidx<src.length){
    let a=random(TWO_PI),r=random(4,220),h=random(2,60)
    let t=r/220
    particles.push({
      sx:src[pidx].x,sy:src[pidx].y,
      ta:a,tr:r,th:h,
      cr:lerp(245,180,t)+random(-5,5),
      cg:lerp(170,25,t)+random(-8,12),
      cb:lerp(160,30,t)+random(-8,12),
      sz:1+random()*2,
      ca:0,crr:0,chh:0,
      ap:0,dl:0.3+pidx*0.0015,
      st:0
    })
    pidx++
  }
}

function draw(){
  bg()
  rotation+=0.005
  let cx=width/2,cy=height*0.48
  let el=(millis()-startTime)/1000
  
  if(phase==='burst'){
    let allDone=true
    for(let p of particles){
      let delay=p.dl
      let raw=max(0,(el-delay)/1.2)
      let e=raw<1?1-pow(2,-8*raw):1
      if(e<1)allDone=false
      if(e>0){
        p.ap=e
        p.crr=p.tr*e
        p.chh=p.th*e
        p.ca=p.ta+rotation*e
      }else{p.ap=0;p.crr=0;p.chh=0}
    }
    if(allDone&&el>particles[particles.length-1].dl+1)
      {phase='disp';startTime=millis()}
    render(cx,cy)
  }else if(phase==='disp'){
    for(let p of particles){p.ap=1;p.crr=p.tr;p.chh=p.th}
    render(cx,cy)
  }
}

function render(cx,cy){
  let depthSorted=[]
  for(let i=0;i<particles.length;i++){
    let p=particles[i];if(p.ap<=0)continue
    let a,r,h
    if(p.st){
      let sw=sin(rotation*0.25+p.sw)*0.2
      a=p.ta+sw*0.04;r=p.crr;h=p.chh
    }else{a=p.ca;r=p.crr;h=p.chh}
    let x=r*cos(a),yf=r*sin(a),z=h
    let sy=yf*cos(tilt)-z*sin(tilt),dp=yf*sin(tilt)+z*cos(tilt)
    let pf=focal/(focal+dp+30)
    let sx=cx+x*pf,sy2=cy+sy*pf,sz=p.sz*pf*(1+z*0.008)
    let sd=1;if(yf<0)sd=0.5+0.5*pow(1+yf/160,0.6)
    let al=255*pf*sd*p.ap;if(p.st)al*=0.8
    depthSorted.push({sx,sy:sy2,sz,al,r:p.cr,g:p.cg,b:p.cb,i})
  }
  depthSorted.sort((a,b)=>b.sy-a.sy)
  for(let d of depthSorted){
    let p=particles[d.i]
    push();translate(d.sx,d.sy)
    fill(d.r,d.g,d.b,d.al*0.15);noStroke();circle(0,0,d.sz*3)
    fill(d.r,d.g,d.b,d.al);circle(0,0,d.sz)
    pop()
  }
}

function bg(){
  for(let y=0;y<height;y+=4){
    let r=lerp(10,3,y/height)
    noStroke();fill(r,0,0);rect(0,y,width,4)
  }
}

function windowResized(){resizeCanvas(windowWidth,windowHeight)}
</script>
</body>
</html>
