<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✦</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080303}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
.glass-card{background:rgba(180,20,40,0.06);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,80,80,0.06);border-radius:36px;padding:52px 46px;text-align:center;box-shadow:0 0 120px rgba(180,0,0,0.08)}
.glass-card h1{color:#e61950;font-size:22px;font-weight:300;margin-bottom:28px;letter-spacing:3px;text-shadow:0 0 50px rgba(230,25,80,0.2)}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(230,25,80,0.18);border-radius:18px;padding:15px 26px;font-size:20px;color:#e61950;text-align:center;outline:none;width:280px;font-family:'Georgia','Noto Serif SC','Microsoft YaHei',sans-serif;transition:all 0.5s;letter-spacing:1px}
.glass-card input:focus{border-color:rgba(230,25,80,0.35);box-shadow:0 0 50px rgba(230,25,80,0.1)}
.glass-card input::placeholder{color:rgba(230,25,80,0.15)}
.glass-card button{margin-top:26px;padding:13px 52px;background:linear-gradient(135deg,rgba(230,25,80,0.55),rgba(160,0,20,0.55));border:none;border-radius:50px;color:#fff;font-size:15px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px}
.glass-card button:hover{background:linear-gradient(135deg,rgba(230,25,80,0.75),rgba(180,0,30,0.75));transform:scale(1.04);box-shadow:0 0 50px rgba(230,25,80,0.15)}
canvas{display:block}
</style>
</head>
<body>
<div id="inputScreen">
  <div class="glass-card">
    <h1>✦ 请输入你的名字</h1>
    <input type="text" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off"><br>
    <button id="submitBtn">✦ 开始</button>
  </div>
</div>
<script>
let phase='idle',startTime=0,rotation=0,particles=[]
const tilt=radians(15),focal=520
let cx,cy

function setup(){
  createCanvas(windowWidth,windowHeight).style('display','block')
  cx=width/2;cy=height*0.48
  textAlign(CENTER,CENTER);textStyle(BOLD)
  document.getElementById('submitBtn').onclick=submit
  document.getElementById('nameInput').onkeydown=e=>{if(e.key==='Enter')submit()}
}

function submit(){
  let v=document.getElementById('nameInput').value.trim()
  if(!v)return
  document.getElementById('inputScreen').classList.add('hidden')
  build(v);phase='grow';startTime=millis()
}

function build(n){
  let c=[],s=0.45
  for(let ch of n)c.push(ch)
  while(c.length<38)for(let ch of n)if(c.length<38)c.push(ch)
  if(c.length>45)c.length=45
  let sn=max(4,min(10,floor(c.length*0.18))),fn=c.length-sn
  particles=[]
  for(let i=0;i<fn;i++){
    let t=i/fn
    particles.push({
      ch:c[i],fa:i*2.3999,fr:14+pow(i,1.15)*2.3,fh:55*exp(-i*0.055),
      cr:lerp(175,245,t),cg:lerp(15,175,t),cb:lerp(15,165,t),
      sz:20+random(-2,3),dl:i*s,st:0
    })
  }
  for(let i=0;i<sn;i++){
    let t=i/sn
    particles.push({
      ch:c[fn+i],fa:-PI*0.25+t*PI*0.55,fr:28+t*115,fh:2.5*(1-t*t),
      cr:lerp(55,130,1-t),cg:lerp(90,185,1-t),cb:lerp(35,75,1-t),
      sz:17-t*random(3,5),dl:(fn+i)*s,st:1,sw:i*0.15
    })
  }
}

function draw(){
  bg()
  rotation+=0.005
  if(phase==='grow')grow()
  else if(phase==='disp')disp()
}

function bg(){
  for(let y=0;y<height;y+=4){
    let r=lerp(12,4,y/height)
    noStroke();fill(r,0,0);rect(0,y,width,4)
  }
}

function grow(){
  let el=(millis()-startTime)/1000,ok=true
  for(let p of particles){
    let r=max(0,(el-p.dl)/0.8)
    let e=r<1?1-pow(2,-10*r):1
    if(e<1)ok=false
    rnd(p,e)
  }
  if(ok&&el>2){phase='disp'}
}

function disp(){for(let p of particles)rnd(p,1)}

function rnd(p,e){
  let a,r,h
  if(p.st){
    if(e<1){a=p.fa;r=p.fr*e;h=p.fh*e}
    else{
      let sw=sin(rotation*0.3+p.sw)*0.3
      a=p.fa+sw*0.03;r=p.fr;h=p.fh
    }
  }else{a=p.fa+rotation*e;r=p.fr*e;h=p.fh*e}
  
  let x=r*cos(a),y=r*sin(a),z=h
  let sy=y*cos(tilt)-z*sin(tilt),dp=y*sin(tilt)+z*cos(tilt)
  let pf=focal/(focal+dp+40)
  let sx=cx+x*pf,sy2=cy+sy*pf,sz=p.sz*pf*(1+z*0.007)
  
  let sd=1;if(y<0)sd=0.5+0.5*pow(1+y/150,0.6)
  let al=255*pf*sd*(p.st?0.85:1);if(e<1)al*=e
  
  push();translate(sx,sy2)
  fill(p.cr,p.cg,p.cb,al*0.2);noStroke();circle(0,0,sz*1.4)
  fill(p.cr,p.cg,p.cb,al);textSize(sz);text(p.ch,0,0)
  pop()
}

function windowResized(){resizeCanvas(windowWidth,windowHeight);cx=width/2;cy=height*0.48}
</script>
</body>
</html>
