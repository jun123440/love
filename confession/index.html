<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✦</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0000;font-family:'Georgia','Noto Serif SC','Microsoft YaHei',serif;-webkit-font-smoothing:antialiased}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
#inputScreen.hidden .glass-card{transform:translateY(-30px) scale(0.95)}
.glass-card{background:rgba(120,0,0,0.08);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border:1px solid rgba(255,60,60,0.1);border-radius:36px;padding:55px 48px;text-align:center;box-shadow:0 0 100px rgba(120,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.04);transition:transform 1.8s cubic-bezier(0.4,0,0.2,1);max-width:90vw}
.glass-card h1{color:#ff1a4a;font-size:24px;font-weight:300;margin-bottom:32px;letter-spacing:3px;text-shadow:0 0 40px rgba(255,0,64,0.3)}
.glass-card .input-wrap{position:relative;display:inline-block}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,60,60,0.2);border-radius:18px;padding:16px 28px;font-size:22px;color:#ff1a4a;text-align:center;outline:none;width:300px;font-family:inherit;transition:all 0.5s;letter-spacing:2px}
.glass-card input:focus{border-color:rgba(255,26,74,0.5);box-shadow:0 0 50px rgba(255,0,64,0.15)}
.glass-card input::placeholder{color:rgba(255,60,60,0.2);letter-spacing:1px;font-weight:300}
.glass-card .btn-wrap{margin-top:30px}
.glass-card button{padding:14px 56px;background:linear-gradient(135deg,rgba(255,0,64,0.65),rgba(160,0,0,0.65));border:none;border-radius:50px;color:#fff;font-size:16px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px;backdrop-filter:blur(4px)}
.glass-card button:hover{background:linear-gradient(135deg,rgba(255,0,64,0.85),rgba(180,0,0,0.85));transform:scale(1.04);box-shadow:0 0 50px rgba(255,0,64,0.25)}
.glass-card button:active{transform:scale(0.96)}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<div id="inputScreen">
  <div class="glass-card">
    <h1>✦ 请输入你的名字</h1>
    <div class="input-wrap">
      <input type="text" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off">
    </div>
    <div class="btn-wrap">
      <button id="submitBtn">✦ 开始</button>
    </div>
  </div>
</div>

<script>
let ph='input',phT=0,ang=0,pls=0,pts=[],sp=[],dust=[],nm=''

function setup(){
  let c=createCanvas(windowWidth,windowHeight)
  c.style('position','fixed');c.style('top','0');c.style('left','0');c.style('z-index','1')
  for(let i=0;i<120;i++)dust.push({x:random(width),y:random(height),vx:random(-.12,.12),vy:random(-.12,.12),s:random(1,2.5),a:random(15,60),ph:random(TWO_PI)})
  document.getElementById('submitBtn').onclick=sub
  document.getElementById('nameInput').onkeydown=e=>{if(e.key==='Enter')sub()}
}

function sub(){
  let el=document.getElementById('nameInput'),v=el.value.trim()
  if(!v){el.style.borderColor='rgba(255,0,64,0.6)';return}
  nm=v
  document.getElementById('inputScreen').classList.add('hidden')
  gen(v)
  ph='appear';phT=millis()
}

function gen(name){
  let g=createGraphics(900,280)
  g.pixelDensity(1);g.background(0,0)
  g.textAlign(CENTER,CENTER);g.textFont('sans-serif')
  let fs=name.length<=2?130:name.length<=4?95:72
  g.textSize(fs);g.fill(255);g.text(name,450,140);g.loadPixels()
  let step=3,sc=1.4
  pts=[]
  for(let x=0;x<g.width;x+=step)for(let y=0;y<g.height;y+=step){
    let idx=(x+y*g.width)*4
    if(g.pixels[idx+3]>128){
      let ox=(x-450)*sc,oy=(y-140)*sc,a2=random(TWO_PI),d=random(120,350)
      pts.push({x:width/2+ox,y:height/2+oy,ox,oy,svx:cos(a2)*d,svy:sin(a2)*d,tx:0,ty:0,s:random(1.5,3.8),a:255,clr:[random(180,255),random(0,50),random(30,70)],de:random(.6),r2:random(TWO_PI)})
    }
  }
  g.remove()
  rose()
  stemP()
}

function rose(){
  let n=pts.length
  let ly=[[5,220,0.52,0],[6,175,0.46,0.3],[7,130,0.38,0.6],[8,85,0.30,0.95],[10,40,0.22,1.3]]
  let wg=[0.22,0.24,0.22,0.18,0.14]
  let idx=0
  for(let li=0;li<ly.length;li++){
    let [pc,R,wd,rt]=ly[li],cnt=floor(n*wg[li])
    for(let i=0;i<cnt&&idx<n;i++,idx++){
      let p=pts[idx],pi=floor(random(pc)),pa=(pi/pc)*TWO_PI+rt
      let hs=wd*PI/2,off=random(-hs,hs)
      let t2=off/(wd*PI/2),r=R*cos(t2*PI/2)*cos(t2*PI/2)
      r+=random(-3,3)*(r/R+0.5);r=max(r,0)
      p.tx=r*cos(pa+off);p.ty=r*sin(pa+off)
      let lf=li/(ly.length-1)
      p.clr=[lerp(140,240,lf)+random(-20,20),lerp(10,60,lf)+random(-10,15),lerp(20,80,lf)+random(-15,20)]
      p.s=lerp(3.2,1.8,lf)+random(-.5,.5)
    }
  }
  for(let i=idx;i<n;i++){
    let a2=random(TWO_PI),r=random(2,15)
    pts[i].tx=r*cos(a2);pts[i].ty=r*sin(a2)
    pts[i].clr=[240+random(-15,15),60+random(-10,20),80+random(-10,20)]
    pts[i].s=random(1,2)
  }
}

function stemP(){
  sp=[]
  let cx=width/2,cy=height/2
  
  for(let i=0;i<300;i++){
    let t2=i/300
    let x=cx-5+10*t2+random(-4,4)+5*pow(t2,2)
    let y=cy+200+180*t2+random(-3,3)
    sp.push({x,y,ox:x-cx,oy:y-cy,s:random(2,4),a:200,clr:[20+random(-10,20),80+random(-20,30),25+random(-10,15)]})
  }
  
  for(let lf=0;lf<3;lf++){
    let baseT=[0.25,0.55,0.82][lf],dir=[-1,1,-1][lf]
    let lx=cx-5+10*baseT+5*pow(baseT,2),ly=cy+200+180*baseT
    let ls=random(18,30)
    for(let j=0;j<40;j++){
      let t3=j/40
      let lw=ls*(0.5*sin(t3*PI)+0.3*random())
      let px=lx+dir*(ls*t3*0.7+random(-3,3))
      let py=ly-ls*t3*0.4+random(-3,3)+(1-t3)*8
      sp.push({x:px,y:py,ox:px-cx,oy:py-cy,s:random(2,4),a:180,clr:[30+random(-10,15),110+random(-30,40),35+random(-10,15)]})
    }
  }
}

function draw(){
  bg()
  du()
  if(ph==='appear')upA()
  else if(ph==='xfrm')upX()
  else if(ph==='disp')upD()
  ang+=.004;pls+=.025
}

function bg(){
  noStroke()
  for(let i=0;i<=height;i+=4){let r=lerp(20,8,i/height);fill(r,0,0);rect(0,i,width,4)}
  let p2=.4+.6*(.5+.5*sin(pls*1.5))
  for(let k=6;k>0;k--){fill(120,0,0,6*p2/(k*.5+.5));let sz=(280+40*p2)*(7-k)*.18;ellipse(width/2,height/2,sz,sz)}
}

function du(){
  for(let d of dust){
    d.x+=d.vx;d.y+=d.vy
    d.a=25+35*sin(d.ph+millis()*.0008)
    if(d.x<-10)d.x=width+10;if(d.x>width+10)d.x=-10
    if(d.y<-10)d.y=height+10;if(d.y>height+10)d.y=-10
    fill(120,30,30,d.a);noStroke();circle(d.x,d.y,d.s)
  }
}

function drRose(){
  noStroke()
  for(let p of pts){
    let[r,g,b]=p.clr;fill(r,g,b,p.a);circle(p.x,p.y,p.s)
    if(p.s>2.5){fill(r,g,b,p.a*.12);circle(p.x,p.y,p.s*2.5)}
  }
}

function drStem(){
  noStroke()
  for(let p of sp){
    let[r,g,b]=p.clr;fill(r,g,b,p.a);circle(p.x,p.y,p.s)
  }
}

function upA(){
  let el=(millis()-phT)/1000,pr=constrain(el/1.8,0,1)
  for(let p of pts){p.x=width/2+p.ox;p.y=height/2+p.oy;p.a=255*e(pr);p.s=(1.2+random(-.3,.3))*e(pr)}
  drStem()
  drRose()
  if(el>2.8){ph='xfrm';phT=millis()}
}

function upX(){
  let el=(millis()-phT)/1000,pr=constrain(el/4.2,0,1)
  let cx=width/2,cy=height/2
  for(let p of pts){
    let pp=constrain((pr-p.de*0.35)/(1-p.de*0.35),0,1),t2=ee(pp)
    let sc=sin(pp*PI)
    let ca=cos(ang),sa=sin(ang),rx=p.tx*ca-p.ty*sa,ry=p.tx*sa+p.ty*ca
    let bx=lerp(p.ox,rx,t2),by=lerp(p.oy,ry,t2)
    p.x=cx+bx+p.svx*sc*(1+t2*0.3)
    p.y=cy+by+p.svy*sc*(1+t2*0.3)
    p.a=lerp(180,230,t2)
    p.s=lerp(1.5,2.3+random(-.3,.3),t2)
  }
  drStem()
  drRose()
  if(pr>=1){ph='disp';phT=millis()}
}

function upD(){
  let p2=.85+.15*sin(pls*.8),cx=width/2,cy=height/2
  for(let p of pts){
    let ca=cos(ang),sa=sin(ang),rx=p.tx*ca-p.ty*sa,ry=p.tx*sa+p.ty*ca
    p.x=cx+rx*p2;p.y=cy+ry*p2
    p.a=220+35*sin(pls+p.r2)
  }
  for(let k=3;k>0;k--){fill(180,0,0,8/k);let sz=(350+30*sin(pls*.8))*(4-k)*.2;ellipse(cx,cy,sz,sz)}
  drStem()
  drRose()
  ang+=.004
}

function e(t){return 1-pow(1-t,3)}
function ee(t){return t===1?1:1-pow(2,-10*t)}
function windowResized(){resizeCanvas(windowWidth,windowHeight)}
</script>
</body>
</html>
