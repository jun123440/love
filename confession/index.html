<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✦</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0505}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
.glass-card{background:rgba(150,10,25,0.06);backdrop-filter:blur(35px);border:1px solid rgba(255,60,60,0.07);border-radius:36px;padding:48px 42px;text-align:center;box-shadow:0 0 100px rgba(150,0,0,0.08)}
.glass-card h1{color:#d41848;font-size:22px;font-weight:300;margin-bottom:28px;letter-spacing:4px;text-shadow:0 0 40px rgba(212,24,72,0.2)}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(212,24,72,0.18);border-radius:16px;padding:14px 24px;font-size:19px;color:#d41848;text-align:center;outline:none;width:260px;font-family:inherit;transition:all 0.5s;letter-spacing:1px}
.glass-card input:focus{border-color:rgba(212,24,72,0.35);box-shadow:0 0 45px rgba(212,24,72,0.1)}
.glass-card input::placeholder{color:rgba(212,24,72,0.18)}
.glass-card button{margin-top:26px;padding:12px 48px;background:linear-gradient(135deg,rgba(212,24,72,0.55),rgba(140,0,15,0.55));border:none;border-radius:50px;color:#fff;font-size:14px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px}
.glass-card button:hover{background:linear-gradient(135deg,rgba(212,24,72,0.75),rgba(160,0,25,0.75));transform:scale(1.04);box-shadow:0 0 45px rgba(212,24,72,0.15)}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
</style>
</head>
<body>
<div id="inputScreen">
  <div class="glass-card">
    <h1>✦ 请输入你的名字</h1>
    <input type="text" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off"><br>
    <button id="submitBtn">✦ 开始</button>
  </div>
</div>
<script>
let phase = 'idle', phaseTime = 0, angle = 0, pulse = 0
let particles = [], dust = [], nameText = ''
const TILT = Math.PI / 7

function setup() {
  let c = createCanvas(windowWidth, windowHeight)
  c.style('position', 'fixed')
  c.style('top', '0')
  c.style('left', '0')
  for (let i = 0; i < 100; i++) {
    dust.push({ x: random(width), y: random(height), vx: random(-0.08, 0.08), vy: random(-0.08, 0.08), s: random(1, 2), a: random(10, 40), p: random(TWO_PI) })
  }
  document.getElementById('submitBtn').onclick = submit
  document.getElementById('nameInput').onkeydown = e => { if (e.key === 'Enter') submit() }
}

function submit() {
  let el = document.getElementById('nameInput'), v = el.value.trim()
  if (!v) return
  nameText = v
  document.getElementById('inputScreen').classList.add('hidden')
  gen(v)
  phase = 'appear'
  phaseTime = millis()
}

function gen(name) {
  let d = pixelDensity(), w2 = round(width * d), h2 = round(height * d)
  let oc = document.createElement('canvas')
  oc.width = w2; oc.height = h2
  let ctx = oc.getContext('2d')
  ctx.fillStyle = '#000'
  ctx.fillRect(0, 0, w2, h2)
  ctx.fillStyle = '#fff'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  let fs = name.length <= 2 ? 220 : name.length <= 4 ? 170 : 120
  ctx.font = `bold ${fs * d}px sans-serif`
  ctx.fillText(name, w2 / 2, h2 / 2)
  let imgData = ctx.getImageData(0, 0, w2, h2)
  let data = imgData.data
  let step = 1, sc = 1.2, src = []
  for (let x = 0; x < w2; x += step * d) {
    for (let y = 0; y < h2; y += step * d) {
      let idx = floor(x + y * w2) * 4
      if (data[idx] > 128) {
        src.push({ ox: (x / d - width / 2) * sc, oy: (y / d - height / 2) * sc })
      }
    }
  }
  let realN = shuffle(src).length
  let missing = max(0, 10000 - realN)
  for (let i = 0; i < missing; i++) {
    let ci = floor(random(name.length))
    src.push({ ox: (ci - (name.length - 1) / 2) * 38 + random(-15, 15), oy: random(-40, 40), fb: 1 })
  }
  src.sort(() => Math.random() - 0.5)
  let N = min(10000, src.length)
  particles = []
  for (let i = 0; i < N; i++) {
    let p = src[i], a = random(TWO_PI), sv = random(80, 200), ts = random(2, 5)
    particles.push({
      ox: p.ox, oy: p.oy,
      svx: cos(a) * sv, svy: sin(a) * sv,
      tx: 0, ty: 0, tz: 0,
      ts: ts, s: 1.5,
      a: 0,
      clr: [255, 255, 255], tclr: [230, 50, 80],
      de: random(0.6), r2: random(TWO_PI),
      st: 0, fb: p.fb || 0
    })
  }
  genRose()
}

function genRose() {
  let n = particles.length, stemN = floor(n * 0.14), lfN = floor(stemN * 0.4), idx = 0
  for (let i = 0; i < stemN; i++, idx++) {
    let p = particles[i], t = i / stemN
    p.tx = 5 * t + 3 * t * t + random(-2, 2) * 0.7
    p.ty = 25 + 230 * t + random(-2, 2) * 0.7
    p.tz = random(-2, 2)
    let dk = 1 - t * 0.5
    p.tclr = [random(80, 160) * dk, random(12, 35) * dk, random(20, 45) * dk]
    p.ts = random(2.5, 4.5) * (1 - t * 0.3)
    p.st = 1
  }
  for (let lf = 0; lf < 3; lf++) {
    let bt = [0.18, 0.45, 0.72][lf], dir = [-1, 1, -1][lf]
    for (let j = 0; j < floor(lfN / 3); j++) {
      if (idx >= n) break
      let p = particles[idx], t = random(), ls = random(18, 28)
      let lx = 5 * bt + 3 * bt * bt, ly = 25 + 230 * bt
      p.tx = lx + dir * (ls * t * 0.6 + random(-2, 2))
      p.ty = ly - ls * t * 0.35 + random(-2, 2) + (1 - t) * 4
      p.tz = random(-3, 3)
      p.tclr = [random(100, 180), random(18, 45), random(28, 55)]
      p.ts = random(2, 3.5)
      p.st = 1
      idx++
    }
  }
  let rem = particles.filter(p => !p.st)
  let ly = [
    { pc: 6, R: 200, w: 0.50, h: 28, wt: 0.20 },
    { pc: 7, R: 155, w: 0.44, h: 16, wt: 0.22 },
    { pc: 8, R: 115, w: 0.37, h: 4, wt: 0.20 },
    { pc: 10, R: 70, w: 0.28, h: -8, wt: 0.20 },
    { pc: 12, R: 35, w: 0.20, h: -20, wt: 0.18 }
  ]
  for (let li = 0; li < ly.length; li++) {
    let { pc, R, w, h, wt } = ly[li]
    let cnt = floor(rem.length * wt)
    for (let i = 0; i < cnt && idx < n; i++, idx++) {
      let p = particles[idx]
      let pi = floor(random(pc)), pa = (pi / pc) * TWO_PI
      let hs = w * PI * 0.5, off = random(-hs, hs), t2 = abs(off) / hs
      let r = R * pow(cos(t2 * PI / 2), 1.6)
      r += random(-4, 4) * (r / R + 0.3)
      r = max(r, 0)
      p.tx = r * cos(pa + off)
      p.tz = r * sin(pa + off)
      p.ty = h + random(-6, 6)
      let lf = li / (ly.length - 1)
      p.tclr = [lerp(250, 185, lf) + random(-12, 12), lerp(135, 20, lf) + random(-10, 10), lerp(155, 30, lf) + random(-10, 10)]
      p.ts = lerp(4, 2.5, lf) + random(-0.6, 0.6)
      p.st = 0
    }
  }
  for (; idx < n; idx++) {
    let p = particles[idx], a = random(TWO_PI), r = random(2, 12)
    p.tx = r * cos(a)
    p.tz = r * sin(a)
    p.ty = random(-30, -15)
    p.tclr = [250 + random(-10, 10), 65 + random(-10, 15), 85 + random(-10, 15)]
    p.ts = random(1.5, 2.5)
    p.st = 0
  }
}

function draw() {
  noStroke()
  for (let i = 0; i <= height; i += 4) {
    let r = lerp(18, 6, i / height)
    fill(r, 0, 0)
    rect(0, i, width, 4)
  }
  let hp = 0.4 + 0.6 * (0.5 + 0.5 * sin(pulse * 1.2))
  for (let k = 4; k > 0; k--) {
    fill(140, 8, 12, 4 * hp / (k * 0.3 + 0.4))
    ellipse(width / 2, height / 2, (200 + 60 * hp) * (5 - k) * 0.2)
  }
  for (let d of dust) {
    d.x += d.vx; d.y += d.vy
    d.a = 15 + 25 * sin(d.p + millis() * 0.0006)
    if (d.x < -5) d.x = width + 5
    if (d.x > width + 5) d.x = -5
    if (d.y < -5) d.y = height + 5
    if (d.y > height + 5) d.y = -5
    fill(140, 20, 25, d.a)
    circle(d.x, d.y, d.s)
  }
  if (phase === 'appear') upA()
  else if (phase === 'xfrm') upX()
  else if (phase === 'disp') upD()
  angle += 0.003
  pulse += 0.02
}

function upA() {
  let el = (millis() - phaseTime) / 1000, pr = constrain(el / 1.5, 0, 1)
  for (let p of particles) {
    p.sx = width / 2 + p.ox
    p.sy = height / 2 + p.oy
    p.a = (p.fb ? 20 : 255) * pow(pr, 1.5)
    p.s = max(1.2, p.ts * pow(pr, 1.5))
  }
  drStem()
  dr()
  if (el > 2.5) { phase = 'xfrm'; phaseTime = millis() }
}

function upX() {
  let el = (millis() - phaseTime) / 1000, pr = constrain(el / 4.5, 0, 1)
  let cx = width / 2, cy = height / 2, ca = cos(angle), sa = sin(angle)
  for (let p of particles) {
    let pp = constrain((pr - p.de * 0.3) / (1 - p.de * 0.3), 0, 1)
    let t = ee(pp), sc = sin(pp * PI)
    let rx = p.tx * ca - p.tz * sa
    let rz = p.tx * sa + p.tz * ca
    let tx = rx
    let ty = p.ty * cos(TILT) - rz * sin(TILT)
    let bx = lerp(p.ox, tx, t)
    let by = lerp(p.oy, ty, t)
    p.sx = cx + bx + p.svx * sc * (1 + t * 0.3)
    p.sy = cy + by + p.svy * sc * (1 + t * 0.3)
    p.a = lerp(220, 235, t)
    p.s = lerp(p.s, p.ts, t)
    p.clr = [lerp(255, p.tclr[0], t), lerp(255, p.tclr[1], t), lerp(255, p.tclr[2], t)]
  }
  dr()
  if (pr >= 1) { phase = 'disp'; phaseTime = millis() }
}

function upD() {
  let cx = width / 2, cy = height / 2, ca = cos(angle), sa = sin(angle)
  let b = 0.85 + 0.15 * sin(pulse * 0.7)
  let proj = []
  for (let p of particles) {
    let rx = p.tx * ca - p.tz * sa
    let rz = p.tx * sa + p.tz * ca
    if (p.st) {
      p.sx = cx + rx
      p.sy = cy + p.ty * cos(TILT) - rz * sin(TILT)
      p.a = 200 + 55 * sin(pulse * 0.4 + p.r2)
    } else {
      p.sx = cx + rx * b
      p.sy = cy + (p.ty * cos(TILT) - rz * sin(TILT)) * b
      p.a = 220 + 35 * sin(pulse + p.r2)
    }
    proj.push({ p, d: rz * cos(TILT) + p.ty * sin(TILT) })
  }
  proj.sort((a, b) => b.d - a.d)
  drStem()
  for (let item of proj) {
    let p = item.p
    let [r, g, b2] = p.tclr
    let ds = p.ts || p.s
    fill(r, g, b2, p.a * 0.15)
    circle(p.sx, p.sy, ds * 2.5)
    fill(r, g, b2, p.a)
    circle(p.sx, p.sy, ds)
  }
}

function dr() {
  for (let p of particles) {
    let [r, g, b] = p.clr
    let ds = p.ts || p.s
    fill(r, g, b, p.a * 0.15)
    circle(p.sx, p.sy, ds * 2.5)
    fill(r, g, b, p.a)
    circle(p.sx, p.sy, ds)
  }
}

function drStem() {
  let cx = width / 2, cy = height / 2
  let sy = cy + 25 * cos(TILT)
  noFill()
  strokeWeight(4)
  stroke(100, 18, 25, 180)
  beginShape()
  vertex(cx, sy)
  bezierVertex(cx - 8, sy + 40, cx + 15, sy + 110, cx + 18, sy + 260)
  endShape()
  strokeWeight(2.5)
  stroke(80, 14, 20, 150)
  beginShape()
  vertex(cx + 2, sy + 8)
  bezierVertex(cx - 4, sy + 50, cx + 20, sy + 120, cx + 22, sy + 250)
  endShape()
  strokeWeight(1)
  stroke(120, 25, 35, 120)
  beginShape()
  vertex(cx - 1, sy + 4)
  bezierVertex(cx - 6, sy + 45, cx + 12, sy + 115, cx + 16, sy + 255)
  endShape()
  noStroke()
  for (let lf of [{ x: cx - 15, y: sy + 70, d: -1, s: 22 }, { x: cx + 18, y: sy + 130, d: 1, s: 28 }, { x: cx - 22, y: sy + 180, d: -1, s: 20 }]) {
    fill(90, 22, 30, 180)
    push()
    translate(lf.x, lf.y)
    rotate(lf.d * 0.55)
    beginShape()
    vertex(0, 0)
    bezierVertex(lf.s * 0.35, -lf.s * 0.35, lf.s * 0.8, -lf.s * 0.15, lf.s * 0.9, -0.1 * lf.s)
    bezierVertex(lf.s * 0.5, -lf.s * 0.1, lf.s * 0.25, lf.s * 0.12, 0, 0)
    endShape(CLOSE)
    pop()
  }
}

function ee(t) { return t === 1 ? 1 : 1 - pow(2, -10 * t) }
function windowResized() { resizeCanvas(windowWidth, windowHeight) }
</script>
</body>
</html>
