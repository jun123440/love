<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>馃挄 鑷翠綘</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0000;font-family:'Georgia','Noto Serif SC','Microsoft YaHei',serif;-webkit-font-smoothing:antialiased}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
#inputScreen.hidden .glass-card{transform:translateY(-30px) scale(0.95)}
.glass-card{background:rgba(120,0,0,0.08);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border:1px solid rgba(255,60,60,0.1);border-radius:36px;padding:55px 48px;text-align:center;box-shadow:0 0 100px rgba(120,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.04);transition:transform 1.8s cubic-bezier(0.4,0,0.2,1);max-width:90vw}
.glass-card h1{color:#ff1a4a;font-size:24px;font-weight:300;margin-bottom:32px;letter-spacing:3px;text-shadow:0 0 40px rgba(255,0,64,0.3)}
.glass-card .input-wrap{position:relative;display:inline-block}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,60,60,0.2);border-radius:18px;padding:16px 28px;font-size:22px;color:#ff1a4a;text-align:center;outline:none;width:300px;font-family:inherit;transition:all 0.5s;letter-spacing:2px}
.glass-card input:focus{border-color:rgba(255,26,74,0.5);box-shadow:0 0 50px rgba(255,0,64,0.15)}
.glass-card input::placeholder{color:rgba(255,60,60,0.2);letter-spacing:1px;font-weight:300}
.glass-card .btn-wrap{margin-top:30px}
.glass-card button{padding:14px 56px;background:linear-gradient(135deg,rgba(255,0,64,0.65),rgba(160,0,0,0.65));border:none;border-radius:50px;color:#fff;font-size:16px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px;backdrop-filter:blur(4px);position:relative;overflow:hidden}
.glass-card button:hover{background:linear-gradient(135deg,rgba(255,0,64,0.85),rgba(180,0,0,0.85));transform:scale(1.04);box-shadow:0 0 50px rgba(255,0,64,0.25)}
.glass-card button:active{transform:scale(0.96)}
.glass-card .hint{color:rgba(255,60,60,0.15);font-size:13px;margin-top:20px;letter-spacing:1px;font-weight:300}
#finalMsg{position:fixed;bottom:60px;left:0;width:100%;text-align:center;z-index:5;opacity:0;transition:opacity 2s ease;pointer-events:none}
#finalMsg.show{opacity:1}
#finalMsg h2{color:#ff1a4a;font-size:22px;font-weight:300;letter-spacing:4px;text-shadow:0 0 30px rgba(255,0,64,0.3)}
#finalMsg p{color:rgba(255,60,60,0.3);font-size:13px;margin-top:8px;letter-spacing:2px}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>

<div id="inputScreen">
  <div class="glass-card">
    <h1>馃挄 璇疯緭鍏ヤ綘鐨勫悕瀛?/h1>
    <div class="input-wrap">
      <input type="text" id="nameInput" placeholder="浣犵殑鍚嶅瓧..." maxlength="12" autocomplete="off">
    </div>
    <div class="btn-wrap">
      <button id="submitBtn">鉁?寮€濮?/button>
    </div>
    <div class="hint">鈥?杞昏交鎸変笅锛岃璇佸杩?鈥?/div>
  </div>
</div>

<div id="finalMsg">
  <h2 id="loveText"></h2>
  <p>鈥?鑷寸嫭涓€鏃犱簩鐨勪綘 鈥?/p>
</div>

<script>
let phase = 'idle', phaseTime = 0, angle = 0, pulse = 0
let particles = [], dust = [], nameStr = ''
const TILT = Math.PI / 7

function setup() {
  let c = createCanvas(windowWidth, windowHeight)
  c.style('position', 'fixed'); c.style('top', '0'); c.style('left', '0'); c.style('z-index', '1')
  for (let i = 0; i < 120; i++) {
    dust.push({ x: random(width), y: random(height), vx: random(-0.12, 0.12), vy: random(-0.12, 0.12), s: random(1, 2.5), a: random(15, 60), ph: random(TWO_PI) })
  }
  document.getElementById('submitBtn').onclick = submit
  document.getElementById('nameInput').onkeydown = e => { if (e.key === 'Enter') submit() }
}

function submit() {
  let el = document.getElementById('nameInput'), v = el.value.trim()
  if (!v) { el.style.borderColor = 'rgba(255,0,64,0.6)'; el.style.boxShadow = '0 0 40px rgba(255,0,64,0.2)'; return }
  nameStr = v
  document.getElementById('inputScreen').classList.add('hidden')
  gen(v)
  phase = 'appear'
  phaseTime = millis()
}

function gen(name) {
  let d = pixelDensity(), w2 = round(width * d), h2 = round(height * d)
  let oc = document.createElement('canvas')
  oc.width = w2; oc.height = h2
  let ctx = oc.getContext('2d')
  ctx.fillStyle = '#000'
  ctx.fillRect(0, 0, w2, h2)
  ctx.fillStyle = '#fff'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  let fs = name.length <= 2 ? 220 : name.length <= 4 ? 170 : 120
  ctx.font = `bold ${fs * d}px sans-serif`
  ctx.fillText(name, w2 / 2, h2 / 2)
  let imgData = ctx.getImageData(0, 0, w2, h2)
  let data = imgData.data
  let step = 1, sc = 1.2, src = []
  for (let x = 0; x < w2; x += step * d) {
    for (let y = 0; y < h2; y += step * d) {
      let idx = floor(x + y * w2) * 4
      if (data[idx] > 128) {
        src.push({ ox: (x / d - width / 2) * sc, oy: (y / d - height / 2) * sc })
      }
    }
  }
  src.sort(() => Math.random() - 0.5)
  let N = min(10000, src.length), maxOx = max(src.map(p => abs(p.ox)))
  particles = []
  for (let i = 0; i < N; i++) {
    let p = src[i], a = random(TWO_PI), sv = random(80, 200), ts = random(2, 5)
    let delay = constrain(map(p.ox, -maxOx, maxOx, 0, 2), 0, 2)
    particles.push({
      ox: p.ox, oy: p.oy,
      svx: cos(a) * sv, svy: sin(a) * sv,
      tx: 0, ty: 0, tz: 0,
      ts, s: 1.5, a: 0,
      clr: [255, 255, 255], tclr: [230, 50, 80],
      de: random(0.6), r2: random(TWO_PI),
      st: 0, fb: p.fb || 0,
      delay, dur: random(0.4, 0.7),
      twinkle: random() < 0.08
    })
  }
  genRose()
}

function genRose() {
  let n = particles.length, stemN = floor(n * 0.14), lfN = floor(stemN * 0.4), idx = 0
  for (let i = 0; i < stemN; i++, idx++) {
    let p = particles[i], t = i / stemN
    p.tx = 5 * t + 3 * t * t + random(-2, 2) * 0.7
    p.ty = 25 + 230 * t + random(-2, 2) * 0.7
    p.tz = random(-2, 2)
    let dk = 1 - t * 0.5
    p.tclr = [random(80, 160) * dk, random(12, 35) * dk, random(20, 45) * dk]
    p.ts = random(2.5, 4.5) * (1 - t * 0.3)
    p.st = 1
  }
  for (let lf = 0; lf < 3; lf++) {
    let bt = [0.18, 0.45, 0.72][lf], dir = [-1, 1, -1][lf]
    for (let j = 0; j < floor(lfN / 3); j++) {
      if (idx >= n) break
      let p = particles[idx], t = random(), ls = random(18, 28)
      let lx = 5 * bt + 3 * bt * bt, ly = 25 + 230 * bt
      p.tx = lx + dir * (ls * t * 0.6 + random(-2, 2))
      p.ty = ly - ls * t * 0.35 + random(-2, 2) + (1 - t) * 4
      p.tz = random(-3, 3)
      p.tclr = [random(100, 180), random(18, 45), random(28, 55)]
      p.ts = random(2, 3.5)
      p.st = 1; idx++
    }
  }
  let rem = particles.filter(p => !p.st)
  let ly = [
    { pc: 6, R: 200, w: 0.50, h: 28, wt: 0.20 },
    { pc: 7, R: 155, w: 0.44, h: 16, wt: 0.22 },
    { pc: 8, R: 115, w: 0.37, h: 4, wt: 0.20 },
    { pc: 10, R: 70, w: 0.28, h: -8, wt: 0.20 },
    { pc: 12, R: 35, w: 0.20, h: -20, wt: 0.18 }
  ]
  for (let li = 0; li < ly.length; li++) {
    let { pc, R, w, h, wt } = ly[li]
    let cnt = floor(rem.length * wt)
    for (let i = 0; i < cnt && idx < n; i++, idx++) {
      let p = particles[idx]
      let pi = floor(random(pc)), pa = (pi / pc) * TWO_PI
      let hs = w * PI * 0.5, off = random(-hs, hs), t2 = abs(off) / hs
      let r = R * pow(cos(t2 * PI / 2), 1.6)
      r += random(-4, 4) * (r / R + 0.3)
      r = max(r, 0)
      p.tx = r * cos(pa + off); p.tz = r * sin(pa + off); p.ty = h + random(-6, 6)
      let lf = li / (ly.length - 1)
      p.tclr = [lerp(250, 185, lf) + random(-12, 12), lerp(135, 20, lf) + random(-10, 10), lerp(155, 30, lf) + random(-10, 10)]
      p.ts = lerp(4, 2.5, lf) + random(-0.6, 0.6)
      p.st = 0
    }
  }
  for (; idx < n; idx++) {
    let p = particles[idx], a = random(TWO_PI), r = random(2, 12)
    p.tx = r * cos(a); p.tz = r * sin(a); p.ty = random(-30, -15)
    p.tclr = [250 + random(-10, 10), 65 + random(-10, 15), 85 + random(-10, 15)]
    p.ts = random(1.5, 2.5); p.st = 0
  }
}

function draw() {
  noStroke()
  for (let i = 0; i <= height; i += 4) {
    let r = lerp(20, 8, i / height)
    fill(r, 0, 0)
    rect(0, i, width, 4)
  }
  let hp = 0.4 + 0.6 * (0.5 + 0.5 * sin(pulse * 1.5))
  let xfGlow = phase === 'xfrm' ? 0.5 + 0.5 * sin(pulse * 0.5) : 0
  for (let k = 6; k > 0; k--) {
    let glow = 6 * hp / (k * 0.5 + 0.5) + xfGlow * 10 / (k + 1)
    fill(120, 0, 0, glow)
    let sz = (280 + 40 * hp) * (7 - k) * 0.18
    ellipse(width / 2, height / 2, sz, sz)
  }
  if (phase === 'xfrm' || phase === 'disp') {
    let wa = phase === 'xfrm' ? 12 * xfGlow : 6 + 6 * sin(pulse * 0.3)
    fill(200, 60, 80, wa)
    ellipse(width / 2, height / 2, 300 + 100 * sin(pulse * 0.4))
  }
  for (let d of dust) {
    let sm = phase === 'xfrm' ? 3 : phase === 'disp' ? 1.5 : 1
    d.x += d.vx * sm; d.y += d.vy * sm
    d.a = 25 + 35 * sin(d.ph + millis() * 0.0008)
    d.a *= phase === 'xfrm' ? 2 : phase === 'disp' ? 1.5 : 1
    if (d.x < -10) d.x = width + 10; if (d.x > width + 10) d.x = -10
    if (d.y < -10) d.y = height + 10; if (d.y > height + 10) d.y = -10
    fill(120, 30, 30, d.a)
    circle(d.x, d.y, d.s)
  }
  if (phase === 'appear') upA()
  else if (phase === 'xfrm') upX()
  else if (phase === 'disp') upD()
  angle += 0.004
  pulse += 0.025
}

function upA() {
  let el = (millis() - phaseTime) / 1000
  let maxDelay = max(particles.map(p => p.delay))
  for (let p of particles) {
    let local = constrain(el - p.delay, 0, 999)
    let pr = constrain(local / p.dur, 0, 1)
    p.sx = width / 2 + p.ox
    p.sy = height / 2 + p.oy
    let e = easeOutBack(pr)
    p.a = 255 * e
    p.s = max(1, p.ts * (1 + 0.6 * easeOutBack(pr)))
  }
  drStem()
  dr()
  if (el > maxDelay + 1.5) { phase = 'xfrm'; phaseTime = millis() }
}

function upX() {
  let el = (millis() - phaseTime) / 1000, pr = constrain(el / 8, 0, 1)
  let cx = width / 2, cy = height / 2, ca = cos(angle), sa = sin(angle)
  let s1 = 2.8 / 8, s2 = (2.8 + 3.2) / 8
  for (let p of particles) {
    let pp = constrain((pr - p.de * 0.3) / (1 - p.de * 0.3), 0, 1)
    let rx = p.tx * ca - p.tz * sa, rz = p.tx * sa + p.tz * ca
    let ttx = rx, tty = p.ty * cos(TILT) - rz * sin(TILT)
    let tx = cx + ttx, ty = cy + tty
    if (pp < s1) {
      let t = constrain(pp / s1, 0, 1), e = ee(t)
      let sw = sin(t * PI * 3 + p.r2) * 25
      let sc = sin(t * PI)
      let sx = p.ox + (p.svx * 0.2 + 60 * cos(p.r2)) * sc + sw
      let sy = p.oy + (p.svy * 0.2 + 60 * sin(p.r2)) * sc + sw * 0.5
      p.sx = cx + sx; p.sy = cy + sy
      p.a = 255
      p.s = lerp(p.s, p.ts, min(1, t * 2))
      let w = t
      p.clr = [lerp(255, 255, w), lerp(255, 210, w), lerp(255, 120, w)]
    } else if (pp < s2) {
      let t = constrain((pp - s1) / (s2 - s1), 0, 1), e = ee(t)
      let sr = (1 - ee(t * 0.6)) * 60
      let sa2 = t * PI * 4 + p.r2
      let sc = sin(t * PI)
      let bx = p.ox * (1 - e) + ttx * e + sc * (p.svx * 0.15 + 50 * cos(p.r2))
      let by = p.oy * (1 - e) + tty * e + sc * (p.svy * 0.15 + 50 * sin(p.r2))
      p.sx = cx + bx + sr * cos(sa2)
      p.sy = cy + by + sr * 0.5 * sin(sa2)
      p.a = lerp(255, 240, e)
      p.s = lerp(p.s, p.ts, min(1, e * 2))
      let w = 1 - t
      p.clr = [
        lerp(255, p.tclr[0], e) - 15 * w * (1 - e),
        lerp(210, p.tclr[1], e) + 25 * w * (1 - e),
        lerp(120, p.tclr[2], e) + 40 * w * (1 - e)
      ]
    } else {
      let t = constrain((pp - s2) / (1 - s2), 0, 1), e = easeOutBack(t)
      p.sx = lerp(p.sx, tx, e)
      p.sy = lerp(p.sy, ty, e)
      p.clr = p.tclr
      p.a = 240
      p.s = lerp(p.s, p.ts, min(1, e * 2))
    }
  }
  dr()
  if (pr >= 1) { phase = 'disp'; phaseTime = millis(); showFinal() }
}

function upD() {
  let cx = width / 2, cy = height / 2, ca = cos(angle), sa = sin(angle)
  let b = 0.85 + 0.15 * sin(pulse * 0.7), breath = 0.5 + 0.5 * sin(pulse * 0.3)
  let proj = []
  for (let p of particles) {
    let rx = p.tx * ca - p.tz * sa, rz = p.tx * sa + p.tz * ca
    if (p.st) {
      p.sx = cx + rx
      p.sy = cy + p.ty * cos(TILT) - rz * sin(TILT)
      p.a = 200 + 55 * sin(pulse * 0.4 + p.r2)
    } else {
      let pb = 1 + 0.04 * breath
      p.sx = cx + rx * b * pb
      p.sy = cy + (p.ty * cos(TILT) - rz * sin(TILT)) * b * pb
      p.a = 220 + 35 * sin(pulse + p.r2)
    }
    proj.push({ p, d: rz * cos(TILT) + p.ty * sin(TILT) })
  }
  proj.sort((a, b2) => b2.d - a.d)
  drStem()
  for (let item of proj) {
    let p = item.p
    let [r, g, b2] = p.tclr
    let ds = p.ts || p.s
    let ga = p.a * (0.2 + 0.15 * sin(pulse * 0.8 + p.r2))
    fill(r, g, b2, ga); circle(p.sx, p.sy, ds * 3)
    fill(r, g, b2, p.a * 0.25); circle(p.sx, p.sy, ds * 2)
    fill(r, g, b2, p.a); circle(p.sx, p.sy, ds)
    if (p.twinkle) {
      let tw = 0.5 + 0.5 * sin(pulse * 1.5 + p.r2 * 3)
      fill(255, 220, 200, p.a * tw * 0.6)
      circle(p.sx - ds * 0.3, p.sy - ds * 0.3, ds * 0.5)
    }
  }
}

function dr() {
  for (let p of particles) {
    let [r, g, b] = p.clr
    let ds = p.ts || p.s
    let ga = p.a * (0.2 + 0.15 * sin(pulse * 0.8 + p.r2))
    fill(r, g, b, ga); circle(p.sx, p.sy, ds * 3)
    fill(r, g, b, p.a * 0.25); circle(p.sx, p.sy, ds * 2)
    fill(r, g, b, p.a); circle(p.sx, p.sy, ds)
    if (p.twinkle) {
      let tw = 0.5 + 0.5 * sin(pulse * 1.5 + p.r2 * 3)
      fill(255, 220, 200, p.a * tw * 0.6)
      circle(p.sx - ds * 0.3, p.sy - ds * 0.3, ds * 0.5)
    }
  }
}

function drStem() {
  let cx = width / 2, cy = height / 2, sy = cy + 25 * cos(TILT)
  noFill()
  strokeWeight(4); stroke(100, 18, 25, 180)
  beginShape(); vertex(cx, sy); bezierVertex(cx - 8, sy + 40, cx + 15, sy + 110, cx + 18, sy + 260); endShape()
  strokeWeight(2.5); stroke(80, 14, 20, 150)
  beginShape(); vertex(cx + 2, sy + 8); bezierVertex(cx - 4, sy + 50, cx + 20, sy + 120, cx + 22, sy + 250); endShape()
  strokeWeight(1); stroke(120, 25, 35, 120)
  beginShape(); vertex(cx - 1, sy + 4); bezierVertex(cx - 6, sy + 45, cx + 12, sy + 115, cx + 16, sy + 255); endShape()
  noStroke()
  for (let lf of [{ x: cx - 15, y: sy + 70, d: -1, s: 22 }, { x: cx + 18, y: sy + 130, d: 1, s: 28 }, { x: cx - 22, y: sy + 180, d: -1, s: 20 }]) {
    fill(90, 22, 30, 180)
    push(); translate(lf.x, lf.y); rotate(lf.d * 0.55)
    beginShape(); vertex(0, 0); bezierVertex(lf.s * 0.35, -lf.s * 0.35, lf.s * 0.8, -lf.s * 0.15, lf.s * 0.9, -0.1 * lf.s); bezierVertex(lf.s * 0.5, -lf.s * 0.1, lf.s * 0.25, lf.s * 0.12, 0, 0); endShape(CLOSE)
    pop()
  }
}

function showFinal() {
  let el = document.getElementById('finalMsg')
  document.getElementById('loveText').textContent = `${nameStr} 馃挄 鎴戠埍浣燻
  setTimeout(() => el.classList.add('show'), 500)
}

function easeOutBack(t) { let c = 1.70158, c3 = c + 1; return 1 + c3 * pow(t - 1, 3) + c * pow(t - 1, 2) }
function ee(t) { return t === 1 ? 1 : 1 - pow(2, -10 * t) }
function windowResized() { resizeCanvas(windowWidth, windowHeight) }
</script>
</body>
</html>
