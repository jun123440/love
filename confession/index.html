<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✦</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080303}
#inputScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);pointer-events:auto}
#inputScreen.hidden{opacity:0;pointer-events:none}
.glass-card{background:rgba(180,20,40,0.06);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,80,80,0.06);border-radius:36px;padding:52px 46px;text-align:center;box-shadow:0 0 120px rgba(180,0,0,0.08)}
.glass-card h1{color:#e61950;font-size:22px;font-weight:300;margin-bottom:28px;letter-spacing:3px;text-shadow:0 0 50px rgba(230,25,80,0.2)}
.glass-card input{background:rgba(0,0,0,0.5);border:1.5px solid rgba(230,25,80,0.18);border-radius:18px;padding:15px 26px;font-size:20px;color:#e61950;text-align:center;outline:none;width:280px;font-family:'Georgia','Noto Serif SC','Microsoft YaHei',sans-serif;transition:all 0.5s;letter-spacing:1px}
.glass-card input:focus{border-color:rgba(230,25,80,0.35);box-shadow:0 0 50px rgba(230,25,80,0.1)}
.glass-card input::placeholder{color:rgba(230,25,80,0.15)}
.glass-card button{margin-top:26px;padding:13px 52px;background:linear-gradient(135deg,rgba(230,25,80,0.55),rgba(160,0,20,0.55));border:none;border-radius:50px;color:#fff;font-size:15px;cursor:pointer;transition:all 0.5s;font-family:inherit;letter-spacing:2px}
.glass-card button:hover{background:linear-gradient(135deg,rgba(230,25,80,0.75),rgba(180,0,30,0.75));transform:scale(1.04);box-shadow:0 0 50px rgba(230,25,80,0.15)}
canvas{display:block}
</style>
</head>
<body>
<div id="inputScreen">
  <div class="glass-card">
    <h1>✦ 请输入你的名字</h1>
    <input type="text" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off"><br>
    <button id="submitBtn">✦ 开始</button>
  </div>
</div>
<script>
let phase='idle',startTime=0,rotation=0,particles=[]
const tilt=radians(15),focal=500

function setup(){
  createCanvas(windowWidth,windowHeight).style('display','block')
  textAlign(CENTER,CENTER)
  document.getElementById('submitBtn').onclick=submit
  document.getElementById('nameInput').onkeydown=e=>{if(e.key==='Enter')submit()}
}

function submit(){
  let v=document.getElementById('nameInput').value.trim()
  if(!v)return
  document.getElementById('inputScreen').classList.add('hidden')
  build(v)
  phase='burst';startTime=millis()
}

function build(n){
  background(10,0,0)
  let W=min(width,600),H=min(height*0.5,180)
  fill(255);noStroke();textSize(56);textAlign(CENTER,CENTER)
  text(n,W/2,H/2)
  let src=[],step=2
  loadPixels()
  for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){
    let i=(x+y*width)*4
    if(pixels[i]>220)src.push({x:x-W/2,y:y-H/2})
  }
  
  if(src.length<30){
    src=[]
    for(let i=0;i<n.length;i++)for(let j=0;j<100;j++){
      let px=(i-(n.length-1)/2)*50+random(-20,20)
      let py=random(-30,30)
      src.push({x:px,y:py})
    }
  }
  if(src.length<30)for(let i=0;i<300;i++)src.push({x:random(-80,80),y:random(-30,30)})
  
  let N=min(1200,src.length)
  shuffle(src)
  
  let layers=[
    {n:20,r1:235,r2:170,h:6},
    {n:18,r1:170,r2:120,h:16},
    {n:16,r1:120,r2:80,h:26},
    {n:14,r1:80,r2:50,h:36},
    {n:12,r1:50,r2:28,h:46},
    {n:10,r1:28,r2:5,h:54}
  ]
  let pidx=0
  particles=[]
  
  for(let li=0;li<layers.length;li++){
    let l=layers[li],ppl=max(1,floor(N*l.n/90))
    for(let j=0;j<ppl&&pidx<N;j++){
      let t=j/ppl
      let baseA=j*2.3999+li*0.7
      let r=lerp(l.r2,l.r1,t)+random(-6,6)
      let a=baseA+(random()-0.5)*PI/(l.n*1.2)
      let h=l.h*(1-t*0.3)+random(-1.5,1.5)
      let ct=li/6
      particles.push({
        sx:src[pidx].x,sy:src[pidx].y,
        ta:a,tr:r,th:max(h,0.5),
        cr:lerp(175,245,ct)+random(-5,5),
        cg:lerp(20,175,ct)+random(-6,10),
        cb:lerp(25,165,ct)+random(-6,10),
        sz:1.2+random()*1.8,
        ap:0,dl:0.15+pidx*0.0015+random()*0.4
      })
      pidx++
    }
  }
  
  let stemN=floor(N*0.08)
  for(let i=0;i<stemN&&pidx<N;i++){
    let t=i/stemN
    let a=-PI*0.25+t*PI*0.5
    particles.push({
      sx:src[pidx].x,sy:src[pidx].y,
      ta:a,tr:20+t*130,th:2.5*(1-t)+random(0,1),
      cr:lerp(55,125,1-t)+random(-5,5),
      cg:lerp(85,180,1-t)+random(-8,10),
      cb:lerp(35,72,1-t)+random(-5,8),
      sz:1.5+random()*1.2,
      ap:0,dl:0.3+pidx*0.0015,
      st:1,sw:i*0.1
    })
    pidx++
  }
  while(pidx<N){
    let a=random(TWO_PI),r=random(5,220),h=random(2,50)
    particles.push({
      sx:src[pidx].x,sy:src[pidx].y,
      ta:a,tr:r,th:h,
      cr:220,cg:80,cb:60,
      sz:1.2+random()*1.8,
      ap:0,dl:0.15+pidx*0.002
    })
    pidx++
  }
}

function draw(){
  bg()
  rotation+=0.005
  let el=(millis()-startTime)/1000
  if(phase==='burst'){
    let allDone=true
    for(let p of particles){
      let raw=max(0,(el-p.dl)/0.9)
      let e=raw<1?1-pow(2,-8*raw):1
      if(e<1)allDone=false
      p.ap=e
    }
    if(allDone&&el>particles.length*0.002+2){phase='disp'}
  }
  render()
}

function render(){
  let cx=width/2,cy=height*0.48
  let buf=[]
  for(let p of particles){
    if(p.ap<=0)continue
    let a,r,h
    if(p.st){
      let sw=sin(rotation*0.25+p.sw)*0.3
      a=p.ta+sw*0.04;r=p.tr*p.ap;h=p.th*p.ap
    }else{
      a=p.ta+rotation*p.ap
      r=p.tr*p.ap;h=p.th*p.ap
    }
    let x=r*cos(a),yf=r*sin(a),z=h
    let sy=yf*cos(tilt)-z*sin(tilt),dp=yf*sin(tilt)+z*cos(tilt)
    let pf=focal/(focal+dp+30)
    let sx=cx+x*pf,sy2=cy+sy*pf
    let sd=1;if(yf<0)sd=0.6+0.4*pow(1+yf/160,0.6)
    let al=min(255,255*pf*sd*p.ap)
    buf.push({x:sx,y:sy2,s:p.sz*pf*(1+z*0.008),a:al,r:p.cr,g:p.cg,b:p.cb})
  }
  buf.sort((a,b)=>a.y-b.y)
  for(let d of buf){
    push();translate(d.x,d.y)
    fill(d.r,d.g,d.b,d.a*0.12);noStroke();circle(0,0,d.s*4)
    fill(d.r,d.g,d.b,d.a);circle(0,0,d.s)
    pop()
  }
}

function bg(){
  for(let y=0;y<height;y+=4){
    fill(lerp(10,3,y/height),0,0);noStroke();rect(0,y,width,4)
  }
}

function windowResized(){resizeCanvas(windowWidth,windowHeight)}
</script>
</body>
</html>
