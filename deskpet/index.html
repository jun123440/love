<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>桌宠 · 绫波丽</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:'Segoe UI','PingFang SC',sans-serif;user-select:none;-webkit-user-select:none;cursor:default}

.bg{position:fixed;inset:0;background:linear-gradient(160deg,#e8eaf6 0%,#c5cae9 35%,#bbdefb 65%,#e0f7fa 100%);z-index:0;transition:background .8s}
.bg.night{background:linear-gradient(160deg,#0a0a1a 0%,#101032 50%,#1a1a3e 100%)}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 1s}
.bg.night .stars{opacity:1}
.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0;transform:scale(.5)}100%{opacity:var(--o);transform:scale(1)}}

.pet-wrap{position:fixed;z-index:10;top:50%;left:50%;transform:translate(-50%,-50%);transition:top .1s,left .1s}
.pet-wrap.dragging{transition:none}

canvas#petCanvas{display:block;cursor:pointer;image-rendering:pixelated;width:192px;height:208px}

.at-ring{position:absolute;top:50%;left:50%;translate:-50% -50%;width:240px;height:240px;border-radius:50%;border:2px solid rgba(100,200,255,.08);z-index:1;pointer-events:none;opacity:0;transition:opacity .6s;animation:atSpin 8s linear infinite}
.at-ring.show{opacity:1}
.at-ring2{position:absolute;top:50%;left:50%;translate:-50% -50%;width:200px;height:200px;border-radius:50%;border:1px solid rgba(100,200,255,.06);z-index:1;pointer-events:none;opacity:0;transition:opacity .6s;animation:atSpin 12s linear infinite reverse}
.at-ring2.show{opacity:1}
@keyframes atSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.bubble{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#fff;padding:5px 12px;border-radius:12px 12px 12px 3px;box-shadow:0 2px 12px rgba(0,0,0,.06);font-size:12px;color:#555;white-space:nowrap;opacity:0;transition:all .3s;z-index:20;pointer-events:none}
.bubble::after{content:'';position:absolute;bottom:-4px;left:20px;width:7px;height:7px;background:#fff;transform:rotate(45deg);border-radius:1px}
.bubble.show{opacity:1;top:-18px}
.bubble.big{font-size:15px;padding:6px 14px}

.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:6px 12px;border-radius:30px;box-shadow:0 2px 20px rgba(0,0,0,.05);border:1px solid rgba(255,255,255,.4)}
.controls button{width:32px;height:32px;border:none;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;color:#5a6070}
.controls button:hover{background:rgba(100,170,220,.25);transform:scale(1.1)}
.controls button:active{transform:scale(.92)}

@media(max-width:400px){
  .pet-wrap{transform:translate(-50%,-50%) scale(.8)}
  .controls{bottom:12px;padding:5px 10px;gap:4px}
  .controls button{width:28px;height:28px;font-size:12px}
}
</style>
</head>
<body>

<div class="bg" id="bg">
  <div class="stars" id="stars"></div>
</div>

<div class="pet-wrap" id="petWrap">
  <div class="at-ring" id="atRing"></div>
  <div class="at-ring2" id="atRing2"></div>
  <canvas id="petCanvas" width="192" height="208"></canvas>
  <div class="bubble" id="bubble"></div>
</div>

<div class="controls" id="controls">
  <button id="moodBtn" title="表情">🎭</button>
  <button id="atBtn" title="AT力场">🔷</button>
  <button id="nightBtn" title="昼夜">🌙</button>
  <button id="resetBtn" title="重置">📍</button>
</div>

<script>
const SPRITESHEET_URL = 'https://codexpethub.com/assets/pets/ayanami-rei/v1/spritesheet-1808f9086c100c0b.webp'

const canvas = document.getElementById('petCanvas')
const ctx = canvas.getContext('2d')
const W = 192, H = 208
const bubble = document.getElementById('bubble')
const petWrap = document.getElementById('petWrap')
const bg = document.getElementById('bg')
const stars = document.getElementById('stars')
const atRing = document.getElementById('atRing')
const atRing2 = document.getElementById('atRing2')

// Stars
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div')
  s.className = 'star'
  s.style.left = Math.random() * 100 + '%'
  s.style.top = Math.random() * 100 + '%'
  s.style.setProperty('--d', (1.5 + Math.random() * 3) + 's')
  s.style.setProperty('--o', (0.3 + Math.random() * 0.7))
  s.style.animationDelay = Math.random() * 5 + 's'
  stars.appendChild(s)
}

// States from pet.json
const STATES = [
  { name: 'idle', row: 0, frames: 6, speed: 180 },
  { name: 'running-right', row: 1, frames: 8, speed: 100 },
  { name: 'running-left', row: 2, frames: 8, speed: 100 },
  { name: 'waving', row: 3, frames: 4, speed: 120 },
  { name: 'jumping', row: 4, frames: 5, speed: 100 },
  { name: 'failed', row: 5, frames: 8, speed: 80 },
  { name: 'waiting', row: 6, frames: 6, speed: 200 },
  { name: 'running', row: 7, frames: 6, speed: 100 },
  { name: 'review', row: 8, frames: 6, speed: 150 },
]

let spritesheet = new Image()
let loaded = false
let currentState = STATES[6] // waiting (calm, sleepy desk presence)
let frameIndex = 0
let lastFrameTime = 0
let isNight = false

// Load spritesheet
spritesheet.onload = () => { loaded = true; drawFrame() }
spritesheet.src = SPRITESHEET_URL

function drawFrame() {
  if (!loaded) return
  const cell = STATES.find(s => s.name === currentState.name) || currentState
  const col = frameIndex % cell.frames
  const row = cell.row
  ctx.clearRect(0, 0, W, H)
  ctx.drawImage(spritesheet, col * W, row * H, W, H, 0, 0, W, H)
}

function setState(name) {
  const s = STATES.find(st => st.name === name)
  if (!s) return
  currentState = s
  frameIndex = 0
  lastFrameTime = 0
}

// Animation loop
function animate(time) {
  if (!loaded) { requestAnimationFrame(animate); return }
  const cell = currentState
  const delay = cell.speed
  if (time - lastFrameTime > delay) {
    frameIndex = (frameIndex + 1) % cell.frames
    lastFrameTime = time
    drawFrame()
  }
  requestAnimationFrame(animate)
}
requestAnimationFrame(animate)

// ===== INTERACTIONS =====
const lines = [
  '……', 'はい', '任務を続行します', '了解',
  '…何？', '私は綾波', '……', '…いいえ',
  '…あなたは誰？', '… LCLの匂いがする'
]

let bubbleTimer = null
function showBubble(text) {
  bubble.textContent = text
  bubble.className = 'bubble show'
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 2000)
}

function showBigBubble(text) {
  bubble.textContent = text
  bubble.className = 'bubble show big'
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 2500)
}

// Click
let lastClick = 0
petWrap.addEventListener('click', (e) => {
  if (e.target.closest('.controls')) return
  const now = Date.now()
  if (now - lastClick < 300) {
    showBigBubble('………（ATフィールド展開）')
    atRing.classList.add('show'); atRing2.classList.add('show')
    setState('jumping')
    setTimeout(() => {
      atRing.classList.remove('show'); atRing2.classList.remove('show')
      setState('waiting')
    }, 1500)
    return
  }
  lastClick = now
  showBubble(lines[Math.floor(Math.random() * lines.length)])
  setState('waving')
  setTimeout(() => setState('waiting'), 800)
})

// Drag
let isDragging = false, startX, startY, origX, origY

petWrap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.controls')) return
  isDragging = true
  petWrap.classList.add('dragging')
  const rect = petWrap.getBoundingClientRect()
  startX = e.clientX; startY = e.clientY
  origX = rect.left; origY = rect.top
  petWrap.style.left = origX + 'px'
  petWrap.style.top = origY + 'px'
  petWrap.style.transform = 'none'
})

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return
  petWrap.style.left = (origX + e.clientX - startX) + 'px'
  petWrap.style.top = (origY + e.clientY - startY) + 'px'
})

document.addEventListener('mouseup', () => {
  if (!isDragging) return
  isDragging = false
  petWrap.classList.remove('dragging')
})

petWrap.addEventListener('touchstart', (e) => {
  if (e.target.closest('.controls')) return
  const t = e.touches[0]
  isDragging = true
  petWrap.classList.add('dragging')
  const rect = petWrap.getBoundingClientRect()
  startX = t.clientX; startY = t.clientY
  origX = rect.left; origY = rect.top
  petWrap.style.left = origX + 'px'
  petWrap.style.top = origY + 'px'
  petWrap.style.transform = 'none'
}, { passive: true })

document.addEventListener('touchmove', (e) => {
  if (!isDragging) return
  const t = e.touches[0]
  petWrap.style.left = (origX + t.clientX - startX) + 'px'
  petWrap.style.top = (origY + t.clientY - startY) + 'px'
}, { passive: true })

document.addEventListener('touchend', () => {
  if (!isDragging) return
  isDragging = false
  petWrap.classList.remove('dragging')
})

// Controls
let moodIdx = 0
const moodStates = ['waiting', 'idle', 'running-right', 'running-left']

document.getElementById('moodBtn').addEventListener('click', () => {
  moodIdx = (moodIdx + 1) % moodStates.length
  setState(moodStates[moodIdx])
  showBubble(['……', '…はい', '…移動する', '…こちらへ'][moodIdx])
})

document.getElementById('atBtn').addEventListener('click', () => {
  const on = atRing.classList.toggle('show')
  atRing2.classList.toggle('show')
  showBubble(on ? 'ATフィールド…展開' : 'ATフィールド…解除')
  if (on) { setState('idle'); setTimeout(() => setState('waiting'), 2000) }
})

document.getElementById('nightBtn').addEventListener('click', () => {
  isNight = !isNight
  bg.classList.toggle('night')
  document.getElementById('nightBtn').textContent = isNight ? '☀️' : '🌙'
  showBubble(isNight ? '…おやすみ' : '…起きる')
  setState(isNight ? 'failed' : 'waiting')
  setTimeout(() => setState('waiting'), 1500)
})

document.getElementById('resetBtn').addEventListener('click', () => {
  petWrap.style.left = ''; petWrap.style.top = ''; petWrap.style.transform = ''
  showBubble('…戻った')
})

// Auto idle animation switching
function autoSwitch() {
  if (!isDragging) {
    const acts = ['waiting', 'idle', 'waving']
    const a = acts[Math.floor(Math.random() * acts.length)]
    setState(a)
    showBubble(['……', '……', '…こんにちは'][acts.indexOf(a)])
    if (a === 'waving') setTimeout(() => setState('waiting'), 1200)
  }
  setTimeout(autoSwitch, 8000 + Math.random() * 12000)
}
setTimeout(autoSwitch, 4000)

setTimeout(() => showBubble('…初めまして、綾波です'), 800)
</script>
</body>
</html>
