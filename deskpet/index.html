<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>桌宠 · 小团子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:'Segoe UI','PingFang SC',sans-serif;user-select:none;-webkit-user-select:none;cursor:default}

/* ====== 🌸 背景 ====== */
.bg{position:fixed;inset:0;background:linear-gradient(160deg,#fce4ec 0%,#f3e5f5 35%,#e8eaf6 65%,#e0f7fa 100%);z-index:0;transition:background .8s}
.bg.night{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 1s}
.bg.night .stars{opacity:1}
.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0;transform:scale(.5)}100%{opacity:var(--o);transform:scale(1)}}

/* ====== 🎀 桌宠容器 ====== */
.pet-wrap{position:fixed;z-index:10;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:420px;display:flex;align-items:center;justify-content:center;transition:top .1s,left .1s}
.pet-wrap.dragging{transition:none}

/* ====== 🐱 猫咪 ====== */
.cat{position:relative;width:200px;height:240px;animation:float 3s ease-in-out infinite;transform-origin:center bottom}
.cat.sleepy{animation:float 4s ease-in-out infinite}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* 👂 耳朵 */
.ear{position:absolute;top:-8px;width:42px;height:50px;background:#ffb5b5;border-radius:50% 50% 0 0;transform-origin:bottom center;transition:transform .3s}
.ear::after{content:'';position:absolute;top:6px;left:6px;width:26px;height:28px;background:#ff8a9e;border-radius:50% 50% 0 0}
.ear-l{left:38px;transform:rotate(-15deg)}
.ear-r{right:38px;transform:rotate(15deg)}
.cat.happy .ear-l{transform:rotate(-25deg)}
.cat.happy .ear-r{transform:rotate(25deg)}
.cat.sleepy .ear-l,.cat.sleepy .ear-r{transform:rotate(-10deg) scaleY(.9)}

/* 🐱 头部 */
.head{position:relative;width:160px;height:150px;margin:0 auto;background:linear-gradient(170deg,#fff5ee,#ffded5);border-radius:50% 50% 50% 50%/55% 55% 45% 45%;box-shadow:inset -8px -8px 20px rgba(200,140,120,.15),inset 8px -8px 20px rgba(255,255,255,.5)}
.cat.sleepy .head{background:linear-gradient(170deg,#faf0ec,#f5d5cc)}

/* 🐱 刘海 */
.bangs{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:100px;height:40px;pointer-events:none;z-index:2}
.bangs span{position:absolute;bottom:0;width:16px;background:#6b4226;border-radius:8px 8px 4px 4px;opacity:.85}
.bangs span:nth-child(1){left:20px;height:28px;transform:rotate(-10deg)}
.bangs span:nth-child(2){left:36px;height:35px;transform:rotate(-4deg)}
.bangs span:nth-child(3){left:52px;height:38px;transform:rotate(0deg)}
.bangs span:nth-child(4){left:68px;height:35px;transform:rotate(4deg)}
.bangs span:nth-child(5){left:84px;height:28px;transform:rotate(10deg)}

/* 🐱 眼睛 */
.eyes{position:absolute;top:52px;left:50%;transform:translateX(-50%);width:110px;height:40px;display:flex;justify-content:space-between;z-index:3}
.eye{position:relative;width:42px;height:42px;background:#2d1b14;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.eye::after{content:'';position:absolute;width:18px;height:18px;background:radial-gradient(circle at 35% 35%,#fff 0%,rgba(255,255,255,.9) 30%,transparent 70%);border-radius:50%;top:5px;right:6px;transition:all .15s}
.cat:not(.sleepy):not(.happy) .eye{animation:glance 6s ease-in-out infinite}
@keyframes glance{
  0%,60%,100%{transform:translateX(0)}
  65%{transform:translateX(4px)}
  68%{transform:translateX(0)}
  72%{transform:translateX(-3px)}
  75%{transform:translateX(0)}
}
.cat.happy .eye{height:18px;border-radius:0 0 21px 21px;margin-top:18px;background:#2d1b14}
.cat.happy .eye::after{display:none}
.cat.sleepy .eye{height:6px;border-radius:3px;margin-top:20px;background:#2d1b14}
.cat.sleepy .eye::after{display:none}

/* 👁️ 星星眼闪 */
.eye-sparkle{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;top:8px;right:10px;opacity:.9;z-index:4}
.cat.love .eye-sparkle{width:8px;height:8px;background:radial-gradient(circle,#ff6b9d,#fff);animation:heartEye .8s ease-in-out infinite alternate}
@keyframes heartEye{0%{transform:scale(1)}100%{transform:scale(1.4)}}

/* 🐱 腮红 */
.blush{position:absolute;top:72px;width:26px;height:16px;background:rgba(255,150,150,.35);border-radius:50%;z-index:2;transition:all .3s}
.blush-l{left:14px}.blush-r{right:14px}
.cat.happy .blush{background:rgba(255,120,120,.5);width:30px;height:20px}
.cat.sleepy .blush{background:rgba(255,150,150,.2);width:22px;height:12px}

/* 🐱 鼻子 */
.nose{position:absolute;top:68px;left:50%;transform:translateX(-50%);width:10px;height:8px;background:#ff9eaa;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;z-index:3;transition:all .3s}
.cat.happy .nose{background:#ff7a8a}

/* 🐱 嘴巴 */
.mouth{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:3}
.mouth-line{width:18px;height:9px;border-bottom:2.5px solid #c97586;border-radius:0 0 50% 50%;transition:all .3s}
.cat.happy .mouth-line{width:24px;height:12px;border-bottom:3px solid #c97586}
.cat.sleepy .mouth-line{width:14px;height:6px;border-color:#b08a92}

/* 🐱 身体 */
.body{position:relative;width:120px;height:95px;margin:-15px auto 0;background:linear-gradient(170deg,#fff5ee,#ffded5 60%,#f0cdc0);border-radius:45% 45% 50% 50%;box-shadow:inset -6px -6px 15px rgba(200,140,120,.12),inset 6px -6px 15px rgba(255,255,255,.4)}

/* 🎀 蝴蝶结 */
.bow{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:5;width:36px;height:36px}
.bow-l,.bow-r{position:absolute;top:4px;width:20px;height:16px;background:#ff6b6b;border-radius:50% 0 50% 0;transition:all .3s}
.bow-l{left:0;transform:rotate(-30deg);border-radius:50% 0 50% 0;box-shadow:-1px -1px 3px rgba(200,50,50,.3)}
.bow-r{right:0;transform:rotate(30deg);border-radius:0 50% 0 50%;box-shadow:1px -1px 3px rgba(200,50,50,.3)}
.bow-center{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#ff5252;border-radius:50%;box-shadow:0 0 4px rgba(255,80,80,.4)}
.cat.happy .bow-l{transform:rotate(-40deg) scale(1.1)}
.cat.happy .bow-r{transform:rotate(40deg) scale(1.1)}

/* 🐱 小手 */
.arm{position:absolute;width:24px;height:44px;background:linear-gradient(180deg,#ffded5,#f5ccc0);border-radius:12px;bottom:18px;z-index:8;transform-origin:top center;transition:transform .3s}
.arm-l{left:-8px;transform:rotate(8deg);border-radius:12px 4px 12px 12px}
.arm-r{right:-8px;transform:rotate(-8deg);border-radius:4px 12px 12px 12px}
.cat.happy .arm-l{transform:rotate(-20deg) translateY(-6px)}
.cat.happy .arm-r{transform:rotate(20deg) translateY(-6px)}
.cat.wave .arm-r{animation:waveArm .6s ease-in-out infinite alternate}
@keyframes waveArm{0%{transform:rotate(-8deg) translateY(0)}100%{transform:rotate(-45deg) translateY(-12px)}}

/* 🐱 尾巴 */
.tail{position:absolute;bottom:10px;right:-18px;width:16px;height:50px;background:linear-gradient(180deg,#ffded5,#f0ccc0);border-radius:8px;transform-origin:bottom center;transform:rotate(20deg);opacity:.8;transition:transform .3s}
.cat.happy .tail{animation:wag .4s ease-in-out infinite alternate}
@keyframes wag{0%{transform:rotate(15deg)}100%{transform:rotate(40deg)}}

/* ====== 💫 装饰粒子 ====== */
.particles{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.particle{position:absolute;bottom:-20px;font-size:16px;opacity:.5;animation:rise var(--d) linear infinite;animation-delay:var(--delay)}
@keyframes rise{
  0%{transform:translateY(0) rotate(0deg) scale(0);opacity:0}
  10%{opacity:.6;transform:translateY(-20px) rotate(20deg) scale(1)}
  90%{opacity:.4}
  100%{transform:translateY(-420px) rotate(80deg) scale(.2);opacity:0}
}
.cat.sleepy .particle{animation:none;opacity:0}

/* ====== 💬 气泡 ====== */
.bubble{position:absolute;top:-50px;left:50%;transform:translateX(-50%);background:#fff;padding:8px 16px;border-radius:16px 16px 16px 4px;box-shadow:0 2px 12px rgba(0,0,0,.06);font-size:13px;color:#5a4a4a;white-space:nowrap;opacity:0;transition:all .3s;z-index:20;font-family:'Segoe UI','PingFang SC',sans-serif;pointer-events:none}
.bubble::after{content:'';position:absolute;bottom:-6px;left:24px;width:10px;height:10px;background:#fff;transform:rotate(45deg);border-radius:2px}
.bubble.show{opacity:1;top:-60px}
.bubble.big{font-size:20px;padding:10px 18px}

/* ====== 🎛️ 控制栏 ====== */
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 16px;border-radius:40px;box-shadow:0 2px 20px rgba(0,0,0,.06);border:1px solid rgba(255,255,255,.5)}
.controls button{width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,.6);cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center;color:#6b5a5a}
.controls button:hover{background:rgba(255,200,210,.5);transform:scale(1.1)}
.controls button:active{transform:scale(.92)}

/* ====== 📱 响应式 ====== */
@media(max-width:400px){
  .pet-wrap{transform:translate(-50%,-50%) scale(.8)}
  .controls{bottom:12px;padding:6px 12px;gap:6px}
  .controls button{width:30px;height:30px;font-size:14px}
}
</style>
</head>
<body>

<div class="bg" id="bg">
  <div class="stars" id="stars"></div>
</div>

<div class="pet-wrap" id="petWrap">
  <div class="cat" id="cat">
    <!-- 耳朵 -->
    <div class="ear ear-l"></div>
    <div class="ear ear-r"></div>

    <!-- 头部 -->
    <div class="head">
      <!-- 刘海 -->
      <div class="bangs">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <!-- 眼睛 -->
      <div class="eyes">
        <div class="eye" id="eyeL"><div class="eye-sparkle"></div></div>
        <div class="eye" id="eyeR"><div class="eye-sparkle"></div></div>
      </div>
      <!-- 腮红 -->
      <div class="blush blush-l"></div>
      <div class="blush blush-r"></div>
      <!-- 鼻子 -->
      <div class="nose"></div>
      <!-- 嘴巴 -->
      <div class="mouth"><div class="mouth-line"></div></div>
    </div>

    <!-- 蝴蝶结 -->
    <div class="bow">
      <div class="bow-l"></div>
      <div class="bow-r"></div>
      <div class="bow-center"></div>
    </div>

    <!-- 身体 -->
    <div class="body">
      <div class="arm arm-l"></div>
      <div class="arm arm-r"></div>
    </div>

    <!-- 尾巴 -->
    <div class="tail"></div>
  </div>

  <!-- 气泡 -->
  <div class="bubble" id="bubble"></div>
</div>

<!-- 粒子 -->
<div class="particles" id="particles"></div>

<!-- 控制栏 -->
<div class="controls" id="controls">
  <button id="moodBtn" title="换心情">🎭</button>
  <button id="feedBtn" title="喂食">🍪</button>
  <button id="nightBtn" title="昼夜">🌙</button>
  <button id="resetBtn" title="重置位置">📍</button>
</div>

<script>
// ====== 🐱 桌宠小团子 v1.0 ======

const cat = document.getElementById('cat')
const bubble = document.getElementById('bubble')
const petWrap = document.getElementById('petWrap')
const bg = document.getElementById('bg')
const stars = document.getElementById('stars')

let isNight = false
let moodIndex = 0
const moods = ['normal', 'happy', 'love', 'sleepy']
const moodLabels = ['😊 日常', '🥰 开心', '💕 爱心', '😴 困困']
const moodDurations = [0, 4000, 3000, 0]

// ---------- 星星 ----------
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div')
  s.className = 'star'
  s.style.left = Math.random() * 100 + '%'
  s.style.top = Math.random() * 100 + '%'
  s.style.setProperty('--d', (1.5 + Math.random() * 3) + 's')
  s.style.setProperty('--o', (0.3 + Math.random() * 0.7))
  s.style.animationDelay = Math.random() * 5 + 's'
  stars.appendChild(s)
}

// ---------- 装饰粒子 ----------
const emojis = ['🌸', '✨', '💕', '🦋', '🌟', '💫', '🌷']
const particlesEl = document.getElementById('particles')
for (let i = 0; i < 10; i++) {
  const p = document.createElement('div')
  p.className = 'particle'
  p.textContent = emojis[i % emojis.length]
  p.style.left = (5 + Math.random() * 90) + '%'
  p.style.setProperty('--d', (6 + Math.random() * 8) + 's')
  p.style.setProperty('--delay', (Math.random() * 10) + 's')
  p.style.fontSize = (12 + Math.random() * 10) + 'px'
  particlesEl.appendChild(p)
}

// ---------- 表情切换 ----------
function setMood(mood) {
  cat.className = 'cat'
  if (mood !== 'normal') cat.classList.add(mood)
  showBubble(moodLabels[moods.indexOf(mood)])
  if (mood === 'happy') {
    setTimeout(() => setMood('normal'), 3500)
  } else if (mood === 'love') {
    setTimeout(() => setMood('normal'), 3000)
  }
}

function nextMood() {
  moodIndex = (moodIndex + 1) % moods.length
  setMood(moods[moodIndex])
  // if sleepy, stay
  if (moods[moodIndex] === 'sleepy') {
    setTimeout(() => {
      if (cat.classList.contains('sleepy')) setMood('normal')
    }, 6000)
  }
}

// ---------- 气泡 ----------
let bubbleTimer = null
function showBubble(text) {
  bubble.textContent = text
  bubble.className = 'bubble show'
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('show')
  }, 2000)
}

function showBigBubble(text) {
  bubble.textContent = text
  bubble.className = 'bubble show big'
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('show')
  }, 2500)
}

// ---------- 点击互动 ----------
const reactions = [
  '😊 嘿嘿~', '🥺 摸摸我~', '✨ 今天心情不错', '🌸 好喜欢你呀',
  '💕 再摸一下嘛~', '🌟 小团子在此！', '🎀 人家可爱吧？', '🍪 想吃饼干~'
]
let lastClick = 0

petWrap.addEventListener('click', (e) => {
  if (e.target.closest('.controls')) return
  const now = Date.now()
  if (now - lastClick < 300) {
    // double click - love
    setMood('love')
    showBigBubble('💕 最喜欢你啦！')
    return
  }
  lastClick = now
  const r = reactions[Math.floor(Math.random() * reactions.length)]
  showBubble(r)

  // random happy reaction
  if (Math.random() < 0.3) {
    cat.classList.add('happy')
    setTimeout(() => cat.classList.remove('happy'), 2000)
  }
  // random wave
  if (Math.random() < 0.25) {
    cat.classList.add('wave')
    setTimeout(() => cat.classList.remove('wave'), 1500)
  }
})

// ---------- 拖拽 ----------
let isDragging = false
let startX, startY, origX, origY

petWrap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.controls')) return
  isDragging = true
  petWrap.classList.add('dragging')
  const rect = petWrap.getBoundingClientRect()
  startX = e.clientX
  startY = e.clientY
  origX = rect.left
  origY = rect.top
  petWrap.style.left = origX + 'px'
  petWrap.style.top = origY + 'px'
  petWrap.style.transform = 'none'
})

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return
  const dx = e.clientX - startX
  const dy = e.clientY - startY
  petWrap.style.left = (origX + dx) + 'px'
  petWrap.style.top = (origY + dy) + 'px'
})

document.addEventListener('mouseup', () => {
  if (!isDragging) return
  isDragging = false
  petWrap.classList.remove('dragging')
})

// Touch drag
petWrap.addEventListener('touchstart', (e) => {
  if (e.target.closest('.controls')) return
  const t = e.touches[0]
  isDragging = true
  petWrap.classList.add('dragging')
  const rect = petWrap.getBoundingClientRect()
  startX = t.clientX
  startY = t.clientY
  origX = rect.left
  origY = rect.top
  petWrap.style.left = origX + 'px'
  petWrap.style.top = origY + 'px'
  petWrap.style.transform = 'none'
}, { passive: true })

document.addEventListener('touchmove', (e) => {
  if (!isDragging) return
  const t = e.touches[0]
  const dx = t.clientX - startX
  const dy = t.clientY - startY
  petWrap.style.left = (origX + dx) + 'px'
  petWrap.style.top = (origY + dy) + 'px'
}, { passive: true })

document.addEventListener('touchend', () => {
  if (!isDragging) return
  isDragging = false
  petWrap.classList.remove('dragging')
})

// ---------- 随机眨眼 ----------
function randomBlink() {
  const eyes = document.querySelectorAll('.eye')
  eyes.forEach(e => { e.style.height = '4px'; e.style.marginTop = '22px'; e.style.borderRadius = '2px' })
  setTimeout(() => {
    eyes.forEach(e => { e.style.height = ''; e.style.marginTop = ''; e.style.borderRadius = '' })
  }, 120)
  setTimeout(randomBlink, 2000 + Math.random() * 4000)
}
setTimeout(randomBlink, 2000)

// ---------- 控制按钮 ----------
document.getElementById('moodBtn').addEventListener('click', nextMood)

document.getElementById('feedBtn').addEventListener('click', () => {
  const foods = ['🍪 好吃！', '🧁 好甜~', '🍩 还要！', '🍫 幸福~', '🍭 嘻嘻~']
  showBigBubble(foods[Math.floor(Math.random() * foods.length)])
  cat.classList.add('happy')
  setTimeout(() => cat.classList.remove('happy'), 2500)
})

document.getElementById('nightBtn').addEventListener('click', () => {
  isNight = !isNight
  bg.classList.toggle('night')
  document.getElementById('nightBtn').textContent = isNight ? '☀️' : '🌙'
  showBubble(isNight ? '🌙 晚安~' : '☀️ 早安！')
  if (isNight) {
    cat.classList.add('sleepy')
  } else {
    cat.classList.remove('sleepy')
  }
})

document.getElementById('resetBtn').addEventListener('click', () => {
  petWrap.style.left = ''
  petWrap.style.top = ''
  petWrap.style.transform = ''
  showBubble('📍 回到原位啦')
})

// ---------- 自动闲逛 ----------
function autoIdle() {
  const acts = [
    () => { cat.classList.add('wave'); setTimeout(() => cat.classList.remove('wave'), 1500) },
    () => { cat.classList.add('happy'); showBubble('😊 嘻嘻~'); setTimeout(() => cat.classList.remove('happy'), 2000) },
    () => { showBubble('💭 想出去玩~') },
    () => { showBubble('🌸 今天天气真好') },
  ]
  if (!isDragging && !cat.classList.contains('sleepy') && !cat.classList.contains('love')) {
    const act = acts[Math.floor(Math.random() * acts.length)]
    act()
  }
  setTimeout(autoIdle, 8000 + Math.random() * 12000)
}
setTimeout(autoIdle, 5000)

// ---------- 开场 ----------
setTimeout(() => showBubble('🐱 你好呀~ 我是小团子！'), 500)
</script>
</body>
</html>
