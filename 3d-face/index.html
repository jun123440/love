<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D 人脸建模</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0a14;
  color: #fff;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .5s, visibility .5s;
}
.screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* Welcome */
#welcome-screen { background: radial-gradient(ellipse at 50% 30%, #1a1a3e 0%, #0a0a14 70%); }
.welcome-bg { position: absolute; inset: 0; overflow: hidden; }
.welcome-bg .orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  animation: float 8s ease-in-out infinite;
}
.welcome-bg .orb:nth-child(1) {
  width: 400px; height: 400px; background: rgba(120,80,200,.25);
  top: -10%; left: -10%; animation-delay: 0s;
}
.welcome-bg .orb:nth-child(2) {
  width: 300px; height: 300px; background: rgba(200,140,80,.2);
  bottom: 10%; right: -5%; animation-delay: -3s;
}
.welcome-bg .orb:nth-child(3) {
  width: 250px; height: 250px; background: rgba(80,140,200,.18);
  top: 50%; left: 60%; animation-delay: -6s;
}
@keyframes float {
  0%, 100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-30px) scale(1.1); }
  66% { transform: translate(-20px,20px) scale(.9); }
}
.welcome-content { position: relative; z-index: 1; text-align: center; padding: 2rem; }
.welcome-content .icon {
  width: 80px; height: 80px; margin: 0 auto 1.5rem;
  background: linear-gradient(135deg, #667eea, #f0c27a);
  border-radius: 24px; display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; box-shadow: 0 20px 60px rgba(100,120,220,.35);
}
.welcome-content h1 {
  font-size: 2.2rem; font-weight: 700; margin-bottom: .5rem;
  background: linear-gradient(135deg, #c9a0ff, #f0c27a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.welcome-content p { color: #8892b0; font-size: 1rem; line-height: 1.6; margin-bottom: 2.5rem; max-width: 320px; }
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: 14px 36px; border: none; border-radius: 50px;
  font-size: 1.05rem; font-weight: 600; cursor: pointer;
  transition: all .3s; outline: none; font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
  box-shadow: 0 8px 30px rgba(100,80,200,.4);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(100,80,200,.55); }
.btn-primary:active { transform: scale(.97); }
.btn-outline {
  background: rgba(255,255,255,.08); color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.btn-outline:hover { background: rgba(255,255,255,.15); }

/* Camera */
#camera-screen { background: #000; }
.camera-container {
  position: relative; width: 100%; max-width: 500px;
  aspect-ratio: 3/4; max-height: 70vh; border-radius: 20px;
  overflow: hidden; box-shadow: 0 0 0 2px rgba(255,255,255,.1), 0 30px 80px rgba(0,0,0,.5);
}
.camera-container video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.face-guide {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 65%; height: 55%;
  border: 2px dashed rgba(255,255,255,.25);
  border-radius: 50% / 40%;
  pointer-events: none;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { border-color: rgba(255,255,255,.2); }
  50% { border-color: rgba(255,255,255,.5); }
}
.camera-controls {
  position: absolute; bottom: 30px; left: 0; right: 0;
  display: flex; justify-content: center; z-index: 10;
}
.capture-btn {
  width: 70px; height: 70px; border-radius: 50%;
  border: 4px solid #fff; background: rgba(255,255,255,.2);
  cursor: pointer; transition: all .2s; position: relative;
}
.capture-btn::after {
  content: ''; position: absolute; inset: 8px;
  border-radius: 50%; background: #fff; transition: all .2s;
}
.capture-btn:active { transform: scale(.9); }
.capture-btn:active::after { transform: scale(.85); }
.camera-back { position: absolute; top: 20px; left: 20px; z-index: 10; }

/* Loading */
#loading-screen { background: #0a0a14; gap: 1.5rem; }
.loader {
  width: 50px; height: 50px;
  border: 3px solid rgba(255,255,255,.1);
  border-top-color: #667eea; border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { color: #8892b0; font-size: .95rem; transition: all .3s; }

/* Result */
#result-screen { background: #0a0a14; }
#three-canvas { position: fixed; inset: 0; }
.result-controls {
  position: fixed; bottom: 40px; left: 0; right: 0;
  display: flex; justify-content: center; gap: .8rem;
  z-index: 10; padding: 0 1rem; flex-wrap: wrap;
}
.result-top {
  position: fixed; top: 20px; left: 0; right: 0;
  display: flex; justify-content: center; z-index: 10;
}
.result-title {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 50px;
  padding: 8px 20px; font-size: .9rem; color: rgba(255,255,255,.7);
}
.error-toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(220,60,60,.9); color: #fff;
  padding: 12px 24px; border-radius: 50px; z-index: 100;
  font-size: .9rem;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  animation: slideDown .4s ease-out; white-space: nowrap;
}
@keyframes slideDown {
  from { transform: translateX(-50%) translateY(-80px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}
</style>
</head>
<body>

<div id="welcome-screen" class="screen">
  <div class="welcome-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
  <div class="welcome-content">
    <div class="icon">&#127775;</div>
    <h1>3D 人脸重建</h1>
    <p>调用摄像头拍摄面部，<br>实时生成真实 3D 人脸网格模型</p>
    <button class="btn btn-primary" id="start-btn">&#128247; 开始建模</button>
  </div>
</div>

<div id="camera-screen" class="screen hidden">
  <button class="btn btn-outline camera-back" id="camera-back-btn" style="font-size:.85rem;padding:8px 18px;">&#8592; 返回</button>
  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="face-guide"></div>
  </div>
  <div class="camera-controls">
    <button class="capture-btn" id="capture-btn"></button>
  </div>
</div>

<div id="loading-screen" class="screen hidden">
  <div class="loader"></div>
  <p class="loading-msg" id="loading-msg">正在初始化人脸检测引擎...</p>
</div>

<div id="result-screen" class="screen hidden">
  <canvas id="three-canvas"></canvas>
  <div class="result-top">
    <span class="result-title">&#x1F440; 拖拽旋转 &bull; 滚轮缩放</span>
  </div>
  <div class="result-controls">
    <button class="btn btn-outline" id="retake-btn" style="font-size:.85rem;padding:10px 22px;">&#128247; 重新拍摄</button>
  </div>
</div>

<canvas id="photo-canvas" style="display:none"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import Delaunator from 'https://cdn.jsdelivr.net/npm/delaunator@5.0.1/+esm';

let currentScreen = 'welcome';
let videoStream = null;
let animationId = null;
let sceneData = null;
let faceMesh = null;
let faceMeshReady = false;

const $ = (s) => document.querySelector(s);
const screens = {
  welcome: $('#welcome-screen'),
  camera: $('#camera-screen'),
  loading: $('#loading-screen'),
  result: $('#result-screen'),
};

function showScreen(name) {
  Object.entries(screens).forEach(([k, el]) => el.classList.toggle('hidden', k !== name));
  currentScreen = name;
}

function showError(msg) {
  const t = document.createElement('div');
  t.className = 'error-toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function setLoadingMsg(msg) {
  $('#loading-msg').textContent = msg;
}

async function initFaceMesh() {
  if (faceMeshReady) return;
  setLoadingMsg('正在加载人脸检测模型...');
  try {
    await new Promise((resolve, reject) => {
      faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`
      });
      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });
      faceMesh.initialize();
      const check = () => {
        if (faceMesh && typeof faceMesh.send === 'function') {
          faceMeshReady = true;
          resolve();
        } else {
          setTimeout(check, 100);
        }
      };
      setTimeout(check, 500);
      setTimeout(() => resolve(), 8000);
    });
    faceMeshReady = true;
  } catch (e) {
    throw new Error('人脸检测引擎加载失败: ' + e.message);
  }
}

function detectFace(imageElement) {
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('检测超时')), 20000);
    faceMesh.onResults((results) => {
      clearTimeout(timeout);
      resolve(results);
    });
    faceMesh.send({ image: imageElement }).catch(reject);
  });
}

$('#start-btn').addEventListener('click', async () => {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false,
    });
    const video = $('#video');
    video.srcObject = videoStream;
    await video.play();
    showScreen('camera');
  } catch (e) {
    if (e.name === 'NotAllowedError') showError('摄像头权限被拒绝，请在浏览器设置中允许摄像头访问');
    else if (e.name === 'NotFoundError') showError('未检测到摄像头设备');
    else showError('无法访问摄像头: ' + e.message);
  }
});

$('#camera-back-btn').addEventListener('click', () => {
  stopCamera();
  showScreen('welcome');
});

function stopCamera() {
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
}

$('#capture-btn').addEventListener('click', async () => {
  const video = $('#video');
  const canvas = $('#photo-canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  stopCamera();
  showScreen('loading');
  setLoadingMsg('正在检测人脸...');

  try {
    await initFaceMesh();

    const img = new Image();
    img.src = canvas.toDataURL('image/jpeg', 0.95);
    await img.decode();

    setLoadingMsg('正在分析面部特征点...');
    const results = await detectFace(img);

    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
      showError('未检测到人脸，请确保面部在画面中央');
      setTimeout(() => showScreen('welcome'), 1500);
      return;
    }

    setLoadingMsg('正在生成 3D 网格...');
    await new Promise(r => setTimeout(r, 200));
    initResultScreen(canvas, results.multiFaceLandmarks[0]);
  } catch (e) {
    showError('处理失败: ' + e.message);
    setTimeout(() => showScreen('welcome'), 1500);
  }
});

$('#retake-btn').addEventListener('click', () => {
  if (animationId) cancelAnimationFrame(animationId);
  if (sceneData) { sceneData.renderer.dispose(); sceneData = null; }
  showScreen('welcome');
});

function buildFaceMesh(landmarks, photoCanvas) {
  const vertexCount = landmarks.length;
  const positions = new Float32Array(vertexCount * 3);
  const uvs = new Float32Array(vertexCount * 2);

  let minX = Infinity, maxX = -Infinity;
  let minY = Infinity, maxY = -Infinity;
  let minZ = Infinity, maxZ = -Infinity;

  for (let i = 0; i < vertexCount; i++) {
    const l = landmarks[i];
    if (l.x < minX) minX = l.x;
    if (l.x > maxX) maxX = l.x;
    if (l.y < minY) minY = l.y;
    if (l.y > maxY) maxY = l.y;
    if (l.z < minZ) minZ = l.z;
    if (l.z > maxZ) maxZ = l.z;
  }

  const rangeX = maxX - minX;
  const rangeY = maxY - minY;
  const rangeZ = Math.max(maxZ - minZ, 10);
  const scale = 1.2 / rangeX;

  for (let i = 0; i < vertexCount; i++) {
    const l = landmarks[i];
    const cx = (l.x - (minX + maxX) / 2) * scale;
    const cy = -((l.y - (minY + maxY) / 2)) * scale;
    const cz = (l.z - (minZ + maxZ) / 2) * 0.008;
    positions[i * 3] = cx;
    positions[i * 3 + 1] = cy;
    positions[i * 3 + 2] = cz;
    uvs[i * 2] = l.x;
    uvs[i * 2 + 1] = 1.0 - l.y;
  }

  const pts = landmarks.map(l => [l.x, l.y]);
  const delaunay = new Delaunator(pts);
  const indices = delaunay.triangles;
  const indexCount = indices.length;

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geom.setIndex(new THREE.BufferAttribute(indices, 1));
  geom.computeVertexNormals();

  const tw = 1024, th = 1024;
  const texCanvas = document.createElement('canvas');
  texCanvas.width = tw;
  texCanvas.height = th;
  const tctx = texCanvas.getContext('2d');
  tctx.drawImage(photoCanvas, 0, 0, tw, th);

  const texture = new THREE.CanvasTexture(texCanvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;

  const mat = new THREE.MeshStandardMaterial({
    map: texture,
    roughness: 0.5,
    metalness: 0.05,
    side: THREE.DoubleSide,
    shadowSide: THREE.FrontSide,
    flatShading: true,
  });

  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x667eea,
    wireframe: true,
    transparent: true,
    opacity: 0.08,
  });
  const wireMesh = new THREE.Mesh(geom.clone(), wireMat);

  const group = new THREE.Group();
  group.add(mesh);
  group.add(wireMesh);

  return group;
}

function initResultScreen(photoCanvas, landmarks) {
  showScreen('result');

  const canvas = $('#three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#0a0a14');
  scene.fog = new THREE.Fog('#0a0a14', 2, 6);

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 20);
  camera.position.set(0, -0.1, 2.8);
  camera.lookAt(0, -0.05, 0);

  const ambient = new THREE.AmbientLight('#ccddee', 1.2);
  scene.add(ambient);

  const key = new THREE.DirectionalLight('#ffffff', 2.8);
  key.position.set(1.2, 0.8, 2.0);
  key.castShadow = true;
  scene.add(key);

  const fill = new THREE.DirectionalLight('#eeccaa', 0.8);
  fill.position.set(-0.8, 0.3, 1.5);
  scene.add(fill);

  const rim = new THREE.DirectionalLight('#aabbff', 1.5);
  rim.position.set(0, 1.2, -2.0);
  scene.add(rim);

  const count = 300;
  const pGeom = new THREE.BufferGeometry();
  const pPos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pPos[i * 3] = (Math.random() - 0.5) * 4;
    pPos[i * 3 + 1] = (Math.random() - 0.5) * 4;
    pPos[i * 3 + 2] = (Math.random() - 0.5) * 4;
  }
  pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pMat = new THREE.PointsMaterial({
    color: 0x667eea, size: 0.012, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const particles = new THREE.Points(pGeom, pMat);
  scene.add(particles);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, -0.05, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 1.2;
  controls.maxDistance = 4.0;
  controls.maxPolarAngle = Math.PI * 0.75;
  controls.minPolarAngle = Math.PI * 0.1;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.8;
  controls.update();

  const headGroup = buildFaceMesh(landmarks, photoCanvas);
  scene.add(headGroup);

  sceneData = { scene, camera, renderer, controls, headGroup, particles };

  function animate(time) {
    animationId = requestAnimationFrame(animate);
    particles.rotation.y += 0.0004;
    const t = time * 0.001;
    headGroup.position.y = Math.sin(t * 0.7) * 0.03;
    controls.update();
    renderer.render(scene, camera);
  }

  animationId = requestAnimationFrame(animate);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let autoRotateTimeout;
  controls.addEventListener('start', () => {
    controls.autoRotate = false;
    clearTimeout(autoRotateTimeout);
  });
  controls.addEventListener('end', () => {
    autoRotateTimeout = setTimeout(() => { controls.autoRotate = true; }, 3000);
  });
}
</script>
</body>
</html>
