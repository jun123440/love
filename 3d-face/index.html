<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>3D Face</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#06060b;color:#fff;overflow:hidden;height:100vh
}
#container{position:fixed;inset:0;z-index:1}
#container video{display:none}
.overlay{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s,visibility .4s;pointer-events:none
}
.overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.overlay.active{pointer-events:auto}

/* Welcome */
#welcome{background:#06060b}
.welcome-content{text-align:center;padding:2rem}
.welcome-content h1{
  font-size:2.4rem;font-weight:700;margin-bottom:.6rem;
  background:linear-gradient(135deg,#e0d0ff,#a080ff,#6d5ae0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.02em
}
.welcome-content p{color:rgba(255,255,255,.4);font-size:.95rem;line-height:1.6;margin-bottom:2.5rem;max-width:280px}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;padding:12px 32px;border:none;border-radius:40px;
  font-size:.95rem;font-weight:500;cursor:pointer;transition:all .25s;outline:none;font-family:inherit;
  pointer-events:auto
}
.btn-primary{background:#6d5ae0;color:#fff;box-shadow:0 4px 20px rgba(109,90,224,.35)}
.btn-primary:hover{background:#7d6aee;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
}
.btn-ghost:hover{background:rgba(255,255,255,.1)}

/* Camera UI */
#camera-ui{background:0 0}
.face-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:65%;height:55%;border:1.5px solid rgba(255,255,255,.12);border-radius:50%/40%;
  pointer-events:none;transition:opacity .8s
}
.face-hint.detected{border-color:rgba(109,90,224,.4);opacity:.5}
.capture-btn{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  width:64px;height:64px;border-radius:50%;
  border:3px solid rgba(255,255,255,.4);background:0 0;
  cursor:pointer;pointer-events:auto;z-index:3;transition:all .2s
}
.capture-btn::after{
  content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;transition:all .2s
}
.capture-btn:active{transform:translateX(-50%) scale(.88)}
.capture-btn.loading::after{background:rgba(255,255,255,.3)}

/* Loading */
#loading{background:#06060b;gap:1rem}
.loading-dots{display:flex;gap:6px}
.loading-dots span{
  width:8px;height:8px;border-radius:50%;background:#6d5ae0;
  animation:lds 1s ease-in-out infinite
}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes lds{
  0%,80%,100%{transform:scale(.6);opacity:.3}
  40%{transform:scale(1);opacity:1}
}
.loading-msg{color:rgba(255,255,255,.35);font-size:.85rem;text-align:center;line-height:1.6}

/* Result */
#result-ui .result-bar{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.06);border-radius:40px;padding:6px 16px;
  font-size:.75rem;color:rgba(255,255,255,.3);white-space:nowrap
}
#result-ui .result-bottom{
  position:absolute;bottom:32px;left:0;right:0;display:flex;justify-content:center;gap:.6rem
}
#result-ui canvas{position:fixed;inset:0;z-index:1}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(220,60,60,.85);color:#fff;padding:10px 22px;border-radius:40px;
  font-size:.85rem;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:toastIn .35s ease-out
}
@keyframes toastIn{
  from{transform:translateX(-50%) translateY(-60px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
</style>
</head>
<body>
<div id="container"></div>

<div id="welcome" class="overlay active">
  <div class="welcome-content">
    <h1>3D Face</h1>
    <p>鎷嶆憚涓€寮犳闈㈢収锛?br>鐢熸垚鍙氦浜掔殑 3D 浜鸿劯</p>
    <button class="btn btn-primary" id="start-btn">寮€濮?/button>
  </div>
</div>

<div id="camera-ui" class="overlay hidden">
  <div class="face-hint" id="face-hint"></div>
  <button class="capture-btn" id="capture-btn" title="鎷嶇収"></button>
</div>

<div id="loading" class="overlay hidden">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p class="loading-msg" id="loading-msg">姝ｅ湪鍔犺浇 AI 妯″瀷</p>
</div>

<div id="result-ui" class="overlay hidden">
  <div class="result-bar">鎷栨嫿鏃嬭浆 路 婊氳疆缂╂斁</div>
  <div class="result-bottom">
    <button class="btn btn-ghost" id="retake-btn" style="padding:8px 20px;font-size:.8rem">閲嶆柊鎷嶆憚</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-face-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js"
  }
}
</script>

<script type="module">
import { MindARThree } from 'mindar-face-three';
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let mindar = null, faceMesh = null, aframe = null;
let scene3d = null, renderer3d = null, camera3d = null, controls3d = null;
let animId = null;

const $ = s => document.querySelector(s);

function show(id) {
  ['welcome','camera-ui','loading','result-ui'].forEach(n =>
    $(`#${n}`).classList.toggle('active', n === id));
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

$('#start-btn').addEventListener('click', async () => {
  show('loading');
  setMsg('姝ｅ湪鍚姩鎽勫儚澶?);
  try {
    await startMindAR();
    show('camera-ui');
  } catch (e) {
    console.error(e);
    toast('鍚姩澶辫触: ' + e.message);
    show('welcome');
  }
});

$('#capture-btn').addEventListener('click', async () => {
  $('#capture-btn').classList.add('loading');
  setMsg('姝ｅ湪鐢熸垚 3D 妯″瀷');
  show('loading');
  await new Promise(r => setTimeout(r, 200));
  doCapture();
});

$('#retake-btn').addEventListener('click', () => {
  cleanup();
  show('welcome');
});

function setMsg(msg) {
  $('#loading-msg').textContent = msg;
}

async function startMindAR() {
  const container = $('#container');

  mindar = new MindARThree({
    container,
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
    disableFaceMirror: false,
  });

  faceMesh = mindar.addFaceMesh();
  mindar.scene.add(faceMesh);

  await mindar.start();

  const tex = new THREE.VideoTexture(mindar.video);
  tex.colorSpace = THREE.SRGBColorSpace;
  faceMesh.material.map = tex;
  faceMesh.material.needsUpdate = true;
  faceMesh.visible = true;

  let lastFaceTime = 0;
  const origOnUpdate = mindar.controller.onUpdate;
  mindar.controller.onUpdate = (data) => {
    if (origOnUpdate) origOnUpdate(data);
    if (data.hasFace) {
      lastFaceTime = Date.now();
      $('#face-hint').classList.add('detected');
    } else {
      if (Date.now() - lastFaceTime > 3000) {
        $('#face-hint').classList.remove('detected');
      }
    }
  };

  const { renderer, scene, camera } = mindar;
  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}

function doCapture() {
  if (!mindar || !faceMesh) {
    toast('璇峰厛鍚姩鎽勫儚澶?);
    return;
  }

  try {
    const video = mindar.video;
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = video.videoWidth;
    srcCanvas.height = video.videoHeight;
    const sctx = srcCanvas.getContext('2d');
    if (mindar.shouldFaceUser) {
      sctx.save();
      sctx.scale(-1, 1);
      sctx.drawImage(video, -srcCanvas.width, 0, srcCanvas.width, srcCanvas.height);
      sctx.restore();
    } else {
      sctx.drawImage(video, 0, 0);
    }

    const tex = new THREE.CanvasTexture(srcCanvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;

    const geoClone = faceMesh.geometry.clone();
    geoClone.applyMatrix4(faceMesh.matrixWorld);

    const box = new THREE.Box3().setFromBufferAttribute(geoClone.attributes.position);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);

    const pos = geoClone.attributes.position;
    const invScale = 1 / maxDim;
    for (let i = 0; i < pos.count; i++) {
      pos.setXYZ(i,
        (pos.getX(i) - center.x) * invScale,
        (pos.getY(i) - center.y) * invScale,
        (pos.getZ(i) - center.z) * invScale
      );
    }
    pos.needsUpdate = true;
    geoClone.computeVertexNormals();

    if (mindar) {
      mindar.stop();
      mindar = null;
    }

    const mat = new THREE.MeshStandardMaterial({
      map: tex,
      roughness: 0.45,
      metalness: 0.02,
      side: THREE.DoubleSide,
    });
    const staticMesh = new THREE.Mesh(geoClone, mat);

    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x6d5ae0,
      wireframe: true,
      transparent: true,
      opacity: 0.06,
    });
    const wireMesh = new THREE.Mesh(geoClone.clone(), wireMat);

    const group = new THREE.Group();
    group.add(staticMesh);
    group.add(wireMesh);

    scene3d = new THREE.Scene();
    scene3d.background = new THREE.Color('#06060b');

    const amb = new THREE.AmbientLight('#ddeeff', 1.8);
    scene3d.add(amb);
    const key = new THREE.DirectionalLight('#ffffff', 2.2);
    key.position.set(1.2, 0.8, 1.5);
    scene3d.add(key);
    const fill = new THREE.DirectionalLight('#ddeeff', 0.6);
    fill.position.set(-0.8, 0.2, 1);
    scene3d.add(fill);
    const rim = new THREE.DirectionalLight('#8888ff', 1.0);
    rim.position.set(0, 1.5, -2);
    scene3d.add(rim);

    scene3d.add(group);

    renderer3d = new THREE.WebGLRenderer({
      canvas: $('#result-ui canvas'),
      antialias: true,
      alpha: true,
    });
    renderer3d.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer3d.setSize(window.innerWidth, window.innerHeight);
    renderer3d.toneMapping = THREE.ACESFilmicToneMapping;
    renderer3d.toneMappingExposure = 0.8;

    camera3d = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 20);
    camera3d.position.set(0, 0.05, 1.6);
    camera3d.lookAt(0, -0.02, 0);

    controls3d = new OrbitControls(camera3d, renderer3d.domElement);
    controls3d.target.set(0, -0.02, 0);
    controls3d.enableDamping = true;
    controls3d.dampingFactor = 0.08;
    controls3d.minDistance = 0.6;
    controls3d.maxDistance = 3.0;
    controls3d.maxPolarAngle = Math.PI * 0.7;
    controls3d.minPolarAngle = Math.PI * 0.1;
    controls3d.autoRotate = true;
    controls3d.autoRotateSpeed = 0.5;
    controls3d.update();

    show('result-ui');

    function animate(t) {
      animId = requestAnimationFrame(animate);
      group.position.y = Math.sin(t * 0.001 * 0.5) * 0.025;
      controls3d.update();
      renderer3d.render(scene3d, camera3d);
    }
    animId = requestAnimationFrame(animate);

    let art;
    controls3d.addEventListener('start', () => {
      controls3d.autoRotate = false;
      clearTimeout(art);
    });
    controls3d.addEventListener('end', () => {
      art = setTimeout(() => { controls3d.autoRotate = true; }, 3000);
    });

  } catch (e) {
    console.error(e);
    toast('鐢熸垚澶辫触: ' + e.message);
    show('welcome');
  }
}

function cleanup() {
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  if (mindar) {
    try { mindar.stop(); } catch(e) {}
    mindar = null;
  }
  if (renderer3d) {
    renderer3d.dispose();
    renderer3d = null;
  }
  controls3d = null;
  scene3d = null;
  faceMesh = null;
  document.querySelectorAll('#result-ui canvas').forEach(c => c.remove());
  const newCanvas = document.createElement('canvas');
  document.getElementById('result-ui').appendChild(newCanvas);
  $('#capture-btn').classList.remove('loading');
}

window.addEventListener('resize', () => {
  if (camera3d && renderer3d) {
    camera3d.aspect = window.innerWidth / window.innerHeight;
    camera3d.updateProjectionMatrix();
    renderer3d.setSize(window.innerWidth, window.innerHeight);
  }
});
</script>
</body>
</html>
