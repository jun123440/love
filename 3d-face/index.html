<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Face Filter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f5fa;overflow:hidden;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
#jeeFaceFilterCanvas{position:fixed;top:0;left:0;z-index:1}
#threeCanvas{position:fixed;top:0;left:0;z-index:2;pointer-events:none}
.btn{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:3;
  padding:12px 28px;border:none;border-radius:40px;
  background:linear-gradient(135deg,#4a9eff,#2b7be4);color:#fff;
  font-size:.9rem;font-weight:500;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 20px rgba(43,123,228,.3);
  transition:all .25s;outline:none
}
.btn:hover{transform:translateX(-50%) translateY(-1px);box-shadow:0 6px 24px rgba(43,123,228,.4)}
.btn:active{transform:translateX(-50%) scale(.97)}
.btn-restart{display:none;background:rgba(255,255,255,.7);color:#4a6a8a;box-shadow:none;border:1px solid rgba(0,0,0,.06)}
.btn-restart:hover{background:rgba(255,255,255,.9);box-shadow:none}
</style>
</head>
<body>
<canvas id="jeeFaceFilterCanvas"></canvas>
<canvas id="threeCanvas"></canvas>
<button class="btn" id="startBtn">开始</button>
<button class="btn btn-restart" id="restartBtn" style="display:none">重新开始</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r112/three.min.js"></script>
<script src="https://appstatic.jeeliz.com/faceFilter/jeelizFaceFilter.js"></script>
<script src="https://appstatic.jeeliz.com/faceFilter/JeelizThreeHelper.js"></script>
<script src="https://appstatic.jeeliz.com/faceFilter/JeelizResizer.js"></script>

<script>
let THREECAMERA = null, threeStuffs = null;
let isDetected = false;
let startBtn = document.getElementById('startBtn');
let restartBtn = document.getElementById('restartBtn');

startBtn.addEventListener('click', function(){
  startBtn.style.display = 'none';
  restartBtn.style.display = 'block';
  main();
});

restartBtn.addEventListener('click', function(){
  window.location.reload();
});

function detect_callback(faceIndex, detected){
  isDetected = detected;
}

function init_threeScene(spec) {
  spec.threeCanvasId = 'threeCanvas';
  threeStuffs = JeelizThreeHelper.init(spec, detect_callback);

  var group = threeStuffs.faceObject;

  // --- 眼镜框 (左右) ---
  var frameMat = new THREE.MeshStandardMaterial({
    color: 0x4a9eff,
    roughness: 0.3,
    metalness: 0.1,
    emissive: 0x4a9eff,
    emissiveIntensity: 0.08
  });

  var lensMat = new THREE.MeshPhongMaterial({
    color: 0x88bbff,
    transparent: true,
    opacity: 0.25,
    emissive: 0x4488ff,
    emissiveIntensity: 0.05
  });

  var rimMat = new THREE.MeshStandardMaterial({
    color: 0x2b7be4,
    roughness: 0.2,
    metalness: 0.3
  });

  // 左框
  var leftGeo = new THREE.TorusGeometry(0.28, 0.045, 12, 24);
  var leftFrame = new THREE.Mesh(leftGeo, frameMat);
  leftFrame.position.set(-0.32, 0, 0);
  leftFrame.rotation.x = Math.PI / 2;
  leftFrame.rotation.z = 0.1;
  group.add(leftFrame);

  // 左镜片
  var lensGeo = new THREE.CircleGeometry(0.24, 20);
  var leftLens = new THREE.Mesh(lensGeo, lensMat);
  leftLens.position.set(-0.32, 0, 0.015);
  leftLens.rotation.x = -Math.PI / 2;
  group.add(leftLens);

  // 右框
  var rightFrame = new THREE.Mesh(leftGeo, frameMat);
  rightFrame.position.set(0.32, 0, 0);
  rightFrame.rotation.x = Math.PI / 2;
  rightFrame.rotation.z = -0.1;
  group.add(rightFrame);

  // 右镜片
  var rightLens = new THREE.Mesh(lensGeo, lensMat);
  rightLens.position.set(0.32, 0, 0.015);
  rightLens.rotation.x = -Math.PI / 2;
  group.add(rightLens);

  // 鼻梁
  var bridgeGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.12, 8);
  var bridge = new THREE.Mesh(bridgeGeo, rimMat);
  bridge.position.set(0, 0, 0);
  bridge.rotation.x = Math.PI / 2;
  group.add(bridge);

  // 镜腿 (左)
  var armGeo = new THREE.BoxGeometry(0.02, 0.25, 0.02);
  var leftArm = new THREE.Mesh(armGeo, rimMat);
  leftArm.position.set(-0.34, -0.24, 0.04);
  leftArm.rotation.x = -0.3;
  leftArm.rotation.z = 0.1;
  group.add(leftArm);

  // 镜腿 (右)
  var rightArm = new THREE.Mesh(armGeo, rimMat);
  rightArm.position.set(0.34, -0.24, 0.04);
  rightArm.rotation.x = -0.3;
  rightArm.rotation.z = -0.1;
  group.add(rightArm);

  // 环境光
  var amb = new THREE.AmbientLight(0xffffff, 0.7);
  threeStuffs.scene.add(amb);

  // 方向光
  var dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(1, 1, 1);
  threeStuffs.scene.add(dir);

  var dir2 = new THREE.DirectionalLight(0x4488ff, 0.4);
  dir2.position.set(-0.5, 0, 1);
  threeStuffs.scene.add(dir2);

  // 缩放
  group.scale.set(1, 1, 1);

  THREECAMERA = JeelizThreeHelper.create_camera();
}

function main(){
  JeelizResizer.size_canvas({
    canvasId: 'jeeFaceFilterCanvas',
    callback: function(isError, bestVideoSettings){
      if (isError) { alert('摄像头访问失败，请授权后重试'); return; }
      init_faceFilter(bestVideoSettings);
    }
  });
}

function init_faceFilter(videoSettings){
  JEELIZFACEFILTER.init({
    canvasId: 'jeeFaceFilterCanvas',
    NNCPath: 'https://appstatic.jeeliz.com/faceFilter/',
    maxFacesDetected: 1,
    callbackReady: function(errCode, spec){
      if (errCode) {
        console.log('ERROR:', errCode);
        alert('初始化失败，请刷新重试');
        return;
      }
      init_threeScene(spec);
    },
    callbackTrack: function(detectState){
      JeelizThreeHelper.render(detectState, THREECAMERA);
    }
  });
}
</script>
</body>
</html>
