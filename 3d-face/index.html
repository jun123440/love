<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>3D Face</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#06060b;color:#fff;width:100vw;height:100vh;overflow:hidden;
  -webkit-tap-highlight-color:transparent;user-select:none
}
.screen{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s,visibility .4s
}
.screen.hidden{opacity:0;visibility:hidden;pointer-events:none}

/* Welcome */
#welcome-screen{background:#06060b}
.welcome-content{position:relative;z-index:1;text-align:center;padding:2rem}
.welcome-content h1{
  font-size:2.4rem;font-weight:700;margin-bottom:.6rem;
  background:linear-gradient(135deg,#e0d0ff 0%,#a080ff 50%,#6d5ae0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.02em
}
.welcome-content p{color:rgba(255,255,255,.45);font-size:.95rem;line-height:1.6;margin-bottom:2.5rem;max-width:300px}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;padding:12px 32px;border:none;border-radius:40px;
  font-size:.95rem;font-weight:500;cursor:pointer;transition:all .25s;outline:none;font-family:inherit
}
.btn-primary{
  background:#6d5ae0;color:#fff;box-shadow:0 4px 20px rgba(109,90,224,.35)
}
.btn-primary:hover{background:#7d6aee;transform:translateY(-1px);box-shadow:0 6px 28px rgba(109,90,224,.45)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
}
.btn-ghost:hover{background:rgba(255,255,255,.1)}

/* Camera */
#camera-screen{background:#000}
.camera-wrap{
  position:relative;width:100%;max-width:480px;aspect-ratio:3/4;max-height:75vh;
  border-radius:16px;overflow:hidden;background:#111
}
.camera-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.face-frame{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:65%;height:55%;border:1.5px solid rgba(255,255,255,.15);border-radius:50%/40%;
  pointer-events:none;transition:border-color .6s
}
.capture-btn{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.5);
  background:transparent;cursor:pointer;z-index:10;transition:all .2s
}
.capture-btn::after{
  content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;transition:all .2s
}
.capture-btn:active{transform:translateX(-50%) scale(.88)}
.capture-btn:active::after{background:rgba(255,255,255,.6)}
.camera-back{
  position:absolute;top:16px;left:16px;z-index:10;padding:8px 16px;font-size:.8rem;color:rgba(255,255,255,.5)
}

/* Loading */
#loading-screen{background:#06060b;gap:1.2rem}
.loading-dots{display:flex;gap:6px}
.loading-dots span{
  width:8px;height:8px;border-radius:50%;background:#6d5ae0;
  animation:lds 1s ease-in-out infinite
}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes lds{
  0%,80%,100%{transform:scale(.6);opacity:.3}
  40%{transform:scale(1);opacity:1}
}
.loading-msg{color:rgba(255,255,255,.4);font-size:.85rem;letter-spacing:.02em}
.loading-progress{color:rgba(255,255,255,.2);font-size:.75rem;margin-top:.5rem}

/* Result */
#result-screen{background:#06060b}
#result-screen canvas{position:fixed;inset:0}
.result-bar{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.06);border-radius:40px;padding:6px 16px;
  font-size:.75rem;color:rgba(255,255,255,.35);letter-spacing:.04em;white-space:nowrap
}
.result-actions{
  position:fixed;bottom:40px;left:0;right:0;display:flex;justify-content:center;gap:.6rem;z-index:10
}
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(220,60,60,.85);color:#fff;padding:10px 22px;border-radius:40px;z-index:100;
  font-size:.85rem;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:toastIn .35s ease-out
}
@keyframes toastIn{
  from{transform:translateX(-50%) translateY(-60px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
</style>
</head>
<body>

<div id="welcome-screen" class="screen">
  <div class="welcome-content">
    <h1>3D Face</h1>
    <p>拍摄一张正面照，<br>生成可交互的 3D 人脸</p>
    <button class="btn btn-primary" id="start-btn">开始</button>
  </div>
</div>

<div id="camera-screen" class="screen hidden">
  <button class="btn btn-ghost camera-back" id="camera-back-btn">← 返回</button>
  <div class="camera-wrap">
    <video id="video" autoplay playsinline></video>
    <div class="face-frame"></div>
    <button class="capture-btn" id="capture-btn"></button>
  </div>
</div>

<div id="loading-screen" class="screen hidden">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p class="loading-msg" id="loading-msg">准备中</p>
  <p class="loading-progress" id="loading-progress"></p>
</div>

<div id="result-screen" class="screen hidden">
  <div class="result-bar">拖拽旋转 · 滚轮缩放</div>
  <div class="result-actions">
    <button class="btn btn-ghost" id="retake-btn" style="padding:8px 20px;font-size:.8rem">重新拍摄</button>
  </div>
</div>

<canvas id="photo-canvas" style="display:none"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import Delaunator from 'https://cdn.jsdelivr.net/npm/delaunator@5.0.1/+esm';

let animationId = null, sceneData = null;
const $ = s => document.querySelector(s);
const show = id => {
  ['welcome','camera','loading','result'].forEach(n =>
    $(`#${n}-screen`).classList.toggle('hidden', n !== id))
};
const err = m => {
  const t = document.createElement('div'); t.className='toast'; t.textContent=m;
  document.body.appendChild(t); setTimeout(()=>t.remove(),4000)
};

$('#start-btn').addEventListener('click', async () => {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:1280}},audio:false
    });
    const v = $('#video'); v.srcObject = s; await v.play();
    show('camera');
  } catch(e){
    if(e.name==='NotAllowedError') err('摄像头权限被拒绝，请在浏览器设置中允许')
    else if(e.name==='NotFoundError') err('未检测到摄像头')
    else err('摄像头错误: '+e.message)
  }
});

$('#camera-back-btn').addEventListener('click', () => {
  const s = $('#video').srcObject;
  if(s) s.getTracks().forEach(t=>t.stop());
  show('welcome')
});

$('#capture-btn').addEventListener('click', async () => {
  const video = $('#video');
  const c = $('#photo-canvas');
  c.width = video.videoWidth; c.height = video.videoHeight;
  const ctx = c.getContext('2d');
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(video,-c.width,0,c.width,c.height); ctx.restore();
  const s = video.srcObject;
  if(s) s.getTracks().forEach(t=>t.stop());
  show('loading');
  setMsg('正在加载人脸模型', '首次加载约需 5-15 秒下载 AI 模型');
  try {
    const results = await detectFace(c);
    if(!results.multiFaceLandmarks?.length){
      err('未检测到人脸，请重新拍摄'); show('welcome'); return
    }
    setMsg('正在构建 3D 网格');
    await new Promise(r=>setTimeout(r,100));
    buildScene(c, results.multiFaceLandmarks[0]);
  } catch(e){
    err(e.message); show('welcome')
  }
});

$('#retake-btn').addEventListener('click', () => {
  if(animationId) cancelAnimationFrame(animationId);
  if(sceneData){sceneData.renderer.dispose();sceneData=null}
  show('welcome')
});

function setMsg(msg, progress=''){
  $('#loading-msg').textContent = msg;
  $('#loading-progress').textContent = progress
}

function detectFace(canvas) {
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('检测超时，请确保面部光线充足、正对镜头')), 120000);
    const img = new Image();
    img.onload = () => {
      const fm = new FaceMesh({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`
      });
      fm.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });
      fm.onResults(r => { clearTimeout(timeout); resolve(r) });
      fm.send({ image: img });
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = canvas.toDataURL('image/jpeg', 0.92);
  });
}

function buildScene(photoCanvas, landmarks) {
  show('result');
  const c = $('#result-screen canvas');
  const r = new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true});
  r.setPixelRatio(Math.min(devicePixelRatio,2));
  r.setSize(window.innerWidth,window.innerHeight);
  r.toneMapping = THREE.ACESFilmicToneMapping; r.toneMappingExposure = 1;
  r.outputColorSpace = THREE.SRGBColorSpace;

  const sc = new THREE.Scene(); sc.background = new THREE.Color('#06060b');

  const cam = new THREE.PerspectiveCamera(38,window.innerWidth/window.innerHeight,0.1,20);
  cam.position.set(0,-0.05,2.8); cam.lookAt(0,-0.05,0);

  const amb = new THREE.AmbientLight('#ddeeff',1.8);
  sc.add(amb);
  const key = new THREE.DirectionalLight('#ffffff',2.2);
  key.position.set(1.5,0.8,1.8); sc.add(key);
  const fill = new THREE.DirectionalLight('#ddeeff',0.6);
  fill.position.set(-0.8,0.2,1); sc.add(fill);
  const rim = new THREE.DirectionalLight('#8888ff',1.2);
  rim.position.set(0,1.5,-2); sc.add(rim);

  const pCount = 200;
  const pg = new THREE.BufferGeometry();
  const pp = new Float32Array(pCount*3);
  for(let i=0;i<pCount;i++){
    pp[i*3]=(Math.random()-.5)*5; pp[i*3+1]=(Math.random()-.5)*5; pp[i*3+2]=(Math.random()-.5)*4
  }
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
  const pm = new THREE.PointsMaterial({color:0x6d5ae0,size:.012,transparent:!0,opacity:.3,blending:THREE.AdditiveBlending,depthWrite:!1});
  const parts = new THREE.Points(pg,pm);
  sc.add(parts);

  const controls = new OrbitControls(cam,r.domElement);
  controls.target.set(0,-0.05,0);
  controls.enableDamping = true; controls.dampingFactor = .08;
  controls.minDistance = 1.2; controls.maxDistance = 3.5;
  controls.maxPolarAngle = Math.PI * .7; controls.minPolarAngle = Math.PI * .15;
  controls.autoRotate = true; controls.autoRotateSpeed = .6;
  controls.update();

  // Build face mesh
  const n = landmarks.length;
  const pos = new Float32Array(n*3), uvs = new Float32Array(n*2);
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,minZ=Infinity,maxZ=-Infinity;
  for(let i=0;i<n;i++){
    const l=landmarks[i];
    if(l.x<minX)minX=l.x;if(l.x>maxX)maxX=l.x;
    if(l.y<minY)minY=l.y;if(l.y>maxY)maxY=l.y;
    if(l.z<minZ)minZ=l.z;if(l.z>maxZ)maxZ=l.z
  }
  const rangeX=Math.max(maxX-minX,.01), scale=1.1/rangeX;
  for(let i=0;i<n;i++){
    const l=landmarks[i];
    pos[i*3]=(l.x-(minX+maxX)/2)*scale;
    pos[i*3+1]=-((l.y-(minY+maxY)/2))*scale;
    pos[i*3+2]=(l.z-(minZ+maxZ)/2)*.006;
    uvs[i*2]=l.x; uvs[i*2+1]=1-l.y
  }

  const d = new Delaunator(landmarks.map(l=>[l.x,l.y]));
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geom.setAttribute('uv',new THREE.BufferAttribute(uvs,2));
  geom.setIndex(new THREE.BufferAttribute(d.triangles,1));
  geom.computeVertexNormals();

  const tw=1024,th=1024;
  const tc=document.createElement('canvas'); tc.width=tw; tc.height=th;
  const tctx=tc.getContext('2d');
  tctx.drawImage(photoCanvas,0,0,tw,th);
  const tex=new THREE.CanvasTexture(tc);
  tex.colorSpace=THREE.SRGBColorSpace; tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
  tex.generateMipmaps=false;

  const mat=new THREE.MeshStandardMaterial({
    map:tex,roughness:.45,metalness:.02,side:THREE.DoubleSide
  });
  const mesh=new THREE.Mesh(geom,mat);
  mesh.castShadow=!0; mesh.receiveShadow=!0;

  const wm=new THREE.MeshBasicMaterial({
    color:0x6d5ae0,wireframe:!0,transparent:!0,opacity:.06
  });
  const wg=new THREE.Mesh(geom.clone(),wm);
  const grp=new THREE.Group();
  grp.add(mesh); grp.add(wg);
  sc.add(grp);

  sceneData = {renderer:r,scene:sc,camera:cam,controls};
  let started = Date.now();

  function animate(t){
    animationId = requestAnimationFrame(animate);
    parts.rotation.y += .0003;
    grp.position.y = Math.sin(t*.001*.6)*.025;
    if(controls.autoRotate && Date.now()-started < 500) controls.update();
    else controls.update();
    r.render(sc,cam)
  }
  animationId = requestAnimationFrame(animate);
  setTimeout(()=>{controls.autoRotate=!0},500);

  window.addEventListener('resize',()=>{
    cam.aspect=window.innerWidth/window.innerHeight; cam.updateProjectionMatrix();
    r.setSize(window.innerWidth,window.innerHeight)
  });

  let art;
  controls.addEventListener('start',()=>{controls.autoRotate=!1;clearTimeout(art)});
  controls.addEventListener('end',()=>{art=setTimeout(()=>{controls.autoRotate=!0},2500)});
}
</script>
</body>
</html>
