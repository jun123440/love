<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全息面容 · Holographic Face</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Segoe UI', 'PingFang SC', sans-serif; }
        #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        #startBtn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 56px; font-size: 22px; z-index: 100;
            background: rgba(0, 200, 255, 0.08);
            border: 1px solid rgba(0, 200, 255, 0.4);
            color: #00ccff; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(12px); letter-spacing: 6px;
            transition: all 0.4s; font-family: inherit;
        }
        #startBtn:hover { background: rgba(0, 200, 255, 0.2); box-shadow: 0 0 60px rgba(0, 200, 255, 0.2); }
        #startBtn .sub {
            display: block; font-size: 11px; letter-spacing: 2px;
            color: rgba(0, 200, 255, 0.4); margin-top: 8px;
        }
        #hint {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
            color: rgba(0, 200, 255, 0.25); font-size: 12px;
            letter-spacing: 3px; z-index: 100; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <button id="startBtn">
        ◈ 启动全息扫描 ◈
        <span class="sub">FACE HOLOGRAM SCANNER</span>
    </button>
    <div id="hint">张嘴 · 粒子爆发</div>
    <canvas id="canvas"></canvas>

    <script src="https://appstatic.jeeliz.com/faceFilter/jeelizFaceFilter.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r112/three.min.js"></script>
    <script src="https://appstatic.jeeliz.com/faceFilter/JeelizThreeHelper.js"></script>
    <script src="https://appstatic.jeeliz.com/faceFilter/JeelizResizer.js"></script>

    <script>
    const startBtn = document.getElementById('startBtn');
    const hint = document.getElementById('hint');

    let threeRenderer, threeCamera, threeScene, faceObject;
    let isDetected = false;
    let time = 0;
    const particles = [];
    const rings = [];

    function generateGlowTexture() {
        const c = document.createElement('canvas');
        c.width = 64; c.height = 64;
        const ctx = c.getContext('2d');
        const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        g.addColorStop(0, 'rgba(255,255,255,1)');
        g.addColorStop(0.1, 'rgba(200,240,255,0.8)');
        g.addColorStop(0.4, 'rgba(0,200,255,0.3)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 64, 64);
        return new THREE.CanvasTexture(c);
    }

    function generateStarTexture() {
        const c = document.createElement('canvas');
        c.width = 32; c.height = 32;
        const ctx = c.getContext('2d');
        const g = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        g.addColorStop(0, 'rgba(255,255,255,1)');
        g.addColorStop(0.05, 'rgba(200,240,255,0.8)');
        g.addColorStop(0.3, 'rgba(0,150,255,0.2)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 32, 32);
        return new THREE.CanvasTexture(c);
    }

    function initScene(spec) {
        const threeStuffs = JeelizThreeHelper.init(spec, function(detected) {
            isDetected = detected;
        });

        threeRenderer = threeStuffs.renderer;
        threeScene = threeStuffs.scene;
        faceObject = threeStuffs.faceObject;

        const glowTex = generateGlowTexture();
        const starTex = generateStarTexture();

        const headGroup = new THREE.Group();
        headGroup.position.set(0, 0.05, -0.25);

        // Wireframe sphere - the main "head cage"
        const sphereGeom = new THREE.SphereGeometry(0.35, 20, 20);
        const wireGeom = new THREE.EdgesGeometry(sphereGeom);
        const wireMat = new THREE.LineBasicMaterial({
            color: 0x00ccff,
            transparent: true,
            opacity: 0.35
        });
        const wireSphere = new THREE.LineSegments(wireGeom, wireMat);
        headGroup.add(wireSphere);

        // Inner glow sphere (faint)
        const innerMat = new THREE.MeshBasicMaterial({
            color: 0x0044ff,
            transparent: true,
            opacity: 0.06,
            wireframe: true,
            depthWrite: false
        });
        const innerSphere = new THREE.Mesh(sphereGeom.clone(), innerMat);
        innerSphere.scale.set(1.08, 1.08, 1.08);
        headGroup.add(innerSphere);

        // Outer glow shell
        const outerMat = new THREE.MeshBasicMaterial({
            color: 0x0088ff,
            transparent: true,
            opacity: 0.03,
            side: THREE.BackSide,
            depthWrite: false
        });
        const outerSphere = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), outerMat);
        headGroup.add(outerSphere);

        // Rotating rings
        for (let i = 0; i < 3; i++) {
            const r = 0.42 + i * 0.06;
            const ringGeom = new THREE.TorusGeometry(r, 0.004, 8, 48);
            const ringMat = new THREE.MeshBasicMaterial({
                color: i === 1 ? 0x00ffff : 0x0088ff,
                transparent: true,
                opacity: 0.3 + i * 0.1
            });
            const ring = new THREE.Mesh(ringGeom, ringMat);
            ring.rotation.x = Math.PI / 2 + (i - 1) * 0.3;
            ring.rotation.z = i * 0.5;
            ring.userData = { speed: 0.3 + i * 0.2, axis: i };
            headGroup.add(ring);
            rings.push(ring);
        }

        // Face glow sprite
        const glowMat2 = new THREE.SpriteMaterial({
            map: glowTex,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.4,
            depthWrite: false
        });
        const glowSprite = new THREE.Sprite(glowMat2);
        glowSprite.scale.set(1.6, 1.6, 1);
        headGroup.add(glowSprite);

        // Particles
        const particleMat = new THREE.SpriteMaterial({
            map: starTex,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.6,
            depthWrite: false
        });

        for (let i = 0; i < 120; i++) {
            const sprite = new THREE.Sprite(particleMat);
            const radius = 0.1 + Math.random() * 0.6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            sprite.position.set(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi) * 0.7,
                radius * Math.sin(phi) * Math.sin(theta) - 0.1
            );
            const s = 0.01 + Math.random() * 0.025;
            sprite.scale.set(s, s, 1);
            sprite.userData = {
                basePos: sprite.position.clone(),
                speed: 0.2 + Math.random() * 0.5,
                phase: Math.random() * Math.PI * 2,
                orbit: 0.2 + Math.random() * 0.6,
                theta: Math.random() * Math.PI * 2,
                phi: Math.acos(2 * Math.random() - 1),
                orbitSpeed: 0.1 + Math.random() * 0.3
            };
            headGroup.add(sprite);
            particles.push(sprite);
        }

        faceObject.add(headGroup);

        // Background stars
        const starFieldMat = new THREE.PointsMaterial({
            color: 0x004488,
            size: 0.002,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const starFieldGeom = new THREE.BufferGeometry();
        const starVerts = [];
        for (let i = 0; i < 500; i++) {
            starVerts.push(
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8 - 2
            );
        }
        starFieldGeom.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
        const starField = new THREE.Points(starFieldGeom, starFieldMat);
        starField.position.z = -1;
        threeScene.add(starField);

        threeCamera = JeelizThreeHelper.create_camera();
    }

    function burstParticles(count) {
        if (!faceObject) return;
        const burstMat = new THREE.SpriteMaterial({
            map: generateGlowTexture(),
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8,
            depthWrite: false
        });
        for (let i = 0; i < count; i++) {
            const sprite = new THREE.Sprite(burstMat);
            const dir = new THREE.Vector3(
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 2,
                -0.3 + Math.random() * 0.6
            ).normalize();
            const speed = 0.5 + Math.random() * 1.5;
            sprite.position.set(0, 0.05, -0.25);
            sprite.scale.set(0.03, 0.03, 1);
            sprite.userData = {
                vel: dir.multiplyScalar(speed),
                life: 1
            };
            faceObject.add(sprite);
            particles.push(sprite);
        }
    }

    function start() {
        JeelizResizer.size_canvas({
            canvasId: 'canvas',
            CSSFlipX: true,
            isFullScreen: true,
            callback: function(isError) {
                if (isError) return;
                JEELIZFACEFILTER.init({
                    canvasId: 'canvas',
                    NNCPath: 'https://appstatic.jeeliz.com/faceFilter/',
                    callbackReady: function(err, spec) {
                        if (err) return;
                        initScene(spec);
                    },
                    callbackTrack: function(detectState) {
                        time += 0.016;
                        if (!isDetected) {
                            if (threeRenderer) threeRenderer.clear();
                            return;
                        }

                        const mouthOpen = Math.min(Math.max((detectState.expressions[0] - 0.15) * 4, 0), 1);

                        // Animate rings
                        rings.forEach((ring, i) => {
                            ring.rotation.y += 0.02 * ring.userData.speed;
                            ring.rotation.x += 0.005 * ring.userData.speed;
                            ring.material.opacity = 0.25 + mouthOpen * 0.5 + Math.sin(time * 2 + i) * 0.05;
                            const s = 1 + mouthOpen * 0.3;
                            ring.scale.set(s, s, s);
                        });

                        // Burst particles on mouth open
                        if (mouthOpen > 0.6 && Math.random() < 0.3) {
                            burstParticles(2);
                        }

                        // Particle animation
                        for (let i = particles.length - 1; i >= 0; i--) {
                            const p = particles[i];
                            if (p.userData.vel) {
                                p.position.add(p.userData.vel.clone().multiplyScalar(0.03));
                                p.userData.life -= 0.02;
                                p.material.opacity = p.userData.life;
                                const s = p.scale.x + 0.002;
                                p.scale.set(s, s, 1);
                                if (p.userData.life <= 0) {
                                    faceObject.remove(p);
                                    particles.splice(i, 1);
                                }
                            } else if (p.userData.basePos) {
                                const ud = p.userData;
                                ud.theta += ud.orbitSpeed * 0.02;
                                ud.phi += ud.orbitSpeed * 0.01;
                                const r = ud.orbit + Math.sin(time * ud.speed + ud.phase) * 0.1;
                                p.position.x = r * Math.sin(ud.phi) * Math.cos(ud.theta);
                                p.position.y = r * Math.cos(ud.phi) * 0.6;
                                p.position.z = r * Math.sin(ud.phi) * Math.sin(ud.theta) - 0.1;
                                const pulse = 0.6 + Math.sin(time * ud.speed + ud.phase) * 0.4;
                                p.material.opacity = pulse * (0.3 + mouthOpen * 0.5);
                            }
                        }

                        JeelizThreeHelper.render(detectState, threeCamera);
                    }
                });
            }
        });
    }

    startBtn.addEventListener('click', function() {
        startBtn.style.opacity = '0';
        startBtn.style.pointerEvents = 'none';
        setTimeout(function() { startBtn.style.display = 'none'; }, 800);
        setTimeout(function() { hint.style.opacity = '0'; }, 3000);
        start();
    });
    </script>
</body>
</html>
