<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>3D Face</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#f0f5fa;color:#1a2a3a;overflow:hidden;height:100vh
}
#container{position:fixed;inset:0;z-index:1}
#container video{display:none}

.overlay{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s,visibility .4s;pointer-events:none
}
.overlay.hidden{opacity:0;visibility:hidden}
.overlay.active{pointer-events:auto}

/* Welcome */
#welcome{background:#f0f5fa}
.welcome-content{text-align:center;padding:2rem}
.welcome-content h1{
  font-size:2.6rem;font-weight:700;margin-bottom:.5rem;
  background:linear-gradient(135deg,#4a9eff,#2b7be4,#1a6fd0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.03em
}
.welcome-content p{color:#6b7f8f;font-size:.95rem;line-height:1.7;margin-bottom:2.5rem;max-width:280px}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;padding:12px 32px;border:none;border-radius:40px;
  font-size:.95rem;font-weight:500;cursor:pointer;transition:all .25s;outline:none;font-family:inherit;
  pointer-events:auto
}
.btn-primary{
  background:linear-gradient(135deg,#4a9eff,#2b7be4);color:#fff;
  box-shadow:0 4px 20px rgba(43,123,228,.3)
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(43,123,228,.4)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{
  background:rgba(255,255,255,.7);color:#4a6a8a;border:1px solid rgba(0,0,0,.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
}
.btn-ghost:hover{background:rgba(255,255,255,.9)}

/* Camera UI */
#camera-ui{background:0 0}
.face-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:65%;height:55%;border:1.5px solid rgba(74,158,255,.15);border-radius:50%/40%;
  pointer-events:none;transition:all .6s
}
.face-hint.detected{border-color:#4a9eff;opacity:.6;box-shadow:0 0 30px rgba(74,158,255,.1)}
.capture-btn{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  width:64px;height:64px;border-radius:50%;
  border:3px solid rgba(74,158,255,.3);background:0 0;
  cursor:pointer;pointer-events:auto;z-index:3;transition:all .2s
}
.capture-btn::after{
  content:'';position:absolute;inset:6px;border-radius:50%;background:linear-gradient(135deg,#4a9eff,#2b7be4);
  transition:all .2s
}
.capture-btn:hover{border-color:rgba(74,158,255,.5)}
.capture-btn:active{transform:translateX(-50%) scale(.88)}
.capture-btn.loading::after{background:rgba(74,158,255,.3)}

/* Loading */
#loading{background:#f0f5fa;gap:1rem}
.spinner{width:24px;height:24px;border:2.5px solid #c8d8e8;border-top-color:#4a9eff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:#6b7f8f;font-size:.85rem;text-align:center;line-height:1.6}

/* Result */
#result-ui{background:#f0f5fa}
#result-ui .result-bar{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(0,0,0,.04);border-radius:40px;padding:6px 16px;
  font-size:.75rem;color:#6b7f8f;white-space:nowrap
}
#result-ui .result-bottom{
  position:absolute;bottom:32px;left:0;right:0;display:flex;justify-content:center;gap:.6rem
}
#result-ui canvas{position:fixed;inset:0;z-index:1;background:#f0f5fa}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(220,60,60,.9);color:#fff;padding:10px 22px;border-radius:40px;
  font-size:.85rem;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:toastIn .35s ease-out;white-space:nowrap
}
@keyframes toastIn{
  from{transform:translateX(-50%) translateY(-60px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
</style>
</head>
<body>

<div id="container"></div>

<div id="welcome" class="overlay active">
  <div class="welcome-content">
    <h1>3D Face</h1>
    <p>拍摄一张正面照，<br>生成可交互的 3D 人脸</p>
    <button class="btn btn-primary" id="start-btn">开始</button>
  </div>
</div>

<div id="camera-ui" class="overlay hidden">
  <div class="face-hint" id="face-hint"></div>
  <button class="capture-btn" id="capture-btn" title="拍照"></button>
</div>

<div id="loading" class="overlay hidden">
  <div class="spinner"></div>
  <p class="loading-msg" id="loading-msg">正在准备...</p>
</div>

<div id="result-ui" class="overlay hidden">
  <div class="result-bar">拖拽旋转 · 滚轮缩放</div>
  <div class="result-bottom">
    <button class="btn btn-ghost" id="retake-btn" style="padding:8px 20px;font-size:.8rem">重新拍摄</button>
  </div>
  <canvas></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.151.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.151.0/examples/jsm/",
    "mindar-face-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js"
  }
}
</script>

<script type="module">
import { MindARThree } from 'mindar-face-three';
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let mindar = null, faceMesh = null;
let scene3d = null, renderer3d = null, camera3d = null, controls3d = null;
let animId = null;

const $ = s => document.querySelector(s);

function show(id) {
  ['welcome','camera-ui','loading','result-ui'].forEach(n =>
    $(`#${n}`).classList.toggle('active', n === id));
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

$('#start-btn').addEventListener('click', async () => {
  show('loading');
  setMsg('正在启动摄像头');
  try {
    await startMindAR();
    show('camera-ui');
  } catch (e) {
    console.error(e);
    toast('启动失败: ' + e.message);
    show('welcome');
  }
});

$('#capture-btn').addEventListener('click', async () => {
  $('#capture-btn').classList.add('loading');
  setMsg('正在生成 3D 模型');
  show('loading');
  setTimeout(() => {
    doCapture();
  }, 100);
});

$('#retake-btn').addEventListener('click', () => {
  cleanup();
  show('welcome');
});

function setMsg(msg) {
  $('#loading-msg').textContent = msg;
}

async function startMindAR() {
  const container = $('#container');

  mindar = new MindARThree({
    container,
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
    disableFaceMirror: false,
  });

  faceMesh = mindar.addFaceMesh();
  mindar.scene.add(faceMesh);

  await mindar.start();

  const tex = new THREE.VideoTexture(mindar.video);
  tex.colorSpace = THREE.SRGBColorSpace;
  faceMesh.material.map = tex;
  faceMesh.material.needsUpdate = true;
  faceMesh.visible = true;

  let lastFaceTime = 0;
  const origOnUpdate = mindar.controller.onUpdate;
  mindar.controller.onUpdate = (data) => {
    if (origOnUpdate) origOnUpdate(data);
    if (data.hasFace) {
      lastFaceTime = Date.now();
      $('#face-hint').classList.add('detected');
    } else {
      if (Date.now() - lastFaceTime > 3000) {
        $('#face-hint').classList.remove('detected');
      }
    }
  };

  const { renderer, scene, camera } = mindar;
  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}

function doCapture() {
  if (!mindar || !faceMesh) {
    toast('请先启动摄像头');
    $('#capture-btn').classList.remove('loading');
    show('camera-ui');
    return;
  }

  try {
    const video = mindar.video;
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = video.videoWidth;
    srcCanvas.height = video.videoHeight;
    const sctx = srcCanvas.getContext('2d');
    if (mindar.shouldFaceUser) {
      sctx.save();
      sctx.scale(-1, 1);
      sctx.drawImage(video, -srcCanvas.width, 0, srcCanvas.width, srcCanvas.height);
      sctx.restore();
    } else {
      sctx.drawImage(video, 0, 0);
    }

    const tex = new THREE.CanvasTexture(srcCanvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;

    const geoClone = faceMesh.geometry.clone();
    geoClone.applyMatrix4(faceMesh.matrixWorld);

    const box = new THREE.Box3().setFromBufferAttribute(geoClone.attributes.position);
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(
      box.max.x - box.min.x,
      box.max.y - box.min.y,
      box.max.z - box.min.z
    );

    const pos = geoClone.attributes.position;
    const invScale = 1 / maxDim;
    for (let i = 0; i < pos.count; i++) {
      pos.setXYZ(i,
        (pos.getX(i) - center.x) * invScale,
        (pos.getY(i) - center.y) * invScale,
        (pos.getZ(i) - center.z) * invScale
      );
    }
    pos.needsUpdate = true;
    geoClone.computeVertexNormals();

    if (mindar) {
      mindar.stop();
      mindar = null;
    }

    const mat = new THREE.MeshStandardMaterial({
      map: tex,
      roughness: 0.4,
      metalness: 0.0,
      side: THREE.DoubleSide,
    });
    const staticMesh = new THREE.Mesh(geoClone, mat);

    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x4a9eff,
      wireframe: true,
      transparent: true,
      opacity: 0.08,
    });
    const wireMesh = new THREE.Mesh(geoClone.clone(), wireMat);

    const group = new THREE.Group();
    group.add(staticMesh);
    group.add(wireMesh);

    scene3d = new THREE.Scene();
    scene3d.background = new THREE.Color('#f0f5fa');

    const amb = new THREE.AmbientLight('#ddeeff', 1.2);
    scene3d.add(amb);
    const key = new THREE.DirectionalLight('#ffffff', 1.8);
    key.position.set(1.2, 0.8, 1.5);
    scene3d.add(key);
    const fill = new THREE.DirectionalLight('#bbddff', 0.6);
    fill.position.set(-0.8, 0.2, 1);
    scene3d.add(fill);
    const rim = new THREE.DirectionalLight('#4488ff', 0.8);
    rim.position.set(0, 1.5, -2);
    scene3d.add(rim);

    scene3d.add(group);

    const canvas = $('#result-ui canvas');
    renderer3d = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
    });
    renderer3d.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer3d.setSize(window.innerWidth, window.innerHeight);
    renderer3d.toneMapping = THREE.ACESFilmicToneMapping;
    renderer3d.toneMappingExposure = 0.8;

    camera3d = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 20);
    camera3d.position.set(0, 0.05, 1.6);
    camera3d.lookAt(0, -0.02, 0);

    controls3d = new OrbitControls(camera3d, renderer3d.domElement);
    controls3d.target.set(0, -0.02, 0);
    controls3d.enableDamping = true;
    controls3d.dampingFactor = 0.08;
    controls3d.minDistance = 0.5;
    controls3d.maxDistance = 3.0;
    controls3d.maxPolarAngle = Math.PI * 0.7;
    controls3d.minPolarAngle = Math.PI * 0.1;
    controls3d.autoRotate = true;
    controls3d.autoRotateSpeed = 0.4;
    controls3d.update();

    $('#capture-btn').classList.remove('loading');
    show('result-ui');

    function animate(t) {
      animId = requestAnimationFrame(animate);
      group.position.y = Math.sin(t * 0.001 * 0.4) * 0.025;
      controls3d.update();
      renderer3d.render(scene3d, camera3d);
    }
    animId = requestAnimationFrame(animate);

    let art;
    controls3d.addEventListener('start', () => {
      controls3d.autoRotate = false;
      clearTimeout(art);
    });
    controls3d.addEventListener('end', () => {
      art = setTimeout(() => { controls3d.autoRotate = true; }, 3000);
    });

  } catch (e) {
    console.error(e);
    toast('生成失败: ' + e.message);
    $('#capture-btn').classList.remove('loading');
    show('camera-ui');
  }
}

function cleanup() {
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  if (mindar) {
    try { mindar.stop(); } catch(e) {}
    mindar = null;
  }
  if (renderer3d) {
    renderer3d.dispose();
    renderer3d = null;
  }
  controls3d = null;
  scene3d = null;
  faceMesh = null;
  const resultUI = document.getElementById('result-ui');
  const oldCanvas = resultUI.querySelector('canvas');
  if (oldCanvas) oldCanvas.remove();
  const newCanvas = document.createElement('canvas');
  resultUI.appendChild(newCanvas);
  $('#capture-btn').classList.remove('loading');
}

window.addEventListener('resize', () => {
  if (camera3d && renderer3d) {
    camera3d.aspect = window.innerWidth / window.innerHeight;
    camera3d.updateProjectionMatrix();
    renderer3d.setSize(window.innerWidth, window.innerHeight);
  }
});
</script>
</body>
</html>
