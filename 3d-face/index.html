<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>3D Face</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#f0f5fa;color:#1a2a3a;overflow:hidden;height:100vh
}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;transform:scaleX(-1)}
.overlay{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s,visibility .4s;pointer-events:none;background:#f0f5fa
}
.overlay.hidden{opacity:0;visibility:hidden}
.overlay.active{pointer-events:auto}

#welcome{background:#f0f5fa}
.welcome-content{text-align:center;padding:2rem}
.welcome-content h1{
  font-size:2.6rem;font-weight:700;margin-bottom:.5rem;
  background:linear-gradient(135deg,#4a9eff,#2b7be4,#1a6fd0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.03em
}
.welcome-content p{color:#6b7f8f;font-size:.95rem;line-height:1.7;margin-bottom:2.5rem;max-width:280px}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;padding:12px 32px;border:none;border-radius:40px;
  font-size:.95rem;font-weight:500;cursor:pointer;transition:all .25s;outline:none;font-family:inherit;pointer-events:auto
}
.btn-primary{
  background:linear-gradient(135deg,#4a9eff,#2b7be4);color:#fff;
  box-shadow:0 4px 20px rgba(43,123,228,.3)
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(43,123,228,.4)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{
  background:rgba(255,255,255,.7);color:#4a6a8a;border:1px solid rgba(0,0,0,.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
}
.btn-ghost:hover{background:rgba(255,255,255,.9)}

#camera-ui{background:0 0}
.face-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:65%;height:55%;border:1.5px solid rgba(74,158,255,.2);border-radius:50%/40%;
  pointer-events:none;transition:all .5s;z-index:2
}
.face-hint.detected{border-color:#4a9eff;opacity:.6}
.capture-btn{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  width:64px;height:64px;border-radius:50%;
  border:3px solid rgba(74,158,255,.3);background:0 0;
  cursor:pointer;pointer-events:auto;z-index:3;transition:all .2s
}
.capture-btn::after{
  content:'';position:absolute;inset:6px;border-radius:50%;background:linear-gradient(135deg,#4a9eff,#2b7be4);
  transition:all .2s
}
.capture-btn:hover{border-color:rgba(74,158,255,.5)}
.capture-btn:active{transform:translateX(-50%) scale(.88)}

#loading{background:#f0f5fa;gap:1rem}
.spinner{width:24px;height:24px;border:2.5px solid #c8d8e8;border-top-color:#4a9eff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:#6b7f8f;font-size:.85rem;text-align:center;line-height:1.6}

#result-ui{background:#f0f5fa}
#result-ui .result-bar{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:3;
  background:rgba(255,255,255,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(0,0,0,.04);border-radius:40px;padding:6px 16px;
  font-size:.75rem;color:#6b7f8f;white-space:nowrap
}
#result-ui .result-bottom{
  position:absolute;bottom:32px;left:0;right:0;display:flex;justify-content:center;gap:.6rem;z-index:3
}
#result-ui .result-canvas{position:fixed;inset:0;z-index:1;background:#f0f5fa}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(220,60,60,.9);color:#fff;padding:10px 22px;border-radius:40px;
  font-size:.85rem;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:toastIn .35s ease-out;white-space:nowrap
}
@keyframes toastIn{
  from{transform:translateX(-50%) translateY(-60px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
</style>
</head>
<body>

<video id="video" playsinline></video>

<div id="welcome" class="overlay active">
  <div class="welcome-content">
    <h1>3D Face</h1>
    <p>拍摄一张正面照，<br>生成可交互的 3D 人脸</p>
    <button class="btn btn-primary" id="start-btn">开始</button>
  </div>
</div>

<div id="camera-ui" class="overlay hidden">
  <div class="face-hint" id="face-hint"></div>
  <button class="capture-btn" id="capture-btn" title="拍照"></button>
</div>

<div id="loading" class="overlay hidden">
  <div class="spinner"></div>
  <p class="loading-msg" id="loading-msg">正在准备...</p>
</div>

<div id="result-ui" class="overlay hidden">
  <div class="result-bar">拖拽旋转 · 滚轮缩放</div>
  <div class="result-bottom">
    <button class="btn btn-ghost" id="retake-btn" style="padding:8px 20px;font-size:.8rem">重新拍摄</button>
  </div>
  <canvas class="result-canvas"></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.151.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.151.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs';

const FACES_JSON = 'https://jun123440.github.io/love/3d-face/assets/face_landmarker.task';
const WASM_BASE = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm/';

let faceLandmarker = null;
let video = null;
let stream = null;
let detectTimer = null;
let faceDetected = false;

let scene3d = null, renderer3d = null, camera3d = null, controls3d = null;
let animId = null;
let capturedLandmarks = null;
let capturedPhoto = null;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function show(id) {
  ['welcome','camera-ui','loading','result-ui'].forEach(n =>
    $(`#${n}`).classList.toggle('active', n === id));
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function setMsg(msg) {
  $('#loading-msg').textContent = msg;
}

$('#start-btn').addEventListener('click', async () => {
  show('loading');
  setMsg('正在启动摄像头');
  try {
    await startCamera();
    show('camera-ui');
  } catch (e) {
    console.error(e);
    toast('启动失败: ' + e.message);
    show('welcome');
  }
});

$('#capture-btn').addEventListener('click', () => {
  if (!faceDetected) { toast('未检测到人脸'); return; }
  doCapture();
});

$('#retake-btn').addEventListener('click', () => {
  cleanup3d();
  startDetectionLoop();
  show('camera-ui');
});

async function startCamera() {
  video = document.getElementById('video');
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = () => { video.play(); r() });

  setMsg('正在加载 AI 模型');
  await initFaceLandmarker();

  startDetectionLoop();
}

async function initFaceLandmarker() {
  const fileset = await FilesetResolver.forVisionTasks(WASM_BASE);
  faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: FACES_JSON,
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numFaces: 1,
    outputFaceBlendshapes: false,
    outputFacialTransformationMatrixes: false,
  });
}

function startDetectionLoop() {
  faceDetected = false;
  $('#face-hint').classList.remove('detected');
  if (detectTimer) cancelAnimationFrame(detectTimer);

  function detect() {
    if (!video || video.readyState < 2 || !faceLandmarker) {
      detectTimer = requestAnimationFrame(detect);
      return;
    }
    const now = performance.now();
    const result = faceLandmarker.detectForVideo(video, now);

    if (result.faceLandmarks && result.faceLandmarks.length > 0) {
      faceDetected = true;
      capturedLandmarks = result.faceLandmarks[0];
      capturedPhoto = now;
      $('#face-hint').classList.add('detected');
    } else {
      faceDetected = false;
      $('#face-hint').classList.remove('detected');
    }
    detectTimer = requestAnimationFrame(detect);
  }
  detectTimer = requestAnimationFrame(detect);
}

function stopDetection() {
  if (detectTimer) { cancelAnimationFrame(detectTimer); detectTimer = null; }
}

function doCapture() {
  if (!capturedLandmarks) { toast('未检测到人脸'); return; }
  stopDetection();
  show('loading');
  setMsg('正在生成 3D 模型');

  setTimeout(() => {
    try {
      const landmarks = capturedLandmarks;

      const srcCanvas = document.createElement('canvas');
      srcCanvas.width = video.videoWidth;
      srcCanvas.height = video.videoHeight;
      const sctx = srcCanvas.getContext('2d');
      sctx.save();
      sctx.scale(-1, 1);
      sctx.drawImage(video, -srcCanvas.width, 0, srcCanvas.width, srcCanvas.height);
      sctx.restore();

      build3DFace(landmarks, srcCanvas);
      show('result-ui');
    } catch (e) {
      console.error(e);
      toast('生成失败: ' + e.message);
      startDetectionLoop();
      show('camera-ui');
    }
  }, 100);
}

function build3DFace(landmarks, photoCanvas) {
  const NUM_VERTS = 468;
  const positions = new Float32Array(NUM_VERTS * 3);
  const uvs = new Float32Array(NUM_VERTS * 2);

  for (let i = 0; i < NUM_VERTS; i++) {
    const l = landmarks[i];
    positions[i*3]   = (l.x - 0.5) * 2;
    positions[i*3+1] = (0.5 - l.y) * 2;
    positions[i*3+2] = (l.z - 0.5) * 2;
    uvs[i*2]   = l.x;
    uvs[i*2+1] = 1 - l.y;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geo.setIndex(FACE_TRIANGLES);
  geo.computeVertexNormals();

  const tex = new THREE.CanvasTexture(photoCanvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    roughness: 0.4,
    metalness: 0.0,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);

  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x4a9eff,
    wireframe: true,
    transparent: true,
    opacity: 0.08,
  });
  const wireMesh = new THREE.Mesh(geo.clone(), wireMat);

  const group = new THREE.Group();
  group.add(mesh);
  group.add(wireMesh);

  scene3d = new THREE.Scene();
  scene3d.background = new THREE.Color('#f0f5fa');

  const amb = new THREE.AmbientLight('#ddeeff', 1.2);
  scene3d.add(amb);
  const key = new THREE.DirectionalLight('#ffffff', 1.8);
  key.position.set(1.2, 0.8, 1.5);
  scene3d.add(key);
  const fill = new THREE.DirectionalLight('#bbddff', 0.6);
  fill.position.set(-0.8, 0.2, 1);
  scene3d.add(fill);
  const rim = new THREE.DirectionalLight('#4488ff', 0.8);
  rim.position.set(0, 1.5, -2);
  scene3d.add(rim);

  scene3d.add(group);

  const canvas = $('.result-canvas');
  renderer3d = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer3d.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer3d.setSize(window.innerWidth, window.innerHeight);
  renderer3d.toneMapping = THREE.ACESFilmicToneMapping;
  renderer3d.toneMappingExposure = 0.8;

  camera3d = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 20);
  camera3d.position.set(0, 0.05, 1.6);
  camera3d.lookAt(0, -0.02, 0);

  controls3d = new OrbitControls(camera3d, renderer3d.domElement);
  controls3d.target.set(0, -0.02, 0);
  controls3d.enableDamping = true;
  controls3d.dampingFactor = 0.08;
  controls3d.minDistance = 0.5;
  controls3d.maxDistance = 3.0;
  controls3d.maxPolarAngle = Math.PI * 0.7;
  controls3d.minPolarAngle = Math.PI * 0.1;
  controls3d.autoRotate = true;
  controls3d.autoRotateSpeed = 0.4;
  controls3d.update();

  stopVideo();

  let art;
  controls3d.addEventListener('start', () => {
    controls3d.autoRotate = false;
    clearTimeout(art);
  });
  controls3d.addEventListener('end', () => {
    art = setTimeout(() => { controls3d.autoRotate = true; }, 3000);
  });

  function animate(t) {
    animId = requestAnimationFrame(animate);
    group.position.y = Math.sin(t * 0.001 * 0.4) * 0.025;
    controls3d.update();
    renderer3d.render(scene3d, camera3d);
  }
  animId = requestAnimationFrame(animate);
}

function stopVideo() {
  if (detectTimer) { cancelAnimationFrame(detectTimer); detectTimer = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (video) { video.srcObject = null; }
  faceLandmarker = null;
  capturedLandmarks = null;
}

function cleanup3d() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (renderer3d) { renderer3d.dispose(); renderer3d = null; }
  controls3d = null;
  scene3d = null;
}

window.addEventListener('resize', () => {
  if (camera3d && renderer3d) {
    camera3d.aspect = window.innerWidth / window.innerHeight;
    camera3d.updateProjectionMatrix();
    renderer3d.setSize(window.innerWidth, window.innerHeight);
  }
});
