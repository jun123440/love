<script type="module">
import * as THREE from 'three';

// ════════════════════════════════════════════════════════════════
//  Delaunay Triangulation
// ════════════════════════════════════════════════════════════════

function delaunay(pts){
  const n=pts.length;if(n<3)return new Uint16Array(0);
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  for(const p of pts){const x=p[0],y=p[1];if(x<mnX)mnX=x;if(x>mxX)mxX=x;if(y<mnY)mnY=y;if(y>mxY)mxY=y}
  const dx=mxX-mnX||1,dy=mxY-mnY||1,mx=(mnX+mxX)/2,my=(mnY+mxY)/2,r=Math.max(dx,dy)*20;
  const ps=pts.map(p=>[p[0],p[1]]);ps.push([mx-r,my-r],[mx+r,my-r],[mx,my+r]);
  function circ(a,b,c,p){
    const ax=a[0]-p[0],ay=a[1]-p[1],bx=b[0]-p[0],by=b[1]-p[1],cx=c[0]-p[0],cy=c[1]-p[1];
    const ab=ax*ax+ay*ay,bc=bx*bx+by*by,cd=cx*cx+cy*cy,d=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
    if(d===0)return false;
    const ux=(ab*(by-cy)+bc*(cy-ay)+cd*(ay-by))/d,uy=(ab*(cx-bx)+bc*(ax-cx)+cd*(bx-ax))/d;
    return(ax-ux)*(ax-ux)+(ay-uy)*(ay-uy)<ux*ux+uy*uy;
  }
  const tris=[{a:n,b:n+1,c:n+2}];
  for(let i=0;i<n;i++){
    const p=ps[i];const edges=[];
    for(let j=tris.length-1;j>=0;j--){const t=tris[j];if(circ(ps[t.a],ps[t.b],ps[t.c],p)){edges.push(t.a,t.b,t.b,t.c,t.c,t.a);tris.splice(j,1)}}

  }

}

// ════════════════════════════════════════════════════════════════
//  Face Mesh from clmtrackr Landmarks
//  70 landmarks → detailed 3D face mesh
// ════════════════════════════════════════════════════════════════

const LANDMARK_DEPTH = {
  // Jaw line (0-16)
  0:-0.06,1:-0.055,2:-0.05,3:-0.045,4:-0.04,5:-0.035,6:-0.03,7:-0.025,
  8:-0.02,9:-0.025,10:-0.03,11:-0.035,12:-0.04,13:-0.045,14:-0.05,15:-0.055,16:-0.06,
  // Eyebrows (17-26)
  17:-0.035,18:-0.033,19:-0.030,20:-0.028,21:-0.030,
  22:-0.035,23:-0.033,24:-0.030,25:-0.028,26:-0.030,
  // Nose (27-35)
  27:-0.025,28:-0.015,29:-0.005,30:0.0,31:0.0,32:-0.005,33:-0.01,34:-0.01,35:-0.01,
  // Eyes (36-47)
  36:-0.035,37:-0.038,38:-0.040,39:-0.038,40:-0.035,41:-0.032,
  42:-0.035,43:-0.038,44:-0.040,45:-0.038,46:-0.035,47:-0.032,
  // Mouth outer (48-59)
  48:-0.015,49:-0.012,50:-0.010,51:-0.010,52:-0.010,53:-0.012,
  54:-0.015,55:-0.018,56:-0.020,57:-0.022,58:-0.020,59:-0.018,
  // Mouth inner (60-67)
  60:-0.013,61:-0.012,62:-0.012,63:-0.013,64:-0.015,65:-0.016,66:-0.016,67:-0.015,
  // Additional (68-69)
  68:-0.04,69:-0.04,
};

function buildFaceFromLandmarks(landmarks, imgW, imgH) {
  // landmarks: array of [x,y] in image pixels
  const n = landmarks.length;
  const pts = landmarks.map(p => [p[0]/imgW, p[1]/imgH]);
  const tri = delaunay(pts);

  // Center and scale face
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  for(const p of pts){if(p[0]<mnX)mnX=p[0];if(p[0]>mxX)mxX=p[0];if(p[1]<mnY)mnY=p[1];if(p[1]>mxY)mxY=p[1]}
  const cX=(mnX+mxX)/2,cY=(mnY+mxY)/2,fW=mxX-mnX,fH=mxY-mnY;
  const tW=0.50,tH=0.60,sX=tW/fW,sY=tH/fH;

  const verts=new Float32Array(n*3);
  const uvs=new Float32Array(n*2);

  for(let i=0;i<n;i++){
    const d=LANDMARK_DEPTH[i]||-0.03;
    verts[i*3]=(pts[i][0]-cX)*sX;
    verts[i*3+1]=-(pts[i][1]-cY)*sY+1.72;
    verts[i*3+2]=d*sX*2;
    uvs[i*2]=pts[i][0];
    uvs[i*2+1]=pts[i][1];
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
  geo.setAttribute('uv',new THREE.BufferAttribute(uvs,2));
  geo.setIndex(new THREE.BufferAttribute(tri,1));
  geo.computeVertexNormals();
  return geo;
}

// ════════════════════════════════════════════════════════════════
//  Body Mesh
// ════════════════════════════════════════════════════════════════

function makeRing(y,rx,rz,seg,dx=0,dz=0){
  const pts=new Float32Array((seg+1)*3);
  for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2;pts[i*3]=Math.cos(a)*rx+dx;pts[i*3+1]=y;pts[i*3+2]=Math.sin(a)*rz+dz}
  return pts;
}
function buildTube(rings,seg){
  const n=rings.length,verts=[],uvs=[],idx=[];
  for(let r=0;r<n;r++){const ri=rings[r],v=r/(n-1);for(let i=0;i<=seg;i++){verts.push(ri[i*3],ri[i*3+1],ri[i*3+2]);uvs.push(i/seg,v);if(r<n-1){const a=r*(seg+1)+i,b=r*(seg+1)+(i+1)%(seg+1),c=(r+1)*(seg+1)+i,d=(r+1)*(seg+1)+(i+1)%(seg+1);idx.push(a,b,c,b,d,c)}}}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));g.setIndex(idx);g.computeVertexNormals();return g;
}

function sec(y,rx,rz){return{y,rx,rz}}
function part(rings,mat,seg,dx=0,dz=0){const m=new THREE.Mesh(buildTube(rings.map(s=>makeRing(s.y,s.rx,s.rz,seg,s.dx||0+dx,s.dz||0+dz)),seg),mat);m.castShadow=true;return m}

function buildBody(skinC,clothC,pantsC,shoeC){

  const P=(r,m,dx=0,dz=0)=>meshes.push(part(r,m,S,dx,dz));

  P([sec(.76,.13,.10),sec(.78,.14,.10),sec(.80,.14,.11),sec(.82,.14,.11),sec(.84,.14,.10),sec(.86,.14,.10),sec(.88,.14,.10),sec(.90,.14,.10),sec(.92,.14,.10),sec(.94,.14,.10),sec(.96,.14,.10),sec(.98,.14,.10),sec(1.00,.14,.10),sec(1.02,.14,.10),sec(1.04,.15,.11),sec(1.06,.15,.11),sec(1.08,.16,.11),sec(1.10,.16,.11),sec(1.12,.17,.12),sec(1.14,.17,.12),sec(1.16,.18,.12),sec(1.18,.18,.12),sec(1.20,.19,.13),sec(1.22,.19,.13),sec(1.24,.20,.13),sec(1.26,.20,.14),sec(1.28,.21,.14),sec(1.30,.21,.14),sec(1.32,.22,.14),sec(1.34,.22,.14),sec(1.36,.22,.14),sec(1.38,.22,.14),sec(1.40,.22,.14),sec(1.42,.21,.14),sec(1.44,.20,.13),sec(1.46,.18,.12),sec(1.48,.15,.11),sec(1.50,.13,.10),sec(1.52,.11,.09),sec(1.54,.10,.08),sec(1.56,.09,.07)],top);

  const lR=[sec(.74,.10,.08),sec(.70,.10,.08),sec(.66,.09,.08),sec(.62,.09,.07),sec(.58,.09,.07),sec(.54,.08,.07),sec(.50,.08,.07),sec(.46,.08,.06),sec(.42,.07,.06),sec(.38,.07,.06),sec(.34,.07,.05),sec(.30,.06,.05),sec(.26,.06,.05),sec(.22,.06,.05),sec(.18,.05,.04),sec(.14,.05,.04),sec(.10,.05,.04),sec(.07,.04,.04),sec(.04,.04,.03),sec(.02,.04,.03),sec(.01,.05,.03)];

// ════════════════════════════════════════════════════════════════
//  Texture & Color Processing
// ════════════════════════════════════════════════════════════════

function avgPixels(ctx,x,y,w,h){
  const d=ctx.getImageData(Math.max(0,x|0),Math.max(0,y|0),Math.min(w|0,ctx.canvas.width-x|0),Math.min(h|0,ctx.canvas.height-y|0)).data;
  let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++}
  return n?[(r/n|0),(g/n|0),(b/n|0)]:[180,150,130];
}

function processImage(img){
  const w=img.width,h=img.height;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0);

  const fW=w*.38,fH=fW*1.2,fX=(w-fW)/2,fY=(h-fH)/2-h*.02;
  const skin=avgPixels(ctx,fX+fW*.25,fY+fH*.2,fW*.5,fH*.4);
  const hair=avgPixels(ctx,w*.25,h*.02,w*.5,h*.12);
  const cloth=avgPixels(ctx,w*.15,fY+fH+h*.04,w*.7,h*.2);
  const bright=c=>Math.min(255,c+20);

  // Head texture canvas
  const S=512;
  const tex=document.createElement('canvas');tex.width=S;tex.height=S;
  const tc=tex.getContext('2d');
  tc.fillStyle=`rgb(${skin[0]},${skin[1]},${skin[2]})`;
  tc.fillRect(0,0,S,S);
  const fs=S*.58,ox=(S-fs)/2,oy=(S-fs)/2-S*.02;
  tc.save();tc.beginPath();tc.ellipse(S/2,S/2,fs/2,fs/2,0,0,Math.PI*2);tc.clip();
  tc.drawImage(img,fX,fY,fW,fH,ox,oy,fs,fs);tc.restore();
  const gr=tc.createRadialGradient(S/2,S/2,fs*.2,S/2,S/2,fs*.5);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,`rgba(${skin[0]},${skin[1]},${skin[2]},.35)`);
  tc.fillStyle=gr;tc.fillRect(0,0,S,S);

  const tex3=new THREE.CanvasTexture(tex);tex3.colorSpace=THREE.SRGBColorSpace;
  return{
    faceTex:tex3,
    skin:(skin[0]<<16)|(skin[1]<<8)|skin[2],
    hair:(hair[0]<<16)|(hair[1]<<8)|hair[2],
    cloth:(bright(cloth[0])<<16)|(bright(cloth[1])<<8)|bright(cloth[2]),
    pants:0x2a2a44,shoe:0x0e0e1e,
    cx:fX,cy:fY,cw:fW,ch:fH,
  };
}

// ════════════════════════════════════════════════════════════════
//  Avatar Assembly
// ════════════════════════════════════════════════════════════════

function buildAvatar(img,faceLMs){
  const cols=processImage(img);
  const group=new THREE.Group();

  // Body
  const body=buildBody(cols.skin,cols.cloth,cols.pants,cols.shoe);
  for(const m of body)group.add(m);

  // Face from landmarks (if detected)
  let headMesh;
  if(faceLMs&&faceLMs.length===70){
    const fGeo=buildFaceFromLandmarks(faceLMs,img.width,img.height);
    const fMat=new THREE.MeshStandardMaterial({map:cols.faceTex,roughness:.2,metalness:0,side:THREE.DoubleSide});
    headMesh=new THREE.Mesh(fGeo,fMat);
  }else{
    // Fallback: parametric head
    const C=48,R=36,W=.21,H=.26,D=.21;const verts=[],uvs=[],idx=[];
    for(let r=0;r<=R;r++){const v=r/R,th=v*Math.PI,ct=Math.cos(th),st=Math.sin(th);for(let c=0;c<=C;c++){const u=c/C,phi=u*2*Math.PI,cp=Math.cos(phi),sp=Math.sin(phi),front=cp>0?cp:0,frontS=Math.pow(Math.max(0,cp),3);const x=st*cp*W,y=ct*H,z=st*sp*D;const nose=.055*Math.exp(-Math.pow((th-.67)*5.5,2))*frontS,nB=.018*Math.exp(-Math.pow((th-.44)*6.5,2))*frontS,eT=th-.51,eL=Math.exp(-Math.pow(phi-.44,2)*32-Math.pow(eT,2)*38),eR=Math.exp(-Math.pow(phi+.44,2)*32-Math.pow(eT,2)*38),eSoc=-(eL+eR)*.025,eBal=(Math.exp(-Math.pow(phi-.44,2)*28-Math.pow(eT,2)*30)+Math.exp(-Math.pow(phi+.44,2)*28-Math.pow(eT,2)*30))*.010;const cheek=Math.exp(-Math.pow(th-.80,2)*12-Math.pow(Math.abs(phi)-.62,2)*18)*.018,chin=Math.exp(-Math.pow((th-1.44)*6.5,2))*front*.012,jaw=Math.exp(-Math.pow((th-1.22)*3.8,2))*(1-Math.abs(front))*.045,brow=(Math.exp(-Math.pow(phi-.44,2)*16-Math.pow(th-.37,2)*30)+Math.exp(-Math.pow(phi+.44,2)*16-Math.pow(th-.37,2)*30))*.018,lipU=Math.exp(-Math.pow((th-1.10)*22,2))*front*.006,lipL=Math.exp(-Math.pow((th-1.20)*20,2))*front*.005,fore=Math.exp(-Math.pow((th-.12)*4.5,2))*.008,ear=Math.exp(-Math.pow((th-.72)*4.5,2)-Math.pow(Math.abs(Math.abs(phi)-1.0)*22,2))*.040,nW=Math.exp(-Math.pow((th-.67)*4,2))*Math.exp(-Math.pow(phi,2)*8)*(-.005);const tz=z+nose+nB+eSoc+eBal+cheek+chin+jaw+brow+lipU+lipL+ear+nW,tx=x+ear*.3,ty=y+fore;verts.push(tx,ty+.005,tz);uvs.push(u,v);if(r<R&&c<C){const a=r*(C+1)+c,b=r*(C+1)+c+1,d=(r+1)*(C+1)+c,e=(r+1)*(C+1)+c+1;idx.push(a,b,d,b,e,d)}}}
    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));g.setIndex(idx);g.computeVertexNormals();
    headMesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({map:cols.faceTex,roughness:.22,metalness:0}));
  }
  headMesh.position.y=1.58;headMesh.castShadow=true;
  group.add(headMesh);

  // Hair
  const hC=48,hR=24;const hVerts=[],hUvs=[],hIdx=[];
  for(let r=0;r<=hR;r++){const v=r/hR,th=v*Math.PI*.5;for(let c=0;c<=hC;c++){const u=c/hC,phi=u*2*Math.PI;hVerts.push(Math.sin(th)*Math.cos(phi)*.22,Math.cos(th)*.30+1.34,Math.sin(th)*Math.sin(phi)*.21);hUvs.push(u,v);if(r<hR&&c<hC){const a=r*(hC+1)+c,b=r*(hC+1)+c+1,d=(r+1)*(hC+1)+c,e=(r+1)*(hC+1)+c+1;hIdx.push(a,b,d,b,e,d)}}}
  const hGeo=new THREE.BufferGeometry();hGeo.setAttribute('position',new THREE.Float32BufferAttribute(hVerts,3));hGeo.setAttribute('uv',new THREE.Float32BufferAttribute(hUvs,2));hGeo.setIndex(hIdx);hGeo.computeVertexNormals();
  const hMat=new THREE.MeshStandardMaterial({color:cols.hair,roughness:.85,metalness:0});
  group.add(new THREE.Mesh(hGeo,hMat));

  return group;
}

// ════════════════════════════════════════════════════════════════
//  Scene
// ════════════════════════════════════════════════════════════════

let scene,camera,renderer,controls,avatarGroup,animTime=0;
function initScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0c0c16);
  camera=new THREE.PerspectiveCamera(30,innerWidth/innerHeight,0.1,100);
  camera.position.set(1.5,1.3,2.8);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
  $('three-container').appendChild(renderer.domElement);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.78,0);controls.enableDamping=true;controls.dampingFactor=0.06;
  controls.minDistance=0.7;controls.maxDistance=4.0;controls.maxPolarAngle=Math.PI*0.78;
  controls.autoRotate=true;controls.autoRotateSpeed=2.0;controls.update();
  controls.addEventListener('start',()=>controls.autoRotate=false);
  scene.add(new THREE.AmbientLight(0x334466,0.4));
  scene.add(new THREE.HemisphereLight(0x6688dd,0x553322,0.5));
  const k=new THREE.DirectionalLight(0xffeedd,2.2);
  k.position.set(2.5,3.0,2.0);k.castShadow=true;
  k.shadow.mapSize.width=1024;k.shadow.mapSize.height=1024;k.shadow.radius=4;scene.add(k);
  const f=new THREE.DirectionalLight(0x88ccff,0.8);f.position.set(-2.0,1.5,-1.5);scene.add(f);
  scene.add(new THREE.DirectionalLight(0x44ffff,0.4).position.set(-1.0,2.5,-2.5));
  scene.add(new THREE.DirectionalLight(0xff44aa,0.3).position.set(1.5,1.0,-2.0));
  scene.add(new THREE.DirectionalLight(0x88aaff,0.3).position.set(0,4,0));
  const g=new THREE.Mesh(new THREE.CircleGeometry(3,48),new THREE.MeshStandardMaterial({color:0x0e0e1a,roughness:0.9,metalness:0,transparent:true,opacity:0.35,side:THREE.DoubleSide}));
  g.rotation.x=-Math.PI/2;g.position.y=-0.02;g.receiveShadow=true;scene.add(g);
  const gr=new THREE.GridHelper(4,20,0x1a1a30,0x1a1a30);
  gr.position.y=-0.01;gr.material.transparent=true;gr.material.opacity=0.06;scene.add(gr);
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}
function updateAvatar(time){if(!avatarGroup)return;avatarGroup.position.y=Math.sin(time*1.8)*0.002;avatarGroup.rotation.z=Math.sin(time*0.6)*0.0015}
function animate(time){animTime=time*0.001;requestAnimationFrame(animate);updateAvatar(animTime);controls?.update();renderer?.render(scene,camera)}

// ════════════════════════════════════════════════════════════════
//  Capture & UI
// ════════════════════════════════════════════════════════════════

const ctrack=new clm.tracker();ctrack.init();

async function startCamera(){
  const video=$('video');
  video.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
  await video.play();
  ctrack.start(video);
  // Start face tracking loop
  trackFace();
}

let detectedLandmarks=null;
function trackFace(){
  const video=$('video');
  if(video.readyState>=2){
    const pos=ctrack.getCurrentPosition();
    if(pos){detectedLandmarks=pos;$('status-tag').textContent='✓ 已检测到面部';$('status-tag').classList.add('ok');$('capture-btn').disabled=false}
    else{$('status-tag').textContent='面部检测中...';$('status-tag').classList.remove('ok');$('capture-btn').disabled=true}
  }
  requestAnimationFrame(trackFace);
}

function capturePhoto(){
  const v=$('video'),w=v.videoWidth||640,h=v.videoHeight||480;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
  return c;
}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));$(id).classList.remove('hidden')}
function showLoading(v){$('loading-overlay').classList.toggle('hidden',!v)}
function showError(m){const t=$('error-toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)}

async function onCapture(){
  const btn=$('capture-btn');btn.disabled=true;btn.textContent='● 处理中...';
  try{
    // Use stored landmarks if available
    let lms=detectedLandmarks;
    if(!lms||lms.length!==70){
      // Try detecting from current frame
      const cap=document.createElement('canvas');cap.width=640;cap.height=480;
      cap.getContext('2d').drawImage($('video'),0,0);
      lms=ctrack.track(cap.getContext('2d').getImageData(0,0,640,480).data,640,480);
    }
    const cap=capturePhoto();showLoading(true);await new Promise(r=>setTimeout(r,50));
    if(avatarGroup)scene.remove(avatarGroup);
    avatarGroup=buildAvatar(cap,lms&&lms.length===70?lms:null);
    scene.add(avatarGroup);
    controls.target.set(0,0.78,0);controls.autoRotate=true;controls.update();
    showLoading(false);showView('model-view');
  }catch(e){showLoading(false);showError('生成失败');console.error(e)}
  finally{btn.disabled=false;btn.textContent='● 捕捉重建'}
}

function onRetake(){if(avatarGroup){scene.remove(avatarGroup);avatarGroup=null}controls.autoRotate=true;showView('camera-view');ctrack.start($('video'))}
function onDownload(){
  if(!avatarGroup)return;showLoading(true);
  try{new GLTFExporter().parse(avatarGroup,blob=>{const u=URL.createObjectURL(new Blob([blob],{type:'application/octet-stream'}));const a=document.createElement('a');a.href=u;a.download='3d-avatar.glb';a.click();URL.revokeObjectURL(u);showLoading(false)},()=>{showLoading(false);showError('导出失败')},{binary:true});setTimeout(()=>showLoading(false),12000)}
  catch(e){showLoading(false);showError('下载失败')}
}

async function init(){
  try{await startCamera()}catch(e){showError('无法访问摄像头')}
  initScene();animate(0);showView('camera-view');
  $('capture-btn').addEventListener('click',onCapture);
  $('retake-btn').addEventListener('click',onRetake);
  $('download-btn').addEventListener('click',onDownload);
}
init();
</script>
