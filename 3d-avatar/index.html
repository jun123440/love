<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 人物建模</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #08080e; color: #fff;
  overflow: hidden; height: 100vh; width: 100vw; user-select: none;
}
.view {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.view.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }
#camera-view { background: radial-gradient(ellipse at 50% 40%, #141420, #08080e); }
#camera-container {
  position: relative; border-radius: 16px; overflow: hidden;
  box-shadow: 0 0 80px rgba(60,100,255,0.12);
  border: 1px solid rgba(255,255,255,0.05); background: #000;
  max-width: 88vw; max-height: 68vh;
}
#camera-container video {
  display: block; width: 100%; height: 100%;
  object-fit: cover; transform: scaleX(-1);
  max-width: 640px; max-height: 480px;
}
#capture-overlay { position: absolute; inset: 0; pointer-events: none; }
.face-guide {
  position: absolute; top: 50%; left: 50%;
  width: 52%; height: 60%;
  transform: translate(-50%, -54%);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
}
.guide-hint {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px;
  background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 20px;
  backdrop-filter: blur(6px); white-space: nowrap;
}
.btn-group { margin-top: 24px; display: flex; gap: 14px; align-items: center; }
.btn {
  padding: 13px 32px; border: none; border-radius: 50px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.25s ease; letter-spacing: 0.5px;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #4a7cff, #6c5ce7);
  color: #fff; box-shadow: 0 4px 24px rgba(74,124,255,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(74,124,255,0.45); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: rgba(255,255,255,0.06); color: #ccc;
  border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-2px); }
#capture-btn { min-width: 180px; justify-content: center; }
#three-container { width: 100vw; height: 100vh; display: block; }
.model-controls {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 10;
}
.model-hint {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.2); font-size: 12px; z-index: 10;
  background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px;
  backdrop-filter: blur(8px);
}
#loading-overlay {
  position: fixed; inset: 0; background: rgba(8,8,14,0.85);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 100; backdrop-filter: blur(16px);
  transition: opacity 0.4s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 44px; height: 44px; border: 2.5px solid rgba(255,255,255,0.04);
  border-top-color: #4a7cff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.55); }
#processing-bar {
  margin-top: 14px; width: 200px; height: 2px;
  background: rgba(255,255,255,0.06); overflow: hidden;
}
#processing-bar::after {
  content: ''; display: block; width: 40%; height: 100%;
  background: linear-gradient(90deg, #4a7cff, #6c5ce7);
  animation: bar-load 1.2s ease-in-out infinite;
}
@keyframes bar-load {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}
#error-toast {
  position: fixed; bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(255,50,50,0.12); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,50,50,0.2); padding: 12px 24px;
  border-radius: 10px; font-size: 13px; color: #ff6b6b;
  z-index: 200; transition: transform 0.35s ease; white-space: nowrap;
}
#error-toast.show { transform: translateX(-50%) translateY(0); }
@media (max-width: 600px) {
  #camera-container { border-radius: 10px; max-height: 50vh; }
  .btn { padding: 11px 22px; font-size: 13px; }
  #capture-btn { min-width: 150px; }
  .model-controls { flex-wrap: wrap; justify-content: center; bottom: 20px; }
}
</style>
</head>
<body>

<div id="camera-view" class="view">
  <div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="capture-overlay">
      <div class="face-guide"></div>
      <div class="guide-hint">将面部对准椭圆区域</div>
    </div>
  </div>

    <button id="capture-btn" class="btn btn-primary">● 捕捉形象</button>
  </div>
</div>

  <div class="spinner"></div>
  <p>正在重建 3D 模型</p>

</div>

<div id="model-view" class="view hidden">
  <div id="three-container"></div>

  <div class="model-controls">
    <button id="retake-btn" class="btn btn-secondary">← 重新拍摄</button>
    <button id="download-btn" class="btn btn-primary">↓ 下载 .glb</button>
  </div>
</div>

<div id="error-toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

const $ = id => document.getElementById(id);
const SEG = 20; // segments around each ring

// ═══════════════════════════════════════════════════
//  Body Mesh Builder — Lofted cross-sections
// ═══════════════════════════════════════════════════

function makeRing(y, rx, rz, seg) {
  const pts = [];
  for (let i = 0; i < seg; i++) {
    const a = (i / seg) * Math.PI * 2;
    pts.push([Math.cos(a) * rx, y, Math.sin(a) * rz]);
  }
  return pts;
}

function loft(rings, seg) {
  const verts = [], uvs = [], idx = [];
  for (let r = 0; r < rings.length; r++) {
    const pts = rings[r];
    const v = r / (rings.length - 1);
    for (let i = 0; i <= seg; i++) {
      const p = pts[i % seg];
      verts.push(p[0], p[1], p[2]);
      uvs.push(i / seg, v);
      if (r < rings.length - 1) {
        const a = r * (seg + 1) + i;
        const b = r * (seg + 1) + ((i + 1) % (seg + 1));
        const c = (r + 1) * (seg + 1) + i;
        const d = (r + 1) * (seg + 1) + ((i + 1) % (seg + 1));
        idx.push(a, b, c, b, d, c);
      }
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}

function offsetRing(ring, dx, dz) {
  return ring.map(p => [p[0] + dx, p[1], p[2] + dz]);
}

function scaleRing(ring, sx, sz) {
  return ring.map(p => [p[0] * sx, p[1], p[2] * sz]);
}

function partRings(profile, seg) {
  return profile.map(([y, rx, rz]) => makeRing(y, rx, rz, seg));
}

// Build complete body
function buildBodyMesh(colSkin, colTop, colPants, colShoe) {
  const seg = SEG;

  // Torso profile: [y, rx, rz]
  const torsoProf = [
    [0.80, 0.14, 0.11], [0.88, 0.15, 0.11], [0.95, 0.14, 0.10],
    [1.02, 0.14, 0.10], [1.10, 0.16, 0.11], [1.18, 0.18, 0.12],
    [1.26, 0.20, 0.13], [1.34, 0.22, 0.14], [1.40, 0.23, 0.15],
    [1.46, 0.21, 0.14], [1.50, 0.16, 0.12], [1.54, 0.12, 0.10],
  ];

  // Left leg profile (and mirrored for right)
  const legProf = [
    [0.78, 0.10, 0.08], [0.72, 0.10, 0.08], [0.65, 0.09, 0.07],
    [0.55, 0.08, 0.07], [0.45, 0.07, 0.06], [0.38, 0.07, 0.06],
    [0.30, 0.06, 0.05], [0.22, 0.06, 0.05], [0.14, 0.05, 0.04],
    [0.07, 0.04, 0.04], [0.03, 0.04, 0.03], [0.01, 0.05, 0.03],
  ];

  // Left arm profile
  const armProf = [
    [0.02, 0.06, 0.06], [-0.02, 0.05, 0.05], [-0.08, 0.05, 0.05],
    [-0.14, 0.05, 0.05], [-0.20, 0.04, 0.04], [-0.25, 0.04, 0.04],
    [-0.30, 0.04, 0.04], [-0.36, 0.03, 0.03], [-0.42, 0.03, 0.03],
    [-0.46, 0.03, 0.03],
  ];

  const torsoR = partRings(torsoProf, seg);
  const legR = partRings(legProf, seg);
  const armR = partRings(armProf, seg);

  const meshes = [];

  function addPart(rings, mat, dx, dz) {
    const off = rings.map(r => r.map(p => [p[0] + dx, p[1], p[2] + dz]));
    const g = loft(off, seg);
    const m = new THREE.Mesh(g, mat);
    m.castShadow = true;
    meshes.push(m);
  }

  const skin = new THREE.MeshStandardMaterial({ color: colSkin, roughness: 0.35, metalness: 0.0 });
  const top = new THREE.MeshStandardMaterial({ color: colTop, roughness: 0.5, metalness: 0.02 });
  const pants = new THREE.MeshStandardMaterial({ color: colPants, roughness: 0.6, metalness: 0.0 });
  const shoe = new THREE.MeshStandardMaterial({ color: colShoe, roughness: 0.7, metalness: 0.0 });

  // Torso (clothed)
  addPart(torsoR, top, 0, 0);

  // Split torso into upper (top) and lower (pants) at y ≈ 0.82
  const pantsRings = torsoR.filter(r => r[0][1] < 0.85);
  const topRings = torsoR.filter(r => r[0][1] >= 0.82);

  // Actually just add pants as separate mesh over lower torso
  const pantsProf = [
    [0.80, 0.14, 0.11], [0.78, 0.14, 0.11], [0.72, 0.13, 0.10],
  ];
  addPart(partRings(pantsProf, seg), pants, 0, 0);

  // Legs
  addPart(legR, pants, -0.10, 0);
  addPart(legR, pants, 0.10, 0);

  // Lower legs (skin visible)
  const skinLegProf = legProf.filter(([y]) => y < 0.40);
  addPart(partRings(skinLegProf, seg), skin, -0.10, 0);
  addPart(partRings(skinLegProf, seg), skin, 0.10, 0);

  // Feet
  const footProf = [[0.01, 0.05, 0.03], [-0.01, 0.06, 0.04], [-0.02, 0.04, 0.02]];
  addPart(partRings(footProf, seg), shoe, -0.10, 0);
  addPart(partRings(footProf, seg), shoe, 0.10, 0);

  // Arms
  addPart(armR, skin, -0.24, 0);
  addPart(armR, skin, 0.24, 0);

  // Upper arms (clothed)
  const clothedArmProf = armProf.filter(([y]) => y > -0.20);
  addPart(partRings(clothedArmProf, seg), top, -0.24, 0);
  addPart(partRings(clothedArmProf, seg), top, 0.24, 0);

  // Shoulders (ball joints)
  for (const s of [-1, 1]) {
    const sh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 14, 14), top);
    sh.position.set(s * 0.24, 1.45, 0);
    meshes.push(sh);
  }

  // Neck
  const neckProf = [[1.54, 0.10, 0.08], [1.58, 0.08, 0.07], [1.62, 0.07, 0.06]];
  addPart(partRings(neckProf, seg), skin, 0, 0);

  return meshes;
}

// ═══════════════════════════════════════════════════
//  Detailed Head Mesh
// ═══════════════════════════════════════════════════

function buildHeadMesh() {
  const C = 48, R = 36;
  const verts = [], uvs = [], idx = [];
  const W = 0.22, H = 0.28, D = 0.22;

  for (let r = 0; r <= R; r++) {
    const v = r / R;
    const theta = v * Math.PI;
    const ct = Math.cos(theta), st = Math.sin(theta);

    for (let c = 0; c <= C; c++) {
      const u = c / C;
      const phi = u * 2 * Math.PI;
      const cp = Math.cos(phi), sp = Math.sin(phi);
      const front = cp > 0 ? cp : 0;
      const frontSharp = Math.pow(Math.max(0, cp), 3);

      // Base ellipsoid
      const x = st * cp * W;
      const y = ct * H;
      const z = st * sp * D;

      // Face region (phi near 0, theta near 0.6-1.0)
      const faceRegion = Math.exp(-Math.pow((theta - 0.8) * 1.8, 2));

      // — Nose —
      const nose = 0.05 * Math.exp(-Math.pow((theta - 0.68) * 5, 2)) * frontSharp;
      const noseBridge = 0.015 * Math.exp(-Math.pow((theta - 0.45) * 6, 2)) * frontSharp;

      // — Eye sockets —
      const eLvl = theta - 0.52;
      const eyeL = Math.exp(-Math.pow(phi - 0.45, 2) * 30 - Math.pow(eLvl, 2) * 35);
      const eyeR = Math.exp(-Math.pow(phi + 0.45, 2) * 30 - Math.pow(eLvl, 2) * 35);
      const eyeSocket = -(eyeL + eyeR) * 0.022;

      // — Eyeball protrusion —
      const eyeBall = (Math.exp(-Math.pow(phi - 0.45, 2) * 25 - Math.pow(eLvl, 2) * 28) +
                       Math.exp(-Math.pow(phi + 0.45, 2) * 25 - Math.pow(eLvl, 2) * 28)) * 0.008;

      // — Cheekbones —
      const cheek = Math.exp(-Math.pow(theta - 0.82, 2) * 12 - Math.pow(Math.abs(phi) - 0.65, 2) * 18) * 0.015;

      // — Chin —
      const chin = Math.exp(-Math.pow((theta - 1.45) * 6, 2)) * front * 0.01;

      // — Jaw —
      const jaw = Math.exp(-Math.pow((theta - 1.25) * 3.5, 2)) * (1 - Math.abs(front)) * 0.04;

      // — Brow ridge —
      const brow = (Math.exp(-Math.pow(phi - 0.45, 2) * 14 - Math.pow(theta - 0.38, 2) * 28) +
                    Math.exp(-Math.pow(phi + 0.45, 2) * 14 - Math.pow(theta - 0.38, 2) * 28)) * 0.015;

      // — Lips —
      const lipUpper = Math.exp(-Math.pow((theta - 1.12) * 20, 2)) * front * 0.005;
      const lipLower = Math.exp(-Math.pow((theta - 1.22) * 18, 2)) * front * 0.004;

      // — Forehead —
      const forehead = Math.exp(-Math.pow((theta - 0.15) * 4, 2)) * 0.01;

      // — Ears (sides) —
      const ear = Math.exp(-Math.pow((theta - 0.75) * 4, 2) - Math.pow(Math.abs(Math.abs(phi) - 1.0) * 20, 2)) * 0.035;

      const totalZ = z + nose + noseBridge + eyeSocket + eyeBall + cheek + chin + jaw + brow + lipUpper + lipLower + ear;
      const totalX = x + ear * 0.3;

      verts.push(totalX, y + 0.005, totalZ);
      uvs.push(u, v);

      if (r < R && c < C) {
        const a = r*(C+1)+c, b = r*(C+1)+c+1;
        const d = (r+1)*(C+1)+c, e = (r+1)*(C+1)+c+1;
        idx.push(a,b,d, b,e,d);
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// ═══════════════════════════════════════════════════
//  Hair 
// ═══════════════════════════════════════════════════

function buildHairMesh() {
  const C = 40, R = 20;
  const verts = [], uvs = [], idx = [];

  for (let r = 0; r <= R; r++) {
    const v = r / R;
    const theta = v * Math.PI * 0.50;
    for (let c = 0; c <= C; c++) {
      const u = c / C;
      const phi = u * 2 * Math.PI;
      const x = Math.sin(theta) * Math.cos(phi) * 0.23;
      const y = Math.cos(theta) * 0.32;
      const z = Math.sin(theta) * Math.sin(phi) * 0.22;
      verts.push(x, y + 1.34, z);
      uvs.push(u, v);
      if (r < R && c < C) {
        const a = r*(C+1)+c, b = r*(C+1)+c+1;
        const d = (r+1)*(C+1)+c, e = (r+1)*(C+1)+c+1;
        idx.push(a,b,d, b,e,d);
      }
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// ═══════════════════════════════════════════════════
//  Texture & Color Extraction
// ═══════════════════════════════════════════════════

function extractColors(img) {
  const w = img.width, h = img.height;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const faceW = w * 0.38, faceH = faceW * 1.2;
  const fx = (w - faceW) / 2, fy = (h - faceH) / 2 - h * 0.02;

  function avg(x, y, w2, h2) {
    const d = ctx.getImageData(Math.max(0,x|0), Math.max(0,y|0), Math.min(w2|0,w-x|0), Math.min(h2|0,h-y|0)).data;
    let r=0,g=0,b=0,n=0;
    for (let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
    return n ? [r/n|0, g/n|0, b/n|0] : [180,150,130];
  }

  const skin = avg(fx+faceW*0.2, fy+faceH*0.2, faceW*0.6, faceH*0.4);
  const hair = avg(w*0.25, h*0.02, w*0.5, h*0.12);
  const cloth = avg(w*0.15, fy+faceH+h*0.04, w*0.7, h*0.2);

  // Brighten colors for youthful look
  const bright = (c2) => Math.min(255, c2 + 15);
  const clothB = [bright(cloth[0]), bright(cloth[1]), bright(cloth[2])];

  return {
    skin: (skin[0]<<16)|(skin[1]<<8)|skin[2],
    hair: (hair[0]<<16)|(hair[1]<<8)|hair[2],
    cloth: (clothB[0]<<16)|(clothB[1]<<8)|clothB[2],
    pants: 0x2a2a44,
    shoe: 0x111122,
    faceTex: buildFaceTexture(c, img, fx, fy, faceW, faceH, skin),
  };
}

function buildFaceTexture(ctx, img, fx, fy, fw, fh, skin) {
  const S = 512;
  const c = document.createElement('canvas');
  c.width = S; c.height = S;
  const tc = c.getContext('2d');

  tc.fillStyle = `rgb(${skin[0]},${skin[1]},${skin[2]})`;
  tc.fillRect(0, 0, S, S);

  const fs = S * 0.60;
  const ox = (S - fs) / 2, oy = (S - fs) / 2 - S * 0.02;

  tc.save();
  tc.beginPath();
  tc.ellipse(S/2, S/2, fs/2, fs/2, 0, 0, Math.PI*2);
  tc.clip();
  tc.drawImage(img, fx, fy, fw, fh, ox, oy, fs, fs);
  tc.restore();

  // Edge blend
  const g = tc.createRadialGradient(S/2, S/2, fs*0.25, S/2, S/2, fs*0.50);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, `rgba(${skin[0]},${skin[1]},${skin[2]},0.35)`);
  tc.fillStyle = g;
  tc.fillRect(0, 0, S, S);

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ═══════════════════════════════════════════════════
//  Avatar Assembly
// ═══════════════════════════════════════════════════

function buildAvatar(img) {
  const cols = extractColors(img);
  const group = new THREE.Group();

  // Body parts
  const parts = buildBodyMesh(cols.skin, cols.cloth, cols.pants, cols.shoe);
  for (const p of parts) group.add(p);

  // Head
  const headM = new THREE.MeshStandardMaterial({
    map: cols.faceTex, roughness: 0.25, metalness: 0.0
  });
  const head = new THREE.Mesh(buildHeadMesh(), headM);
  head.position.y = 1.58;
  head.castShadow = true;
  group.add(head);

  // Hair
  const hairM = new THREE.MeshStandardMaterial({
    color: cols.hair, roughness: 0.85, metalness: 0.0
  });
  const hair = new THREE.Mesh(buildHairMesh(), hairM);
  group.add(hair);

  return group;
}

// ═══════════════════════════════════════════════════
//  Scene
// ═══════════════════════════════════════════════════

let scene, camera, renderer, controls, avatarGroup, animTime = 0;

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c16);

  camera = new THREE.PerspectiveCamera(32, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(1.6, 1.4, 2.8);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.shadowMap.bias = -0.0005;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  $('three-container').appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.80, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 0.8;
  controls.maxDistance = 4.5;
  controls.maxPolarAngle = Math.PI * 0.80;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.8;
  controls.update();
  controls.addEventListener('start', () => controls.autoRotate = false);

  // Vibrant lighting for youthful feel
  scene.add(new THREE.AmbientLight(0x334466, 0.4));
  scene.add(new THREE.HemisphereLight(0x6688dd, 0x553322, 0.5));

  const key = new THREE.DirectionalLight(0xffeedd, 2.0);
  key.position.set(2.5, 3.0, 2.0);
  key.castShadow = true;
  key.shadow.mapSize.width = 1024;
  key.shadow.mapSize.height = 1024;
  key.shadow.radius = 4;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0x88ccff, 0.8);
  fill.position.set(-2.0, 1.5, -1.5);
  scene.add(fill);

  const rimCyan = new THREE.DirectionalLight(0x44ffff, 0.4);
  rimCyan.position.set(-1.0, 2.5, -2.5);
  scene.add(rimCyan);

  const rimMagenta = new THREE.DirectionalLight(0xff44aa, 0.3);
  rimMagenta.position.set(1.5, 1.0, -2.0);
  scene.add(rimMagenta);

  const top = new THREE.DirectionalLight(0x88aaff, 0.3);
  top.position.set(0, 4, 0);
  scene.add(top);

  // Ground
  const g = new THREE.Mesh(
    new THREE.CircleGeometry(2.8, 48),
    new THREE.MeshStandardMaterial({ color: 0x0e0e1a, roughness: 0.9, metalness: 0, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
  );
  g.rotation.x = -Math.PI/2;
  g.position.y = -0.02;
  g.receiveShadow = true;
  scene.add(g);

  const gr = new THREE.GridHelper(4, 20, 0x1a1a30, 0x1a1a30);
  gr.position.y = -0.01;
  gr.material.transparent = true;
  gr.material.opacity = 0.08;
  scene.add(gr);

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function updateAvatar(time) {
  if (!avatarGroup) return;
  const b = Math.sin(time * 1.8) * 0.002;
  const s = Math.sin(time * 0.6) * 0.0015;
  avatarGroup.position.y = b;
  avatarGroup.rotation.z = s;
}

function animate(time) {
  animTime = time * 0.001;
  requestAnimationFrame(animate);
  updateAvatar(animTime);
  controls?.update();
  renderer?.render(scene, camera);
}

// ═══════════════════════════════════════════════════
//  Capture & UI
// ═══════════════════════════════════════════════════

async function startCamera() {
  const video = $('video');
  video.srcObject = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  });
  await video.play();
}

function capturePhoto() {
  const video = $('video');
  const w = video.videoWidth || 640, h = video.videoHeight || 480;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.scale(-1, 1);
  ctx.drawImage(video, -w, 0, w, h);
  return c;
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  $(id).classList.remove('hidden');
}

function showLoading(v) { $('loading-overlay').classList.toggle('hidden', !v); }

function showError(m) {
  const t = $('error-toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

async function onCapture() {
  const btn = $('capture-btn');
  btn.disabled = true;
  btn.textContent = '● 处理中...';
  try {
    const cap = capturePhoto();
    showLoading(true);
    await new Promise(r => setTimeout(r, 50));
    if (avatarGroup) scene.remove(avatarGroup);
    avatarGroup = buildAvatar(cap);
    scene.add(avatarGroup);
    controls.target.set(0, 0.80, 0);
    controls.autoRotate = true;
    controls.update();
    showLoading(false);
    showView('model-view');
  } catch (e) {
    showLoading(false);
    showError('生成失败');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '● 捕捉形象';
  }
}

function onRetake() {
  if (avatarGroup) { scene.remove(avatarGroup); avatarGroup = null; }
  controls.autoRotate = true;
  showView('camera-view');
}

function onDownload() {
  if (!avatarGroup) return;
  showLoading(true);
  try {
    new GLTFExporter().parse(avatarGroup, blob => {
      const url = URL.createObjectURL(new Blob([blob], { type:'application/octet-stream' }));
      const a = document.createElement('a');
      a.href = url; a.download = '3d-avatar.glb'; a.click();
      URL.revokeObjectURL(url); showLoading(false);
    }, () => { showLoading(false); showError('导出失败'); }, { binary: true });
    setTimeout(() => showLoading(false), 12000);
  } catch (e) { showLoading(false); showError('下载失败'); }
}

async function init() {
  try { await startCamera(); } catch (e) { showError('无法访问摄像头'); }
  initScene();
  animate(0);
  showView('camera-view');
  $('capture-btn').addEventListener('click', onCapture);
  $('retake-btn').addEventListener('click', onRetake);
  $('download-btn').addEventListener('click', onDownload);
}

init();
</script>
