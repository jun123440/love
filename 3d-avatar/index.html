<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 面部建模 - 摄像头捕捉</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #08080e;
  color: #fff;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}
.view {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.view.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }
#camera-view { background: radial-gradient(ellipse at 50% 40%, #141420, #08080e); }
#camera-container {
  position: relative; border-radius: 16px; overflow: hidden;
  box-shadow: 0 0 80px rgba(60,100,255,0.12);
  border: 1px solid rgba(255,255,255,0.05); background: #000;
  max-width: 88vw; max-height: 68vh;
}
#camera-container video {
  display: block; width: 100%; height: 100%;
  object-fit: cover; transform: scaleX(-1);
  max-width: 640px; max-height: 480px;
}
#capture-overlay { position: absolute; inset: 0; pointer-events: none; }
.face-guide {
  position: absolute; top: 50%; left: 50%;
  width: 52%; height: 60%;
  transform: translate(-50%, -54%);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
}
.guide-hint {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.3);
  letter-spacing: 2px; background: rgba(0,0,0,0.5);
  padding: 5px 14px; border-radius: 20px;
  backdrop-filter: blur(6px); white-space: nowrap;
}
.btn-group { margin-top: 24px; display: flex; gap: 14px; align-items: center; }
.btn {
  padding: 13px 32px; border: none; border-radius: 50px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.25s ease; letter-spacing: 0.5px;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #4a7cff, #6c5ce7);
  color: #fff; box-shadow: 0 4px 24px rgba(74,124,255,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(74,124,255,0.45); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: rgba(255,255,255,0.06); color: #ccc;
  border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-2px); }
#capture-btn { min-width: 180px; justify-content: center; }
#three-container { width: 100vw; height: 100vh; display: block; }
.model-controls {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%); display: flex; gap: 12px; z-index: 10;
}
.model-hint {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.2); font-size: 12px; letter-spacing: 1px;
  z-index: 10; background: rgba(0,0,0,0.4);
  padding: 6px 16px; border-radius: 20px; backdrop-filter: blur(8px);
}
#loading-overlay {
  position: fixed; inset: 0;
  background: rgba(8,8,14,0.85);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(16px);
  transition: opacity 0.4s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 44px; height: 44px;
  border: 2.5px solid rgba(255,255,255,0.04);
  border-top-color: #4a7cff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.55); }
#processing-bar {
  margin-top: 14px; width: 200px; height: 2px;
  background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
#processing-bar::after {
  content: ''; display: block; width: 40%; height: 100%;
  background: linear-gradient(90deg, #4a7cff, #6c5ce7);
  border-radius: 2px; animation: bar-load 1.2s ease-in-out infinite;
}
@keyframes bar-load {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}
#error-toast {
  position: fixed; bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(255,50,50,0.12); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,50,50,0.2);
  padding: 12px 24px; border-radius: 10px;
  font-size: 13px; color: #ff6b6b; z-index: 200;
  transition: transform 0.35s ease; white-space: nowrap;
}
#error-toast.show { transform: translateX(-50%) translateY(0); }
.status-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 11px; padding: 4px 10px; border-radius: 8px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  color: rgba(255,255,255,0.4); pointer-events: none;
}
.status-badge.ready { color: #4a7cff; }
@media (max-width: 600px) {
  #camera-container { border-radius: 10px; max-height: 50vh; }
  .btn { padding: 11px 22px; font-size: 13px; }
  #capture-btn { min-width: 150px; }
  .model-controls { flex-wrap: wrap; justify-content: center; bottom: 20px; }
}
</style>
</head>
<body>

<div id="camera-view" class="view">
  <div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="capture-overlay">
      <div class="face-guide"></div>
      <div class="guide-hint">将面部对准椭圆区域</div>
    </div>
    <div class="status-badge" id="model-status">加载 AI 模型中...</div>
  </div>
  <div class="btn-group">
    <button id="capture-btn" class="btn btn-primary" disabled>● 捕捉形象</button>
  </div>
</div>

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <p>正在重建 3D 面部</p>
  <div id="processing-bar"></div>
</div>

<div id="model-view" class="view hidden">
  <div id="three-container"></div>
  <div class="model-hint">拖动旋转 · 滚轮缩放</div>
  <div class="model-controls">
    <button id="retake-btn" class="btn btn-secondary">← 重新拍摄</button>
    <button id="download-btn" class="btn btn-primary">↓ 下载 .glb</button>
  </div>
</div>

<div id="error-toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ─── Delaunay Triangulation ────────────────────────
function delaunay(points) {
  const n = points.length;
  if (n < 3) return new Uint16Array(0);
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of points) { const x = p[0], y = p[1]; if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
  const dx = maxX - minX || 1, dy = maxY - minY || 1;
  const mx = (minX + maxX) / 2, my = (minY + maxY) / 2, r = Math.max(dx, dy) * 20;
  const pts = points.map(p => [p[0], p[1]]);
  pts.push([mx - r, my - r], [mx + r, my - r], [mx, my + r]);

  function circ(a, b, c, p) {
    const ax = a[0] - p[0], ay = a[1] - p[1], bx = b[0] - p[0], by = b[1] - p[1], cx = c[0] - p[0], cy = c[1] - p[1];
    const ab = ax*ax + ay*ay, bc = bx*bx + by*by, cd = cx*cx + cy*cy;
    const d = 2 * (ax*(by-cy) + bx*(cy-ay) + cx*(ay-by));
    if (d === 0) return false;
    const ux = (ab*(by-cy) + bc*(cy-ay) + cd*(ay-by)) / d;
    const uy = (ab*(cx-bx) + bc*(ax-cx) + cd*(bx-ax)) / d;
    return (ax-ux)*(ax-ux) + (ay-uy)*(ay-uy) < ux*ux + uy*uy;
  }

  const tris = [{ a: n, b: n+1, c: n+2 }];
  for (let i = 0; i < n; i++) {
    const p = pts[i];
    const edges = [];
    for (let j = tris.length - 1; j >= 0; j--) {
      const t = tris[j];
      if (circ(pts[t.a], pts[t.b], pts[t.c], p)) {
        edges.push(t.a, t.b, t.b, t.c, t.c, t.a);
        tris.splice(j, 1);
      }
    }
    for (let j = 0; j < edges.length; j += 2) {
      let dup = false;
      for (let k = j + 2; k < edges.length; k += 2) {
        if (edges[j] === edges[k] && edges[j+1] === edges[k+1]) { dup = true; edges.splice(k, 2); break; }
        if (edges[j] === edges[k+1] && edges[j+1] === edges[k]) { dup = true; edges.splice(k, 2); break; }
      }
      if (!dup) tris.push({ a: edges[j], b: edges[j+1], c: i });
    }
  }

  const out = [];
  for (const t of tris) { if (t.a < n && t.b < n && t.c < n) out.push(t.a, t.b, t.c); }
  return new Uint16Array(out);
}

// ─── State ─────────────────────────────────────────
const $ = id => document.getElementById(id);
let scene, camera, renderer, controls;
let avatarGroup = null;
let isProcessing = false;
let animTime = 0;
let faceLandmarker = null;
let modelReady = false;

// ─── MediaPipe Face Landmarker ─────────────────────
async function initAIModel() {
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.16/wasm/vision_bundle.js');
    const wasm = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.16/wasm/';
    const vision = await mod.FilesetResolver.forVisionTasks(wasm);
    faceLandmarker = await mod.FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task',
        delegate: 'GPU'
      },
      runningMode: 'IMAGE',
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false,
      numFaces: 1
    });
    modelReady = true;
    $('model-status').textContent = 'AI 模型已就绪';
    $('model-status').classList.add('ready');
    $('capture-btn').disabled = false;
    return true;
  } catch (e) {
    console.error('FaceLandmarker init failed:', e);
    $('model-status').textContent = 'AI 模型加载失败，使用基础模式';
    setTimeout(() => $('capture-btn').disabled = false, 1000);
    return false;
  }
}

// ─── Camera ────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    const video = $('video');
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    showError('无法访问摄像头，请授予权限');
  }
}

function capturePhoto() {
  const video = $('video');
  const w = video.videoWidth || 640, h = video.videoHeight || 480;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.scale(-1, 1);
  ctx.drawImage(video, -w, 0, w, h);
  return canvas;
}

// ─── Face Mesh from Landmarks ──────────────────────
function buildFaceMesh(landmarks, imgWidth, imgHeight) {
  const n = landmarks.length;

  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (const p of landmarks) { if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x; if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; }
  const fw = maxX - minX, fh = maxY - minY;
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  const targetW = 0.50, targetH = 0.62;
  const sx = targetW / fw, sy = targetH / fh;

  const verts = new Float32Array(n * 3);
  const uvs = new Float32Array(n * 2);
  for (let i = 0; i < n; i++) {
    const p = landmarks[i];
    verts[i*3]   = (p.x - cx) * sx;
    verts[i*3+1] = -(p.y - cy) * sy + 1.72;
    verts[i*3+2] = p.z * sx * 1.6;
    uvs[i*2]   = p.x;
    uvs[i*2+1] = p.y;
  }

  const pts2d = landmarks.map(p => [p.x, p.y]);
  const indices = delaunay(pts2d);

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geom.setIndex(new THREE.BufferAttribute(indices, 1));
  geom.computeVertexNormals();
  return geom;
}

function buildHeadTexture(img, landmarks, w, h) {
  const S = 512;
  const c = document.createElement('canvas');
  c.width = S; c.height = S;
  const ctx = c.getContext('2d');

  // Sample skin color from cheek area (landmark indices ~105, ~330 for cheeks)
  function sampleColor(lm) {
    const px = Math.round(lm.x * w), py = Math.round(lm.y * h);
    const d = ctx.getImageData(Math.max(0,px-4), Math.max(0,py-4), 8, 8).data;
    let r=0,g=0,b=0,cnt=0;
    for (let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; cnt++; }
    return cnt ? { r:r/cnt|0, g:g/cnt|0, b:b/cnt|0 } : { r:180,g:150,b:130 };
  }

  ctx.drawImage(img, 0, 0);
  const cheekL = landmarks[105] || { x:0.3, y:0.5 }, cheekR = landmarks[330] || { x:0.7, y:0.5 };
  const s1 = sampleColor(cheekL), s2 = sampleColor(cheekR);
  const skin = { r: (s1.r+s2.r)/2|0, g: (s1.g+s2.g)/2|0, b: (s1.b+s2.b)/2|0 };

  const tex = document.createElement('canvas');
  tex.width = S; tex.height = S;
  const tctx = tex.getContext('2d');
  tctx.fillStyle = `rgb(${skin.r},${skin.g},${skin.b})`;
  tctx.fillRect(0, 0, S, S);

  // Face region based on landmark bounds
  let mnX=1, mxX=0, mnY=1, mxY=0;
  for (const p of landmarks) { if (p.x < mnX) mnX = p.x; if (p.x > mxX) mxX = p.x; if (p.y < mnY) mnY = p.y; if (p.y > mxY) mxY = p.y; }

  // Add margin
  const margin = 0.05;
  mnX = Math.max(0, mnX - margin); mxX = Math.min(1, mxX + margin);
  mnY = Math.max(0, mnY - margin); mxY = Math.min(1, mxY + margin);

  const faceTexSize = S * 0.7;
  const fx = (S - faceTexSize) / 2, fy = (S - faceTexSize) / 2;

  tctx.save();
  tctx.beginPath();
  tctx.ellipse(S/2, S/2, faceTexSize/2, faceTexSize/2, 0, 0, Math.PI*2);
  tctx.clip();
  tctx.drawImage(c, mnX*w, mnY*h, (mxX-mnX)*w, (mxY-mnY)*h, fx, fy, faceTexSize, faceTexSize);
  tctx.restore();

  // Soft edge blend
  const g = tctx.createRadialGradient(S/2, S/2, faceTexSize*0.3, S/2, S/2, faceTexSize*0.55);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, `rgba(${skin.r},${skin.g},${skin.b},0.4)`);
  tctx.fillStyle = g;
  tctx.fillRect(0, 0, S, S);

  const tex3 = new THREE.CanvasTexture(tex);
  tex3.colorSpace = THREE.SRGBColorSpace;
  return tex3;
}

// ─── Body Builder ──────────────────────────────────
function buildBody() {
  const group = new THREE.Group();
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.4, metalness: 0.0 });
  const clothMat = new THREE.MeshStandardMaterial({ color: 0x334466, roughness: 0.6, metalness: 0.02 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7, metalness: 0.0 });
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8, metalness: 0.0 });

  // Neck
  const neck = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.02, 6, 14), skinMat);
  neck.position.y = 1.50;
  group.add(neck);

  // Torso
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.30, 0.18, 8, 20), clothMat);
  torso.position.y = 1.18;
  torso.castShadow = true;
  group.add(torso);

  // Hip
  const hip = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.06, 8, 18), clothMat);
  hip.position.y = 0.84;
  group.add(hip);

  // Shoulders
  for (const side of [-1, 1]) {
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), clothMat);
    s.position.set(side * 0.34, 1.45, 0);
    group.add(s);
  }

  // Upper arms
  for (const side of [-1, 1]) {
    const a = new THREE.Mesh(new THREE.CapsuleGeometry(0.05, 0.16, 6, 14), clothMat);
    a.position.set(side * 0.36, 1.28, 0);
    a.rotation.z = side * 0.3;
    a.castShadow = true;
    group.add(a);
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 10), clothMat);
    e.position.set(side * 0.42, 1.08, 0.02);
    group.add(e);
  }

  // Forearms
  for (const side of [-1, 1]) {
    const a = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.16, 6, 14), skinMat);
    a.position.set(side * 0.42, 0.92, 0.04);
    a.rotation.z = side * 0.4;
    group.add(a);
  }

  // Hands
  for (const side of [-1, 1]) {
    const h = new THREE.Mesh(new THREE.SphereGeometry(0.03, 10, 10), skinMat);
    h.position.set(side * 0.44, 0.77, 0.06);
    group.add(h);
  }

  // Upper legs
  for (const side of [-1, 1]) {
    const l = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.18, 7, 16), pantsMat);
    l.position.set(side * 0.10, 0.56, 0);
    l.castShadow = true;
    group.add(l);
    const k = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), pantsMat);
    k.position.set(side * 0.10, 0.34, 0);
    group.add(k);
  }

  // Lower legs
  for (const side of [-1, 1]) {
    const l = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.18, 7, 16), skinMat);
    l.position.set(side * 0.10, 0.18, 0);
    group.add(l);
  }

  // Feet
  for (const side of [-1, 1]) {
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.10), shoeMat);
    f.position.set(side * 0.10, 0.015, 0.03);
    group.add(f);
  }

  return group;
}

// ─── Scene Setup ───────────────────────────────────
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c16);

  camera = new THREE.PerspectiveCamera(36, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(1.8, 1.5, 2.6);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  $('three-container').appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.85, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 1.0;
  controls.maxDistance = 5;
  controls.maxPolarAngle = Math.PI * 0.82;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.6;
  controls.update();
  controls.addEventListener('start', () => { controls.autoRotate = false; });

  // Lights
  scene.add(new THREE.AmbientLight(0x333366, 0.5));
  scene.add(new THREE.HemisphereLight(0x6677cc, 0x443322, 0.5));

  const key = new THREE.DirectionalLight(0xffeedd, 1.8);
  key.position.set(2, 3.5, 2.5);
  key.castShadow = true;
  key.shadow.mapSize.width = 1024;
  key.shadow.mapSize.height = 1024;
  key.shadow.radius = 4;
  key.shadow.bias = -0.001;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0x88bbff, 0.7);
  fill.position.set(-2, 1.5, -1.5);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0xaaccff, 0.5);
  rim.position.set(-0.5, 3, -3);
  scene.add(rim);

  const top = new THREE.DirectionalLight(0x88aaff, 0.3);
  top.position.set(0, 4, 0);
  scene.add(top);

  // Ground
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(2.5, 48),
    new THREE.MeshStandardMaterial({ color: 0x0e0e1a, roughness: 0.9, metalness: 0, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  const grid = new THREE.GridHelper(4, 20, 0x1a1a30, 0x1a1a30);
  grid.position.y = 0.001;
  grid.material.transparent = true;
  grid.material.opacity = 0.12;
  scene.add(grid);

  window.addEventListener('resize', () => {
    if (!camera || !renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ─── Animation ─────────────────────────────────────
function updateAvatar(time) {
  if (!avatarGroup) return;
  const b = Math.sin(time * 1.8) * 0.003;
  const s = Math.sin(time * 0.6) * 0.002;
  avatarGroup.position.y = b;
  avatarGroup.rotation.z = s;
}

function animate(time) {
  animTime = time * 0.001;
  requestAnimationFrame(animate);
  updateAvatar(animTime);
  controls?.update();
  renderer?.render(scene, camera);
}

// ─── Avatar Assembly ──────────────────────────────
async function createAvatar(captureCanvas) {
  const w = captureCanvas.width, h = captureCanvas.height;
  let faceGeom = null;
  let headTex = null;

  if (faceLandmarker && modelReady) {
    try {
      const img = new Image();
      img.src = captureCanvas.toDataURL();
      await img.decode();

      const result = faceLandmarker.detect(img);

      if (result.faceLandmarks && result.faceLandmarks.length > 0) {
        const landmarks = result.faceLandmarks[0];
        faceGeom = buildFaceMesh(landmarks, w, h);
        headTex = buildHeadTexture(captureCanvas, landmarks, w, h);
      }
    } catch (e) {
      console.warn('Face landmark detection failed, using fallback:', e);
    }
  }

  const group = new THREE.Group();

  // Body
  const body = buildBody();
  group.add(body);

  // Head
  if (faceGeom && headTex) {
    const mat = new THREE.MeshStandardMaterial({
      map: headTex, roughness: 0.35, metalness: 0.0, side: THREE.DoubleSide
    });
    const head = new THREE.Mesh(faceGeom, mat);
    head.castShadow = true;
    group.add(head);
  } else {
    // Fallback: face-shaped sphere
    const fallbackGeom = new THREE.SphereGeometry(0.28, 40, 32);
    const pos = fallbackGeom.attributes.position;
    const v = new THREE.Vector3();
    for (let i = 0; i < pos.count; i++) {
      v.fromBufferAttribute(pos, i);
      const theta = Math.acos(Math.max(-1, Math.min(1, v.y / 0.28)));
      const phi = Math.atan2(v.z, v.x);
      const front = Math.cos(phi);
      let r = 0.28;
      const mid = Math.exp(-Math.pow((theta - 0.95) * 2.2, 2));
      r *= 1 + 0.10 * mid;
      const nose = 0.045 * Math.exp(-Math.pow((theta - 0.75) * 5, 2)) * Math.max(0, front);
      r += nose;
      const eyeL = Math.exp(-Math.pow(phi - 0.55, 2) * 28 - Math.pow(theta - 0.6, 2) * 35);
      const eyeR = Math.exp(-Math.pow(phi + 0.55, 2) * 28 - Math.pow(theta - 0.6, 2) * 35);
      r -= (eyeL + eyeR) * 0.018;
      v.setLength(r);
      pos.setXYZ(i, v.x, v.y, v.z);
    }
    pos.needsUpdate = true;
    fallbackGeom.computeVertexNormals();

    // Create fallback texture
    const fc = document.createElement('canvas');
    fc.width = 512; fc.height = 512;
    const fctx = fc.getContext('2d');
    fctx.fillStyle = '#d4a574';
    fctx.fillRect(0, 0, 512, 512);
    const faceSize = 320;
    const fw = captureCanvas.width * 0.4, fh = fw * 1.2;
    const fcx = (captureCanvas.width - fw) / 2, fcy = (captureCanvas.height - fh) / 2 - captureCanvas.height * 0.02;
    fctx.save();
    fctx.beginPath();
    fctx.ellipse(256, 256, 160, 160, 0, 0, Math.PI*2);
    fctx.clip();
    fctx.drawImage(captureCanvas, fcx, fcy, fw, fh, 96, 96, faceSize, faceSize);
    fctx.restore();
    const ft = new THREE.CanvasTexture(fc);
    ft.colorSpace = THREE.SRGBColorSpace;
    const mat = new THREE.MeshStandardMaterial({ map: ft, roughness: 0.35, metalness: 0.0 });
    const head = new THREE.Mesh(fallbackGeom, mat);
    head.position.y = 1.72;
    head.castShadow = true;
    group.add(head);
  }

  return group;
}

// ─── UI ────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  $(id).classList.remove('hidden');
}

function showLoading(v) { $('loading-overlay').classList.toggle('hidden', !v); }

function showError(msg) {
  const t = $('error-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

async function onCapture() {
  if (isProcessing) return;
  isProcessing = true;
  const btn = $('capture-btn');
  btn.disabled = true;
  btn.textContent = '● 处理中...';

  try {
    const cap = capturePhoto();
    showLoading(true);
    await new Promise(r => setTimeout(r, 50));

    const avatar = await createAvatar(cap);
    if (avatarGroup) scene.remove(avatarGroup);
    avatarGroup = avatar;
    scene.add(avatarGroup);

    controls.target.set(0, 0.85, 0);
    controls.autoRotate = true;
    controls.update();

    showLoading(false);
    showView('model-view');
  } catch (e) {
    showLoading(false);
    showError('生成失败: ' + e.message);
    console.error(e);
  } finally {
    isProcessing = false;
    btn.disabled = false;
    btn.textContent = '● 捕捉形象';
  }
}

function onRetake() {
  if (avatarGroup) { scene.remove(avatarGroup); avatarGroup = null; }
  controls.autoRotate = true;
  showView('camera-view');
}

function onDownload() {
  if (!avatarGroup) return;
  showLoading(true);
  try {
    const exporter = new GLTFExporter();
    exporter.parse(avatarGroup, blob => {
      const url = URL.createObjectURL(new Blob([blob], { type:'application/octet-stream' }));
      const a = document.createElement('a');
      a.href = url; a.download = '3d-avatar.glb'; a.click();
      URL.revokeObjectURL(url);
      showLoading(false);
    }, err => { showLoading(false); showError('导出失败'); console.error(err); }, { binary: true });
    setTimeout(() => showLoading(false), 12000);
  } catch (e) { showLoading(false); showError('下载失败'); }
}

// ─── Init ──────────────────────────────────────────
async function init() {
  await startCamera();
  initScene();
  animate(0);
  showView('camera-view');
  initAIModel();

  $('capture-btn').addEventListener('click', onCapture);
  $('retake-btn').addEventListener('click', onRetake);
  $('download-btn').addEventListener('click', onDownload);
}

init();
</script>
