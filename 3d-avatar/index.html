<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>3D 头像</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#111;color:#fff;height:100vh;width:100vw;overflow:hidden}
.view{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s}
.view.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
#cam-wrap{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(80,130,255,.15);border:2px solid rgba(255,255,255,.1);background:#000;width:min(88vw,360px);aspect-ratio:4/3}
#cam-wrap video{display:block;width:100%;height:100%;object-fit:cover}
#cam-wrap.mirror video{transform:scaleX(-1)}
#oval{position:absolute;top:50%;left:50%;width:50%;height:56%;transform:translate(-50%,-54%);border:2px solid rgba(255,255,255,.3);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;pointer-events:none}
#hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.5);background:rgba(0,0,0,.6);padding:5px 14px;border-radius:20px;pointer-events:none}
.btns{margin-top:18px;display:flex;gap:12px;align-items:center;justify-content:center}
.btn{padding:12px 28px;border:none;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
.btn1{background:linear-gradient(135deg,#5588ff,#7755f0);color:#fff;box-shadow:0 4px 20px rgba(85,136,255,.3)}
.btn1:active{transform:scale(.96)}
.btn1:disabled{opacity:.4}
.btn2{background:rgba(255,255,255,.1);color:#ddd;border:1px solid rgba(255,255,255,.15)}
.btn2:active{background:rgba(255,255,255,.18)}
.btn2 svg{width:15px;height:15px;fill:currentColor}
#capBtn{min-width:160px;justify-content:center}
#gl{width:100vw;height:100vh;display:block}
.ctrl{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
.tip{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:12px;z-index:10;background:rgba(0,0,0,.5);padding:5px 16px;border-radius:20px;pointer-events:none}
#load{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .3s}
#load.hidden{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:2px solid rgba(255,255,255,.1);border-top-color:#5588ff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load p{margin-top:14px;font-size:14px;color:rgba(255,255,255,.6)}
#err{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.25);padding:10px 22px;border-radius:10px;font-size:13px;color:#ff6b6b;z-index:200;transition:transform .3s;white-space:nowrap}
#err.show{transform:translateX(-50%) translateY(0)}
#status{position:absolute;top:10px;right:12px;font-size:11px;padding:3px 9px;border-radius:6px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.4);pointer-events:none}
</style>
</head>
<body>

<div id="cam-view" class="view">
  <div id="cam-wrap" class="mirror">
    <video id="video" autoplay playsinline muted></video>
    <div id="oval"></div>
    <div id="hint">面部对准框内 · 正面拍摄</div>
    <div id="status">就绪</div>
  </div>
  <div class="btns">
    <button id="swBtn" class="btn btn2">
      <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c2.21 0 4 1.79 4 4 0 .89-.3 1.72-.79 2.39l2.2 2.2C18.54 13.89 19 12.5 19 11c0-3.87-3.13-7-7-7-1.5 0-2.89.46-4.03 1.26l1.48 1.48A3.98 3.98 0 0112 7zm-4.41 1.13L4.26 4.85 3 6.11l2.08 2.08C3.95 9.7 3 11.24 3 13c0 3.87 3.13 7 7 7 1.76 0 3.36-.63 4.61-1.69l2.13 2.13 1.26-1.26-9.41-9.42z"/></svg>
      翻转
    </button>
    <button id="capBtn" class="btn btn1">启动摄像头</button>
  </div>
</div>

<div id="load" class="hidden"><div class="sp"></div><p>生成 3D 模型中...</p></div>

<div id="md-view" class="view hidden">
  <div id="gl"></div>
  <div class="tip">拖动旋转 · 缩放</div>
  <div class="ctrl">
    <button id="reBtn" class="btn btn2">← 重拍</button>
    <button id="dlBtn" class="btn btn1">↓ 下载 .glb</button>
  </div>
</div>

<div id="err"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/exporters/GLTFExporter.js"></script>

<script>
(function(){
var T=THREE;

var facing='user', stream=null, avatar=null;
var scene, cam, renderer, ctl, t=0;

function buildFace(tex,imgW,imgH){
  var W=80,H=64,verts=[],uvs=[],idx=[];
  for(var j=0;j<=H;j++){
    var v=j/H,y=(0.5-v)*0.50;
    for(var i=0;i<=W;i++){
      var u=i/W,x=(u-0.5)*0.38;
      var cx=u-0.5, front=1-Math.abs(cx)*2, z=0;
      z+=-0.06*Math.pow(Math.abs(cx)*2,1.5);
      z+=0.050*Math.exp(-(Math.pow((u-0.5)*3.5,2)+Math.pow((v-0.55)*3.2,2)));
      z+=0.018*Math.exp(-(Math.pow((u-0.5)*5,2)+Math.pow((v-0.42)*2.8,2)))*front;
      var el=Math.exp(-Math.pow(u-0.33,2)*40-Math.pow(v-0.44,2)*42);
      var er=Math.exp(-Math.pow(u-0.67,2)*40-Math.pow(v-0.44,2)*42);
      z+=-(el+er)*0.022;
      z+=(Math.exp(-Math.pow(u-0.33,2)*28-Math.pow(v-0.40,2)*32)+Math.exp(-Math.pow(u-0.67,2)*28-Math.pow(v-0.40,2)*32))*0.010;
      var ckl=Math.exp(-Math.pow(v-0.52,2)*16-Math.pow(u-0.20,2)*22);
      var ckr=Math.exp(-Math.pow(v-0.52,2)*16-Math.pow(u-0.80,2)*22);
      z+=(ckl+ckr)*0.018;
      z+=Math.exp(-Math.pow((v-0.88)*6,2))*front*0.014;
      z+=Math.exp(-Math.pow((v-0.70)*4,2))*0.030;
      var bl=Math.exp(-Math.pow(u-0.33,2)*16-Math.pow(v-0.32,2)*36);
      var br=Math.exp(-Math.pow(u-0.67,2)*16-Math.pow(v-0.32,2)*36);
      z+=(bl+br)*0.015;
      z+=Math.exp(-Math.pow((v-0.68)*28,2))*front*0.008;
      z+=Math.exp(-Math.pow((v-0.72)*24,2))*front*0.006;
      z+=Math.exp(-Math.pow((v-0.04)*5,2))*0.008;
      z+=Math.exp(-Math.pow((v-0.56)*5,2)-Math.pow((u-0.5)*8,2))*(-0.005);
      verts.push(x,y,z);uvs.push(u,1-v);
      if(i<W&&j<H){var a=j*(W+1)+i,b=a+1,c=a+W+1,d=c+1;idx.push(a,b,d,a,d,c)}
    }
  }
  var geo=new T.BufferGeometry();
  geo.setAttribute('position',new T.BufferAttribute(new Float32Array(verts),3));
  geo.setAttribute('uv',new T.BufferAttribute(new Float32Array(uvs),2));
  geo.setIndex(new T.BufferAttribute(new Uint16Array(idx),1));geo.computeVertexNormals();
  var mesh=new T.Mesh(geo,new T.MeshStandardMaterial({map:tex,roughness:.15,metalness:0}));
  mesh.position.y=1.60;return mesh;
}

function avg(ctx,x,y,w,h){var d=ctx.getImageData(Math.max(0,x|0),Math.max(0,y|0),Math.min(w|0,ctx.canvas.width-x|0),Math.min(h|0,ctx.canvas.height-y|0)).data;var r=0,g=0,b=0,n=0;for(var i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++}return n?[(r/n|0),(g/n|0),(b/n|0)]:[180,150,130];}

function processPhoto(img){
  var w=img.width,h=img.height;var c=document.createElement('canvas');c.width=w;c.height=h;
  var ctx=c.getContext('2d');ctx.drawImage(img,0,0);
  var fW=w*.34,fH=fW*1.25,fX=(w-fW)/2,fY=(h-fH)/2;
  var skin=avg(ctx,fX+fW*.3,fY+fH*.12,fW*.4,fH*.55);
  var SZ=512;var tx=document.createElement('canvas');tx.width=SZ;tx.height=SZ;
  var tc=tx.getContext('2d');
  tc.fillStyle='rgb('+skin[0]+','+skin[1]+','+skin[2]+')';tc.fillRect(0,0,SZ,SZ);
  tc.save();tc.beginPath();tc.ellipse(SZ/2,SZ/2,SZ*.30,SZ*.36,0,0,Math.PI*2);tc.clip();
  tc.drawImage(img,fX,fY,fW,fH,0,0,SZ,SZ);tc.restore();
  var gr=tc.createRadialGradient(SZ/2,SZ/2,SZ*.08,SZ/2,SZ/2,SZ*.40);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba('+skin[0]+','+skin[1]+','+skin[2]+',.28)');
  tc.fillStyle=gr;tc.fillRect(0,0,SZ,SZ);
  var t3=new T.CanvasTexture(tx);t3.encoding=T.sRGBEncoding;
  return t3;
}

function buildAvatar(img){
  var tex=processPhoto(img);return buildFace(tex,img.width,img.height);
}

function initScene(){
  scene=new T.Scene();scene.background=new T.Color(0x0c0c16);
  cam=new T.PerspectiveCamera(30,innerWidth/innerHeight,.1,100);
  cam.position.set(0,1.6,3);
  renderer=new T.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=T.PCFSoftShadowMap;
  renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  document.getElementById('gl').appendChild(renderer.domElement);
  ctl=new T.OrbitControls(cam,renderer.domElement);
  ctl.target.set(0,1.55,0);ctl.enableDamping=true;ctl.dampingFactor=.08;
  ctl.minDistance=.5;ctl.maxDistance=3.5;ctl.maxPolarAngle=Math.PI*.75;ctl.minPolarAngle=.15;
  ctl.autoRotate=true;ctl.autoRotateSpeed=1.2;ctl.update();
  ctl.addEventListener('start',function(){ctl.autoRotate=false});
  scene.add(new T.AmbientLight(0x334466,.4));
  scene.add(new T.HemisphereLight(0x6688dd,0x553322,.5));
  var k=new T.DirectionalLight(0xffeedd,2.2);k.position.set(2,3,2.5);k.castShadow=true;
  k.shadow.mapSize.width=1024;k.shadow.mapSize.height=1024;k.shadow.radius=3;scene.add(k);
  scene.add(new T.DirectionalLight(0x88ccff,.6).position.set(-2,1.5,-1.5));
  scene.add(new T.DirectionalLight(0xff44aa,.2).position.set(1,1.2,-2));
  var fl=new T.Mesh(new T.CircleGeometry(3,48),new T.MeshStandardMaterial({color:0x0e0e1a,roughness:.9,metalness:0,transparent:true,opacity:.35,side:T.DoubleSide}));
  fl.rotation.x=-Math.PI/2;fl.position.y=-.2;fl.receiveShadow=true;scene.add(fl);
  // 测试球 - 验证渲染是否正常
  var test=new T.Mesh(new T.SphereGeometry(.15,16,16),new T.MeshBasicMaterial({color:0xff4444}));
  test.position.set(0,1.55,0);scene.add(test);
  addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function anim(time){t=time*.001;requestAnimationFrame(anim);if(avatar){avatar.rotation.y=Math.sin(t*.5)*.003;avatar.position.y=Math.sin(t*1.5)*.0015}if(ctl)ctl.update();if(renderer)renderer.render(scene,cam)}

function snap(){var v=document.getElementById('video'),w=v.videoWidth||640,h=v.videoHeight||480;if(!w||!h)return null;var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(v,0,0);return c}
function toast(m){var e=document.getElementById('err');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},3500)}
function showV(id){var vs=document.querySelectorAll('.view');for(var i=0;i<vs.length;i++)vs[i].classList.add('hidden');document.getElementById(id).classList.remove('hidden')}

async function startCam(face){
  var v=document.getElementById('video'),btn=document.getElementById('capBtn');
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  btn.disabled=true;btn.textContent='启动中...';
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:face,width:{ideal:640},height:{ideal:480}}});facing=face}
  catch(e){if(face!=='user')return startCam('user');toast('摄像头访问被拒绝，请在浏览器设置中允许');throw e}
  v.srcObject=stream;
  if(v.readyState<2)await new Promise(function(r){v.addEventListener('loadeddata',r,{once:true})});
  await v.play();
  document.getElementById('cam-wrap').classList.toggle('mirror',facing==='user');
  btn.disabled=false;btn.textContent='拍摄';
}

async function capture(){
  var btn=document.getElementById('capBtn');btn.disabled=true;btn.textContent='处理中...';
  try{
    var img=snap();if(!img){btn.disabled=false;btn.textContent='拍摄';return}
    document.getElementById('load').classList.remove('hidden');
    await new Promise(function(r){setTimeout(r,60)});
    if(avatar)scene.remove(avatar);
    avatar=buildAvatar(img);scene.add(avatar);
    renderer.setSize(innerWidth,innerHeight);
    ctl.target.set(0,1.55,0);ctl.autoRotate=true;ctl.update();
    document.getElementById('load').classList.add('hidden');
    showV('md-view');
  }catch(e){document.getElementById('load').classList.add('hidden');toast('出错: '+e.message)}
  finally{btn.disabled=false;btn.textContent='拍摄'}
}

async function swCam(){try{await startCam(facing==='user'?'environment':'user')}catch(e){toast('切换失败')}}
function retake(){if(avatar){scene.remove(avatar);avatar=null}ctl.autoRotate=true;showV('cam-view')}
function dl(){
  if(!avatar)return;document.getElementById('load').classList.remove('hidden');
  try{var exp=new T.GLTFExporter();exp.parse(avatar,function(b){var u=URL.createObjectURL(new Blob([b],{type:'application/octet-stream'}));var a=document.createElement('a');a.href=u;a.download='avatar.glb';a.click();URL.revokeObjectURL(u);document.getElementById('load').classList.add('hidden')},{binary:true})}
  catch(e){document.getElementById('load').classList.add('hidden');toast('下载失败')}
}

window.onload=async function(){
  initScene();anim(0);
  try{await startCam(facing)}catch(e){toast('摄像头: '+e.message)}
  document.getElementById('capBtn').addEventListener('click',capture);
  document.getElementById('swBtn').addEventListener('click',swCam);
  document.getElementById('reBtn').addEventListener('click',retake);
  document.getElementById('dlBtn').addEventListener('click',dl);
};

})();
</script>
</body>
</html>
