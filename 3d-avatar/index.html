<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>3D 头像</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Segoe UI',sans-serif;background:#0a0a14;color:#fff;height:100dvh;width:100vw;overflow:hidden}
.view{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s}
.view.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
#cam{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 80px rgba(60,100,255,.08);border:1px solid rgba(255,255,255,.04);background:#000;width:min(88vw,360px);aspect-ratio:4/3}
#cam video{display:block;width:100%;height:100%;object-fit:cover}
#cam.mirror video{transform:scaleX(-1)}
#oval{position:absolute;top:50%;left:50%;width:50%;height:56%;transform:translate(-50%,-54%);border:1.5px solid rgba(255,255,255,.15);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;pointer-events:none}
#txt{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.22);background:rgba(0,0,0,.4);padding:4px 14px;border-radius:20px;pointer-events:none}
.btns{margin-top:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 24px;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
.btn1{background:linear-gradient(135deg,#4a7cff,#6c5ce7);color:#fff;box-shadow:0 4px 20px rgba(74,124,255,.25)}
.btn1:active{transform:scale(.96)}
.btn1:disabled{opacity:.35;pointer-events:none}
.btn2{background:rgba(255,255,255,.05);color:#bbb;border:1px solid rgba(255,255,255,.06)}
.btn2:active{background:rgba(255,255,255,.1)}
.btn2 svg{width:14px;height:14px;fill:currentColor;opacity:.6}
#cap{min-width:140px;justify-content:center}
#c3d{width:100vw;height:100dvh;display:block}
.ctrl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
.tip{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.15);font-size:11px;z-index:10;background:rgba(0,0,0,.35);padding:5px 14px;border-radius:20px;pointer-events:none}
#load{position:fixed;inset:0;background:rgba(8,8,14,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .35s}
#load.hidden{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:2px solid rgba(255,255,255,.04);border-top-color:#4a7cff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load p{margin-top:14px;font-size:13px;color:rgba(255,255,255,.5)}
#err{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.15);padding:10px 20px;border-radius:10px;font-size:12px;color:#ff6b6b;z-index:200;transition:transform .3s;white-space:nowrap}
#err.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="cam-view" class="view">
  <div id="cam" class="mirror">
    <video id="video" autoplay playsinline muted></video>
    <div id="oval"></div>
    <div id="txt">正面面向镜头</div>
  </div>
  <div class="btns">
    <button id="sw" class="btn btn2">
      <svg viewBox="0 0 24 24"><path d="M12 4c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm-1-6h2v2h-2zm0-6h2v4h-2z"/></svg>
      翻转
    </button>
    <button id="cap" class="btn btn1">启动中...</button>
  </div>
</div>

<div id="load" class="hidden"><div class="sp"></div><p>生成中...</p></div>

<div id="md-view" class="view hidden">
  <div id="c3d"></div>
  <div class="tip">拖动旋转 · 缩放</div>
  <div class="ctrl">
    <button id="re" class="btn btn2">← 重拍</button>
    <button id="dl" class="btn btn1">↓ 下载模型</button>
  </div>
</div>

<div id="err"></div>

<script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const $=id=>document.getElementById(id);

let facing='user', stream=null;

function buildFace(tex,imgW,imgH){
  const W=80,H=64;
  const verts=[],uvs=[],idx=[];

  for(let j=0;j<=H;j++){
    const v=j/H;          // 0=发际线, 1=下巴
    const y=(0.5-v)*0.50; // 3D Y: 上=+0.25, 下=-0.25

    for(let i=0;i<=W;i++){
      const u=i/W;                // 0=左脸, 1=右脸
      const x=(u-0.5)*0.38;       // 3D X: -0.19..+0.19
      const front=1-Math.abs(u-0.5)*2; // 1中心, 0边缘
      const cx=u-0.5;

      let z=0;

      // 脸的基本弧度 (侧面往后弯)
      const sideCurve=-0.06*Math.pow(Math.abs(cx)*2,1.5);
      z+=sideCurve;

      // 鼻子
      const nd=Math.pow((u-0.5)*3.5,2)+Math.pow((v-0.55)*3.2,2);
      z+=0.050*Math.exp(-nd);

      // 鼻梁
      const nb=Math.pow((u-0.5)*5,2)+Math.pow((v-0.42)*2.8,2);
      z+=0.018*Math.exp(-nb)*front;

      // 眼窝
      const el=Math.exp(-Math.pow(u-0.33,2)*40-Math.pow(v-0.44,2)*42);
      const er=Math.exp(-Math.pow(u-0.67,2)*40-Math.pow(v-0.44,2)*42);
      z+=-(el+er)*0.022;

      // 眼皮
      z+=(Math.exp(-Math.pow(u-0.33,2)*28-Math.pow(v-0.40,2)*32)+Math.exp(-Math.pow(u-0.67,2)*28-Math.pow(v-0.40,2)*32))*0.010;

      // 颧骨
      const ckl=Math.exp(-Math.pow(v-0.52,2)*16-Math.pow(u-0.20,2)*22);
      const ckr=Math.exp(-Math.pow(v-0.52,2)*16-Math.pow(u-0.80,2)*22);
      z+=(ckl+ckr)*0.018;

      // 下巴
      z+=Math.exp(-Math.pow((v-0.88)*6,2))*front*0.014;

      // 下颌线
      z+=Math.exp(-Math.pow((v-0.70)*4,2))*0.030;

      // 眉毛
      const bl=Math.exp(-Math.pow(u-0.33,2)*16-Math.pow(v-0.32,2)*36);
      const br=Math.exp(-Math.pow(u-0.67,2)*16-Math.pow(v-0.32,2)*36);
      z+=(bl+br)*0.015;

      // 上唇
      z+=Math.exp(-Math.pow((v-0.68)*28,2))*front*0.008;
      // 下唇
      z+=Math.exp(-Math.pow((v-0.72)*24,2))*front*0.006;

      // 额头微凸
      z+=Math.exp(-Math.pow((v-0.04)*5,2))*0.008;

      // 鼻翼凹陷
      z+=Math.exp(-Math.pow((v-0.56)*5,2)-Math.pow((u-0.5)*8,2))*(-0.005);

      verts.push(x,y,z);
      uvs.push(u,1-v);
      if(i<W&&j<H){
        const a=j*(W+1)+i,b=a+1,c=a+W+1,d=c+1;
        idx.push(a,b,d,a,d,c);
      }
    }
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx);geo.computeVertexNormals();

  const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:tex,roughness:.15,metalness:0}));
  mesh.position.y=1.60;
  return mesh;
}

function processPhoto(img){
  const c=document.createElement('canvas');
  const w=img.width,h=img.height;
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.drawImage(img,0,0);

  const fW=w*.34,fH=fW*1.25,fX=(w-fW)/2,fY=(h-fH)/2;
  const skin=avg(ctx,fX+fW*.3,fY+fH*.12,fW*.4,fH*.55);
  const hair=avg(ctx,w*.25,h*.02,w*.5,h*.12);

  const SZ=512;
  const tx=document.createElement('canvas');tx.width=SZ;tx.height=SZ;
  const tc=tx.getContext('2d');
  tc.fillStyle=`rgb(${skin[0]},${skin[1]},${skin[2]})`;
  tc.fillRect(0,0,SZ,SZ);
  tc.save();tc.beginPath();tc.ellipse(SZ/2,SZ/2,SZ*.30,SZ*.36,0,0,Math.PI*2);tc.clip();
  tc.drawImage(img,fX,fY,fW,fH,0,0,SZ,SZ);
  tc.restore();
  const gr=tc.createRadialGradient(SZ/2,SZ/2,SZ*.08,SZ/2,SZ/2,SZ*.40);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,`rgba(${skin[0]},${skin[1]},${skin[2]},.28)`);
  tc.fillStyle=gr;tc.fillRect(0,0,SZ,SZ);

  const t3=new THREE.CanvasTexture(tx);t3.colorSpace=THREE.SRGBColorSpace;
  return{tex:t3,hair:(hair[0]<<16)|(hair[1]<<8)|hair[2]};
}
function avg(ctx,x,y,w,h){const d=ctx.getImageData(Math.max(0,x|0),Math.max(0,y|0),Math.min(w|0,ctx.canvas.width-x|0),Math.min(h|0,ctx.canvas.height-y|0)).data;let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++}return n?[(r/n|0),(g/n|0),(b/n|0)]:[180,150,130]}

function buildAvatar(img){
  const col=processPhoto(img);const g=new THREE.Group();
  g.add(buildFace(col.tex,img.width,img.height));
  return g;
}

// Scene
let scene,cam,renderer,ctl,avatar,t=0;
function initScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0c0c16);
  cam=new THREE.PerspectiveCamera(30,innerWidth/innerHeight,.1,100);
  cam.position.set(0,1.6,3);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  $('c3d').appendChild(renderer.domElement);
  ctl=new OrbitControls(cam,renderer.domElement);
  ctl.target.set(0,1.55,0);ctl.enableDamping=true;ctl.dampingFactor=.08;
  ctl.minDistance=.5;ctl.maxDistance=3.5;ctl.maxPolarAngle=Math.PI*.75;ctl.minPolarAngle=.15;
  ctl.autoRotate=true;ctl.autoRotateSpeed=1.2;ctl.update();
  ctl.addEventListener('start',()=>ctl.autoRotate=false);
  scene.add(new THREE.AmbientLight(0x334466,.4));
  scene.add(new THREE.HemisphereLight(0x6688dd,0x553322,.5));
  const k=new THREE.DirectionalLight(0xffeedd,2.2);k.position.set(2,3,2.5);k.castShadow=true;
  k.shadow.mapSize.width=1024;k.shadow.mapSize.height=1024;k.shadow.radius=3;scene.add(k);
  scene.add(new THREE.DirectionalLight(0x88ccff,.6).position.set(-2,1.5,-1.5));
  scene.add(new THREE.DirectionalLight(0xff44aa,.2).position.set(1,1.2,-2));
  const fl=new THREE.Mesh(new THREE.CircleGeometry(3,48),new THREE.MeshStandardMaterial({color:0x0e0e1a,roughness:.9,metalness:0,transparent:true,opacity:.35,side:THREE.DoubleSide}));
  fl.rotation.x=-Math.PI/2;fl.position.y=-.2;fl.receiveShadow=true;scene.add(fl);
  addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}
function anim(time){t=time*.001;requestAnimationFrame(anim);if(avatar){avatar.rotation.y=Math.sin(t*.5)*.003;avatar.position.y=Math.sin(t*1.5)*.0015}ctl?.update();renderer?.render(scene,cam)}

// Camera
function snap(){const v=$('video'),w=v.videoWidth||640,h=v.videoHeight||480;if(!w||!h)return null;const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(v,0,0);return c}
function toast(m){const e=$('err');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3500)}
function showV(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));$(id).classList.remove('hidden')}
function ld(v){$('load').classList.toggle('hidden',!v)}

async function startCam(face){
  const v=$('video');
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  $('cap').disabled=true;$('cap').textContent='启动中...';
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:face,width:{ideal:640},height:{ideal:480}}});facing=face}
  catch(e){if(face!=='user')return startCam('user');throw e}
  v.srcObject=stream;
  if(v.readyState<2)await new Promise(r=>{v.addEventListener('loadeddata',r,{once:true})});
  await v.play();
  $('cam').classList.toggle('mirror',facing==='user');
  $('cap').disabled=false;$('cap').textContent='拍摄';
}

async function capture(){
  const btn=$('cap');btn.disabled=true;btn.textContent='处理中...';
  try{
    const img=snap();if(!img){btn.disabled=false;btn.textContent='拍摄';return}
    ld(true);await new Promise(r=>setTimeout(r,80));
    if(avatar)scene.remove(avatar);
    avatar=buildAvatar(img);scene.add(avatar);
    ctl.target.set(0,1.55,0);ctl.autoRotate=true;ctl.update();
    ld(false);showV('md-view');
  }catch(e){ld(false);toast('出错: '+e.message)}
  finally{btn.disabled=false;btn.textContent='拍摄'}
}

async function sw(){await startCam(facing==='user'?'environment':'user').catch(e=>toast('切换失败'))}
function retake(){if(avatar){scene.remove(avatar);avatar=null}ctl.autoRotate=true;showV('cam-view')}

async function init(){
  initScene();anim(0);
  await startCam(facing).catch(e=>toast('摄像头: '+e.message));
  $('cap').addEventListener('click',capture);
  $('sw').addEventListener('click',sw);
  $('re').addEventListener('click',retake);
  showV('cam-view');
}
init();
</script>
</body>
</html>
