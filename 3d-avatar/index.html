<style>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';


const $=id=>document.getElementById(id);

// ═══════════════════════════════════════════════════════════
//  High-Poly Body Mesh Generator
//  ~10,000+ vertices — real 3D geometry, not primitives
// ═══════════════════════════════════════════════════════════

function buildRing(y, rx, rz, seg, dx=0, dz=0) {
  const pts = new Float32Array((seg+1)*3);
  for (let i=0; i<=seg; i++) {
    const a=i/seg*Math.PI*2;
    pts[i*3]=Math.cos(a)*rx+dx;
    pts[i*3+1]=y;
    pts[i*3+2]=Math.sin(a)*rz+dz;
  }
  return pts;
}

function buildTube(rings, seg) {
  const n=rings.length;
  const verts=[], uvs=[], idx=[];
  for (let r=0; r<n; r++) {
    const ring=rings[r];
    const v=r/(n-1);
    for (let i=0; i<=seg; i++) {
      verts.push(ring[i*3], ring[i*3+1], ring[i*3+2]);
      uvs.push(i/seg, v);
      if (r<n-1) {
        const a=r*(seg+1)+i, b=r*(seg+1)+(i+1)%(seg+1);
        const c=(r+1)*(seg+1)+i, d=(r+1)*(seg+1)+(i+1)%(seg+1);
        idx.push(a,b,c,b,d,c);
      }
    }
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}

// Body cross-section profiles — returns array of [rings, material]
function genProfile(cSkin,cCloth,cPants,cShoe) {
  const S=28;
  const skin=new THREE.MeshStandardMaterial({color:cSkin,roughness:0.3,metalness:0});
  const top=new THREE.MeshStandardMaterial({color:cCloth,roughness:0.5,metalness:0.02});
  const pants=new THREE.MeshStandardMaterial({color:cPants,roughness:0.6,metalness:0});
  const shoe=new THREE.MeshStandardMaterial({color:cShoe,roughness:0.7,metalness:0});

  function sec(y,rx,rz,dx=0,dz=0){return {y,rx,rz,dx,dz}}
  function part(rings,mat,dx=0,dz=0){
    const off=rings.map(s=>buildRing(s.y,s.rx,s.rz,S,s.dx+dx,s.dz+dz));
    return new THREE.Mesh(buildTube(off,S),mat);
  }

  const meshes=[];

  // Torso
  const tR=[
    sec(0.76,0.13,0.10),sec(0.78,0.14,0.10),sec(0.80,0.14,0.11),
    sec(0.82,0.14,0.11),sec(0.84,0.14,0.10),sec(0.86,0.14,0.10),
    sec(0.88,0.14,0.10),sec(0.90,0.14,0.10),sec(0.92,0.14,0.10),
    sec(0.94,0.14,0.10),sec(0.96,0.14,0.10),sec(0.98,0.14,0.10),
    sec(1.00,0.14,0.10),sec(1.02,0.14,0.10),sec(1.04,0.15,0.11),
    sec(1.06,0.15,0.11),sec(1.08,0.16,0.11),sec(1.10,0.16,0.11),
    sec(1.12,0.17,0.12),sec(1.14,0.17,0.12),sec(1.16,0.18,0.12),
    sec(1.18,0.18,0.12),sec(1.20,0.19,0.13),sec(1.22,0.19,0.13),
    sec(1.24,0.20,0.13),sec(1.26,0.20,0.14),sec(1.28,0.21,0.14),
    sec(1.30,0.21,0.14),sec(1.32,0.22,0.14),sec(1.34,0.22,0.14),
    sec(1.36,0.22,0.14),sec(1.38,0.22,0.14),sec(1.40,0.22,0.14),
    sec(1.42,0.21,0.14),sec(1.44,0.20,0.13),sec(1.46,0.18,0.12),
    sec(1.48,0.15,0.11),sec(1.50,0.13,0.10),sec(1.52,0.11,0.09),
    sec(1.54,0.10,0.08),sec(1.56,0.09,0.07),
  ];
  const torso=part(tR,top);torso.castShadow=true;meshes.push(torso);

  // Legs
  const lR=[
    sec(0.74,0.10,0.08),sec(0.70,0.10,0.08),sec(0.66,0.09,0.08),
    sec(0.62,0.09,0.07),sec(0.58,0.09,0.07),sec(0.54,0.08,0.07),
    sec(0.50,0.08,0.07),sec(0.46,0.08,0.06),sec(0.42,0.07,0.06),
    sec(0.38,0.07,0.06),sec(0.34,0.07,0.05),sec(0.30,0.06,0.05),
    sec(0.26,0.06,0.05),sec(0.22,0.06,0.05),sec(0.18,0.05,0.04),
    sec(0.14,0.05,0.04),sec(0.10,0.05,0.04),sec(0.07,0.04,0.04),
    sec(0.04,0.04,0.03),sec(0.02,0.04,0.03),sec(0.01,0.05,0.03),
  ];
  const lL=part(lR,pants,-0.09);lL.castShadow=true;meshes.push(lL);
  const lR2=part(lR,pants,0.09);lR2.castShadow=true;meshes.push(lR2);

  // Lower legs (skin)
  const sR=lR.filter(({y})=>y<0.38);
  meshes.push(part(sR,skin,-0.09));meshes.push(part(sR,skin,0.09));

  // Feet
  const fR=[sec(0.01,0.05,0.03),sec(-0.01,0.06,0.04),sec(-0.02,0.04,0.02)];
  meshes.push(part(fR,shoe,-0.09));meshes.push(part(fR,shoe,0.09));

  // Arms
  const aR=[
    sec(0.02,0.06,0.06),sec(-0.02,0.06,0.05),sec(-0.06,0.05,0.05),
    sec(-0.10,0.05,0.05),sec(-0.14,0.05,0.05),sec(-0.18,0.05,0.04),
    sec(-0.22,0.04,0.04),sec(-0.26,0.04,0.04),sec(-0.30,0.04,0.04),
    sec(-0.34,0.04,0.04),sec(-0.38,0.04,0.03),sec(-0.42,0.03,0.03),
    sec(-0.45,0.03,0.03),
  ];
  meshes.push(part(aR,skin,-0.24));meshes.push(part(aR,skin,0.24));

  // Upper arms (clothed)
  const cR=aR.filter(({y})=>y>-0.22);
  meshes.push(part(cR,top,-0.24));meshes.push(part(cR,top,0.24));

  // Neck
  const nR=[sec(1.56,0.09,0.07),sec(1.58,0.08,0.07),sec(1.60,0.08,0.07),sec(1.62,0.08,0.07),sec(1.64,0.07,0.06)];
  meshes.push(part(nR,skin));

  // Shoulder joints
  for(const s of[-1,1]){
    const sh=new THREE.Mesh(new THREE.SphereGeometry(0.07,14,14),top);
    sh.position.set(s*0.24,1.44,0);meshes.push(sh);
  }

  return meshes;
}

// ═══════════════════════════════════════════════════════════
//  High-Poly Head — Deformed UV sphere
//  64×48 = 3072 vertices, facial features sculpted in
// ═══════════════════════════════════════════════════════════

function buildHead() {
  const C=64, R=48;
  const verts=[], uvs=[], idx=[];
  const W=0.21, H=0.26, D=0.21;

  for (let r=0; r<=R; r++) {
    const v=r/R, theta=v*Math.PI, ct=Math.cos(theta), st=Math.sin(theta);
    for (let c=0; c<=C; c++) {
      const u=c/C, phi=u*2*Math.PI, cp=Math.cos(phi), sp=Math.sin(phi);
      const front=cp>0?cp:0, frontS=Math.pow(Math.max(0,cp),3);

      const x=st*cp*W, y=ct*H, z=st*sp*D;

      // ── Facial feature deformations ──
      const fr=Math.exp(-Math.pow((theta-0.78)*1.6,2));
      const nose=0.055*Math.exp(-Math.pow((theta-0.67)*5.5,2))*frontS;
      const nBridge=0.018*Math.exp(-Math.pow((theta-0.44)*6.5,2))*frontS;
      const eT=theta-0.51;
      const eL=Math.exp(-Math.pow(phi-0.44,2)*32-Math.pow(eT,2)*38);
      const eR=Math.exp(-Math.pow(phi+0.44,2)*32-Math.pow(eT,2)*38);
      const eSoc=-(eL+eR)*0.025;
      const eBal=(Math.exp(-Math.pow(phi-0.44,2)*28-Math.pow(eT,2)*30)+
                 Math.exp(-Math.pow(phi+0.44,2)*28-Math.pow(eT,2)*30))*0.010;
      const cheek=Math.exp(-Math.pow(theta-0.80,2)*12-Math.pow(Math.abs(phi)-0.62,2)*18)*0.018;
      const chin=Math.exp(-Math.pow((theta-1.44)*6.5,2))*front*0.012;
      const jaw=Math.exp(-Math.pow((theta-1.22)*3.8,2))*(1-Math.abs(front))*0.045;
      const browL=Math.exp(-Math.pow(phi-0.44,2)*16-Math.pow(theta-0.37,2)*30);
      const browR=Math.exp(-Math.pow(phi+0.44,2)*16-Math.pow(theta-0.37,2)*30);
      const brow=(browL+browR)*0.018;
      const lipU=Math.exp(-Math.pow((theta-1.10)*22,2))*front*0.006;
      const lipL=Math.exp(-Math.pow((theta-1.20)*20,2))*front*0.005;
      const fore=Math.exp(-Math.pow((theta-0.12)*4.5,2))*0.008;
      const ear=Math.exp(-Math.pow((theta-0.72)*4.5,2)-Math.pow(Math.abs(Math.abs(phi)-1.0)*22,2))*0.040;
      const noseW=Math.exp(-Math.pow((theta-0.67)*4,2))*Math.exp(-Math.pow(phi,2)*8)*(-0.005);

      const tz=z+nose+nBridge+eSoc+eBal+cheek+chin+jaw+brow+lipU+lipL+ear+noseW;
      const tx=x+ear*0.3;
      const ty=y+fore;

      verts.push(tx, ty+0.005, tz);
      uvs.push(u, v);
      if (r<R && c<C) {
        const a=r*(C+1)+c,b=r*(C+1)+c+1,d=(r+1)*(C+1)+c,e=(r+1)*(C+1)+c+1;
        idx.push(a,b,d,b,e,d);
      }
    }
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}

// ═══════════════════════════════════════════════════════════
//  Hair
// ═══════════════════════════════════════════════════════════

function buildHair() {
  const C=48,R=24,V=0.50;
  const verts=[],uvs=[],idx=[];
  for (let r=0;r<=R;r++){
    const v=r/R,th=v*Math.PI*V;
    for (let c=0;c<=C;c++){
      const u=c/C,phi=u*2*Math.PI;
      verts.push(Math.sin(th)*Math.cos(phi)*0.22,Math.cos(th)*0.30+1.34,Math.sin(th)*Math.sin(phi)*0.21);
      uvs.push(u,v);
      if(r<R&&c<C){const a=r*(C+1)+c,b=r*(C+1)+c+1,d=(r+1)*(C+1)+c,e=(r+1)*(C+1)+c+1;idx.push(a,b,d,b,e,d)}
    }
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  g.setIndex(idx);g.computeVertexNormals();
  return g;
}

// ═══════════════════════════════════════════════════════════
//  Color Extraction
// ═══════════════════════════════════════════════════════════

function sample(img,x,y,w,h){
  const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
  const d=ctx.getImageData(Math.max(0,x|0),Math.max(0,y|0),Math.min(w|0,img.width),Math.min(h|0,img.height)).data;
  let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++}
  return n?[(r/n|0),(g/n|0),(b/n|0)]:[180,150,130];
}

function makeHeadTex(img){
  const S=512,w=img.width,h=img.height;
  const fw=w*0.38,fh=fw*1.2,fx=(w-fw)/2,fy=(h-fh)/2-h*0.02;
  const skin=sample(img,fx+fw*0.25,fy+fh*0.2,fw*0.5,fh*0.4);
  const c=document.createElement('canvas');c.width=S;c.height=S;
  const ctx=c.getContext('2d');
  ctx.fillStyle=`rgb(${skin[0]},${skin[1]},${skin[2]})`;
  ctx.fillRect(0,0,S,S);
  const fs=S*0.58,ox=(S-fs)/2,oy=(S-fs)/2-S*0.02;
  ctx.save();ctx.beginPath();ctx.ellipse(S/2,S/2,fs/2,fs/2,0,0,Math.PI*2);ctx.clip();
  ctx.drawImage(img,fx,fy,fw,fh,ox,oy,fs,fs);ctx.restore();
  const gr=ctx.createRadialGradient(S/2,S/2,fs*0.2,S/2,S/2,fs*0.5);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,`rgba(${skin[0]},${skin[1]},${skin[2]},0.4)`);
  ctx.fillStyle=gr;ctx.fillRect(0,0,S,S);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
  return t;
}

// ═══════════════════════════════════════════════════════════
//  Avatar Assembly
// ═══════════════════════════════════════════════════════════

function buildAvatar(img) {
  const w=img.width,h=img.height;
  const fw=w*0.38,fh=fw*1.2,fx=(w-fw)/2,fy=(h-fh)/2-h*0.02;
  const skin=sample(img,fx+fw*0.25,fy+fh*0.2,fw*0.5,fh*0.4);
  const hair=sample(img,w*0.25,h*0.02,w*0.5,h*0.12);
  const cloth=sample(img,w*0.15,fy+fh+h*0.04,w*0.7,h*0.2);
  const bright=c=>Math.min(255,c+20);
  const cSkin=(skin[0]<<16)|(skin[1]<<8)|skin[2];
  const cHair=(hair[0]<<16)|(hair[1]<<8)|hair[2];
  const cCloth=(bright(cloth[0])<<16)|(bright(cloth[1])<<8)|bright(cloth[2]);

  const group=new THREE.Group();

  // Body parts (all meshes with proper materials)
  const parts=genProfile(cSkin,cCloth,0x2a2a44,0x0e0e1e);
  for(const p of parts)group.add(p);

  // Head
  const headM=new THREE.MeshStandardMaterial({map:makeHeadTex(img),roughness:0.22,metalness:0});
  const head=new THREE.Mesh(buildHead(),headM);
  head.position.y=1.58;head.castShadow=true;group.add(head);

  // Hair
  const hM=new THREE.MeshStandardMaterial({color:cHair,roughness:0.85,metalness:0});
  group.add(new THREE.Mesh(buildHair(),hM));

  return group;
}

// ═══════════════════════════════════════════════════════════
//  Scene
// ═══════════════════════════════════════════════════════════

let scene,camera,renderer,controls,avatarGroup,animTime=0;

function initScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0c0c16);
  camera=new THREE.PerspectiveCamera(30,innerWidth/innerHeight,0.1,100);
  camera.position.set(1.5,1.3,2.8);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
  $('three-container').appendChild(renderer.domElement);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.78,0);controls.enableDamping=true;controls.dampingFactor=0.06;
  controls.minDistance=0.7;controls.maxDistance=4.0;controls.maxPolarAngle=Math.PI*0.78;
  controls.autoRotate=true;controls.autoRotateSpeed=2.0;controls.update();
  controls.addEventListener('start',()=>controls.autoRotate=false);

  scene.add(new THREE.AmbientLight(0x334466,0.4));
  scene.add(new THREE.HemisphereLight(0x6688dd,0x553322,0.5));
  const k=new THREE.DirectionalLight(0xffeedd,2.2);
  k.position.set(2.5,3.0,2.0);k.castShadow=true;
  k.shadow.mapSize.width=1024;k.shadow.mapSize.height=1024;k.shadow.radius=4;scene.add(k);
  const f=new THREE.DirectionalLight(0x88ccff,0.8);f.position.set(-2.0,1.5,-1.5);scene.add(f);
  const c=new THREE.DirectionalLight(0x44ffff,0.4);c.position.set(-1.0,2.5,-2.5);scene.add(c);
  const m=new THREE.DirectionalLight(0xff44aa,0.3);m.position.set(1.5,1.0,-2.0);scene.add(m);
  scene.add(new THREE.DirectionalLight(0x88aaff,0.3).position.set(0,4,0));

  const g=new THREE.Mesh(new THREE.CircleGeometry(3,48),
    new THREE.MeshStandardMaterial({color:0x0e0e1a,roughness:0.9,metalness:0,transparent:true,opacity:0.35,side:THREE.DoubleSide}));
  g.rotation.x=-Math.PI/2;g.position.y=-0.02;g.receiveShadow=true;scene.add(g);

  const gr=new THREE.GridHelper(4,20,0x1a1a30,0x1a1a30);
  gr.position.y=-0.01;gr.material.transparent=true;gr.material.opacity=0.06;scene.add(gr);

  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function updateAvatar(time){
  if(!avatarGroup)return;
  avatarGroup.position.y=Math.sin(time*1.8)*0.002;
  avatarGroup.rotation.z=Math.sin(time*0.6)*0.0015;
}

function animate(time){
  animTime=time*0.001;requestAnimationFrame(animate);
  updateAvatar(animTime);controls?.update();renderer?.render(scene,camera);
}

// ═══════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════

async function startCamera(){
  const video=$('video');
  video.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
  await video.play();
}

function capturePhoto(){
  const v=$('video'),w=v.videoWidth||640,h=v.videoHeight||480;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.scale(-1,1);ctx.drawImage(v,-w,0,w,h);return c;
}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));$(id).classList.remove('hidden')}
function showLoading(v){$('loading-overlay').classList.toggle('hidden',!v)}
function showError(m){const t=$('error-toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)}

async function onCapture(){
  const btn=$('capture-btn');btn.disabled=true;btn.textContent='● 处理中...';
  try{
    const cap=capturePhoto();showLoading(true);await new Promise(r=>setTimeout(r,50));
    if(avatarGroup)scene.remove(avatarGroup);
    avatarGroup=buildAvatar(cap);scene.add(avatarGroup);
    controls.target.set(0,0.78,0);controls.autoRotate=true;controls.update();
    showLoading(false);showView('model-view');
  }catch(e){showLoading(false);showError('生成失败');console.error(e)}
  finally{btn.disabled=false;btn.textContent='● 捕捉形象'}
}

function onRetake(){if(avatarGroup){scene.remove(avatarGroup);avatarGroup=null}controls.autoRotate=true;showView('camera-view')}
function onDownload(){
  if(!avatarGroup)return;showLoading(true);
  try{new GLTFExporter().parse(avatarGroup,blob=>{const u=URL.createObjectURL(new Blob([blob],{type:'application/octet-stream'}));const a=document.createElement('a');a.href=u;a.download='3d-avatar.glb';a.click();URL.revokeObjectURL(u);showLoading(false)},()=>{showLoading(false);showError('导出失败')},{binary:true});setTimeout(()=>showLoading(false),12000)}
  catch(e){showLoading(false);showError('下载失败')}
}

async function init(){
  try{await startCamera()}catch(e){showError('无法访问摄像头')}
  initScene();animate(0);showView('camera-view');
  $('capture-btn').addEventListener('click',onCapture);
  $('retake-btn').addEventListener('click',onRetake);
  $('download-btn').addEventListener('click',onDownload);
}
init();
</script>
