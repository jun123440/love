<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>3D 头像</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#111;color:#fff;height:100vh;width:100vw;overflow:hidden}
.page{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.page.show{display:flex}
/* -- 拍照页 -- */
#cam-box{position:relative;width:min(88vw,360px);aspect-ratio:4/3;border-radius:14px;overflow:hidden;background:#000;border:2px solid rgba(255,255,255,.12)}
#cam-box video{width:100%;height:100%;object-fit:cover;display:block}
.oval{position:absolute;top:50%;left:50%;width:48%;height:54%;transform:translate(-50%,-54%);border:2px solid rgba(255,255,255,.25);border-radius:50%;pointer-events:none}
.hint-text{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.45);background:rgba(0,0,0,.55);padding:4px 12px;border-radius:14px;pointer-events:none}
#debug{position:fixed;top:6px;right:8px;font-size:10px;color:rgba(255,255,255,.35);background:rgba(0,0,0,.5);padding:3px 8px;border-radius:6px;z-index:300;max-width:200px;word-break:break-all}
.btn-row{margin-top:18px;display:flex;gap:12px}
.btn{padding:12px 26px;border:none;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;letter-spacing:.5px}
.btn:active{opacity:.7}
.btn-go{background:linear-gradient(135deg,#5588ff,#7755f0);color:#fff;min-width:140px}
.btn-go:disabled{opacity:.35}
.btn-out{background:rgba(255,255,255,.1);color:#ddd;border:1px solid rgba(255,255,255,.15)}
.btn-out svg{width:14px;height:14px;fill:currentColor;vertical-align:-2px;margin-right:4px}
/* -- 3D 页 -- */
#gl-box{width:100vw;height:100vh}
.tip-bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:11px;background:rgba(0,0,0,.45);padding:5px 14px;border-radius:14px;pointer-events:none;z-index:5}
.act-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5}
/* -- 加载 -- */
#loading{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loading.show{display:flex}
.ld-spin{width:34px;height:34px;border:2px solid rgba(255,255,255,.08);border-top-color:#5588ff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:12px;font-size:13px;color:rgba(255,255,255,.55)}
/* -- 错误 -- */
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.2);padding:10px 20px;border-radius:10px;font-size:13px;color:#ff6b6b;z-index:200;transition:transform .3s;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- 拍照页 -->
<div id="cam-page" class="page show">
  <div id="cam-box"><video id="v" autoplay playsinline muted></video><div class="oval"></div><div class="hint-text">人脸对准圈内</div></div>
  <div class="btn-row">
    <button id="sw-btn" class="btn btn-out"><svg viewBox="0 0 24 24"><path d="M12 4c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zM11 17h2v-6h-2v6zm1-8c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1z"/></svg>翻转</button>
    <button id="cap-btn" class="btn btn-go" disabled>启动中...</button>
  </div>
</div>

<!-- 3D页 -->
<div id="md-page" class="page">
  <div id="gl-box"></div>
  <div class="tip-bar">拖动旋转 · 缩放</div>
  <div class="act-bar">
    <button id="re-btn" class="btn btn-out">← 重拍</button>
  </div>
</div>

<div id="loading"><div class="ld-spin"></div><p>生成中...</p></div>
<div id="toast"></div>
<div id="debug">加载中...</div>

<!-- === 摄像头脚本（零依赖，立即执行）=== -->
<script>
(function(){
var stream=null, facing='user';

function log(m){var e=document.getElementById('debug');if(e)e.textContent=m}

function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},3000)}
function showPage(id){var ps=document.querySelectorAll('.page');for(var i=0;i<ps.length;i++)ps[i].classList.remove('show');document.getElementById(id).classList.add('show')}
function loading(on){document.getElementById('loading').classList.toggle('show',on)}

async function startCam(face){
  var v=document.getElementById('v'),btn=document.getElementById('cap-btn');
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  btn.disabled=true;btn.textContent='启动中...';log('摄像头启动中...');
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:face,width:{ideal:640},height:{ideal:480}}});
    facing=face;
    v.srcObject=stream;
    await new Promise(function(r){
      if(v.readyState>=2)r();else v.addEventListener('loadeddata',r,{once:true})
    });
    await v.play();
    window._camReady=true;
    btn.disabled=false;btn.textContent='拍摄';
    log('摄像头就绪 | 3D:'+(window._threeReady?'已加载':'加载中'));
  }catch(e){
    log('摄像头错误: '+e.message);
    if(face!=='user'){startCam('user');return}
    btn.disabled=false;btn.textContent='重试';toast('请允许摄像头权限')
  }
}

function snap(){
  var v=document.getElementById('v'),w=v.videoWidth||640,h=v.videoHeight||480;
  if(!w||!h)return null;
  var c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(v,0,0);return c;
}

// 存储拍到的照片和尺寸（给后续3D用）
var photoImg=null,photoW=0,photoH=0;

document.getElementById('cap-btn').onclick=async function(){
  var btn=this,p=snap();if(!p)return;
  photoImg=p;photoW=p.width;photoH=p.height;
  btn.disabled=true;btn.textContent='处理中...';

  // 如果 THREE 已就绪，立即生成
  if(window._threeReady){buildAndShow();return}

  // 否则等 THREE 加载
  loading(true);
  var waited=0;
  var check=function(){
    waited+=200;
    if(window._threeReady){loading(false);buildAndShow()}
    else if(waited<12000)setTimeout(check,200);
    else{loading(false);btn.disabled=false;btn.textContent='拍摄';toast('3D引擎加载失败，请检查网络')}
  };
  setTimeout(check,200);
};

function buildAndShow(){
  try{
    var avatar=buildAvatar(photoImg,photoW,photoH);
    if(window._scene){
      if(window._avatar)window._scene.remove(window._avatar);
      window._avatar=avatar;window._scene.add(avatar);
    }
    showPage('md-page');
  }catch(e){toast('生成失败: '+e.message)}
  var btn=document.getElementById('cap-btn');btn.disabled=false;btn.textContent='拍摄';
}

document.getElementById('sw-btn').onclick=function(){
  startCam(facing==='user'?'environment':'user').catch(function(){});
};

document.getElementById('re-btn').onclick=function(){
  showPage('cam-page');
};

startCam(facing).catch(function(){});
})();
</script>

<!-- === THREE.js + 3D 脚本（异步加载）=== -->
<script>
// 3D 面罩构建
function buildAvatar(img,w,h){
  var T=window.THREE;if(!T)throw new Error('THREE not loaded');

  // 纹理
  var SZ=512;var tx=document.createElement('canvas');tx.width=SZ;tx.height=SZ;
  var tc=tx.getContext('2d');
  var fW=w*.34,fH=fW*1.25,fX=(w-fW)/2,fY=(h-fH)/2;
  tc.drawImage(img,fX,fY,fW,fH,0,0,SZ,SZ);
  var t3=new T.CanvasTexture(tx);
  if(t3.encoding!==undefined)t3.encoding=T.sRGBEncoding;
  else if(t3.colorSpace!==undefined)t3.colorSpace=T.SRGBColorSpace;

  // 面罩网格 80x64
  var W=80,H=64,verts=[],uvs=[],idx=[];
  for(var j=0;j<=H;j++){
    var v=j/H,y=(0.5-v)*0.50;
    for(var i=0;i<=W;i++){
      var u=i/W,x=(u-0.5)*0.38;
      var cx=u-0.5,front=1-Math.abs(cx)*2,z=0;
      z+=-.06*Math.pow(Math.abs(cx)*2,1.5);
      z+=.050*Math.exp(-(Math.pow((u-.5)*3.5,2)+Math.pow((v-.55)*3.2,2)));
      z+=.018*Math.exp(-(Math.pow((u-.5)*5,2)+Math.pow((v-.42)*2.8,2)))*front;
      var el=Math.exp(-Math.pow(u-.33,2)*40-Math.pow(v-.44,2)*42);
      var er=Math.exp(-Math.pow(u-.67,2)*40-Math.pow(v-.44,2)*42);
      z+=-(el+er)*.022;
      z+=(Math.exp(-Math.pow(u-.33,2)*28-Math.pow(v-.40,2)*32)+Math.exp(-Math.pow(u-.67,2)*28-Math.pow(v-.40,2)*32))*.010;
      z+=Math.exp(-Math.pow(v-.88,2)*36)*front*.014+Math.exp(-Math.pow(v-.70,2)*16)*.028;
      verts.push(x,y,z);uvs.push(u,1-v);
      if(i<W&&j<H){var a=j*(W+1)+i,b=a+1,c=a+W+1,d=c+1;idx.push(a,b,d,a,d,c)}
    }
  }
  var geo=new T.BufferGeometry();
  geo.setAttribute('position',new T.BufferAttribute(new Float32Array(verts),3));
  geo.setAttribute('uv',new T.BufferAttribute(new Float32Array(uvs),2));
  geo.setIndex(new T.BufferAttribute(new Uint16Array(idx),1));
  geo.computeVertexNormals();
  var mat=new T.MeshStandardMaterial({map:t3,roughness:.15,metalness:0});
  var mesh=new T.Mesh(geo,mat);mesh.position.y=1.60;mesh.castShadow=true;
  return mesh;
}
</script>

<script async src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>

<script>
// 轮询等待 THREE 就绪
(function checkThree(){
  var e=document.getElementById('debug');
  if(window.THREE){
    initScene();
    window._threeReady=true;
    if(e)e.textContent='3D就绪 | 摄像头:'+(window._camReady?'就绪':'...');
    return;
  }
  if(!window._threeLoadStart)window._threeLoadStart=Date.now();
  if(Date.now()-window._threeLoadStart>15000){if(e)e.textContent='3D加载超时';return}
  if(e)e.textContent='3D引擎加载中...('+Math.floor((Date.now()-(window._threeLoadStart||0))/1000)+'s)';
  setTimeout(checkThree,500);
})();

function initScene(){
  var T=THREE;
  var scene=new T.Scene();scene.background=new T.Color(0x0c0c16);
  var cam=new T.PerspectiveCamera(30,innerWidth/innerHeight,.1,100);
  cam.position.set(0,1.6,3);
  var renderer=new T.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  document.getElementById('gl-box').appendChild(renderer.domElement);

  var ctl=null;
  // 手动旋转
  var drag=false, prevX=0, prevY=0, rotY=0, rotX=0, auto=true;
  var canvas=renderer.domElement;
  canvas.addEventListener('touchstart',function(e){if(e.touches.length===1){drag=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;auto=false}},{passive:false});
  canvas.addEventListener('touchmove',function(e){if(!drag)return;e.preventDefault();var dx=e.touches[0].clientX-prevX,dy=e.touches[0].clientY-prevY;rotY+=dx*.005;rotX+=dy*.005;rotX=Math.max(-1,Math.min(1,rotX));prevX=e.touches[0].clientX;prevY=e.touches[0].clientY},{passive:false});
  canvas.addEventListener('touchend',function(){drag=false});
  canvas.addEventListener('mousedown',function(e){drag=true;prevX=e.clientX;prevY=e.clientY;auto=false});
  canvas.addEventListener('mousemove',function(e){if(!drag)return;e.preventDefault();var dx=e.clientX-prevX,dy=e.clientY-prevY;rotY+=dx*.005;rotX+=dy*.005;rotX=Math.max(-1,Math.min(1,rotX));prevX=e.clientX;prevY=e.clientY});
  canvas.addEventListener('mouseup',function(){drag=false});
  canvas.addEventListener('wheel',function(e){e.preventDefault();cam.position.z+=e.deltaY*.01;cam.position.z=Math.max(.5,Math.min(5,cam.position.z))},{passive:false});
  window._camDist=3;

  scene.add(new T.AmbientLight(0x334466,.4));
  scene.add(new T.HemisphereLight(0x6688dd,0x553322,.5));
  var k=new T.DirectionalLight(0xffeedd,2.2);k.position.set(2,3,2.5);k.castShadow=true;
  k.shadow.mapSize.width=1024;k.shadow.mapSize.height=1024;k.shadow.radius=3;scene.add(k);
  scene.add(new T.DirectionalLight(0x88ccff,.6).position.set(-2,1.5,-1.5));
  var fl=new T.Mesh(new T.CircleGeometry(3,48),new T.MeshStandardMaterial({color:0x0e0e1a,roughness:.9,metalness:0,transparent:true,opacity:.35,side:T.DoubleSide}));
  fl.rotation.x=-Math.PI/2;fl.position.y=-.2;fl.receiveShadow=true;scene.add(fl);

  addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

  var t=0;
  function anim(time){
    t=time*.001;requestAnimationFrame(anim);
    if(auto)rotY=t*.3;
    var av=window._avatar;
    if(av){av.rotation.y=rotY;av.rotation.x=rotX*Math.PI/6}
    cam.position.set(Math.sin(rotY)*window._camDist,1.6+rotX,Math.cos(rotY)*window._camDist);
    cam.lookAt(0,1.55,0);
    renderer.render(scene,cam);
  }
  requestAnimationFrame(anim);

  window._scene=scene;
  window._cam=cam;
  window._renderer=renderer;
  window._ctl=ctl;
}
</script>

</body>
</html>
