<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 人物建模 - 摄像头捕捉</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #08080e;
  color: #fff;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

.view {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.view.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.95);
}

#camera-view {
  background: radial-gradient(ellipse at center, #12121c, #08080e);
}

#camera-container {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(80, 120, 255, 0.15), 0 0 120px rgba(80, 120, 255, 0.05);
  border: 1px solid rgba(255,255,255,0.06);
  background: #000;
  max-width: 90vw;
  max-height: 70vh;
}

#camera-container video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  max-width: 640px;
  max-height: 480px;
}

#capture-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

#capture-overlay::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 55%;
  height: 65%;
  transform: translate(-50%, -55%);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  animation: pulse-border 2s ease-in-out infinite;
}

@keyframes pulse-border {
  0%, 100% { border-color: rgba(255,255,255,0.2); }
  50% { border-color: rgba(255,255,255,0.5); }
}

#capture-overlay .hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  background: rgba(0,0,0,0.6);
  padding: 6px 16px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
}

.btn-group {
  margin-top: 28px;
  display: flex;
  gap: 16px;
  align-items: center;
}

.btn {
  padding: 14px 36px;
  border: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 1px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, #4a7cff, #6c5ce7);
  color: #fff;
  box-shadow: 0 4px 20px rgba(74, 124, 255, 0.35);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(74, 124, 255, 0.5);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}
.btn-secondary:active { transform: translateY(0); }

.btn-icon {
  padding: 12px 20px;
}

#capture-btn {
  min-width: 200px;
  justify-content: center;
}

/* 3D View */
#model-view {
  background: #08080e;
}

#three-container {
  width: 100vw;
  height: 100vh;
  display: block;
}

.model-controls {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  z-index: 10;
}

.model-hint {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.35);
  font-size: 13px;
  letter-spacing: 1px;
  z-index: 10;
  background: rgba(0,0,0,0.5);
  padding: 8px 20px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
}

/* Loading */
#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,8,14,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(12px);
  transition: opacity 0.5s ease;
}
#loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(255,255,255,0.05);
  border-top-color: #4a7cff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#loading-overlay p {
  margin-top: 20px;
  font-size: 16px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 2px;
}

/* Error */
#error-toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(255, 60, 60, 0.15);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 60, 60, 0.25);
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 14px;
  color: #ff6b6b;
  z-index: 200;
  transition: transform 0.4s ease;
  white-space: nowrap;
}
#error-toast.show {
  transform: translateX(-50%) translateY(0);
}

/* Corner decorations */
.corner-deco {
  position: fixed;
  width: 80px;
  height: 80px;
  border: 1px solid rgba(255,255,255,0.03);
  pointer-events: none;
}
.corner-deco.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
.corner-deco.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
.corner-deco.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
.corner-deco.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

/* Responsive */
@media (max-width: 600px) {
  #camera-container { border-radius: 12px; max-height: 55vh; }
  .btn { padding: 12px 24px; font-size: 14px; }
  #capture-btn { min-width: 160px; }
  .model-controls { flex-direction: column; align-items: center; }
  .corner-deco { display: none; }
}
</style>
</head>
<body>

<!-- Camera View -->
<div id="camera-view" class="view">
  <div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="capture-overlay">
      <div class="hint">将面部对准框内</div>
    </div>
  </div>
  <div class="btn-group">
    <button id="capture-btn" class="btn btn-primary">● 捕捉形象</button>
  </div>
</div>

<!-- Loading -->
<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <p>正在生成 3D 模型...</p>
</div>

<!-- 3D View -->
<div id="model-view" class="view hidden">
  <div id="three-container"></div>
  <div class="model-hint">拖动旋转 · 滚轮缩放</div>
  <div class="model-controls">
    <button id="retake-btn" class="btn btn-secondary">← 重新拍摄</button>
    <button id="download-btn" class="btn btn-primary">↓ 下载模型</button>
  </div>
</div>

<!-- Error -->
<div id="error-toast"></div>

<!-- Corner Decorations -->
<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ─── State ──────────────────────────────────────────
let scene, camera, renderer, controls;
let avatarGroup = null;
let currentCapture = null;
let isProcessing = false;

const $ = id => document.getElementById(id);
const video = $('video');
const threeContainer = $('three-container');

// ─── Camera ─────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    showError('无法访问摄像头，请授权摄像头权限');
    throw e;
  }
}

function capturePhoto() {
  const w = video.videoWidth || 640;
  const h = video.videoHeight || 480;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.scale(-1, 1);
  ctx.drawImage(video, -w, 0, w, h);
  return canvas;
}

// ─── Image Processing ───────────────────────────────
function getAverageColor(ctx, x, y, w, h) {
  const data = ctx.getImageData(x, y, w, h).data;
  let r = 0, g = 0, b = 0, count = 0;
  for (let i = 0; i < data.length; i += 4) {
    r += data[i]; g += data[i+1]; b += data[i+2]; count++;
  }
  return { r: r/count|0, g: g/count|0, b: b/count|0 };
}

function rgbToHex(c) {
  return (c.r << 16) | (c.g << 8) | c.b;
}

function hexColor(c) {
  return `#${rgbToHex(c).toString(16).padStart(6, '0')}`;
}

function extractFaceRegion(canvas) {
  const w = canvas.width, h = canvas.height;
  const faceW = w * 0.40;
  const faceH = faceW * 1.2;
  const faceX = (w - faceW) / 2;
  const faceY = (h - faceH) / 2 - h * 0.03;
  return { x: faceX|0, y: faceY|0, w: faceW|0, h: faceH|0 };
}

function processCapture(captureCanvas) {
  const w = captureCanvas.width;
  const h = captureCanvas.height;
  const ctx = captureCanvas.getContext('2d');

  const face = extractFaceRegion(captureCanvas);
  const skinColor = getAverageColor(ctx, face.x, face.y, face.w, face.h);

  const clothY = face.y + face.h + h * 0.05;
  const clothH = h * 0.25;
  const clothColor = getAverageColor(ctx, w * 0.2|0, clothY|0, w * 0.6|0, clothH|0);

  return { face, skinColor, clothColor, captureCanvas };
}

function createFaceTexture(captureCanvas, face, skinColor) {
  const size = 512;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  ctx.fillStyle = hexColor(skinColor);
  ctx.fillRect(0, 0, size, size);

  const faceOnTex = size * 0.65;
  const fx = (size - faceOnTex) / 2;
  const fy = (size - faceOnTex) / 2 - size * 0.02;

  ctx.save();
  ctx.beginPath();
  ctx.ellipse(size/2, size/2, faceOnTex/2, faceOnTex/2, 0, 0, Math.PI*2);
  ctx.clip();

  ctx.drawImage(
    captureCanvas,
    face.x, face.y, face.w, face.h,
    fx, fy, faceOnTex, faceOnTex
  );
  ctx.restore();

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ─── 3D Avatar Builder ──────────────────────────────
function buildAvatar(data) {
  const { face, skinColor, clothColor, captureCanvas } = data;
  const group = new THREE.Group();

  const skinHex = rgbToHex(skinColor);
  const clothHex = rgbToHex(clothColor);
  const skinMat = new THREE.MeshStandardMaterial({
    color: skinHex, roughness: 0.6, metalness: 0.0, flatShading: false
  });
  const clothMat = new THREE.MeshStandardMaterial({
    color: clothHex, roughness: 0.7, metalness: 0.05
  });
  const darkMat = new THREE.MeshStandardMaterial({
    color: 0x222233, roughness: 0.8, metalness: 0.0
  });

  // Face texture for head
  const faceTex = createFaceTexture(captureCanvas, face, skinColor);
  const headMat = new THREE.MeshStandardMaterial({
    map: faceTex, roughness: 0.5, metalness: 0.0
  });

  // ── Head ──
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 40, 32), headMat);
  head.position.y = 1.72;
  head.castShadow = true;
  group.add(head);

  // ── Neck ──
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.14, 0.08, 16), skinMat);
  neck.position.y = 1.52;
  group.add(neck);

  // ── Torso ──
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.28, 0.38, 20), clothMat);
  torso.position.y = 1.2;
  torso.castShadow = true;
  group.add(torso);

  // ── Shoulders ──
  const shoulderGeo = new THREE.SphereGeometry(0.1, 12, 12);
  const sLeft = new THREE.Mesh(shoulderGeo, clothMat);
  sLeft.position.set(-0.34, 1.48, 0);
  group.add(sLeft);
  const sRight = new THREE.Mesh(shoulderGeo, clothMat);
  sRight.position.set(0.34, 1.48, 0);
  group.add(sRight);

  // ── Upper Arms ──
  function makeArm(side, shoulderY) {
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.055, 0.065, 0.28, 12),
      clothMat
    );
    const offset = side === 'left' ? -1 : 1;
    arm.position.set(offset * 0.34, shoulderY - 0.18, 0);
    arm.rotation.z = offset * 0.25;
    arm.castShadow = true;
    return arm;
  }
  group.add(makeArm('left', 1.48));
  group.add(makeArm('right', 1.48));

  // ── Forearms ──
  function makeForearm(side, shoulderY) {
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.045, 0.055, 0.26, 12),
      skinMat
    );
    const offset = side === 'left' ? -1 : 1;
    arm.position.set(offset * 0.4, shoulderY - 0.43, 0.03);
    arm.rotation.z = offset * 0.35;
    return arm;
  }
  group.add(makeForearm('left', 1.48));
  group.add(makeForearm('right', 1.48));

  // ── Hands ──
  function makeHand(side, shoulderY) {
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 10), skinMat);
    const offset = side === 'left' ? -1 : 1;
    hand.position.set(offset * 0.42, shoulderY - 0.62, 0.05);
    return hand;
  }
  group.add(makeHand('left', 1.48));
  group.add(makeHand('right', 1.48));

  // ── Hips ──
  const hip = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.26, 0.14, 16), clothMat);
  hip.position.y = 0.84;
  group.add(hip);

  // ── Upper Legs ──
  function makeUpperLeg(side) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.07, 0.32, 14),
      darkMat
    );
    const offset = side === 'left' ? -1 : 1;
    leg.position.set(offset * 0.12, 0.58, 0);
    leg.castShadow = true;
    return leg;
  }
  group.add(makeUpperLeg('left'));
  group.add(makeUpperLeg('right'));

  // ── Lower Legs ──
  function makeLowerLeg(side) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.07, 0.055, 0.32, 14),
      skinMat
    );
    const offset = side === 'left' ? -1 : 1;
    leg.position.set(offset * 0.12, 0.18, 0);
    return leg;
  }
  group.add(makeLowerLeg('left'));
  group.add(makeLowerLeg('right'));

  // ── Feet ──
  function makeFoot(side) {
    const foot = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.04, 0.12),
      darkMat
    );
    const offset = side === 'left' ? -1 : 1;
    foot.position.set(offset * 0.12, 0.02, 0.04);
    return foot;
  }
  group.add(makeFoot('left'));
  group.add(makeFoot('right'));

  return group;
}

// ─── Three.js Scene ─────────────────────────────────
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a12);

  camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(2.4, 1.8, 3.0);
  camera.lookAt(0, 0.8, 0);

  renderer = new THREE.WebGLRenderer({
    antialias: true, alpha: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  threeContainer.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.85, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 1.2;
  controls.maxDistance = 6;
  controls.maxPolarAngle = Math.PI * 0.85;
  controls.update();

  // Lighting
  const ambient = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.5);
  scene.add(hemi);

  const keyLight = new THREE.DirectionalLight(0xffeedd, 1.6);
  keyLight.position.set(2, 3.5, 2);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.width = 1024;
  keyLight.shadow.mapSize.height = 1024;
  keyLight.shadow.radius = 4;
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0x4488ff, 0.6);
  fillLight.position.set(-1.5, 1, -2);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0x6688cc, 0.4);
  rimLight.position.set(-1, 2, -2);
  scene.add(rimLight);

  // Ground
  const groundGeo = new THREE.CircleGeometry(2.5, 48);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x12121e, roughness: 0.9, metalness: 0.0,
    transparent: true, opacity: 0.6, side: THREE.DoubleSide
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid helper (subtle)
  const grid = new THREE.GridHelper(4, 16, 0x222244, 0x222244);
  grid.position.y = 0.001;
  grid.material.transparent = true;
  grid.material.opacity = 0.25;
  scene.add(grid);

  window.addEventListener('resize', onResize);
}

function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── View Management ────────────────────────────────
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  $(viewId).classList.remove('hidden');
}

function showLoading(show) {
  $('loading-overlay').classList.toggle('hidden', !show);
}

function showError(msg) {
  const toast = $('error-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// ─── Main Capture Flow ──────────────────────────────
async function onCapture() {
  if (isProcessing) return;
  isProcessing = true;
  $('capture-btn').disabled = true;

  try {
    const captureCanvas = capturePhoto();
    currentCapture = captureCanvas;

    showLoading(true);

    await new Promise(r => setTimeout(r, 100));

    const data = processCapture(captureCanvas);

    if (avatarGroup) {
      scene.remove(avatarGroup);
      avatarGroup = null;
    }

    avatarGroup = buildAvatar(data);
    scene.add(avatarGroup);

    controls.target.set(0, 0.85, 0);
    controls.update();

    showLoading(false);
    showView('model-view');
  } catch (e) {
    showLoading(false);
    showError('模型生成失败: ' + e.message);
    console.error(e);
  } finally {
    isProcessing = false;
    $('capture-btn').disabled = false;
  }
}

function onRetake() {
  if (avatarGroup) {
    scene.remove(avatarGroup);
    avatarGroup = null;
  }
  showView('camera-view');
}

function onDownload() {
  if (!avatarGroup) return;
  showLoading(true);

  try {
    const exporter = new GLTFExporter();
    exporter.parse(
      avatarGroup,
      (result) => {
        const blob = new Blob([result], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '3d-avatar.glb';
        a.click();
        URL.revokeObjectURL(url);
        showLoading(false);
      },
      (err) => {
        showLoading(false);
        showError('下载失败');
        console.error(err);
      },
      { binary: true }
    );
    // Timeout safety
    setTimeout(() => showLoading(false), 10000);
  } catch (e) {
    showLoading(false);
    showError('下载失败: ' + e.message);
  }
}

// ─── Animation Loop ─────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls?.update();
  renderer?.render(scene, camera);
}

// ─── Init ───────────────────────────────────────────
async function init() {
  try {
    await startCamera();
    initScene();
    animate();
    showView('camera-view');
  } catch (e) {
    showError('初始化失败: ' + e.message);
  }

  $('capture-btn').addEventListener('click', onCapture);
  $('retake-btn').addEventListener('click', onRetake);
  $('download-btn').addEventListener('click', onDownload);
}

init();
</script>
</body>
</html>
