<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>3D 人脸重建</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#08080e;color:#fff;height:100vh;width:100vw;user-select:none;overflow:hidden}
.view{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease}
.view.hidden{opacity:0;pointer-events:none;transform:scale(.96)}
#camera-view{background:radial-gradient(ellipse at 50% 40%,#141420,#08080e)}
#camera-container{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 80px rgba(60,100,255,.12);border:1px solid rgba(255,255,255,.05);background:#000;max-width:88vw;max-height:68vh}
#camera-container video{display:block;width:100%;height:100%;object-fit:cover;max-width:640px;max-height:480px}
#camera-container.mirror video{transform:scaleX(-1)}
#capture-overlay{position:absolute;inset:0;pointer-events:none}
.face-guide{position:absolute;top:50%;left:50%;width:52%;height:60%;transform:translate(-50%,-54%);border:1.5px solid rgba(255,255,255,.2);border-radius:50% 50% 50% 50%/60% 60% 40% 40%}
.guide-hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.3);letter-spacing:2px;background:rgba(0,0,0,.5);padding:5px 14px;border-radius:20px;backdrop-filter:blur(6px);white-space:nowrap}
.btn-group{margin-top:24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 26px;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s ease;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#4a7cff,#6c5ce7);color:#fff;box-shadow:0 4px 24px rgba(74,124,255,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(74,124,255,.45)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:rgba(255,255,255,.06);color:#ccc;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px)}
.btn-secondary:hover{background:rgba(255,255,255,.12);color:#fff;transform:translateY(-2px)}
.btn-toggle{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);font-size:12px;padding:8px 18px}
.btn-toggle:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-toggle svg{width:14px;height:14px;fill:currentColor;opacity:.7}
#capture-btn{min-width:180px;justify-content:center}
#three-container{width:100vw;height:100vh;display:block}
.model-controls{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;flex-wrap:wrap;justify-content:center}
.model-hint{position:fixed;top:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.18);font-size:12px;z-index:10;background:rgba(0,0,0,.4);padding:6px 16px;border-radius:20px;backdrop-filter:blur(8px);pointer-events:none}
#loading-overlay{position:fixed;inset:0;background:rgba(8,8,14,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(16px);transition:opacity .4s ease}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border:2.5px solid rgba(255,255,255,.04);border-top-color:#4a7cff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-overlay p{margin-top:16px;font-size:14px;color:rgba(255,255,255,.55)}
#processing-bar{margin-top:14px;width:200px;height:2px;background:rgba(255,255,255,.06);overflow:hidden}
#processing-bar::after{content:'';display:block;width:40%;height:100%;background:linear-gradient(90deg,#4a7cff,#6c5ce7);animation:bar-load 1.2s ease-in-out infinite}
@keyframes bar-load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
#error-toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(255,50,50,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,50,50,.2);padding:12px 24px;border-radius:10px;font-size:13px;color:#ff6b6b;z-index:200;transition:transform .35s ease;white-space:nowrap}
#error-toast.show{transform:translateX(-50%) translateY(0)}
.status-tag{position:absolute;top:12px;right:12px;font-size:11px;padding:4px 10px;border-radius:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);color:rgba(255,255,255,.4);pointer-events:none}
.status-tag.ok{color:#4a7cff}
@media(max-width:600px){#camera-container{border-radius:10px;max-height:50vh}.btn{padding:9px 18px;font-size:12px}#capture-btn{min-width:140px}.model-controls{bottom:18px}}
</style>

  <div class="btn-group">

      <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6 2.69-6 6-6zm0 2c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/></svg>

</div>

  <div id="three-container"></div>

</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

const $=id=>document.getElementById(id);

function buildParametricHead(faceTex, landmarks, imgW, imgH) {
  const RX=0.21, RY=0.25, RZ=0.21;
  const CU=96, CV=72;

  let scaleX=1, scaleY=1, offsetX=0, offsetY=0;
  if (landmarks && landmarks.length===70) {
    let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
    for (const p of landmarks) { if(p[0]<mnX)mnX=p[0]; if(p[0]>mxX)mxX=p[0]; if(p[1]<mnY)mnY=p[1]; if(p[1]>mxY)mxY=p[1]; }
    const fW=(mxX-mnX)/imgW, fH=(mxY-mnY)/imgH;
    scaleX=Math.max(.85, Math.min(1.20, fW/0.42));
    scaleY=Math.max(.85, Math.min(1.20, fH/0.56));
    const myX=(mnX+mxX)/2/imgW, myY=(mnY+mxY)/2/imgH;
    offsetX=(myX-0.5)*0.04;
    offsetY=(myY-0.5)*0.02;
  }

  const verts=[], uvs=[], idx=[];

  for (let j=0; j<=CV; j++) {
    const v=j/CV;
    const theta=(1-v)*Math.PI;
    const st=Math.sin(theta), ct=Math.cos(theta);

    for (let i=0; i<=CU; i++) {
      const u=i/CU;
      const phi=u*2*Math.PI;
      const cp=Math.cos(phi), sp=Math.sin(phi);
      const front=cp>0?cp:0;
      const f3=front*front*front;

      let x=st*cp*RX;
      let y=ct*RY;
      let z=st*sp*RZ;

      const nx=x/(RX*RX), ny=y/(RY*RY), nz=z/(RZ*RZ);
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      const nxn=nx/nl, nyn=ny/nl, nzn=nz/nl;

      const nose=.060*Math.exp(-Math.pow((theta-.65)*6,2)-Math.pow(phi*3.2,2));
      const nB=.020*Math.exp(-Math.pow((theta-.42)*7,2))*f3;
      const eT=theta-.50, eL=Math.exp(-Math.pow(phi-.42,2)*35-Math.pow(eT,2)*40);
      const eR=Math.exp(-Math.pow(phi+.42,2)*35-Math.pow(eT,2)*40);
      const eSoc=-(eL+eR)*.028;
      const eBal=(Math.exp(-Math.pow(phi-.42,2)*30-Math.pow(eT,2)*32)+Math.exp(-Math.pow(phi+.42,2)*30-Math.pow(eT,2)*32))*.012;
      const cheek=Math.exp(-Math.pow(theta-.78,2)*14-Math.pow(Math.abs(phi)-.60,2)*20)*.020;
      const chin=Math.exp(-Math.pow((theta-1.42)*7,2))*front*.014;
      const jaw=Math.exp(-Math.pow((theta-1.20)*4,2))*(1-Math.abs(front))*.048;
      const brow=(Math.exp(-Math.pow(phi-.42,2)*18-Math.pow(theta-.35,2)*35)+Math.exp(-Math.pow(phi+.42,2)*18-Math.pow(theta-.35,2)*35))*.020;
      const lipU=Math.exp(-Math.pow((theta-1.08)*25,2))*front*.008;
      const lipL=Math.exp(-Math.pow((theta-1.18)*22,2))*front*.007;
      const fore=Math.exp(-Math.pow((theta-.10)*5,2))*.010;
      const earL=Math.exp(-Math.pow((theta-.70)*5,2)-Math.pow(phi+1.25,2)*50)*.048;
      const earR=Math.exp(-Math.pow((theta-.70)*5,2)-Math.pow(phi-1.23,2)*50)*.048;
      const nW=Math.exp(-Math.pow((theta-.65)*4.5,2)-Math.pow(phi*8,2))*(-.006);

      const dz=nose+nB+eSoc+eBal+cheek+chin+jaw+brow+lipU+lipL+nW;
      const dx=earL*(-.4)+earR*(.4);
      const dy=fore;

      verts.push(
        (x+dx+nxn*dz)*scaleX+offsetX,
        (y+dy+nyn*dz)*scaleY+offsetY,
        z+nzn*dz+(earL+earR)*.3
      );
      uvs.push(u, v);
      if (i<CU && j<CV) { const a=j*(CU+1)+i, b=a+1, c=a+CU+1, d=c+1; idx.push(a,b,d, a,d,c); }
    }
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({map:faceTex, roughness:.18, metalness:0});
  const mesh=new THREE.Mesh(geo, mat);
  mesh.position.y=1.62;
  mesh.castShadow=true;
  return mesh;
}

function makeRing(y,rx,rz,seg,dx=0,dz=0){const p=new Float32Array((seg+1)*3);for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2;p[i*3]=Math.cos(a)*rx+dx;p[i*3+1]=y;p[i*3+2]=Math.sin(a)*rz+dz}return p}
function buildTube(rings,seg){const n=rings.length,verts=[],uvs=[],idx=[];for(let r=0;r<n;r++){const ri=rings[r],v=r/(n-1);for(let i=0;i<=seg;i++){verts.push(ri[i*3],ri[i*3+1],ri[i*3+2]);uvs.push(i/seg,v);if(r<n-1){const a=r*(seg+1)+i,b=r*(seg+1)+(i+1)%(seg+1),c=(r+1)*(seg+1)+i,d=(r+1)*(seg+1)+(i+1)%(seg+1);idx.push(a,b,c,b,d,c)}}}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));g.setIndex(idx);g.computeVertexNormals();return g}
function sec(y,rx,rz){return{y,rx,rz}}
function part(rings,mat,seg,dx=0,dz=0){const m=new THREE.Mesh(buildTube(rings.map(s=>makeRing(s.y,s.rx,s.rz,seg,(s.dx||0)+dx,(s.dz||0)+dz)),seg),mat);m.castShadow=true;return m}

function buildBody(skinC,clothC,pantsC,shoeC){
  const S=28;
  const skin=new THREE.MeshStandardMaterial({color:skinC,roughness:.3,metalness:0});
  const top=new THREE.MeshStandardMaterial({color:clothC,roughness:.5,metalness:.02});
  const pants=new THREE.MeshStandardMaterial({color:pantsC,roughness:.6,metalness:0});
  const shoe=new THREE.MeshStandardMaterial({color:shoeC,roughness:.7,metalness:0});
  const meshes=[];
  const P=(r,m,dx=0,dz=0)=>meshes.push(part(r,m,S,dx,dz));
  P([sec(.76,.13,.10),sec(.78,.14,.10),sec(.80,.14,.11),sec(.82,.14,.11),sec(.84,.14,.10),sec(.86,.14,.10),sec(.88,.14,.10),sec(.90,.14,.10),sec(.92,.14,.10),sec(.94,.14,.10),sec(.96,.14,.10),sec(.98,.14,.10),sec(1.00,.14,.10),sec(1.02,.14,.10),sec(1.04,.15,.11),sec(1.06,.15,.11),sec(1.08,.16,.11),sec(1.10,.16,.11),sec(1.12,.17,.12),sec(1.14,.17,.12),sec(1.16,.18,.12),sec(1.18,.18,.12),sec(1.20,.19,.13),sec(1.22,.19,.13),sec(1.24,.20,.13),sec(1.26,.20,.14),sec(1.28,.21,.14),sec(1.30,.21,.14),sec(1.32,.22,.14),sec(1.34,.22,.14),sec(1.36,.22,.14),sec(1.38,.22,.14),sec(1.40,.22,.14),sec(1.42,.21,.14),sec(1.44,.20,.13),sec(1.46,.18,.12),sec(1.48,.15,.11),sec(1.50,.13,.10),sec(1.52,.11,.09),sec(1.54,.10,.08),sec(1.56,.09,.07)],top);
  const lR=[sec(.74,.10,.08),sec(.70,.10,.08),sec(.66,.09,.08),sec(.62,.09,.07),sec(.58,.09,.07),sec(.54,.08,.07),sec(.50,.08,.07),sec(.46,.08,.06),sec(.42,.07,.06),sec(.38,.07,.06),sec(.34,.07,.05),sec(.30,.06,.05),sec(.26,.06,.05),sec(.22,.06,.05),sec(.18,.05,.04),sec(.14,.05,.04),sec(.10,.05,.04),sec(.07,.04,.04),sec(.04,.04,.03),sec(.02,.04,.03),sec(.01,.05,.03)];
  P(lR,pants,-.09);P(lR,pants,.09);
  P(lR.filter(({y})=>y<.38),skin,-.09);P(lR.filter(({y})=>y<.38),skin,.09);
  P([sec(.01,.05,.03),sec(-.01,.06,.04),sec(-.02,.04,.02)],shoe,-.09);P([sec(.01,.05,.03),sec(-.01,.06,.04),sec(-.02,.04,.02)],shoe,.09);
  const aR=[sec(.02,.06,.06),sec(-.02,.06,.05),sec(-.06,.05,.05),sec(-.10,.05,.05),sec(-.14,.05,.05),sec(-.18,.05,.04),sec(-.22,.04,.04),sec(-.26,.04,.04),sec(-.30,.04,.04),sec(-.34,.04,.04),sec(-.38,.04,.03),sec(-.42,.03,.03),sec(-.45,.03,.03)];
  P(aR,skin,-.24);P(aR,skin,.24);
  P(aR.filter(({y})=>y>-.22),top,-.24);P(aR.filter(({y})=>y>-.22),top,.24);
  P([sec(1.56,.09,.07),sec(1.58,.08,.07),sec(1.60,.08,.07),sec(1.62,.08,.07),sec(1.64,.07,.06)],skin);
  for(const s of[-1,1]){const sh=new THREE.Mesh(new THREE.SphereGeometry(.07,14,14),top);sh.position.set(s*.24,1.44,0);meshes.push(sh)}
  return meshes;
}

function avgPixels(ctx,x,y,w,h){const d=ctx.getImageData(Math.max(0,x|0),Math.max(0,y|0),Math.min(w|0,ctx.canvas.width-x|0),Math.min(h|0,ctx.canvas.height-y|0)).data;let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++}return n?[(r/n|0),(g/n|0),(b/n|0)]:[180,150,130]}

function processImage(img){
  const w=img.width,h=img.height;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
  const fW=w*.38,fH=fW*1.2,fX=(w-fW)/2,fY=(h-fH)/2-h*.02;
  const skin=avgPixels(ctx,fX+fW*.25,fY+fH*.2,fW*.5,fH*.4);
  const hair=avgPixels(ctx,w*.25,h*.02,w*.5,h*.12);
  const cloth=avgPixels(ctx,w*.15,fY+fH+h*.04,w*.7,h*.2);
  const bright=c=>Math.min(255,c+20);
  const S=512;
  const tex=document.createElement('canvas');tex.width=S;tex.height=S;
  const tc=tex.getContext('2d');
  tc.fillStyle=`rgb(${skin[0]},${skin[1]},${skin[2]})`;
  tc.fillRect(0,0,S,S);
  const fs=S*.58,ox=(S-fs)/2,oy=(S-fs)/2-S*.02;
  tc.save();tc.beginPath();tc.ellipse(S/2,S/2,fs/2,fs/2,0,0,Math.PI*2);tc.clip();
  tc.drawImage(img,fX,fY,fW,fH,ox,oy,fs,fs);tc.restore();
  const gr=tc.createRadialGradient(S/2,S/2,fs*.2,S/2,S/2,fs*.5);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,`rgba(${skin[0]},${skin[1]},${skin[2]},.35)`);
  tc.fillStyle=gr;tc.fillRect(0,0,S,S);
  const tex3=new THREE.CanvasTexture(tex);tex3.colorSpace=THREE.SRGBColorSpace;
  return{
    faceTex:tex3,
    skin:(skin[0]<<16)|(skin[1]<<8)|skin[2],
    hair:(hair[0]<<16)|(hair[1]<<8)|hair[2],
    cloth:(bright(cloth[0])<<16)|(bright(cloth[1])<<8)|bright(cloth[2]),
    pants:0x2a2a44, shoe:0x0e0e1e,
  };
}

function buildAvatar(img, landmarks){
  const cols=processImage(img);
  const group=new THREE.Group();
  const body=buildBody(cols.skin,cols.cloth,cols.pants,cols.shoe);
  for(const m of body) group.add(m);
  const headMesh=buildParametricHead(cols.faceTex, landmarks, img.width, img.height);
  group.add(headMesh);

  const hR=24, hC=48; const hVerts=[], hUvs=[], hIdx=[];
  for(let r=0;r<=hR;r++){const v=r/hR, th=v*Math.PI*.5;for(let c=0;c<=hC;c++){const u=c/hC, phi=u*2*Math.PI;hVerts.push(Math.sin(th)*Math.cos(phi)*.22,Math.cos(th)*.30+1.38,Math.sin(th)*Math.sin(phi)*.21);hUvs.push(u,v);if(r<hR&&c<hC){const a=r*(hC+1)+c,b=r*(hC+1)+c+1,d=(r+1)*(hC+1)+c,e=(r+1)*(hC+1)+c+1;hIdx.push(a,b,d,b,e,d)}}}
  const hGeo=new THREE.BufferGeometry();hGeo.setAttribute('position',new THREE.Float32BufferAttribute(hVerts,3));hGeo.setAttribute('uv',new THREE.Float32BufferAttribute(hUvs,2));hGeo.setIndex(hIdx);hGeo.computeVertexNormals();
  group.add(new THREE.Mesh(hGeo, new THREE.MeshStandardMaterial({color:cols.hair,roughness:.85,metalness:0})));

  return group;
}

let scene,camera,renderer,controls,avatarGroup,animTime=0;
function initScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0c0c16);
  camera=new THREE.PerspectiveCamera(30,innerWidth/innerHeight,0.1,100);
  camera.position.set(1.5,1.3,2.8);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
  $('three-container').appendChild(renderer.domElement);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.78,0);controls.enableDamping=true;controls.dampingFactor=0.06;
  controls.minDistance=0.7;controls.maxDistance=4.0;controls.maxPolarAngle=Math.PI*0.78;
  controls.autoRotate=true;controls.autoRotateSpeed=2.0;controls.update();
  controls.addEventListener('start',()=>controls.autoRotate=false);
  scene.add(new THREE.AmbientLight(0x334466,0.4));
  scene.add(new THREE.HemisphereLight(0x6688dd,0x553322,0.5));
  const k=new THREE.DirectionalLight(0xffeedd,2.2);
  k.position.set(2.5,3.0,2.0);k.castShadow=true;
  k.shadow.mapSize.width=1024;k.shadow.mapSize.height=1024;k.shadow.radius=4;scene.add(k);
  scene.add(new THREE.DirectionalLight(0x88ccff,0.8).position.set(-2.0,1.5,-1.5));
  scene.add(new THREE.DirectionalLight(0x44ffff,0.4).position.set(-1.0,2.5,-2.5));
  scene.add(new THREE.DirectionalLight(0xff44aa,0.3).position.set(1.5,1.0,-2.0));
  scene.add(new THREE.DirectionalLight(0x88aaff,0.3).position.set(0,4,0));
  const g=new THREE.Mesh(new THREE.CircleGeometry(3,48),new THREE.MeshStandardMaterial({color:0x0e0e1a,roughness:0.9,metalness:0,transparent:true,opacity:0.35,side:THREE.DoubleSide}));
  g.rotation.x=-Math.PI/2;g.position.y=-0.02;g.receiveShadow=true;scene.add(g);
  const gr=new THREE.GridHelper(4,20,0x1a1a30,0x1a1a30);
  gr.position.y=-0.01;gr.material.transparent=true;gr.material.opacity=0.06;scene.add(gr);
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function updateAvatar(time){if(!avatarGroup)return;avatarGroup.position.y=Math.sin(time*1.8)*0.002;avatarGroup.rotation.z=Math.sin(time*0.6)*0.0015}
function animate(time){animTime=time*0.001;requestAnimationFrame(animate);updateAvatar(animTime);controls?.update();renderer?.render(scene,camera)}

const ctrack=new clm.tracker();ctrack.init();
let detectedLandmarks=null;
let cameraFacing='user';
let videoStream=null;

async function startCamera(facing){
  const video=$('video');
  if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null}
  detectedLandmarks=null;
  ctrack.reset();

  const constraints={video:{facingMode:facing,width:{ideal:640},height:{ideal:480}}};
  videoStream=await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject=videoStream;
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();
  const cont=$('camera-container');
  if(facing==='user') cont.classList.add('mirror'); else cont.classList.remove('mirror');
  ctrack.start(video);
  $('status-tag').classList.remove('ok');
  $('status-tag').textContent='面部检测中...';
  $('capture-btn').disabled=true;
  $('capture-btn').textContent='检测面部';
  trackFace();
}

function trackFace(){
  const video=$('video');
  if(video.readyState>=2){
    const pos=ctrack.getCurrentPosition();
    if(pos){
      detectedLandmarks=pos;
      $('status-tag').textContent='✓ 已检测到面部';
      $('status-tag').classList.add('ok');
      $('capture-btn').disabled=false;
      $('capture-btn').textContent='● 捕捉重建';
    }else{
      $('status-tag').textContent='面部检测中...';
      $('status-tag').classList.remove('ok');
      if(!$('capture-btn').disabled){$('capture-btn').disabled=true;$('capture-btn').textContent='检测面部'}
    }
  }
  requestAnimationFrame(trackFace);
}

function capturePhoto(){const v=$('video'),w=v.videoWidth||640,h=v.videoHeight||480;const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(v,0,0);return c}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));$(id).classList.remove('hidden')}
function showLoading(v){$('loading-overlay').classList.toggle('hidden',!v)}
function showError(m){const t=$('error-toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)}

async function onCapture(){
  const btn=$('capture-btn');btn.disabled=true;btn.textContent='● 处理中...';
  try{
    let lms=detectedLandmarks;
    if(!lms||lms.length!==70){
      const cap=document.createElement('canvas');cap.width=640;cap.height=480;
      cap.getContext('2d').drawImage($('video'),0,0);
      lms=ctrack.track(cap.getContext('2d').getImageData(0,0,640,480).data,640,480);
    }
    const cap=capturePhoto();showLoading(true);await new Promise(r=>setTimeout(r,50));
    if(avatarGroup)scene.remove(avatarGroup);
    avatarGroup=buildAvatar(cap, lms&&lms.length===70?lms:null);
    scene.add(avatarGroup);
    controls.target.set(0,0.78,0);controls.autoRotate=true;controls.update();
    showLoading(false);showView('model-view');
  }catch(e){showLoading(false);showError('生成失败: '+e.message);console.error(e)}
  finally{btn.disabled=false;btn.textContent='● 捕捉重建'}
}

async function onSwitchCamera(){
  cameraFacing=cameraFacing==='user'?'environment':'user';
  $('camera-toggle').innerHTML=cameraFacing==='user'?
    '<svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6 2.69-6 6-6zm0 2c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/></svg>翻转':
    '<svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6 2.69-6 6-6zm0 2c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/></svg>翻转';
  try{await startCamera(cameraFacing)}catch(e){showError('摄像头切换失败')}
}

function onRetake(){if(avatarGroup){scene.remove(avatarGroup);avatarGroup=null}controls.autoRotate=true;showView('camera-view');ctrack.start($('video'));trackFace()}
function onDownload(){
  if(!avatarGroup)return;showLoading(true);
  try{new GLTFExporter().parse(avatarGroup,blob=>{const u=URL.createObjectURL(new Blob([blob],{type:'application/octet-stream'}));const a=document.createElement('a');a.href=u;a.download='3d-avatar.glb';a.click();URL.revokeObjectURL(u);showLoading(false)},()=>{showLoading(false);showError('导出失败')},{binary:true});setTimeout(()=>showLoading(false),12000)}
  catch(e){showLoading(false);showError('下载失败')}
}

async function init(){
  try{await startCamera(cameraFacing)}catch(e){showError('无法访问摄像头: '+e.message)}
  initScene();animate(0);showView('camera-view');
  $('capture-btn').addEventListener('click',onCapture);
  $('camera-toggle').addEventListener('click',onSwitchCamera);
  $('retake-btn').addEventListener('click',onRetake);
  $('download-btn').addEventListener('click',onDownload);
}
init();
</script>
</body>
</html>
