<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 人物建模 - 摄像头捕捉</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #08080e; color: #fff;
  overflow: hidden; height: 100vh; width: 100vw; user-select: none;
}
.view {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.view.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }
#camera-view { background: radial-gradient(ellipse at 50% 40%, #141420, #08080e); }
#camera-container {
  position: relative; border-radius: 16px; overflow: hidden;
  box-shadow: 0 0 80px rgba(60,100,255,0.12);
  border: 1px solid rgba(255,255,255,0.05); background: #000;
  max-width: 88vw; max-height: 68vh;
}
#camera-container video {
  display: block; width: 100%; height: 100%;
  object-fit: cover; transform: scaleX(-1);
  max-width: 640px; max-height: 480px;
}
#capture-overlay { position: absolute; inset: 0; pointer-events: none; }
.face-guide {
  position: absolute; top: 50%; left: 50%;
  width: 52%; height: 60%;
  transform: translate(-50%, -54%);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
}
.guide-hint {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px;
  background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 20px;
  backdrop-filter: blur(6px); white-space: nowrap;
}
.btn-group { margin-top: 24px; display: flex; gap: 14px; align-items: center; }
.btn {
  padding: 13px 32px; border: none; border-radius: 50px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.25s ease; letter-spacing: 0.5px;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #4a7cff, #6c5ce7);
  color: #fff; box-shadow: 0 4px 24px rgba(74,124,255,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(74,124,255,0.45); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: rgba(255,255,255,0.06); color: #ccc;
  border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-2px); }
#capture-btn { min-width: 180px; justify-content: center; }
#three-container { width: 100vw; height: 100vh; display: block; }
.model-controls {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 10;
}
.model-hint {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.2); font-size: 12px; z-index: 10;
  background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px;
  backdrop-filter: blur(8px);
}
#loading-overlay {
  position: fixed; inset: 0; background: rgba(8,8,14,0.85);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 100; backdrop-filter: blur(16px);
  transition: opacity 0.4s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 44px; height: 44px; border: 2.5px solid rgba(255,255,255,0.04);
  border-top-color: #4a7cff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.55); }
#processing-bar {
  margin-top: 14px; width: 200px; height: 2px;
  background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
#processing-bar::after {
  content: ''; display: block; width: 40%; height: 100%;
  background: linear-gradient(90deg, #4a7cff, #6c5ce7);
  border-radius: 2px; animation: bar-load 1.2s ease-in-out infinite;
}
@keyframes bar-load {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}
#error-toast {
  position: fixed; bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(255,50,50,0.12); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,50,50,0.2); padding: 12px 24px;
  border-radius: 10px; font-size: 13px; color: #ff6b6b;
  z-index: 200; transition: transform 0.35s ease; white-space: nowrap;
}
#error-toast.show { transform: translateX(-50%) translateY(0); }
@media (max-width: 600px) {
  #camera-container { border-radius: 10px; max-height: 50vh; }
  .btn { padding: 11px 22px; font-size: 13px; }
  #capture-btn { min-width: 150px; }
  .model-controls { flex-wrap: wrap; justify-content: center; bottom: 20px; }
}
</style>
</head>
<body>

<div id="camera-view" class="view">
  <div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="capture-overlay">
      <div class="face-guide"></div>
      <div class="guide-hint">将面部对准椭圆区域</div>
    </div>
  </div>
  <div class="btn-group">
    <button id="capture-btn" class="btn btn-primary">● 捕捉形象</button>
  </div>
</div>

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <p>正在生成 3D 模型</p>
  <div id="processing-bar"></div>
</div>

<div id="model-view" class="view hidden">
  <div id="three-container"></div>
  <div class="model-hint">拖动旋转 · 滚轮缩放</div>
  <div class="model-controls">
    <button id="retake-btn" class="btn btn-secondary">← 重新拍摄</button>
    <button id="download-btn" class="btn btn-primary">↓ 下载 .glb</button>
  </div>
</div>

<div id="error-toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ─── Parametric Face Geometry ─────────────────────
function createHeadGeometry() {
  const C = 40, R = 30;
  const verts = [], uvs = [], idx = [];

  const W = 0.30, H = 0.38, D = 0.28;

  for (let r = 0; r <= R; r++) {
    const v = r / R;
    const theta = v * Math.PI;
    const ct = Math.cos(theta), st = Math.sin(theta);

    for (let c = 0; c <= C; c++) {
      const u = c / C;
      const phi = u * 2 * Math.PI;
      const cp = Math.cos(phi), sp = Math.sin(phi);
      const front = cp > 0 ? cp : 0;

      const x = st * cp * W;
      const y = ct * H;
      const z = st * sp * D;

      const nose = 0.055 * Math.exp(-Math.pow((theta - 0.72) * 5, 2)) * front;
      const bridge = 0.018 * Math.exp(-Math.pow((theta - 0.48) * 7, 2)) * front;
      const eLvl = theta - 0.58;
      const eye = (Math.exp(-Math.pow(phi - 0.5, 2)*28 - Math.pow(eLvl,2)*32) +
                   Math.exp(-Math.pow(phi + 0.5, 2)*28 - Math.pow(eLvl,2)*32)) * (-0.018);
      const cheek = Math.exp(-Math.pow(theta-0.85,2)*10 - Math.pow(Math.abs(phi)-0.75,2)*16) * 0.012;
      const chin = Math.exp(-Math.pow((theta-1.5)*7, 2)) * front * 0.006;
      const jaw = Math.exp(-Math.pow((theta-1.3)*3.5,2)) * (1 - front) * 0.035;
      const brow = (Math.exp(-Math.pow(phi-0.55,2)*15 - Math.pow(theta-0.42,2)*30) +
                    Math.exp(-Math.pow(phi+0.55,2)*15 - Math.pow(theta-0.42,2)*30)) * 0.012;

      verts.push(x, y, z + nose + bridge + eye + cheek + chin + jaw + brow);
      uvs.push(u, v);

      if (r < R && c < C) {
        const a = r*(C+1)+c, b = r*(C+1)+c+1;
        const d = (r+1)*(C+1)+c, e = (r+1)*(C+1)+c+1;
        idx.push(a,b,d, b,e,d);
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// ─── Hair Geometry ────────────────────────────────
function createHairGeometry() {
  const C = 36, R = 16;
  const verts = [], uvs = [], idx = [];

  for (let r = 0; r <= R; r++) {
    const v = r / R;
    const theta = v * Math.PI * 0.55;
    for (let c = 0; c <= C; c++) {
      const u = c / C;
      const phi = u * 2 * Math.PI;
      const x = Math.sin(theta) * Math.cos(phi) * 0.29;
      const y = Math.cos(theta) * 0.42 + 0.02;
      const z = Math.sin(theta) * Math.sin(phi) * 0.28;
      verts.push(x, y + 1.30, z);
      uvs.push(u, v);
      if (r < R && c < C) {
        const a = r*(C+1)+c, b = r*(C+1)+c+1;
        const d = (r+1)*(C+1)+c, e = (r+1)*(C+1)+c+1;
        idx.push(a,b,d, b,e,d);
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// ─── Texture Creation ─────────────────────────────
function buildHeadTexture(src, srcW, srcH) {
  const S = 512;
  const faceW = srcW * 0.38, faceH = faceW * 1.2;
  const fx = (srcW - faceW) / 2, fy = (srcH - faceH) / 2 - srcH * 0.02;

  const tmp = document.createElement('canvas');
  tmp.width = srcW; tmp.height = srcH;
  const tc = tmp.getContext('2d');
  tc.drawImage(src, 0, 0);

  // Skin color from face center
  const sd = tc.getImageData(fx + faceW*0.25|0, fy + faceH*0.2|0, faceW*0.5|0, faceH*0.4|0).data;
  let sr=0,sg=0,sb=0,sc=0;
  for (let i=0; i<sd.length; i+=4) { sr+=sd[i]; sg+=sd[i+1]; sb+=sd[i+2]; sc++; }
  sr=sc?sr/sc|0:180; sg=sc?sg/sc|0:150; sb=sc?sb/sc|0:130;

  // Hair color from top region
  const hd = tc.getImageData(srcW*0.3|0, srcH*0.02|0, srcW*0.4|0, srcH*0.15|0).data;
  let hr=0,hg=0,hb=0,hc=0;
  for (let i=0; i<hd.length; i+=4) { hr+=hd[i]; hg+=hd[i+1]; hb+=hd[i+2]; hc++; }
  hr=hc?hr/hc|0:40; hg=hc?hg/hc|0:30; hb=hc?hb/hc|0:20;

  // Cloth color from chest
  const cy = fy + faceH + srcH * 0.04;
  const cd2 = tc.getImageData(srcW*0.15|0, cy|0, srcW*0.7|0, srcH*0.2|0).data;
  let cr=80,cg=100,cb=140,cc2=0;
  for (let i=0; i<cd2.length; i+=4) { cr+=cd2[i]; cg+=cd2[i+1]; cb+=cd2[i+2]; cc2++; }
  cr=cc2?cr/cc2|0:80; cg=cc2?cg/cc2|0:100; cb=cc2?cb/cc2|0:140;

  const tex = document.createElement('canvas');
  tex.width = S; tex.height = S;
  const ctx = tex.getContext('2d');
  ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
  ctx.fillRect(0, 0, S, S);
  const fs = S * 0.65;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(S/2, S/2, fs/2, fs/2, 0, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(src, fx, fy, faceW, faceH, (S-fs)/2, (S-fs)/2 - S*0.02, fs, fs);
  ctx.restore();
  const g = ctx.createRadialGradient(S/2, S/2, fs*0.2, S/2, S/2, fs*0.52);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, `rgba(${sr},${sg},${sb},0.35)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, S, S);

  return {
    faceTex: new THREE.CanvasTexture(tex),
    skinColor: `rgb(${sr},${sg},${sb})`,
    skinHex: (sr<<16)|(sg<<8)|sb,
    clothHex: (cr<<16)|(cg<<8)|cb,
    hairHex: (hr<<16)|(hg<<8)|hb
  };
}

// ─── Avatar Assembly ──────────────────────────────
function buildAvatar(src) {
  const w = src.width, h = src.height;
  const texData = buildHeadTexture(src, w, h);
  const group = new THREE.Group();

  const skinM = new THREE.MeshStandardMaterial({ color: texData.skinHex, roughness: 0.35, metalness: 0.0 });
  const clothM = new THREE.MeshStandardMaterial({ color: texData.clothHex, roughness: 0.55, metalness: 0.02 });
  const pantsM = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7, metalness: 0.0 });
  const shoeM = new THREE.MeshStandardMaterial({ color: 0x0e0e1e, roughness: 0.8, metalness: 0.0 });
  const hairM = new THREE.MeshStandardMaterial({ color: texData.hairHex, roughness: 0.9, metalness: 0.0 });
  const headM = new THREE.MeshStandardMaterial({ map: texData.faceTex, roughness: 0.3, metalness: 0.0 });

  // Head
  const head = new THREE.Mesh(createHeadGeometry(), headM);
  head.position.y = 1.72;
  head.castShadow = true;
  group.add(head);

  // Hair
  const hair = new THREE.Mesh(createHairGeometry(), hairM);
  group.add(hair);

  // Neck
  const neck = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.02, 6, 14), skinM);
  neck.position.y = 1.50;
  group.add(neck);

  // Torso
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.30, 0.18, 8, 20), clothM);
  torso.position.y = 1.18;
  torso.castShadow = true;
  group.add(torso);

  // Hip
  const hip = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.06, 8, 18), clothM);
  hip.position.y = 0.84;
  group.add(hip);

  // Shoulders
  for (const s of [-1, 1]) {
    const sh = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), clothM);
    sh.position.set(s * 0.34, 1.45, 0);
    group.add(sh);
  }

  // Upper arms
  for (const s of [-1, 1]) {
    const a = new THREE.Mesh(new THREE.CapsuleGeometry(0.05, 0.16, 6, 14), clothM);
    a.position.set(s * 0.36, 1.28, 0);
    a.rotation.z = s * 0.30;
    a.castShadow = true;
    group.add(a);
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 10), clothM);
    e.position.set(s * 0.42, 1.08, 0.02);
    group.add(e);
  }

  // Forearms
  for (const s of [-1, 1]) {
    const a = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.16, 6, 14), skinM);
    a.position.set(s * 0.42, 0.92, 0.04);
    a.rotation.z = s * 0.40;
    group.add(a);
  }

  // Hands
  for (const s of [-1, 1]) {
    const h2 = new THREE.Mesh(new THREE.SphereGeometry(0.03, 10, 10), skinM);
    h2.position.set(s * 0.44, 0.77, 0.06);
    group.add(h2);
  }

  // Upper legs
  for (const s of [-1, 1]) {
    const l = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.18, 7, 16), pantsM);
    l.position.set(s * 0.10, 0.56, 0);
    l.castShadow = true;
    group.add(l);
    const k = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), pantsM);
    k.position.set(s * 0.10, 0.34, 0);
    group.add(k);
  }

  // Lower legs
  for (const s of [-1, 1]) {
    const l = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.18, 7, 16), skinM);
    l.position.set(s * 0.10, 0.18, 0);
    group.add(l);
  }

  // Feet
  for (const s of [-1, 1]) {
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.10), shoeM);
    f.position.set(s * 0.10, 0.015, 0.03);
    group.add(f);
  }

  return group;
}

// ─── Scene ─────────────────────────────────────────
let scene, camera, renderer, controls, avatarGroup, animTime = 0;

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c16);
  camera = new THREE.PerspectiveCamera(36, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(1.8, 1.5, 2.6);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  $('three-container').appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.85, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 1.0;
  controls.maxDistance = 5;
  controls.maxPolarAngle = Math.PI * 0.82;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.6;
  controls.update();
  controls.addEventListener('start', () => controls.autoRotate = false);

  scene.add(new THREE.AmbientLight(0x333366, 0.5));
  scene.add(new THREE.HemisphereLight(0x6677cc, 0x443322, 0.5));
  const k = new THREE.DirectionalLight(0xffeedd, 1.8);
  k.position.set(2, 3.5, 2.5);
  k.castShadow = true;
  k.shadow.mapSize.width = 1024;
  k.shadow.mapSize.height = 1024;
  k.shadow.radius = 4;
  k.shadow.bias = -0.001;
  scene.add(k);
  const f = new THREE.DirectionalLight(0x88bbff, 0.7);
  f.position.set(-2, 1.5, -1.5);
  scene.add(f);
  const r = new THREE.DirectionalLight(0xaaccff, 0.5);
  r.position.set(-0.5, 3, -3);
  scene.add(r);
  scene.add(new THREE.DirectionalLight(0x88aaff, 0.3).position.set(0, 4, 0));

  const g = new THREE.Mesh(
    new THREE.CircleGeometry(2.5, 48),
    new THREE.MeshStandardMaterial({ color: 0x0e0e1a, roughness: 0.9, metalness: 0, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
  );
  g.rotation.x = -Math.PI/2; g.position.y = 0; g.receiveShadow = true;
  scene.add(g);

  const gr = new THREE.GridHelper(4, 20, 0x1a1a30, 0x1a1a30);
  gr.position.y = 0.001;
  gr.material.transparent = true;
  gr.material.opacity = 0.10;
  scene.add(gr);

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function updateAvatar(time) {
  if (!avatarGroup) return;
  avatarGroup.position.y = Math.sin(time * 1.8) * 0.003;
  avatarGroup.rotation.z = Math.sin(time * 0.6) * 0.002;
}

function animate(time) {
  animTime = time * 0.001;
  requestAnimationFrame(animate);
  updateAvatar(animTime);
  controls?.update();
  renderer?.render(scene, camera);
}

// ─── Camera ────────────────────────────────────────
const $ = id => document.getElementById(id);

async function startCamera() {
  const video = $('video');
  video.srcObject = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  });
  await video.play();
}

function capturePhoto() {
  const video = $('video');
  const w = video.videoWidth || 640, h = video.videoHeight || 480;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.scale(-1, 1);
  ctx.drawImage(video, -w, 0, w, h);
  return c;
}

// ─── UI ────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  $(id).classList.remove('hidden');
}
function showLoading(v) { $('loading-overlay').classList.toggle('hidden', !v); }
function showError(m) { const t = $('error-toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 4000); }

async function onCapture() {
  const btn = $('capture-btn');
  btn.disabled = true;
  btn.textContent = '● 处理中...';
  try {
    const cap = capturePhoto();
    showLoading(true);
    await new Promise(r => setTimeout(r, 50));
    if (avatarGroup) scene.remove(avatarGroup);
    avatarGroup = buildAvatar(cap);
    scene.add(avatarGroup);
    controls.target.set(0, 0.85, 0);
    controls.autoRotate = true;
    controls.update();
    showLoading(false);
    showView('model-view');
  } catch (e) { showLoading(false); showError('生成失败: ' + e.message); console.error(e); }
  finally { btn.disabled = false; btn.textContent = '● 捕捉形象'; }
}

function onRetake() {
  if (avatarGroup) { scene.remove(avatarGroup); avatarGroup = null; }
  controls.autoRotate = true;
  showView('camera-view');
}

function onDownload() {
  if (!avatarGroup) return;
  showLoading(true);
  try {
    new GLTFExporter().parse(avatarGroup, blob => {
      const url = URL.createObjectURL(new Blob([blob], { type:'application/octet-stream' }));
      const a = document.createElement('a'); a.href = url; a.download = '3d-avatar.glb'; a.click();
      URL.revokeObjectURL(url); showLoading(false);
    }, () => { showLoading(false); showError('导出失败'); }, { binary: true });
    setTimeout(() => showLoading(false), 12000);
  } catch (e) { showLoading(false); showError('下载失败'); }
}

// ─── Init ──────────────────────────────────────────
async function init() {
  try { await startCamera(); } catch (e) { showError('无法访问摄像头'); }
  initScene();
  animate(0);
  showView('camera-view');
  $('capture-btn').addEventListener('click', onCapture);
  $('retake-btn').addEventListener('click', onRetake);
  $('download-btn').addEventListener('click', onDownload);
}

init();
</script>
</body>
